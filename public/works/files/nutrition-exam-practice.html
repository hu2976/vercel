: "q", "stem": "4.下列关于再喂养综合征的描述中，不正确的是（ ）", "options": ["A.再喂养综合征的高危人群主要是慢性营养不良、虚弱的老年人、癌症和危重症患者等", "B.再喂养综合征是营养不良伴合成代谢状态下的机体对营养治疗的一种过度适应性反应", "C.再喂养综合征除了电解质紊乱相关的症状，主要为水肿、心动过速和呼吸急促", "D.再喂养综合征严重者可危及生命"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1501。", "再喂养综合征是营养不良伴分解代谢状态下的机体对营养治疗的一种过度适应性反应。不是合成代谢状态。"]}, {"type": "q", "stem": "5.再喂养时，大量补充葡萄糖可引起的糖脂代谢异常不包括（ ）", "options": ["A.高血糖", "B.高胆固醇血症", "C.渗透性利尿或脱水", "D.高甘油三酯血症"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1502。", "再喂养时，持续、大量和快速补充葡萄糖易造成高血糖，甚至并发高渗性非酮症昏迷、酮症酸中毒、渗透性利尿或脱水。此外，大量补充葡萄糖可促进脂肪合成代谢，易引起高甘油三酯血症。"]}], "qn": 5}]}, {"name": "六、营养与慢性疾病", "count": 84, "ntopic": 17, "topics": [{"title": "122 营养与肥胖（上）", "items": [{"type": "context", "text": "[2017RD真题]某男性患者在营养门诊进行体格测量，身高175cm，体重90kg，腰围98cm，臀围101cm，上臂周长339mm，肱三头肌皮褶厚度19.5mm。"}, {"type": "q", "stem": "1.该患者的BMI（kg/m2）值是（  ）", "options": ["A.22.0", "B.26.4", "C.29.4", "D.31.4"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P197。", "BMI=体重（kg）/[身高（m）]2=90/1.752=29.4。"]}, {"type": "q", "stem": "2.对该患者体格状况判断为（  ）", "options": ["A.消瘦", "B.正常", "C.超重", "D.肥胖"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P197。", "我国成人BMI 标准：BMI<18.5 为消瘦，18.5~23.9为正常，24.0~27.9 为超重，≥28.0 为肥胖。"]}, {"type": "q", "stem": "3.该患者的上臂肌围值是多少（  ）", "options": ["A.31.95cm", "B.29.95cm", "C.27.78cm", "D.25.78cm"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P28。", "上臂肌围（arm muscle circumference ，AMC）上臂周长（arm circurnference，AC）肱三头肌皮褶厚度（triceps skin-fold thickness，TSF）AMC (mm) =AC (mm) -3.14×TSF(mm) =339-3.14×19.5=277.8(mm)"]}, {"type": "q", "stem": "4.对该患者进行腰臀比测量的意义是（  ）", "options": ["A.评估身体的脂肪分布", "B.评估身体蛋白质的分布", "C.评估身体肌肉的分布", "D.评估减肥的金标准"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P197。", "腰臀比（WHR）是腰围和臀围的比值，也是判定中心性肥胖的重要指标。", "WHO建议腰臀比男性≥0.9、女性≥0.8作为上身性肥胖的标准。"]}, {"type": "q", "stem": "[2021RD真题]5.下列关于运动控制体重的描述中，错误的是（  ）", "options": ["A.运动可以增加瘦组织，并增加基础代谢", "B.有氧运动可以针对腰臀部位局部减脂", "C.应逐渐达到每周运动150min以上，每周运动3~5天", "D.运动可以增加胰岛素敏感性并强化心肺功能"], "answer": "答案：B", "analysis": ["解析：有氧运动不能局部减脂。"]}], "qn": 5}, {"title": "123 营养与肥胖（中）", "items": [{"type": "context", "text": "[2023RD真题]张先生，IT人员，38岁，身高172cm，体重76kg，平时身体健康，无心脏疾病，不运动，经常坐在电脑前工作，最近发现体重超重决定运动，制定一周计划：周一跑步30分钟，周二、三游泳20分钟，周四骑车30min，周五打乒乓球30mim，周六、日体息。"}, {"type": "q", "stem": "1.根据我国成人BMI标准，评估张先生体型状况是（  ）", "options": ["A.超重", "B.正常体重", "C.肥胖", "D.消瘦"], "answer": "", "analysis": ["解析：《营养与食品卫生学》第9版P197。", "体质指数(BMI) =体重(kg)/ [身高(m)]2=76÷1.72÷1.72≈25.7kg/m2。", "我国成人BMI标准：BMI<18.5消瘦，18.5~23.9正常，24.0~27.9超重，≥28.0肥胖。"]}, {"type": "q", "stem": "2.对于张先生的饮食建议最合理的是（  ）", "options": ["A.建议摄入富含碳水化合物的食物", "B.建议摄入富含膳食纤维的食物", "C.未回忆出", "D.建议摄入优质蛋白质食物的摄入"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P201。", "富含膳食纤维的食物有益于健康，尤其是对肥胖者，因此膳食纤维的摄入可不加限制，每天膳食纤维的供给量在25~30g为宜。"]}, {"type": "q", "stem": "3.下列运动类型中，适合张先生选择的是（  ）①跑步；②举重；③爬山；④游泳；⑤打球。", "options": ["A.①②③④", "B.②③④⑤", "C.①②④⑤", "D.①③④⑤"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P202。", "规律的、中等强度的有氧运动是控制体重的有效方法。举重是高强度抗阻运动，属于无氧运动，且需专业指导，初学者易因姿势错误导致肌肉拉伤或关节损伤。"]}, {"type": "context", "text": "[2021RD真题]王某，女，46岁，银行职员，158cm，81kg，无运动习惯。因为走路时膝盖疼，医院诊断骨关节炎，给予非甾体类抗炎药，建议减重并调整生活方式。"}, {"type": "q", "stem": "4.王某在网络上搜索，采用饥饿减重法，下列正确的是（  ）", "options": ["A.长期采用会导致心率不齐及低血压", "B.长期采用会导致基础代谢率增加", "C.体内肝糖原仅能供前3天的能量需要", "D.初期体脂肪快速下降"], "answer": "答案：A", "analysis": ["解析：", "B错。长期采用会导致基础代谢率降低。", "C错。体内糖原的储备有限，如果没有补充，在12~24小时肝糖原即被耗尽。", "D错。初期水分快速下降。"]}, {"type": "q", "stem": "5.给她制定的减重方案中，错误的是（  ）", "options": ["A.每天膳食纤维摄入量14g/1000Kcal", "B.可以结合饮食调整、运动、行为干预、心理治疗和健康教育", "C.首选轻断食模式", "D.减重初期目标：体重下降≥5%"], "answer": "答案：C", "analysis": ["解析：非甾体类抗炎药伤胃，轻断食雪上加霜。"]}], "qn": 5}, {"title": "124 营养与肥胖（下）", "items": [{"type": "q", "stem": "[2023RD真题]1.根据《中国居民营养与慢性病状况报告2020》，我国6~17岁儿童青少年超重率11.1%，肥胖率7.9%，均比2015年发布结果上升，为预防儿童青少年超重肥胖，下列做法中，正确的是（  ）", "options": ["A.只选择植物油", "B.不过度限制膳食脂肪摄入，脂肪摄入量控制在占总能量的20%~30%", "C.限制脂肪摄入，将脂肪摄入量控制在占总能量的20%以下", "D.严格控制脂肪摄入，不吃肥肉"], "answer": "答案：B", "analysis": ["解析：", "A错，油要换着吃，动物油不是绝对禁忌。", "B对，脂肪摄入量控制在占总能量的20%~30%合理。", "C错，脂肪摄入量控制在占总能量的20%以下，太低。", "D错，不用那么严格，可以适量吃。"]}, {"type": "context", "text": "[2024RD真题]王某，男，31岁。身高178cm，体重95kg，IT公司程序员。平时工作繁忙，很少参加体育活动。春节期间看了电影《热辣滚烫》，被演员贾玲减重100斤所震撼，希望也可以通过饮食和运动改善自己的身体健康状况。"}, {"type": "q", "stem": "2.若为王某设计食谱，下列关于能量摄入目标值描述中，最合理的是（ ）", "options": ["A.1800kcal", "B.2200Kcal", "C.2600kcal", "D.1400kcal"], "answer": "答案：A", "analysis": ["解析：《成人肥胖食养指南（2024年版）》。", "王某理想体重（kg）=身高（cm）-105 =178-105=73；能量摄入目标值（kcal）=73×（20~25）=1460~1825；故最合理的是1800kcal。"]}, {"type": "q", "stem": "3.若按该能量水平设计食谱，该份食谱中碳水化合物供给量最合理的是（ ）", "options": ["A.270g", "B.210g", "C.165g", "D.100g"], "answer": "答案：A", "analysis": ["解析：《成人肥胖食养指南（2024年版）》三大宏量营养素的供能比分别为脂肪20%~30%，蛋白质15%~20%，碳水化合物50%~60%。", "碳水化合物供给量为：（1800×50%÷4）~（1800×60%÷4），即225~270g。", "故最合理的是270g。"]}, {"type": "q", "stem": "4.王某希望两个月达到理想体重，向注册营养师咨询，下列建议合理的是（ ）", "options": ["A.可以，设计限能量平衡膳食食谱", "B.不建议饮食和运动方式减肥，建议吃药物减肥", "C.可以，设计5+2 轻断食食谱", "D.不建议，理想的减重目标应该是6个月减重5~10kg"], "answer": "答案：D", "analysis": ["解析：《成人肥胖食养指南（2024年版）》。", "较为理想的减重目标应该是6个月内减少当前体重的5%~10%，合理的减重速度为每月减2~4kg。两个月减重95-73=22kg，每月减重11kg，太快。"]}, {"type": "q", "stem": "[2023DTR真题]5.吴某，男，25岁，身高175cm，体重90kg，腰围95cm，喜吃荤菜、甜食，不喜欢吃蔬菜，吃饭速度较快，一般5~10分钟吃完一顿饭。下列为吴某制定的控制肥胖干预方案中，正确的是（  ）①减少高糖和高脂食物摄入；②增加高膳食纤维食物摄入；③减少主食，补充白芸豆提取物；④采用高蛋白膳食；⑤吃饭时要充分咀嚼，避免进餐速度过快。", "options": ["A.①②⑤", "B.②③④", "C.①③④", "D.②③⑤"], "answer": "答案：A", "analysis": ["解析：", "①对，喜吃荤菜、甜食，高糖和高脂食物摄入过多，应减少。", "②对，不喜欢吃蔬菜，膳食纤维摄入过少，应增加高膳食纤维食物。", "③错，题干未提到吴某主食摄入过多。白芸豆提取物是从白芸豆中提取的一种天然淀粉酶抑制剂，不用补充。", "④错，喜吃荤菜，不宜再采用高蛋白膳食。", "⑤对，吃饭速度太快易致能量摄入过多，应充分咀嚼，避免进餐速度过快。"]}], "qn": 5}, {"title": "125 营养与糖尿病（上）", "items": [{"type": "q", "stem": "[2018DTR真题]1.糖尿病的诊断标准中，空腹血浆葡萄糖水平应大于等于（ ）", "options": ["A.7.0mmol/L", "B.8.0mmol/L", "C.9.0mmol/L", "D.10.0mmol/L"], "answer": "答案：A", "analysis": ["解析：解析：《营养与食品卫生学》第9版P204。"]}, {"type": "q", "stem": "[2021DTR真题]2.于某，女，41岁，身高168cm，体重63kg，近半年来出现多饮、多尿，伴乏力症状。血压150/98mmHg，空腹血糖7.2mmol/L，口服75g葡萄糖负荷后2小时血糖11.5mmol/L，余未见明显异常。根据上诉描述，可以判断她的血糖状况是（  ）", "options": ["A.糖耐量异常", "B.正常血糖", "C.空腹血糖受损", "D.糖尿病"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P204。"]}, {"type": "q", "stem": "3.典型糖尿病“三多一少” 症状中的一少指的是（  ）", "options": ["A.饮水减少", "B.体重减轻", "C.进食减少", "D.尿量减少"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P203。", "一少是指体重减轻。即使进食增多，但胰岛素缺乏或作用不足，机体无法充分利用葡萄糖，只能分解脂肪、蛋白质供能，导致脂肪肌肉消耗，体重明显下降。"]}, {"type": "q", "stem": "4.下列关于胰岛素抵抗的说法，正确的是（ ）", "options": ["A.胰岛β细胞完全不能分泌胰岛素", "B.机体组织细胞对胰岛素敏感性下降", "C.只发生在 1 型糖尿病患者身上", "D.血糖偏低时才会出现胰岛素抵抗"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P203。", "胰岛素抵抗是指胰岛素作用的靶器官对胰岛素作用的敏感性下降，即正常剂证的胰岛素产生低于正常生物学效应的一种状态，被认为是2型糖尿病（T2DM）的发病基础。"]}, {"type": "q", "stem": "[2023RD真题]5.下列关于《中国居民营养与慢性病状况报告2020》中，我国居民慢性病患病率描述正确的是（  ）", "options": ["A.18岁以上居民血脂异常患病率35.6%", "B.18岁以上居民高血压患病率13.6%", "C.18岁以上居民糖尿病患病率27.5%", "D.40岁以上居民慢阻肺患病率46.0%"], "answer": "答案：A", "analysis": ["解析：《中国居民营养与慢性病状况报告2020》。", "全国18岁及以上成年人糖尿病患病率11.9%，高血压患病率为27.5%，血脂异常患病率35.6%，40岁以上居民慢阻肺患病率13.6%。"]}], "qn": 5}, {"title": "126 营养与糖尿病（中）", "items": [{"type": "q", "stem": "[2018DTR真题]1.下列哪种糖常用于糖尿病患者的专用食品中（  ）", "options": ["A.蔗糖", "B.果糖", "C.木糖醇", "D.糖精"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P316。", "过多蔗糖摄入后分解的果糖或者添加过量果糖易导致甘油三酯合成增多，不利于脂肪代谢。", "木糖醇属于糖醇。糖醇代谢途径与胰岛素无关，不会引起血糖升高，故常用于糖尿病患者的专用食品中。"]}, {"type": "q", "stem": "[2022DTR真题]2.下列关于该患者控制2型糖尿病饮食建议中，错误的是（  ）", "options": ["A.选择低膳食纤维的食物", "B.选择低脂的食物", "C.按照蔬菜、肉类、主食顺序进食", "D.食物多样化"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P207。", "可溶性膳食纤维能吸水膨胀，吸附并延缓碳水化合物在消化道的吸收，使餐后血糖和胰岛素水平降低，还有降低胆固醇的作用。不溶性膳食纤维能促进肠蠕动，加快食物通过肠道，减少吸收，具有间接缓解餐后血糖升高和减肥的作用。故糖尿病人建议选择高膳食纤维的食物。"]}, {"type": "context", "text": "[2024DTR]贺某，55 岁，170cm，72.6kg，轻体力劳动者。现患有慢性肾病、糖尿病，一直在服用降糖药降糖。非常喜欢吃面食，白馒头、花卷、面条是他典型主食。他说他自己饭后感到疲惫，曾有低血糖发作。"}, {"type": "q", "stem": "3.对贺某来说，下列建议中，最合适的是（  ）", "options": ["A.要减少饮食中优质蛋白摄入量", "B.要增加饮食中精制碳水化合物的摄入量", "C.要减少饮食中脂肪含量", "D.要减少用餐次数"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P207。", "A错，慢性肾病患者需控制蛋白质总量，但应保证优质蛋白摄入比例。", "B错，精制碳水化合物升糖速度快，会导致血糖剧烈波动。", "C对，为防止或延缓糖尿病病人的心脑血管并发症，必须限制膳食脂肪摄入量。", "D错，糖尿病患者易出现血糖波动，应少量多餐而非减少用餐次数，以预防低血糖。"]}, {"type": "q", "stem": "4.下列饮食建议中，最适合贺某的是（  ）", "options": ["A.避免碳水化合物饮食", "B.高蛋白低、低碳水化合物饮食", "C.适量蛋白质、控制碳水化合物饮食", "D.生酮饮食"], "answer": "答案：C", "analysis": ["解析：", "A错，碳水化合物是能量的主要来源，完全避免会导致酮症、营养不良等。", "B错，高蛋白会加重肾脏负担，不符合慢性肾病营养原则。", "C对，适量蛋白质可减轻肾脏负担，控制碳水化合物（低GI食物、定量摄入）可稳定血糖。", "D错，生酮饮食以高脂肪、极低碳水为特点，易导致酮体蓄积，加重肾脏负担。"]}, {"type": "q", "stem": "5.下列为贺某提供的饮食调整策略中，最合理的是（  ）", "options": ["A.改变吃饭时顺序：先喝汤、再吃面食、最后吃菜", "B.与多种全谷物或杂豆混合制作面食", "C.增加面食制作时间，让面食更软烂一些", "D.尽量吃汤面、烩面，少吃馒头或花卷"], "answer": "答案：B", "analysis": ["解析：", "A错：吃饭顺序建议先吃蔬菜、再吃蛋白质食物、最后吃主食。", "B对，全谷物或杂豆与精制面粉混合制作面食，可降低GI，稳定血糖。", "C错，面食更软烂会加快消化吸收，导致血糖快速升高，加重波动。", "D错，汤面、烩面与馒头、花卷均为精制碳水化合物，无法改善血糖问题。"]}], "qn": 5}, {"title": "127 营养与糖尿病（下）", "items": [{"type": "context", "text": "[2018RD真题]某男，53岁，小学数学教师，患有糖尿病10年，口服二甲双胍及注射胰岛素治疗，身高175cm，体重88kg，最近一次体检结果如下：血压130/85mmHg，FPG5.8mmol/L，餐后2小时血糖8.7mmol/L，HbA1c5.7%，TC6.3mmol/L，TG2.5mmol/L，尿素氮4.7mmol/L，血肌酐76μmol/L，尿酸301μmol/L，尿蛋白（-）"}, {"type": "q", "stem": "1.根据他的情况，制定营养治疗方案，膳食的量以控制为（  ）", "options": ["A.1050~1400kcal/d", "B.1400~1750kcal/d", "C.1750~2100kcal/d", "D.2100~2450kcal/d"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P206。", "2018年的真题，当时是以第8版数据为准，思维导图是第9版数据。", "BMI=88/1.752=28.7，属于肥胖标准体重=175-105=70kg能量摄入=70×20~70×25=1400~1750kcal/d"]}, {"type": "q", "stem": "2.在为其制定的营养方案中，碳水化合物、脂肪、蛋白质、膳食纤维及胆固醇的建议量最合理的是（  ）", "options": ["A.55%~60%E、25%~30%E、15%~20%、25~30g/d、<300mg", "B.45%~60%E、25%~30%E、10%~15%、25~30g/d、<200mg", "C.55%~60%E、20%~25%E、15%~20%、30~35g/d、<300mg", "D.45%~60%E、20%~25%E、15%~20%、25~30g/d、<200mg"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P206-P207。", "碳水化合物供能比以45%~60%为宜，脂肪20~25%，蛋白质15%~20%，膳食纤维25~30g，胆固醇<200mg。"]}, {"type": "q", "stem": "3.食物的GI值和GL值可以作为糖尿病患者选择碳水化合物食物的重要指标。西瓜的GI值是72，若食用200g（可食部），请计算GL值（  ）。（西瓜碳水化合物含量：7g/100可食部）", "options": ["A.5", "B.10", "C.14.4", "D.144"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P40。", "GL = 摄入食品中碳水化合物的重量×食品的GI值/100=200×0.07×72/100=10.08≈10。"]}, {"type": "q", "stem": "4.下列对该患者的饮食建议中，错误的是（  ）", "options": ["A.用粗杂粮代替部分精白米面", "B.为降低血脂，应该少用富含n-3脂肪酸的油类", "C.少吃腌肉、腊肉、色拉酱等食物", "D.可以适度饮酒，但应避免空腹饮酒"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P212。", "n-3 系列PUFA如α-亚麻酸、EPA和DHA能抑制肝内脂质及脂蛋白合成，降低血胆固醇、TG、LDL、VLDL，增加HDL。"]}, {"type": "q", "stem": "[2017RD真题]5.易出现低血糖的糖尿病患者适宜的餐次为（  ）", "options": ["A.2", "B.3", "C.4", "D.5"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P207。", "口服降糖药或注射胰岛素后易出现低血糖的病人，可在三次正餐之间加餐2~3次。"]}], "qn": 5}, {"title": "128 营养与动脉粥样硬化性心脏病（上）", "items": [{"type": "q", "stem": "[2017RD真题]1.高血压患者预防动脉粥样硬化时，不仅需定期化验监测血脂浓度，同时应监测下列哪一项与维生素B12、叶酸代谢相关的指标（  ）", "options": ["A.血清葡萄糖", "B.血清尿酸", "C.血清同型半胱氨酸", "D.血清铁"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P1543。", "维生素B12、维生素B6、叶酸是同型半胱氨酸向蛋氨酸、胱氨酸转化代谢过程中的辅酶，这些维生素缺乏时，可影响同型半胱氨酸代谢，导致高同型半胱氨酸血症。", "血浆高同型半胱氨酸水平与动脉粥样硬化性心血管疾病发病呈显著相关。"]}, {"type": "q", "stem": "[2021DTR真题]3.长期大剂量服用铁剂，胡女士可能会出现的症状是（  ）", "options": ["A.铁堆积于真皮而使皮肤黝黑", "B.动脉粥样硬化", "C.巨幼红细胞性贫血", "D.碱奶综合征"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P63。", "铁具有催化自由基生成和促进脂质过氧化的作用，当铁过量时会增加心血管疾病的风险。"]}, {"type": "q", "stem": "4.预防动脉粥样硬化应增加摄入的脂类成分为（ ）", "options": ["A.饱和脂肪酸", "B.不饱和脂肪酸", "C.反式脂肪酸", "D.甘油三酯"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P208-P209。", "单不饱和脂肪酸可以降低血LDL-C和TG，而且不会降低HDL-C水平。长链多不饱和脂肪酸尤其是n-6与n-3系列多不饱和脂肪酸在防治动脉粥样硬化方面起重要作用。n-6系列PUFA如亚油酸能提高LDL受体活性，显著降低血清LDL-C并同时降低HDL-C，从而降低血清总胆固醇含量。n-3 系列PUFA如α- 亚麻酸、EPA和DHA能抑制肝内脂质及脂蛋白合成，降低血胆固醇、TG、LDL、VLDL，增加HDL。"]}, {"type": "q", "stem": "5.某男，58岁，BMI为29，喜食肉多年，颈动脉B超示:“双侧颈动脉粥样硬化并粥样斑块形成”。其营养治疗应注意（ ）", "options": ["A.限制脂肪摄入", "B.限制胆固醇摄入", "C.严格限制胆固醇和控制总能量摄入", "D.限制总能量、总脂肪、饱和脂肪和胆固醇摄入"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P210。", "总的膳食原则应在平衡膳食的基础上控制总能量和总脂肪的摄入，限制饮食中的SFA和胆固醇含量，保证充足的膳食纤维和多种维生素，补充适量的矿物质和抗氧化营养素。"]}], "qn": 4}, {"title": "129 营养与动脉粥样硬化性心脏病（中）", "items": [{"type": "q", "stem": "[2020DTR真题]1.长期酗酒者，下列脂代谢异常中，最易发生的是（  ）", "options": ["A.低HDL血症", "B.高甘油三酯血症", "C.高胆固醇血症", "D.高LDL血症"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P211。", "大量饮酒可导致肝脏损伤，脂代谢紊乱，升高血TG水平，增加CVD风险。"]}, {"type": "context", "text": "[2024DTR真题]宋某，男，61岁，年度体检发现血脂异常，检查结果如下：总胆固醇 5.3 mmol/L、低密度脂蛋白胆固醇 3.6 mmol/L、高密度脂蛋白胆固醇 1.0 mmol/L、甘油三酯 1.8 mmol/L。经了解宋某BMI为28kg/m²，平时无锻炼习惯，饮食偏好肉食，喜欢吃烧烤、火锅，医生建议他改变饮食习惯，增加锻炼来控制血脂水平。"}, {"type": "q", "stem": "2.若降低男子LDL-C水平，以下合理的建议是（  ）", "options": ["A.增加可溶性膳食纤维的摄入", "B.降低n-3脂肪酸的摄入", "C.增加反式脂肪酸的摄入", "D.增加饱和脂肪酸的摄入"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P209。", "膳食纤维有降低血总胆固醇和LDL-C的作用，可溶性膳食纤维作用强于不可溶性膳食纤维。"]}, {"type": "q", "stem": "3.考虑到宋某甘油三酯升高，饮食限制摄入的是（  ）", "options": ["A.新鲜蔬菜水果", "B.含糖饮料和酒精", "C.杂粮豆类", "D.瘦肉和鱼类"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P209、P211。", "过量的碳水化合物（主要是单糖和双糖）本身可以直接转化为内源性TG，导致高TG血症。", "大量饮酒可导致肝脏损伤，脂代谢紊乱，升高血TG和LDL-C水平，增加CVD风险。"]}, {"type": "q", "stem": "4.下列饮食调整方案中，最适合宋某的是（  ）", "options": ["A.增加米饭、馒头等精制碳水化合物的摄入量", "B.增加奶及奶制品的摄入量", "C.增加瘦肉摄入量", "D.增加全谷物、蔬菜、水果的摄入量"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P210。", "与精致谷物相比，全谷物保留更多的膳食纤维、蛋白质、维生素和无机盐，能量密度也相对低。增加全谷物摄入量可降低血脂。", "蔬菜水果含有丰富的膳食纤维、维生素、矿物质以及植物化学物。增加水果蔬菜的摄入可降低心脑血管病发病率和死亡率。"]}, {"type": "q", "stem": "5.根据《中国居民膳食营养素参考摄入量（2023版）》中关于植物甾醇降低血清TC和LDL-C的剂量效应关系，提出我国居民植物甾醇的SPL为0.8g/d。植物甾醇在控制血脂异常中的主要作用是（  ）", "options": ["A.促进饱和脂肪酸代谢", "B.增加血液中HDL-C水平", "C.减少肝脏中甘油三脂生成", "D.抑制肠道对胆固醇的吸收"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P209。", "植物固醇（植物甾醇）在肠道内可以与胆固醇竞争性形成“胶粒”，抑制胆固醇的吸收，有效地降低高脂血症病人血液中的总胆固醇和LDL-C，而不会降低HDL-C。"]}], "qn": 5}, {"title": "130 营养与动脉粥样硬化性心脏病（下）", "items": [{"type": "q", "stem": "[2021RD真题]1.下列关于动脉粥样硬化患者营养管理说法，正确的是（  ）①体重管理；②采用地中海饮食；③增加膳食纤维到15~20g/d；④多食用含ω-3脂肪酸食物；⑤限制食盐3g以下。", "options": ["A.①②④", "B.①②③④⑤", "C.①②③④", "D.①②"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P212。", "①对。肥胖是动脉粥样硬化的重要危险因素。", "②对。地中海饮食饱和脂肪摄入低，不饱和脂肪摄入高，含大量复合碳水化合物，蔬菜、水果摄入量较高。心脑血管疾病、2型糖尿病等的发生率低。", "③错。15~20g/d太少。", "④对。n-3系列PUFA对心血管有保护作用。", "⑤错。高血压是动脉粥样硬化的重要危险因素，食盐摄入应限制在5g以下。"]}, {"type": "q", "stem": "[2022RD真题]2.下列关于预防动脉粥样硬化冠心病的膳食建议，正确的是（  ）①限制饱和脂肪酸；②限制胆固醇；③保持充足膳食纤维；④限制食盐的摄入；⑤限制含糖饮料的摄入。", "options": ["A.①②", "B.①②③④⑤", "C.①②③④", "D.①②④"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P212。", "①②对，限制总脂肪、SFA、胆固醇和TFAs的摄入量是防治动脉粥样硬化性心脏病的重要措施。", "③对，膳食纤维在肠道与胆汁酸结合，可减少脂类的吸收，从而降低血胆固醇水平。同时，高纤维膳食可降低血胰岛素水平，提高人体胰岛素敏感性，利于脂代谢的调节。", "④对，高血压是动脉粥样硬化的重要危险因素，每天食盐的摄入应限制在5g以下。", "⑤对，能量摄入过多是肥胖的重要原因，而肥胖又是动脉粥样硬化的重要危险因素。应限制含糖饮料的摄入。", "李女士，51岁，身高165cm，体重72kg，被诊断患有高脂血症，血脂生化检查结果显示LDL-C升高，HDL-C降低，目前正在服用他汀类药物。"]}, {"type": "q", "stem": "3.下列膳食因素中，能降低血脂异常风险的是（  ）①饱和脂肪酸；②胆固醇；③膳食纤维； ④维生素C；⑤维生素E。", "options": ["A.③④⑤      B.②③④⑤      C.①②④      D.③⑤"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P43、P81、P95。", "①②错，饱和脂肪酸、胆固醇升高血脂异常风险。", "③对，膳食纤维吸附脂肪、胆固醇和胆汁酸，使其吸收率下降，可达到降血脂的作用。", "④对，维生素C参与类固醇的羟基化反应，促进代谢进行，如由胆固醇转变成胆酸、皮质激素及性激素，降低血清胆固醇，预防动脉粥样硬化的发生。", "⑤对，维生素E抑制胆固醇合成限速酶（HMG-CoA) 还原酶的活性，降低血浆胆固醇水平。"]}, {"type": "q", "stem": "4.下列针对李女士的膳食管理方案中，正确的是（ ）", "options": ["A.在饮食中增加饱和脂肪酸和胆固醇摄入量", "B.在饮食中增加精制碳水化合物和糖摄入量", "C.在饮食中增加可溶性膳食纤维摄入量", "D.尽可能降低饮食中单不饱和脂肪酸和n-3多不饱和脂肪酸摄入量"], "answer": "答案：C", "analysis": ["解析：《成人高脂血症食养指南（2023年版）》。", "膳食纤维在肠道与胆酸结合，可减少脂类的吸收，从而降低血胆固醇水平。同时，高膳食纤维可降低血胰岛素水平，提高人体胰岛素敏感性，有利于脂代谢的调节。"]}, {"type": "q", "stem": "5.如果李女士按上述饮食方案坚持2个月，以下血液指标中，最有可能发生变化的是（ ）", "options": ["A.HDL-C升高", "B.总胆固醇下降", "C.总甘油三酯下降", "D.LDL-C下降"], "answer": "答案：D", "analysis": ["解析：", "A错，可溶性纤维可能轻微提升HDL-C，但变化不如LDL-C显著，且提升HDL-C更依赖运动和不饱和脂肪酸。", "B错，总胆固醇可能下降，但主要受LDL-C降低驱动，非独立最显著变化。", "C错，可溶性纤维对甘油三酯影响较小，主要依赖控制精制碳水化合物。", "D对，可溶性纤维通过结合胆汁酸减少胆固醇重吸收，直接降低LDL-C。"]}], "qn": 5}, {"title": "131 营养与高血压（上）", "items": [{"type": "context", "text": "[2021RD真题]男，50岁，收缩压145mmHg，舒张压95mmHg。"}, {"type": "q", "stem": "1.男子血压属于哪个等级（  ）", "options": ["A.一级高血压（轻度）", "B.二级高血压（中度）", "C.三级高血压（重度）", "D.正常血压"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P213。"]}, {"type": "q", "stem": "2.若同时伴有同型半胱氨酸升高，为降低脑卒中发生的风险，下列适合补充的营养素有（  ） ①叶酸；②维生素B12；③维生素B6；④钙；⑤铁。", "options": ["A.①②③", "B.①②③④⑤", "C.②③④", "D.①②⑤"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P93。", "维生素B12从5-甲基四氢叶酸获得甲基后形成甲基B12，后者又将甲基转移给同型半胱氨酸，并在蛋氨酸合成酶的作用下合成蛋氨酸。维生素B12缺乏时，5-甲基四氢叶酸上的甲基不能转移，蛋氨酸的生成受阻，造成同型半胱氨酸堆积，形成高同型半胱氨酸血症。", "维生素B6是半胱氨酸脱羧酶、胱硫醚酶β-合成酶的辅助因子，这些酶参与同型半胱氨酸到半胱氨酸的转硫化途径。"]}, {"type": "q", "stem": "[2019DTR真题]3.我国目前采用的高血压诊断标准是（  ）", "options": ["A.收缩压≥130mmHg或舒张压≥80mmHg", "B.收缩压≥130mmHg或舒张压≥90 mmHg", "C.收缩压≥140mmHg或舒张压≥80mmHg", "D.收缩压≥140mmHg或舒张压≥90mmHg"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P213。"]}, {"type": "q", "stem": "[2019DTR真题]4.可能增加高血压患病风险的食物是（  ）①高钠；②高钾；③高钙；④低钾；⑤低钙。", "options": ["A.①②④", "B.①②③", "C.②③⑤", "D.①④⑤"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P214。", "钠盐摄入过多可使血容量增加而引起血压升高。", "钾盐摄入量与血压水平呈负相关。可能与钾促进尿钠排泄、抑制肾素释放、舒张血管、减少血栓素的产生有关。", "膳食钙摄入不足可使血压升高。钙促进钠从尿中排泄可能是其降血压作用的机制之一。", "故①④⑤对，选D。"]}, {"type": "q", "stem": "[2022DTR真题]5.下列关于高血压与营养素相关性描述中，不正确的是（  ）", "options": ["A.与胆固醇、脂肪总量成正相关", "B.蛋白质是独立危险因素", "C.与钠盐摄入成正相关", "D.与膳食中镁摄入负相关"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P214。", "A对，增加胆固醇、脂肪，可导致血压升高；增加PUFA和减少SFA的摄入有利于降血压。", "B错，蛋白质不是独立危险因素。", "C对，钠的摄入量与血压水平和高血压患病率呈正相关。", "D对，镁的摄入量与高血压发病风险呈负相关。"]}], "qn": 5}, {"title": "132 营养与高血压（下）", "items": [{"type": "q", "stem": "[2017RD真题]1.高血压患者应限制的食物有（  ）①咸菜；②全谷类；③火腿；④咸鱼；⑤新鲜蔬菜；⑥豆腐；⑦香肠；⑧水果。", "options": ["A.①②③④", "B.①③⑤⑦", "C.①③④⑦", "D.⑤⑥⑦⑧"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P215。", "高血压患者应限制钠摄入量，除减少烹调用盐，减少味精、酱油等含钠盐的调味品用量外，也要注意食物中的“隐形盐”，如各类加工食品：咸菜、火腿、咸鱼、香肠以及各类炒货等。"]}, {"type": "q", "stem": "[2018RD真题]2.某男性，67岁，轻体力劳动，身高172cm，体重73kg。近期体检发现患有高血压，其他指标正常，现为他编制一日食谱。考虑他患有高血压，营养师建议他增加高钾的食物，下列食物中可选用的是（  ）①香蕉；②马铃薯；③冬菇；④大米；⑤牛肉。", "options": ["A.①②③", "B.①②⑤", "C.②③④", "D.③④⑤"], "answer": "答案：A", "analysis": ["解析：《中国营养科学全书》第2版P120。", "大部分食物都含有钾，但豆类、蔬菜和水果是钾最好的来源。", "香蕉256，马铃薯347，冬菇（干）1155，稻米（代表值）112，牛肉（代表值）212。"]}, {"type": "context", "text": "[2021DTR真题]某女性，60岁，身高160cm，体重60kg，不抽烟，不喝酒，经常参加身体活动，喜欢吃肉（红烧肉），吃肉量大，主食量少（午晚餐约小半碗）。测血压150/90 mmHg。"}, {"type": "q", "stem": "3.对该女性而言，控制血压的最主要方式是（  ）", "options": ["A.控制体重", "B.限制肉类摄入", "C.限制食盐", "D.增加运动"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P215。", "BMI=60/1.62=23.4，体重正常。应限制肉类摄入，红烧肉脂肪高。"]}, {"type": "q", "stem": "4.该女性的膳食烹调加工过程中，需要限制的调料是（  ）①食盐；②鸡精；③味精；④醋；⑤料酒。", "options": ["A.①②④", "B.①③⑤", "C.①③④", "D.①②③"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P215。", "高血压患者应限制钠摄入。食盐、鸡精、味精都是含钠的调味品。"]}, {"type": "q", "stem": "5.下列蔬菜中，若食用则需要减少主食食用量的是（  ）①土豆；②山药；③芋头；④莲藕；⑤菱角。", "options": ["A.①②③", "B.①②③④⑤", "C.①②", "D.①②③④"], "answer": "答案：B", "analysis": ["解析：土豆、山药、芋头、莲藕、菱角碳水化合物都较高，若食用则需要减少主食食用量。"]}], "qn": 5}, {"title": "133 营养与痛风（上）", "items": [{"type": "q", "stem": "[2022RD真题]1.下列关于痛风发病机制及危害的描述中，错误的是（  ）", "options": ["A.与绝经前女性相比，绝经后女性患痛风的风险更高", "B.大约70%的尿酸通过肠道排出，30%由肾脏清除", "C.当出现高尿酸血症时，尿酸盐在肾脏内堆积可引起肾脏病变", "D.痛风是由于尿酸的过量产生和（或）排出减少引起的尿酸堆积"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P216。", "正常人体尿酸池平均约为1200mg，每日产生750mg，其中约2/3由肾脏排泄， 1/3由消化道排出。"]}, {"type": "q", "stem": "[2018RD真题]2.对男性来说，高尿酸血症的诊断标准是（  ）", "options": ["A.>250μmol/L", "B.>350μmol/L", "C.>420μmol/L", "D.>450μmol/L"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P216。", "正常膳食状态下，非同日2 次空腹血尿酸水平超过420μmol/L, 诊断为高尿酸血症。"]}, {"type": "q", "stem": "[2022RD真题]3.下列关于高尿酸血症的描述中，正确的是（  ）", "options": ["A.人体外源性尿酸占80%，应避免高嘌呤饮食", "B.建议限制水分摄入量", "C.维生素C能促进组织中尿酸盐的溶解", "D.肥胖患者需要采用低碳水化合物快速减重"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P1537。", "A错，人体尿酸来源，外源性占20%，内源性占80%。", "B错，摄入充足的水分有利于体内尿酸排出，只要肾功能正常，每天饮水2000ml 以上。", "C对，B族维生素和维生素C可促进组织沉积的尿酸盐溶解，有利于缓解痛风。", "D错，超重肥胖者应适当减重，减少能量应循序渐进，切忌骤减，否则引起体脂分解过快会导致酮症，抑制尿酸的排出，诱发痛风症急性发作。"]}, {"type": "q", "stem": "[2021RD真题]4.下列关于痛风患者不宜食用果糖原因的描述中，正确的是（  ）", "options": ["A.造成血糖", "B.加速嘌呤合成", "C.诱发糖尿病", "D.促进尿酸合成"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P216。", "果糖能增加尿酸生成。"]}, {"type": "q", "stem": "[2021DTR真题]5.下列关于饮酒与痛风的描述中，错误的是（  ）", "options": ["A.乙醇的代谢产物乳酸会抑制尿酸排泄", "B.酒精摄入量与痛风发病风险呈剂量-效应关系", "C.不同类型酒中嘌呤含量：白酒>黄酒>啤酒", "D.乙醇在体内代谢时消耗ATP，增加尿酸生成"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P217。", "嘌呤含量依酒精饮料种类不同而各异，一般规律为：陈年黄酒>啤酒>普通黄酒>白酒。"]}], "qn": 5}, {"title": "134 营养与痛风（下）", "items": [{"type": "q", "stem": "[2019RD真题]1.下列关于对痛风患者营养治疗的建议中，正确的是（  ）", "options": ["A.尽量减少果糖的摄入，不宜食用蜂蜜", "B.在选择乳制品时，优先选择酸奶", "C.可优先选择菠菜、芦笋和蘑菇", "D.烹调时多用一些辣椒、胡椒和芥末等调味"], "answer": "答案：A", "analysis": ["解析： 《中国营养科学全书》第2版P1539。", "A对，果糖会增加尿酸生成。", "B错，乳酸菌的细胞核里面含有嘌呤，所以导致酸奶的嘌呤比牛奶、奶粉等其他奶制品要高一些，不过依旧不属于高嘌呤食物。在适量的情况下，痛风患者亦可食用。酸奶中含有很多丰富的乳酸成分，乳酸摄入会影响到体内尿酸的排泄。", "C错，菠菜、芦笋和蘑菇的嘌呤含量：50~150mg/100g，较高。", "D错，辣椒、胡椒和芥末等能兴奋自主神经诱导痛风急性发作。"]}, {"type": "q", "stem": "[2020RD真题]2.某痛风患者急性发作期，下列食物可选择的是（  ）", "options": ["A.鸡蛋及奶制品类", "B.鸡汤等炖补汤品", "C.肉及海鲜类", "D.干豆及菌菇类"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P218。", "急性期应严格限制嘌呤在150mg/d之内，可选择低嘌呤含量的食物，如鸡蛋及奶制品类 。"]}, {"type": "q", "stem": "[2021DTR真题]3.针对痛风患者的建议，以下错误的是（  ）", "options": ["A.多喝水，保持尿液2000ml以上，以排出尿酸", "B.多摄入蔬菜水果，使尿液偏碱性", "C.肥胖者应在短期内减轻体重，缓和痛风症状", "D.避免饮酒过量"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P1538。", "超重肥胖者应适当减重，减少能量应循序渐进，切忌骤减，否则引起体脂分解过快会导致酮症，抑制尿酸的排出，诱发痛风症急性发作。"]}, {"type": "q", "stem": "[2018RD]4.为痛风患者制定的食谱中，最不应该采用的是（  ）", "options": ["A.红烧花鲢鱼", "B.荠菜豆腐汤", "C.黄瓜炒蛋", "D.凉拌蔬菜沙拉"], "answer": "答案：A", "analysis": ["解析：《中国营养科学全书》第2版P1539。", "鲢鱼是高嘌呤食物（150~1000mg/100g）。"]}, {"type": "q", "stem": "[2018RD]5.当该患者病情缓解时，下列建议的预防措施中，错误的是（  ）", "options": ["A.多喝水，戒酒", "B.采用高强度运动减肥", "C.低嘌呤饮食", "D.多吃蔬菜和适量水果"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1539。", "适当的运动可预防痛风的发作，减少内脏脂肪，减少胰岛素抵抗。注意需避免与体力不相称的剧烈运动，因剧烈运动是无氧运动，可产生大量乳酸与尿酸竞争排泄，同时由于肌肉ATP的分解加速而导致尿酸生成增加。"]}], "qn": 5}, {"title": "135 营养与免疫性疾病", "items": [{"type": "q", "stem": "1.下列脂类，有利于抑制自身免疫性疾病的是（ ）", "options": ["A.单不饱和脂肪酸", "B.饱和脂肪酸", "C.反式脂肪酸", "D.n-3系列脂肪酸"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P219。", "富含n-3系列脂肪酸的摄入有利于抑制自身免疫性疾病。"]}, {"type": "q", "stem": "2.下列关于蛋白质与免疫功能关系描述中，错误的是（ ）", "options": ["A.蛋白质是维持机体免疫防御功能的物质基础", "B.蛋白质的质和量都影响着免疫功能", "C.蛋白质可通过提高人体内其他抗氧化物的水平而增强机体免疫功能", "D.必需氨基酸的不足或过量都会影响到免疫功能"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P219。", "可通过提高人体内其他抗氧化物的水平而增强机体免疫功能的是维生素C，不是蛋白质。"]}, {"type": "q", "stem": "3.参与免疫应答，缺乏时导致免疫功能减的微量元素有（ ）①锌；②铁；③铜；④硒。", "options": ["A.①②③④", "B.②③④", "C.①②④", "D.①②③"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P220。", "锌、铁、铜、硒都参与免疫应答，缺乏时导致免疫功能减退。"]}, {"type": "q", "stem": "4.艾滋病主要传染途径不包括（）", "options": ["A.性接触感染", "B.共用HIV污染针头", "C.输血和血制品的应用", "D.共用泳池"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P220。", "获得性免疫缺陷综合征（AIDS）简称艾滋病。病因是HIV感染，主要传染途径为：①性接触感染，最为常见；②共用HIV污染针头；③输血和血制品的应用；④母体病毒经胎盘感染胎儿或通过哺乳、黏膜接触等方式感染婴儿。"]}, {"type": "q", "stem": "5.AIDS病人的膳食原则应该是（ ）", "options": ["A.高能量、高脂肪、食物多样均衡", "B.低能量、低脂肪、食物多样均衡", "C.高能量、高蛋白质、食物多样均衡", "D.低能量、低蛋白、食物多样均衡"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P221。", "AIDS病人的膳食应该以高能量、高蛋白质、食物多样均衡为原则。"]}], "qn": 5}, {"title": "136 营养与癌症（上）", "items": [{"type": "q", "stem": "[2017RD真题]1.肿瘤患者放疗后，如出现放射性肠炎，给予口服补充下列哪种营养物质，有助于降低肠道黏膜炎（  ）", "options": ["A.谷氨酰胺", "B.乳清蛋白", "C.必需脂肪酸", "D.支链氨基酸"], "answer": "答案：A", "analysis": ["解析：《中国营养科学全书》第2版P1495。", "谷氨酰胺是体内含量最丰富的非必需氨基酸，约占血液游离氨基酸的60%。谷氨酰胺是肠上皮细胞和淋巴细胞的重要营养物质，可以促进肠黏膜细胞增殖，维护肠黏膜屏障，是肠道修复最重要的营养物质，谷氨酰胺同时可以调节免疫功能，参与机体免疫保护，无论口服或静脉补充谷氨酰胺都有利于改善肠道炎症、黏膜结构和功能损伤，改善肠道免疫功能，减少细菌移位。"]}, {"type": "q", "stem": "[2021DTR真题]2.下列乳腺癌风险较高的人群是（  ）", "options": ["A.脂肪摄入过高的人群", "B.哺乳期较长的人群", "C.蛋白质摄入过高的人群", "D.月经初潮来得晚的人群"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P222。", "脂肪的摄入量与结肠癌、直肠癌、乳腺癌、肺癌、前列腺癌的危险性呈正相关。", "膳食脂肪的种类与癌症的发生也有关系，SFA和动物油脂的摄入与肺癌、乳腺癌、结肠癌、直肠癌、子宫内膜癌、前列腺癌危险性增加有关。"]}, {"type": "q", "stem": "[2019RD真题]3.近年来的研究发现，肿瘤患者大脑摄取某种氨基酸增加，引起5-羟色胺浓度增加，从而刺激下丘脑饱食中枢引起厌食。该氨基酸是（  ）", "options": ["A.色氨酸", "B.蛋氨酸", "C.精氨酸", "D.亮氨酸"], "answer": "答案：A", "analysis": ["解析：《生物化学与分子生物学》第9版P187。", "色氨酸首先经色氨酸羟化酶催化生成5-羟色氨酸 , 然后由5-羟色氨酸脱羧酶催化生成5-羟色胺。"]}, {"type": "q", "stem": "[2019RD真题]4.下列关于营养素在肿瘤治疗中的意义描述中，错误的是（  ）", "options": ["A.谷氨酰胺对快速增殖的肿瘤细胞，是必需氨基酸", "B.肿瘤细胞可能具有甲硫氨酸依赖性", "C.精氨酸具有促进肿瘤生长的作用", "D.ω-3脂肪酸能促进某些肿瘤的生长"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1611、P1613。", "A对。谷氨酰胺是促进肿瘤细胞增殖和转化的必需物质。肿瘤细胞能大量摄取和代谢谷氨酰胺，一方面提供能量，一方面参与合成：谷氨酰胺通过肿瘤细胞胞膜和线粒体膜上专一性转运载体进入线粒体三羧酸循环进行代谢，在其中代谢转变为其他代谢物后，转运出线粒体， 参与肿瘤细胞重要的合成代谢，有利于肿瘤细胞增殖。", "B对。许多肿瘤细胞是依赖蛋氨酸的，即肿瘤细胞在缺乏蛋氨酸而补充同型半胱氨酸的条件下不能存活。", "C对。精氨酸具有促进肿瘤生长的作用。", "D错。患者由于肿瘤引起机体炎症状态，ω-3多不饱和脂肪酸具有降低炎症及低致炎反应的特征。"]}, {"type": "q", "stem": "[2022RD真题]5.下列关于肿瘤患者营养代谢变化的描述，正确的是（  ）", "options": ["A.血清白蛋白浓度升高", "B.高血脂症", "C.瘦体重增加", "D.食欲增加"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1611。", "肿瘤患者的机体脂类代谢异常主要是脂类分解代谢增强，其特征是外源性脂肪利用下降，脂肪动员增加，内源性脂肪消耗增加，血浆脂蛋白、甘油三酯和胆固醇升高。"]}], "qn": 5}, {"title": "137 营养与癌症（中）", "items": [{"type": "context", "text": "[2017RD真题]某患者，女，51岁，结肠癌，做了两次化疗后，胃肠道症状明显，包括腹泻、恶心、呕吐及食欲不振，过去的两个月，体重下降了8%。"}, {"type": "q", "stem": "1.为了缓解该患者腹泻问题，下列饮食调整措施中，正确的是（ ）", "options": ["A.增加乳制品的摄入，以促进规律排便", "B.高膳食纤维饮食，包括大量的水果和蔬菜", "C.低渣饮食，少量多餐", "D.高能量高蛋白膳食"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P1615。", "A错，乳制品可能因乳糖不耐受加重腹泻。", "B错，高膳食纤维饮食会促进肠道蠕动，加重腹泻症状。", "C对，低渣饮食可减少肠道内食物残渣，减轻肠道刺激；少量多餐能避免一次进食过多增加肠道负担，有助于缓解腹泻。", "D错，高能量高蛋白膳食可能因消化负担重而无法缓解甚至加重腹泻。"]}, {"type": "q", "stem": "2.患者总感觉到恶心，提不起食欲，下列做法中，正确的是（ ）", "options": ["A.鼓励多吃一些，满足能量需要", "B.建议他想吃什么就吃什么，不需要限制饮食", "C.增加高脂肪高能量食物摄入", "D.建议他少食多餐，避免引起恶心"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1615。", "对于食欲不好及恶心呕吐的患者，饮食一般建议注意少量多餐，注意补充水分，避免脱水。"]}, {"type": "q", "stem": "3.患者味觉改变，肉吃起来有金属味，她不想吃肉，该如何做（ ）", "options": ["A.增加植物来源的蛋白质，如大豆及其制品", "B.暂时禁肉，直至味觉恢复", "C.强迫自己吃廋肉", "D.烹调时用更多的盐来掩盖肉的金属味"], "answer": "答案：A", "analysis": ["解析：", "A对，大豆及其制品是优质植物蛋白的良好来源，可替代肉类提供蛋白质，且能避免肉类的金属味带来的不适，符合患者需求。", "B错，暂时禁肉会导致蛋白质摄入不足，影响患者的营养状况和身体恢复。", "C错，强迫进食会加重患者的心理抵触，甚至可能诱发恶心、呕吐等不适，不利于营养摄入。", "D错，过多摄入盐会增加肾脏负担，还可能影响其他食物的口感。"]}, {"type": "q", "stem": "[2019RD真题]4.下列关于在化疗期间，给食管癌患者准备的饮食中，错误的是（  ）", "options": ["A.每天食用新鲜的蔬菜水果", "B.高脂肪膳食，以保证充足的能量", "C.少吃多餐", "D.忌食腌制或高度精加工的食物"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1615。", "化疗期间建议采用高蛋白质、高维生素的饮食营养原则，即在平衡膳食的基础上摄取足量富含蛋白质的食物，以利于身体组织修复及白细胞再生。蔬菜水果富含抗氧化维生素，有助于平衡体内的自由基，减轻化疗反应。", "化疗药可能导致消化道黏膜损伤，应注意选择清淡、细软、易消化的食物。", "避免油腻、粗硬、味道太浓或辛辣刺激的食物，以减轻消化道的负担。"]}, {"type": "q", "stem": "[2024DTR真题]5.下面关于加工肉类描述，正确的是（  ）", "options": ["A.国际癌症研究组织（IARC）将加工肉类列为人类致癌（1级）", "B.加工肉类加工过程中易产生黄曲霉毒素", "C.白斩鸡、烤鸭属于酱卤加工肉类", "D.金华火腿和宣威火腿属于经腌制的熟肉制品"], "answer": "答案：A", "analysis": ["解析：", "A对，国际癌症研究机构（IARC）将加工肉类列为1 类致癌物（对人类致癌性证据充分）。", "B错，加工肉类在加工过程中（如腌制、烟熏）易产生亚硝胺等致癌物，而非黄曲霉毒素。", "C错，白斩鸡、烤鸭属于禽肉的直接烹饪制品，不属于酱卤加工肉类（酱卤肉类需经调味、卤制等加工）。", "D错，金华火腿和宣威火腿属于经腌制的生肉制品，需烹饪后食用，而非熟肉制品。"]}], "qn": 5}, {"title": "138 营养与癌症（下）", "items": [{"type": "context", "text": "[2020RD真题]李某，男，70岁，身高170cm，近期体重下降4kg，目前58kg，近1周饮食摄入量减少25%~50%，偶有呕吐，胃镜检显示幽门肿瘤和幽门管狭窄，病理活检确定为胃癌，目前收住院，拟手术冶疗。实验室检测：电解质、肝肾功正常，血浆白蛋白34g/L，前白蛋白180mg/L，粪便隐血++。"}, {"type": "q", "stem": "1.术前营养干预，宜选择（  ）", "options": ["A.流质饮食+口服营养补充剂", "B.半流质饮食+口服营养补充剂", "C.软食", "D.半流质"], "answer": "答案：A", "analysis": ["解析：《中国营养科学全书》第2版P1463。", "幽门肿瘤和幽门管狭窄造成吞咽困难，适合流质饮食。", "患者饮食量减少，体重下降。流质饮食能量低，所供营养素不足，不能满足患者营养需要，还需口服营养补充剂。"]}, {"type": "q", "stem": "2.通过以上饮食干预后，若3~5天饮食量仅达到目标需要量（  ）时，需进行肠外营养", "options": ["A.50%", "B.60%", "C.70%", "D.80%"], "answer": "答案：B", "analysis": ["解析：《肿瘤营养治疗通则》。", "营养不良的五阶梯治疗模式：首先选择营养教育，然后依次向上晋级选择ONS、完全肠内营养（TEN）、部分肠外营养（PPN）、全肠外营养（TPN）。参照ESPEN 指南建议，当下一阶梯不能满足60% 目标能量需求3~5 天时，应该选择上一阶梯。"]}, {"type": "q", "stem": "3.术前进行营养干预数天后进行胃空肠吻合术，术后肠内营养供给量递增至800ml时腹泻，下列改善耐受性措施中，不宜选择的是（  ）", "options": ["A.改换肠内营养剂", "B.减少供给量", "C.减缓输注速度", "D.加水稀释肠内营养液"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1490。", "A对，比如改用含有可溶性膳食纤维的肠内营养配方。", "B错，减少供给量可导致能量及营养素供给不足。", "C对，减缓输注速度可缓解腹泻。", "D对，加水稀释可降低肠内营养液渗透压，缓解渗透性腹泻。"]}, {"type": "context", "text": "[2021RD真题]患者，女，65岁。7个月前因发现右侧颈部肿块，后入院诊断为恶性肿瘤，鳞状细胞癌，进行放、化疗治疗。"}, {"type": "q", "stem": "4.该患者在放疗后出现放射性肠炎，为降低肠道粘膜炎，可以口服的是（  ）", "options": ["A.乳清蛋白", "B.硬脂酸", "C.支链氨基酸", "D.谷氨酰胺"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1614。", "谷氨酰胺属于免疫营养素，可以改善免疫功能、调节机体炎性反应。", "《放疗患者营养治疗专家共识》（中国抗癌协会肿瘤营养专业委员会，2021年）：谷氨酰胺对降低恶性肿瘤放疗患者放射性皮肤损伤、放射性口腔黏膜炎、放射性食管黏膜炎的发生率和严重程度有益，但对于放射性肠炎的预防和治疗作用缺乏足够的临床证据。"]}, {"type": "q", "stem": "5.在该患者的营养支持中，除关注体重变化，还应关注（  ）", "options": ["A.血清白蛋白", "B.血脂", "C.尿糖", "D.尿蛋白"], "answer": "答案：A", "analysis": ["解析：《中国营养科学全书》第2版P1644。", "肿瘤患者蛋白质代谢的特点主要表现为骨骼肌蛋白降解、去脂组织进行性下降、内脏蛋白消耗和低蛋白血症。肿瘤患者往往表现为负氮平衡。", "血清白蛋白反映机体蛋白质营养状况。"]}], "qn": 5}]}, {"name": "七、食品卫生与安全", "count": 88, "ntopic": 16, "topics": [{"title": "139 食品微生物生长条件", "items": [{"type": "q", "stem": "[2018RD真题]1.一般来说，水分活度多少以上适合细菌生长（  ）", "options": ["A.0.6", "B.0.87", "C.0.8", "D.0.9"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P250。", "Aw低于0.60时，绝大多数微生物无法生长，故Aw小的食品较少出现腐败变质现象。", "一般说来，细菌生长所需的Aw>0.9，酵母菌为>0.87，真菌为>0.8 。"]}, {"type": "q", "stem": "[2019RD真题]2.某食品Aw值0.4，下列状况不会发生的是（  ）", "options": ["A.脂质氧化速度会增大", "B.美拉德反应", "C.自然陈化", "D.细菌能繁殖"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P250。", "Aw低于0.60时，绝大多数微生物无法生长，故Aw小的食品较少出现腐败变质现象。", "一般说来，细菌生长所需的Aw>0.9，酵母菌为>0.87，真菌为>0.8。"]}, {"type": "q", "stem": "3.每一种微生物在食品中生长繁殖都有其最低的水分活度要求，正确的选项是（ ）", "options": ["A.细菌=酵母=真菌", "B.细菌>酵母>真菌", "C.真菌>酵母>细菌", "D.细菌>真菌>酵母"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第8版P302。", "Aw低于0.60时，绝大多数微生物无法生长，故Aw小的食品较少出现腐败变质现象。", "一般说来，细菌生长所需的Aw>0.9，酵母菌为>0.87，真菌为>0.8。"]}, {"type": "q", "stem": "4.影响微生物在食品中生长的因素包括（ ）", "options": ["A.②③④⑤", "B.①②④⑤", "C.①②③④", "D.①②③④⑤"], "answer": "答案：D", "analysis": ["①食品的营养成分；", "②pH；", "③温度；", "④渗透压；", "⑤水分", "解析：《营养与食品卫生学》第9版P250。", "食品中微生物生长的条件有：①食品的成分（水分、营养成分和抑菌成分）；②食品的理化性质（pH、渗透压和生物结构）；③环境因素（温度、氧气和湿度）。"]}, {"type": "q", "stem": "5.大多数细菌最适合生长的pH值是（ ）", "options": ["A.pH4.0左右", "B.pH5.0左右", "C.pH6.0左右", "D.pH7.0左右"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P250。", "大多数细菌在pH为7.0左右生长最好。"]}], "qn": 5}, {"title": "140 食品细菌污染", "items": [{"type": "q", "stem": "[2024RD真题]1.食品微生物评价采用的卫生指标主要有（  ）①菌落总数；②水分活度；③大肠菌群；④K值；⑤过氧化值。", "options": ["A.②③", "B.①②", "C.①③", "D.④⑤"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P252。", "反映食品卫生质量的细菌污染指标有两个：一是菌落总数，二是大肠菌群。"]}, {"type": "q", "stem": "[2024DTR真题]2.下列关于菌落总数的描述中，错误的是（  ）", "options": ["A.菌落总数超标意味着食品中存在致病菌", "B.菌落总数也可用于预测食品的耐保藏性", "C.菌落总数以菌落形成单位（CFU）表示", "D.菌落总数是反映食品卫生质量的微生物指标"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P252。", "菌落总数是指在被检样品的单位质量（g）、容积（ml）内，在严格规定的条件下（培养基及其pH、培育温度与时间、计数方法等）培养所形成的细菌菌落总数，以菌落形成单位（CFU）表示。菌落总数的卫生学意义包括两方面：一是作为食品被细菌污染程度即清洁状态的标志。二是可用于预测食品的耐保藏性。"]}, {"type": "q", "stem": "3.菌落总数可作为食品（ ）", "options": ["A.污染粪便的标志", "B.腐败变质的标志", "C.酸败的标志", "D.清洁状态的标志"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P252。", "菌落总数的卫生学意义包括两方面：一是作为食品被细菌污染程度即清洁状态的标志。二是可用于预测食品的耐保藏性。"]}, {"type": "q", "stem": "4.大肠菌群最近似值表示大肠菌群的可能数相当于食品的数量是", "options": ["A.1g或1ml", "B.10g或10ml", "C.100g或100ml", "D.1kg或1L"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P252。", "食品中大肠菌群的数量可用两种方式表示，当食品中大肠菌群含量较低时，采用相当于每g（ml）食品中大肠菌群的最可能数（most probable number，MPN）来表示。当食品中大肠菌群含量较高时，采用平板计数培养后大肠菌群的菌落数，结果表示为每g（ml）样品中大肠菌群的菌落数，即CFU/g（ml）。"]}, {"type": "q", "stem": "5.为判断冷冻食品是否被人或温血动物粪便污染，可检测（ ）", "options": ["A.大肠菌群", "B.沙门氏菌", "C.葡萄球菌", "D.肠球菌"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P252。", "大肠菌群可以作为食品卫生质量的鉴定指标，但由于大肠菌群是嗜温菌，在5℃以下基本不能生长，所以对低温菌占优势的水产品，特别是冷冻食品未必适用。因此，近年来也有用肠球菌作为粪便污染的指示菌。"]}], "qn": 5}, {"title": "141 食品真菌污染", "items": [{"type": "q", "stem": "[2017RD真题]1.食品安全国家标准《食品中真菌毒素限量（GB 2761—2017）》中制定了限量指标的真菌毒素是（  ）①黄曲霉毒素B1；②黄曲霉毒素M1；③脱氧雪腐镰刀菌烯醇；④展青霉素；⑤赭曲霉毒素A；⑥玉米赤霉烯酮", "options": ["A.①②", "B.①③⑤⑥", "C.③④⑤⑥", "D.①②③④⑤⑥"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P257-P259。", "《食品中真菌毒素限量（GB 2761—2017） 》 2017年3月17日发布，2017年9月17日实施。", "该标准规定了食品中黄曲霉毒素B1、黄曲霉毒素M1、脱氧雪腐镰刀菌烯醇、展青霉素、赫曲霉毒素A及玉米赤霉烯酮的限量指标。"]}, {"type": "q", "stem": "[2021RD真题]2.某公司生产的液体乳产品被检出黄曲霉毒素M1超标140％，下列关于黄曲霉素来源最可能是（  ）", "options": ["A.奶牛被黄曲霉菌污染", "B.奶牛可能患有乳腺炎", "C.饲料污染", "D.在乳产品加工过程中被黄曲霉菌污染"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P256。", "奶牛进食被AFB1污染的饲料后其牛乳中排出AFB1的羟基化代谢产物AFM1。"]}, {"type": "q", "stem": "[2018DTR真题]3.一批花生油经检查发现，黄曲霉毒素B1含量小于10μg/kg，对该批花生油的检查结论是（ ）", "options": ["A.可食用", "B.废弃", "C.经处理后工业用", "D.处理后可食用"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P257。", "《食品安全国家标准食品中真菌毒素限量》（GB 2761—2017）规定花生油、玉米油中的黄曲霉毒素B1含量不超过20μg/kg，其他种类食用油的黄曲霉毒素B1含量不超过10μg/kg。"]}, {"type": "q", "stem": "[2019DTR真题]4.黄曲霉毒素属于（ ）", "options": ["A.细菌毒素", "B.真菌毒素", "C.农药残留", "D.多环芳烃化合物"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P254。", "黄曲霉毒素（AF）是黄曲霉和寄生曲霉产生的一类代谢产物。"]}, {"type": "q", "stem": "[2019DTR真题]5.黄曲霉毒素主要的污染的食品包括（ ）①玉米；②花生；③芹菜；④香蕉；⑤大米", "options": ["A.①②③", "B.①②⑤", "C.②③④", "D.③④⑤"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P255。", "黄曲霉毒素主要污染粮油及其制品，其中以玉米、花生和棉籽油最易受到污染，其次是稻谷、小麦、大麦、豆类等。"]}], "qn": 5}, {"title": "142 食品腐败变质（上）", "items": [{"type": "q", "stem": "[2020RD真题]1.下列关于食品腐败变质的说法，错误的是（  ）", "options": ["A.微生物是引起食品腐败变质的重要原因", "B.三甲胺主要测定鱼虾的新鲜度", "C.Aw越大，食品越不容易腐败变质", "D.挥发性盐基总氮是蛋白质腐败变质的鉴定指标"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P250。", "食品中水分是微生物赖以生存和食品成分分解的基础，食品的Aw值越小，微生物越不易繁殖，食品越不易腐败变质。"]}, {"type": "q", "stem": "[2018RD真题]2.下列关于油脂和脂肪氧化的描述，正确的是（  ）", "options": ["A.动物油脂比植物油脂更容易氧化", "B.油脂的氧化受到铁、铜等金属离子的抑制", "C.维生素E可以促进油脂酸败", "D.油脂氧化过程中产生过氧化脂质"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P334。", "脂类氧化形成的自由基与其他物质结合，生成过氧化物、交联过氧化物、环氧化物，并向食品体系释放出氧，不仅引起必需脂肪酸的破坏，而且造成维生素和色素的破坏。"]}, {"type": "q", "stem": "[2020RD真题]3.下列关于油脂酸败的描述，错误的是（  ）", "options": ["A.酸价、过氧化值、羰基价、丙二醛可以作为油脂酸败的卫生学指标", "B.油脂酸败是油脂中饱和脂肪酸和脂溶性维生素等物质被氧化破坏的结果", "C.食用油脂纯度不高或储存不当，可导致酸败", "D.油脂中添加丁基羟基茴香醚和维生素E有助于防止油脂酸败"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P261。", "油脂酸败的化学过程复杂，主要是经水解与氧化，产生相应的分解产物。中性脂肪分解为甘油和脂肪酸，随后进一步氧化为低级的醛、酮、酸等；不饱和脂肪酸的双键被氧化形成过氧化物，进一步分解为醛、酮、酸等。"]}, {"type": "q", "stem": "[2020DTR真题]4.北方冬天有腌制咸肉的习惯，放到次年夏天咸肉有“哈嗽味”，是由于（ ）", "options": ["A.肉中蛋白质腐败", "B.肉中脂溶性维生素被破坏", "C.油脂酸败", "D.肉中B族维生素被破坏"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P333。", "在油脂酸败过程中所形成的酸、酮和某些羧酸使得油脂带有特殊的刺激性臭味，即所谓的“哈喇” 气味。"]}, {"type": "q", "stem": "[2018RD真题]5.下列关于油脂和脂肪氧化的描述，正确的是（  ）", "options": ["A.动物油脂比植物油脂更容易氧化", "B.油脂的氧化受到铁、铜等金属离子的抑制", "C.维生素E可以促进油脂酸败", "D.油脂氧化过程中产生过氧化脂质"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P334。", "脂类氧化形成的自由基与其他物质结合，生成过氧化物、交联过氧化物、环氧化物，并向食品体系释放出氧，不仅引起必需脂肪酸的破坏，而且造成维生素和色素的破坏。"]}], "qn": 5}, {"title": "143 食品腐败变质（中）", "items": [{"type": "q", "stem": "[2021DTR真题]1.下列指标中，可作为油脂酸败程度指标的是（  ）", "options": ["A.PH值", "B.碘值", "C.皂化价", "D.过氧化值"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P262。", "过氧化值（POV）是指油脂中不饱和脂肪酸被氧化形成过氧化物的量，以100g被测油脂使碘化钾析出碘的克数表示。POV是一个反映油脂酸败早期状态的指标。"]}, {"type": "q", "stem": "[2024RD真题]2.下列关于食品腐败变质鉴定指标的描述中，错误的是（ ）", "options": ["A.K值可用于鉴定碳水化合物腐败变质", "B.折光率、冰点、黏度是食品腐败变质鉴定的物理指标", "C.食品的感官鉴定包括视觉、嗅觉、触觉和味觉", "D.过氧化值和酸价可用于鉴定脂肪酸败变质"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P261-P262。", "K值是指ATP分解的低级产物肌苷（HxR）和次黄嘌呤（Hx）占ATP系列分解产物ATP+ADP+AMP+IMP+HxR+Hx的百分比，主要适用于鉴定鱼类早期腐败。"]}, {"type": "q", "stem": "[2023RD真题]3.鱼类死后随着新鲜度的下降，下列成分中随之升高的有（  ）①氧化三甲胺（TMAO）； ②三甲胺（TMA）；③挥发性盐基总氮（TVBN） ④尿素（Urea）。", "options": ["A.①②", "B.①③", "C.②③", "D.①④"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P262。", "①氧化三甲胺是鱼类体内的一种稳定化合物，通常在新鲜鱼类中含量较高，随着新鲜度下降，TMAO会逐渐转化为三甲胺（TMA）。", "②对，三甲胺是季胺类含氮物经微生物还原产生的，新鲜鱼虾等水产品中没有三甲胺。", "③对，挥发性盐基总氮是衡量鱼类新鲜度的一个指标，随着鱼类的腐败，蛋白质分解产生氨和其他氮化合物，导致TVBN含量升高。", "④错，尿素是鱼类体内的一种代谢产物，但其含量并不会随着鱼类新鲜度的下降而显著升高。"]}, {"type": "q", "stem": "[2018DTR真题]4.下列常用作油脂酸败评价指标的是（  ）①杂环胺；②酸价；③过氧化值；④羰基价；⑤丙二醛含量。", "options": ["A.③④", "B.②③⑤", "C.①②④⑤", "D.②③④⑤"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P333。", "酸价是指中和1g油脂中游离脂肪酸所需KOH的毫克数，该指标可衡量油脂中游离脂肪酸的含量，按照我国现行食用植物油卫生标准的规定，食用植物油酸价不得超过3。", "过氧化值是指油脂中不饱和脂肪酸被氧化形成的过氧化物的量，一般以100g被测油脂使碘化钾析出碘的克数或每于克油脂中所含过氧化物的毫摩尔数来表示。", "羰基价指油脂酸败时产生的含有羰基和酮基的脂肪酸或甘油酯及其聚合物的总量。", "丙二醛是油脂氧化的最终产物，通常用来反映动物油脂酸败的程度。"]}, {"type": "q", "stem": "[2023DTR真题]5.若判断食物中脂肪是否发生腐败变质，下列指标中，可采用的是（  ）", "options": ["A.挥发性盐基总氮", "B.K值", "C.过氧化值", "D.三甲胺"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P333。", "过氧化值是脂肪酸败最早期的指标，其次是酸价的上升。在脂肪分解的早期，酸败尚不明显，由于产生过氧化物和氧化物而使脂肪的过氧化值上升，其后则由于形成各种低级酮酸及脂肪酸而使油脂酸价升高。"]}], "qn": 5}, {"title": "144 食品腐败变质（下）", "items": [{"type": "q", "stem": "[2019RD真题]2.下列关于食品保藏的描述，正确的是（  ）", "options": ["A.增加氢离子浓度可延长保存期", "B.为抑制马铃薯发芽，可采用紫外线照射", "C.蛋类可采用冷冻法进行保鲜", "D.糖渍食品中的糖含量达到10%以上，可以抑制大多数细菌"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P262。", "大多数微生物不能在pH4.5 以下正常繁殖，故可利用提高氢离子浓度来防腐，此方法多用于各种蔬菜，如泡菜和渍酸菜等。"]}, {"type": "q", "stem": "[2020DTR真题]3.以下工艺中，与食品腐败变质无关的是（ ）", "options": ["A.脱水", "B.高温", "C.压榨", "D.冷藏"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P262。", "食品保藏的基本原理是改变食品的温度、水分、氢离子浓度、渗透压以及采用其他抑菌杀菌的措施，将食品中的微生物杀灭或减弱其生长繁殖的能力，以达到防止食品腐败变质的目的。压榨与与食品腐败变质无关。"]}, {"type": "q", "stem": "[2020RD真题]4.关于辐照对食品中脂溶性维生素影响，从大到小的顺序（  ）", "options": ["A.维生素A>维生素D>维生素E>维生素K", "B.维生素K>维生素E>维生素D>维生素A", "C.维生素E>维生素A>维生素D>维生素K", "D.维生素D>维生素K>维生素E>维生素A"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P682。", "脂溶性维生素对辐射敏感，其中以维生素E最为显著，脂溶性维生素对辐射的敏感性大小秩序为：维生素E>胡萝卜素>维生素A>维生素D>维生素K。"]}, {"type": "q", "stem": "[2020RD真题]5.一批工厂的冷冻肉，在下列哪种情况下解冻最佳（  ）", "options": ["A.自然流水下", "B.热水里浸泡", "C.温水下", "D.冰箱里冷藏解冻"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P263。", "快速冻结、缓慢解冻有利于保持食品（尤其是生鲜食品）的品质。因为当温度降至-1~-5°C时，为冰晶生成带，如果冷冻缓慢，在此温度带停留时间长，则使食品中形成的冰晶核体积增大，使食品组织细胞膜破裂，释放出细胞液，当食品解冻时，就会引起汁液流失，食品的口感、风味及营养价值均受影响。反之，快速冻结，迅速通过冰晶生成带，形成的冰晶核数量多，体积小，就不会使食品组织细胞破裂。"]}], "qn": 4}, {"title": "145 农药残留", "items": [{"type": "context", "text": "[2022DTR真题]2022年1月，国家市场监督管理总局通报某地蔬菜批发配送中心销售的豇豆，其中噻虫胺、倍硫磷、灭蚊胺残留量不符合食品安全国家标准规定。"}, {"type": "q", "stem": "1.倍硫胺是一种有机磷农药，该类农药的急性毒性主要是（  ）", "options": ["A.干扰体内激素分泌", "B.对皮肤和呼吸器官具有强烈的刺激性", "C.急性肝损伤", "D.抑制胆碱酯酶活性，导致胆碱能神经功能紊乱，出现一系列的神经系统中毒症状"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P268。", "有机磷农药的急性毒性主要是抑制胆碱酯酶的活性，因乙酰胆碱蓄积，导致胆碱能神经功能紊乱而出现一系列神经系统中毒症状。"]}, {"type": "q", "stem": "2.下列农药中，我国已经禁止使用的是（  ）", "options": ["A.有机磷农药", "B.有机氯农药", "C.氨基甲酯类农药", "D.拟除虫菌脂类"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P267。", "DDT、六六六等有机氯农药属于高残留农药，我国已经禁止使用。"]}, {"type": "q", "stem": "3.下列措施中，有利于降低农作物农药残留水平的是（  ）①去皮、研磨等加工；②减少农药施用次数和用量；③加热后食用；④收获前一段时期停止施用农药；⑤少量多次施用农药。", "options": ["A.③④⑤", "B.①③⑤", "C.①②④", "D.②③④"], "answer": "答案：C", "analysis": ["解析：营养与食品卫生学》第9版P270-P271。", "①对，去皮、研磨等加工可以减少农药残留。", "②对，减少农药施用次数和用量可以减少农药残留。", "③错，加热不一定能破坏农药毒性。", "④对，收获前按照安全间隔期的要求停止使用。", "⑤错，少量多次施用农药，总量并无减少。"]}, {"type": "q", "stem": "4.下列农药残留超标最不可能的原因是（  ）", "options": ["A.未遵守合理间隔期采摘", "B.气象条件影响农药的清除和降解", "C.农药用量过大", "D.违规使用了国家禁止使用的农药"], "answer": "答案：D", "analysis": ["解析：违规使用国家禁止使用的农药不属于农药残留超标的范畴。"]}, {"type": "q", "stem": "[2018RD真题]4.某果菜批发市场销售的芹菜，毒死蜱检出值为1.6mg/kg，比国家标准（不超过0.05mg/kg）高出31.0倍。毒死蜱属于哪类农药（  ）", "options": ["A.有机磷农药", "B.拟除虫菊酯类农药", "C.有机氯农药", "D.氨基甲酸酯类农药"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P268。", "有机磷农药是目前常用农药中毒性最大的一类农药。毒死蜱属于有机磷农药。"]}], "qn": 5}, {"title": "146 有毒金属污染", "items": [{"type": "q", "stem": "[2020RD真题]1.在摄入海产品时，应特别关注的重金属污染是（  ）", "options": ["A.砷", "B.镉", "C.铅", "D.汞"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P272。", "含汞的废水排入江河湖海后，其中所含的金属汞或无机汞可以在水体（尤其是底层污泥） 中某些微生物体内甲基钴氨酸转移酶的作用下，转变为甲基汞，污染水产品。"]}, {"type": "q", "stem": "[2017RD真题]2.食用被重金属镉污染的大米会引起下列哪种疾病（  ）", "options": ["A.水俣病", "B.黑脚病", "C.痛痛病", "D.脚气病"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P274。", "水俣病—甲基汞中毒；黑脚病—砷中毒；痛痛病—镉中毒；脚气病—维生素B1缺乏。"]}, {"type": "q", "stem": "[2019DTR真题]3.下列哪种金属的毒性最易造成贫血（ ）", "options": ["A.铬", "B.铅", "C.镉", "D.砷"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P156、P275。", "铅主要损害造血系统、神经系统和肾脏。常见的症状和体征为贫血、神经衰弱、烦躁、失眠、食欲缺乏、口有金属味、腹痛、腹泻或便秘、头昏、头痛、肌肉关节疼痛等。", "铅通过抑制巯基酶活性，使血红蛋白合成减少。由于在肠道吸收过程中，铅与铁等矿物质的转运蛋白相同，相互间存在竞争性抑制作用，血铅增高会直接降低铁的吸收率。"]}, {"type": "q", "stem": "[2018DTR真题]4.皮蛋豆腐是客人常点的菜肴，但传统的皮蛋制作工艺中容易造成某种重金属的污染，对健康带来风险，这种重金属是（ ）", "options": ["A.铝", "B.汞", "C.砷", "D.铅"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P127。", "传统皮蛋是用鸭蛋为原料，用生石灰、黄丹粉、烧碱、茶叶末、草木灰和食盐等“和稀泥”包裹加工而成，黄丹粉里含有氧化铅，从而导致了传统皮蛋制作过程中出现铅超标的现象。"]}, {"type": "q", "stem": "[2019RD真题]5.下列关于食品污染及其危害对应关系中，正确的是（  ）①黄曲霉毒素一肝癌；②伏马菌素一神经毒性；③玉米赤霉烯酮一生殖系统毒性；", "options": ["A.④②③", "B.④③⑤", "C.①②③⑤", "D.①③④⑤"], "answer": "答案：C", "analysis": ["④镉一造血系统毒性；⑤甲基汞一神经系统毒性", "解析：《营养与食品卫生学》第9版P257、P258、P273、P274。"]}], "qn": 5}, {"title": "147 N-亚硝基化合物污染", "items": [{"type": "q", "stem": "1.增加维生素C的摄入量可抑制食管癌发生的机制是（ ）", "options": ["A.减少亚硝酸盐的摄入", "B.阻断亚硝基化反应", "C.抑制胃内硝酸盐还原菌的活性", "D.增加亚硝酸盐的排出"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P280。", "维生素C、维生素E以及酚类及黄酮类化合物有较强的阻断亚硝基化反应的作用。维生素C对N-亚硝基化合物的阻断机制可能是通过还原亚硝基化反应，或者清除亚硝基阳离子(NO+)来实现阻断。"]}, {"type": "q", "stem": "2.适宜N-亚硝基化合物在体内合成的场所是（ ）", "options": ["A.肺", "B.胃", "C.血液", "D.肝脏"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P279。", "由于在pH<3 的酸性环境中合成亚硝胺的反应较强，而且胃中存在亚硝酸盐和具有催化作用的氯离子和硫氰酸根离子，有利于胃内N-亚硝基化合物的合成，因此胃可能是人体内合成亚硝胺的主要场所。"]}, {"type": "q", "stem": "[2020RD真题]3.下列营养素，能延缓亚硝酸盐在胃里转变成亚硝胺的是（  ）", "options": ["A.维生素C", "B.铁", "C.油酸", "D.色氨酸"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P280。", "维生素C、维生素E以及酚类及黄酮类化合物有较强的阻断亚硝基化反应的作用。维生素C对N-亚硝基化合物的阻断机制可能是通过还原亚硝基化反应，或者清除亚硝基阳离子（NO+）来实现阻断。大蒜中含有的硫化物和苯二羧酸类是大蒜产生阻断作用的主要活性成分。"]}, {"type": "q", "stem": "[2024RD真题]2.下列物质中，属于N-亚硝基化合物前体物的是（ ）①硝酸盐；②亚硝酸盐；③胺类；④N-亚硝胺；⑤N-亚硝酰胺。", "options": ["A.①③⑤", "B.②③④", "C.①②③", "D.②④⑤"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P278。", "N-亚硝基化合物的前体包括：硝酸盐、亚硝酸盐和胺类物质。"]}, {"type": "q", "stem": "5.以下针对N-亚硝基化合物污染的预防措施中，不正确的是（ ）", "options": ["A.防止食物被微生物污染", "B.改进食品加工工艺", "C.施用氮肥", "D.阻断亚硝基化反应"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P280。", "农业用肥及用水与蔬菜中亚硝酸盐和硝酸盐含量有密切关系。使用钼肥有利于降低蔬菜中硝酸盐和亚硝酸盐含量。"]}], "qn": 5}, {"title": "148 苯并芘污染", "items": [{"type": "q", "stem": "[2021DTR真题]1.熏羊肉可能存在的污染物是（  ）", "options": ["A.苯并芘", "B.二甲基硫化物", "C.黄曲霉毒素", "D.丙烯酰胺"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P280。", "苯并芘来源：食品在烘烤或熏制时直接受到污染；食品成分高温烹调加工时发生热解或热聚反应所形成。", "苯并芘在烘烤和熏制食品中含量较多。"]}, {"type": "q", "stem": "2.B(a)P被机体吸收后可分布于全身，并可大量蓄积于（ ）", "options": ["A.肝脏", "B.胃", "C.脂肪组织", "D.血液", "A.防止食物霉变", "B.食物加工时减少亚硝酸盐的使用量", "C.将肉熏制后挂于厨房晾晒", "D.使食物不直接接触炭火"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P281。", "通过食物或水进入机体的PAH在肠道被吸收入血后很快分布于全身，几乎在所有器官组织中均可发现，但以脂肪组织中含量最高。", "3.有利于降低食物中苯并（a）芘含量的措施是（ ）", "解析：《营养与食品卫生学》第9版P281。", "防止苯并（a）芘污染的措施：", "①加强环境治理，减少环境B(a)P的污染，从而减少其对食品的污染；②熏制、烘烤食品及烘干粮食等加工过程应改进燃烧过程，避免使食品直接接触炭火或直接接触烟，使用熏烟洗净器或冷熏液；③不在柏油路上晾晒粮食和油料种子，以防沥青中B(a)P的污染。"]}, {"type": "q", "stem": "4.我国食品安全标准规定，烧烤或熏制的动物性食品中B(a)P的含量应（ ）", "options": ["A.≤100μg/kg", "B.≤50μg/kg", "C.≤10μg/kg", "D.≤5μg/kg"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P281。", "食品安全国家标准（GB 2762一2022）中B(a)P的限量标准为：熏、烧、烤肉类≤5μg/kg，植物油≤10μg/kg。"]}, {"type": "q", "stem": "5.街头烤羊肉串，是将小块羊肉串在铁针上，直接在炭火上烤制，这种羊肉串中含量较高的有（ ）", "options": ["A.黄曲霉毒素", "B.苯并(a)芘", "C.氯丙醇", "D.丙烯酰胺"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P280。", "选项A是真菌污染的代谢产物，其余3个选项均是食品加工过程中生成的，但只有选项B是在明火烟熏时最易生成。"]}], "qn": 4}, {"title": "149 杂环胺污染", "items": [{"type": "q", "stem": "1.下列关于杂环胺化合物的表述，错误的是（ ）", "options": ["A.高温烹调鱼、肉类过程中容易产生", "B.主要致癌靶器官为胃", "C.有很强的致突变性", "D.可通过改变不良烹调方式来预防"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P283。", "肝脏为杂环胺化合物主要致癌靶器官。"]}, {"type": "q", "stem": "[2017RD真题]2.食品高温加工条件下可发生美拉德反应，该过程中产生的污染物主要是（  ）", "options": ["A.N-亚硝基化合物", "B.氯丙醇", "C.杂环胺", "D.多环芳烃"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P283。", "美拉德反应在杂环胺的形成中可能起到催化作用，也有研究表明糖中的碳原子可以进入一些杂环胺中，如糖与氨基酸、肌酸在一定条件下可产生大量杂环物质，其中一些可进一步反应生成杂环胺。"]}, {"type": "q", "stem": "3.杂环胺致癌的主要靶器官为（ ）", "options": ["A.肝脏", "B.胃", "C.脂肪组织", "D.血液"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P283。", "杂环胺经口摄入后，很快吸收并通过血液分布于体内的大部分的组织，肝脏是其重要的代谢器官，肠、肺、肾等组织也有一定的代谢能力。"]}, {"type": "q", "stem": "[2023RD真题]4.下列食品中，杂环胺类化合物含量最低的是（  ）", "options": ["A.烤韭菜", "B.煎带鱼", "C.烤猪排", "D.烤羊肉串"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P283。", "在烹调温度、时间和水分相同的情况下，蛋白质含量较高的食物产生杂环胺较多。"]}, {"type": "q", "stem": "[2023DTR真题]5.富含蛋白质的食物，在高温烹调的过程中，容易产生的污染物是（  ）", "options": ["A.亚硝酸盐", "B.丙烯酰胺", "C.杂环胺", "D.多环芳烃"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P281。", "食物中蛋白质、氨基酸在加工烹调中，由于受到高温的作用可产生杂环化合物。"]}], "qn": 5}, {"title": "150 氯丙醇污染", "items": [{"type": "q", "stem": "1.促使水解蛋白中形成氯丙醇的因素主要包括（ ）", "options": ["A.①③④", "B.①③⑤", "C.②③④", "D.③④⑤"], "answer": "答案：A", "analysis": ["①盐酸的用量较大；②氯离子的浓度较低；③回流的温度过高；④原料中的脂肪较多；⑤反应时间短", "解析：《营养与食品卫生学》第9版P284。", "在生产酸水解植物蛋白调味液时，原料中脂肪多、盐酸用量大、温度高、反应时间长，产生的氯丙醇多。"]}, {"type": "q", "stem": "2.氯丙醇的主要毒作用器官有（ ）①肝脏；②肾脏；③脑组织；④骨髓；⑤肺脏", "options": ["A.①②③", "B.②③④", "C.②③⑤", "D.③④⑤"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P285。", "3-MCPD的主要靶器官是肾脏；1，3-DCP 的主要靶器官是肝脏，同时也对肾脏造成损伤。3-MCPD有神经毒作用，主要表现为脑干对称性损伤、四肢麻木。"]}, {"type": "q", "stem": "3.用盐酸水解法生产酸水解植物蛋白调味液的过程中，产生的污染物是（ ）", "options": ["A.苯并[a]芘", "B.丙烯酰胺", "C.杂环胺", "D.氯丙醇"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P284。", "氯丙醇主要存在于用盐酸水解法生产的酸水解植物蛋白调味液中。在生产过程中，原料中的脂肪被水解为甘油，后者与盐酸的氯离子发生亲核取代反应，生成一系列氯丙醇产物。"]}, {"type": "q", "stem": "4.在生产酸水解植物蛋白调味液时，减少氯丙醇产生的工艺是（ ）", "options": ["A.增加盐酸用量", "B.降低温度", "C.增加原料中脂肪", "D.延长反应时间"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P286。", "在生产酸水解植物蛋白调味液时，原料中脂肪多、盐酸用量大、温度高、反应时间长，产生的氯丙醇多。针对上述因素调整生产工艺可使氯丙醇的含量大大降低。"]}, {"type": "q", "stem": "5.在各种氯丙醇产物中，最主要的是（ ）", "options": ["A.3-MCPD", "B.2-MCPD", "C.1,3-DCP", "D.2,3-DCP"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P284。", "在各种氯丙醇产物中，3-MCPD约占70%。"]}], "qn": 5}, {"title": "151 丙烯酰胺污染", "items": [{"type": "q", "stem": "[2020RD真题]1.高温烘烤的淀粉类食物，可能产生的有毒物质是（  ）", "options": ["A.杂环胺", "B.丙烯酰胺", "C.苯并芘", "D.亚硝胺"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P286。", "油炸和焙烤的淀粉类食品是膳食中丙烯酰胺（AA）的主要来源。AA含量较高的是薯类制品、咖啡及类似制品、早餐谷物。"]}, {"type": "context", "text": "[2018RD真题]据媒体报道，因星巴克产品中含有高含量的丙烯酰胺，被美国法院要求在产品上加贴“致癌”警告标签。"}, {"type": "q", "stem": "2.下列关于丙烯酰胺的说法中，正确的是（  ）", "options": ["A.丙烯酰胺主要在高脂肪、高蛋白质含量的食物烹调过程中产生", "B.食品中丙烯酰胺不稳定，随着储存时间的延长，含量逐渐下降", "C.丙烯酰胺具有潜在的神经毒性、遗传毒性和致癌性", "D.丙烯酰胺是脂质过氧化产物"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P286。", "丙烯酰胺（AA）主要由天门冬酰胺与还原糖（葡萄糖、果糖、麦芽糖等）在高温下发生美拉德反应生成，两者单独存在时即使加热也不产生AA。", "AA在食物中较稳定。"]}, {"type": "q", "stem": "3.下列食品中，丙烯酰胺含量较高的是（  ）①高温加工的土豆制品（包括薯片、薯条等）；②咖啡及类似制品；③早餐谷物类食品；④肉松；⑤奶粉", "options": ["A.①②③", "B.④⑤", "C.②④⑤", "D.①②③④⑤"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P286。", "油炸和焙烤的淀粉类食品是膳食中AA的主要来源。AA含量较高的是薯类制品、咖啡及类似制品、早餐谷物。"]}, {"type": "q", "stem": "4.减少食物中丙烯酰胺的措施，正确的是（  ）①尽量避免烹调时温度过高；②避免烹饪时间过长；③减少油炸和高脂食品的摄入；④平衡膳食，多吃蔬菜水果；⑤改进食品加工工艺和条件，减少食品中丙烯酰胺的可能途径", "options": ["A.③④", "B.④⑤", "C.③④⑤", "D.①②③④⑤"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P288。", "全部都对。"]}, {"type": "q", "stem": "[2020DTR真题]5.未成熟的咖啡豆经高温烘培后容易产生的致癌物质是（ ）", "options": ["A.多环芳经", "B.丙烯酰胺", "C.N-亚硝基化合物", "D.氯丙醇"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P286。", "油炸和焙烤的淀粉类食品是膳食中AA的主要来源。AA含量较高的是薯类制品、咖啡及类似制品、早餐谷物。"]}], "qn": 5}, {"title": "152-155 食品添加剂", "items": [{"type": "context", "text": "[2018RD真题]已知，某食品企业生产的黑芝麻月饼和五仁月饼脱氢乙酸及其钠盐（以脱氢乙酸计）超出国家安全标准规定。"}, {"type": "q", "stem": "1.在月饼中添加脱氢乙酸及其钠盐的作用是（  ）", "options": ["A.增味剂", "B.甜味剂", "C.防腐剂", "D.抗氧化剂"], "answer": "答案：C", "analysis": ["解析：《GB 2760-2024 食品安全国家标准 食品添加剂使用标准》。", "脱氢乙酸及其钠盐（又名脱氢醋酸及其钠盐），功能为防腐剂。"]}, {"type": "q", "stem": "2.下列哪些情况，可以使用食品添加剂（  ）①保持或者提高食品本身的营养价值；②作为某些特殊膳食用食品的必要配料或成分；③提高食品的质量和稳定性，改进其感官特性；④便于食品的生产和加工；⑤便于食品的包装、运输或贮藏", "options": ["A.①②③④⑤", "B.①③④⑤", "C.③④⑤", "D.①②③"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P303。", "在下列情况下可使用食品添加剂：1. 保持或提高食品本身的营养价值。2. 作为某些特殊膳食用食品的必要配料或成分。3. 提高食品的质量和稳定性，改进其感官特性。4. 便于食品的生产、加工、包装、运输或者贮藏。"]}, {"type": "q", "stem": "3.以下食品添加剂不可作为抗氧化剂使用的是（  ）", "options": ["A.丁基羟基茴香醚", "B.没食子酸丙酯", "C.二氧化硫", "D.海藻酸钠"], "answer": "答案：D", "analysis": ["解析：《GB 2760-2024 食品安全国家标准 食品添加剂使用标准》。", "海藻酸钠（又名褐藻酸钠），功能为增稠剂。"]}, {"type": "q", "stem": "[2020DTR真题]4.关于食品添加剂描述错误的是（ ）", "options": ["A.在符合标准限量的条件下，可随意添加", "B.同一种食品添加剂在不同食品中可具有不同功能", "C.食品添加剂既可是天然物质，也可以是人工合成物质", "D.食品工业用加工助剂属于食品添加剂"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P303。", "A错。在达到预期效果的前提下尽可能降低食品添加剂在食品中的使用量。"]}, {"type": "q", "stem": "[2021DTR真题]5.下列食品添加剂中，会对特殊体质人群造成哮喘的是（  ）", "options": ["A.糖精", "B.亚硝酸盐", "C.亚硫酸盐", "D.抗坏血酸"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P308。", "亚硫酸盐能导致过敏反应。"]}, {"type": "context", "text": "[2018DTR真题]食品添加剂是随着食品工业的发展而逐步形成和发展起来的，合理使用食品添加剂可以改善食品的组织状态、增强食品的色香味和口感，防腐保鲜，延长食品保质期。"}, {"type": "q", "stem": "6.制作香肠、火腿时，加入亚硝酸盐的主要目的是（ ）", "options": ["A.防止维生素被破坏", "B.缩短腌制的时间", "C.保持颜色及抑制细菌生长", "D.使肉质软嫩，缩短烹调的时间"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P310。", "亚硝酸盐可作为防腐剂和护色剂，用于肉类腌制，以保持肉类的颜色、抑制微生物（肉毒梭状芽抱杆菌）的生长及产生特殊风味。"]}, {"type": "q", "stem": "7.下列食品中不得添加任何食品添加剂的是（ ）", "options": ["A.纯牛奶", "B.酱油", "C.火腿", "D.大豆油"], "answer": "答案：A", "analysis": ["解析：根据《GB 25190一2010  灭菌乳》, 仅以生牛（羊）乳为原料的超高温灭菌乳应在产品包装主要展示面上紧邻产品名称的位置，使用不小于产品名称字号且宇体高度不小于主要展示面高度五分之一的汉字标注“ 纯牛（羊）奶” 或“ 纯牛（羊）乳”。"]}, {"type": "q", "stem": "8.素食者的食品中，不宜使用下列哪种胶作为增稠剂（ ）", "options": ["A.明胶", "B.卡拉胶", "C.阿拉伯胶", "D.褐藻胶"], "answer": "答案：A", "analysis": ["解析：食品添加剂明胶通常以动物的骨、皮、筋、腱和鳞等为原料经适度水解所制得常用作增稠剂。"]}, {"type": "q", "stem": "9.苏打粉的主要成分是（ ）", "options": ["A.碳酸氢钠", "B.碳酸氢铵", "C.酒石酸钾", "D.酒石酸钠"], "answer": "答案：A", "analysis": ["解析：碳酸氢钠俗称小苏打或苏打粉。"]}, {"type": "q", "stem": "10.某饼干的配料表标注为：小麦粉，食用植物油，全蛋液，麦精，碳酸氢钠，焦亚硫酸钠，食用盐，淀粉。其中碳酸氢钠是（ ）", "options": ["A.防腐剂", "B.膨松剂", "C.面粉处理剂", "D.增味剂"], "answer": "答案：B", "analysis": ["解析：《 GB2760-2024  食品添加剂使用标准》。", "碳酸氢钠可用作膨松剂、酸度调节剂和稳定剂。", "近期，国家市场监督管理总局发布食品抽检不合格情况通告，其中某公司生产的山核桃味瓜子，二氧化硫残留量不符合食品安全国家标准规定。"]}, {"type": "q", "stem": "11.二氧化硫及亚硫酸盐（包括二氧化硫、焦亚硫酸钾、焦亚硫酸钠、亚硫酸钠、亚硫酸氢钠、低亚硫酸钠）是我国允许使用的食品添加剂，下列关于其功能的描述中，错误的是（  ）", "options": ["A.水分保持剂", "B.漂白剂", "C.防腐剂", "D.抗氧化剂"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P307。", "A错，二氧化硫及亚硫酸盐的主要功能是漂白剂、防腐剂和抗氧化剂，不具有水分保持剂的功能。", "B对，二氧化硫及亚硫酸盐具有漂白作用，是我国允许使用的漂白剂。", "C对，亚硫酸盐对微生物有抑制作用，可作为防腐剂。", "D对，亚硫酸盐具有还原性，可防止食物氧化，作为抗氧化剂使用。"]}, {"type": "q", "stem": "12.以下食品不得检出二氧化硫的是（  ）", "options": ["A.蜜饯", "B.蔬菜罐头", "C.水果罐头", "D.葡萄酒"], "answer": "答案：C", "analysis": ["解析：《GB 2760-2024 食品添加剂使用标准》。", "A错，蜜饯类食品允许使用二氧化硫，且有明确的残留限量标准（0.35g/kg）。", "B错，蔬菜罐头允许使用二氧化硫，但有明确的残留限量标准（0.05g/kg，仅限银条菜为0.2g/kg）。", "C对，水果罐头不属于二氧化硫及亚硫酸盐的允许使用范围，因此不得检出。", "D错，葡萄酒允许使用二氧化硫作为防腐剂和抗氧化剂，且有明确的残留限量标准（0.25g/L）。"]}, {"type": "q", "stem": "13.下列关于二氧化硫及亚硫酸盐描述中，错误的是（  ）", "options": ["A.该食品属于熟制坚果和籽类食品，不允许使用二氧化硫及亚硫酸盐", "B.亚硫酸盐是一种过敏原", "C.亚硫酸盐能破坏食物中维生素B1", "D.亚硫酸盐只能抑制食品中的酶性褐变，不能抑制非酶性褐变"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P307-P308；《GB 2760-2024 食品添加剂使用标准》。", "A对，熟制坚果与籽类（非油炸类）不在二氧化硫及亚硫酸盐的允许使用范围内，因此不得使用。", "B对，亚硫酸盐是导致过敏反应的主要过敏原之一，易感人群应避免接触。", "C对，亚硫酸盐在中性或碱性条件下会加速维生素B1的分解破坏。", "D错，亚硫酸盐既能抑制酶性褐变（通过抑制氧化酶活性），也能抑制非酶性褐变（通过与羰基化合物发生加合反应，阻断美拉德反应）。"]}, {"type": "q", "stem": "[2018RD真题]14.甜蜜素和胭脂红的作用分别是（  ）", "options": ["A.甜蜜素 — 甜味剂，胭脂红 — 着色剂", "B.甜蜜素 — 甜味剂，胭脂红 — 护色剂", "C.甜蜜素 — 防腐剂，胭脂红 — 着色剂", "D.甜蜜素 — 防腐剂，胭脂红 — 增味剂"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P308、P315。", "甜蜜素是人工甜味剂，胭脂红是人工着色剂。"]}, {"type": "q", "stem": "[2022DTR真题]15.下列食品添加剂中，我国碳酸饮料中可以按生产需要适量使用而无限量要求的是（  ）", "options": ["A.红曲红", "B.胭脂红", "C.黑加仑红", "D.苋菜红"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P308。", "红曲红是将紫红曲霉接种在稻米上经发酵制成的红曲色素。我国《食品安全国家标准食品添加剂使用标准》（GB 2760-2024）中规定，除风味发酵乳、糕点和焙烤食品馅料及表面用挂浆外，其他适用食品可按生产需要适量使用。"]}], "qn": 15}, {"title": "156 食物过敏", "items": [{"type": "q", "stem": "[2018RD真题]1.关于食物过敏及其营养管理的描述中，正确的是（  ）①最常见的症状是腹泻；②饭后运动会诱发过敏性休克；③脱敏治疗就是在食物中完全去除过敏原；④婴幼儿、儿童是食物过敏的高危人群；⑤某些水果、蔬菜也能引起食物过敏，如苹果、芒果、芹菜、胡萝卜等。", "options": ["A.②④", "B.②④⑤", "C.①②④", "D.①②③④"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1660。", "食物依赖运动诱发的过敏性休克是食物过敏的特殊类型。患者在食入虾、芹菜、小麦等食物后6小时内运动就会发生严重的过敏反应，轻者会突发全身皮肤瘙痒、潮红、荨麻疹、喉头水肿、呼吸困难、哮喘等症状，严重者可有血压下降、意识丧失。", "脱敏治疗：临床上确定过敏性疾病患者的变应原后，将该变应原制成变应原提取液并配制成各种不同浓度的制剂，经反复注射或舌下含服或通过其它给药途径与患者反复接触，剂量由小到大，浓度由低到高，达到维持剂量后，维持足够的疗程，从而提高患者对该种变应原的耐受性，当再次接触此种变应原时，过敏现象得以减轻或不再产生过敏现象。"]}, {"type": "q", "stem": "[2022RD真题]2.下列关于食物过敏的描述中，正确的是（  ）", "options": ["A.发病率随年龄增长而增加", "B.食物过敏主要由IgG介导", "C.小麦、大麦及燕麦等谷物及其制品也会引起食物过敏", "D.食物不耐受是食物过敏的特殊表现"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P369-P370。", "A错，发病率随年龄的增长而降低。比如患病儿童随着年龄的增长对牛奶不再过敏。", "B错，食物过敏主要是由免疫球蛋白E（IgE）介导的速发过敏反应。", "C对，常见致敏食品：①少牛乳及乳制品（干酪、酪蛋白、乳糖等）；②蛋及蛋制品；③花生及其制品；④大豆和其他豆类以及各种豆制品；⑤小麦、大麦、燕麦等谷物及其制品；⑥鱼类及其制品；⑦甲壳类及其制品；⑧坚果类（核桃、芝麻等）及其制品。", "D错，食物不耐受是不涉及免疫系统的、对食物的不良反应。"]}, {"type": "q", "stem": "[2020DTR真题]3.下列关于食物过敏描述正确的是（  ）", "options": ["A.人群实际发病率较低", "B.由IgG介导", "C.食物不耐受是食物过敏的特殊表现", "D.发病率随年龄的增长而增加"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P369。", "A对，人群中实际发病率较低。由于临床表现难以区分，人们往往把各种原因引起的对食物的不良反应误认为是食物过敏。", "B错，由食物成分引起的人体免疫反应主要是由IgE介导的速发过敏反应。", "C错，食物不耐受是不涉及免疫系统的、对食物的不良反应。", "D错，发病率随年龄的增长而降低。比如患病儿童随着年龄的增长对牛奶不再过敏。"]}, {"type": "q", "stem": "[2023RD真题]4.以下食品及其制品可能导致过敏反应，如果用作配料，宜在配料表邻近位置加以提示的是（  ） ①大米及其制品；②花生及其制品；③大豆及其制品；④鱼及其制品；⑤蛋及其制品", "options": ["A.②④⑤", "B.②③④", "C.②③④⑤", "D.①②③④⑤", "a) 含有麸质的谷物及其制品（如小麦、黑麦、大麦、燕麦、斯佩耳特小麦或它们的杂交品系）。b) 甲壳纲类动物及其制品（如虾、龙虾、蟹等）。c) 鱼类及其制品。d) 蛋类及其制品。e) 花生及其制品。f) 大豆及其制品。g) 乳及乳制品（包括乳糖）。h) 坚果及其果仁类制品。"], "answer": "答案：C", "analysis": ["解析：《GB 7718-2025 预包装食品标签通则》以下食品配料可能导致敏感人群产生过敏反应，如用作配料，应在配料表中加以提示，或在配料表临近位置标示提示信息。"]}, {"type": "q", "stem": "[2019RD真题]5.对于预防婴儿过敏下列说法，错误的是（  ）", "options": ["A.纯母乳喂养至6月龄", "B.辅食添加不晚于26周", "C.可用羊奶、豆奶进行喂养", "D.孕期、乳母饮食回避对预防婴儿过敏无作用"], "answer": "答案：C", "analysis": ["解析：《中国婴幼儿牛奶蛋白过敏诊治循证建议（2022）》", "A对，母乳喂养有助于降低过敏疾病风险。", "B对，辅食添加不晚于26周，过晚增加过敏风险。", "C错，由于大豆与牛奶间存在交叉过敏反应和营养成分不足，一般不建义选用豆蛋白配方进行治疗。考虑营养因素及交叉过敏反应的影响，故不推荐采用未水解的驴乳、羊乳等进行替代治疗。", "D对，无证据显示母亲妊娠期回避牛奶和鸡蛋会减少子代过敏性疾病发生率；而母亲哺乳期饮食干预除可短时降低湿疹的发生率或严重程度外，并不能减少后期其他过敏性疾病的发生。故为避免母亲、胎儿/婴儿营养不良，不推荐限制母亲妊娠期、哺乳期饮食以预防牛奶蛋白过敏。"]}], "qn": 5}, {"title": "157-159 有毒动植物中毒", "items": [{"type": "context", "text": "[2019RD真题]某渔民，捕获一未知品种鱼类后，经简单加工处理后食用。10分钟后出现恶心、 呕吐、 腹泻等胃肠道症状，同时伴有四肢无力、 发冷。"}, {"type": "q", "stem": "1.根据以上症状判断本次食物中毒最可能的原因是（  ）", "options": ["A.组胺", "B.河豚毒素", "C.贝类毒素", "D.副溶血弧菌"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P392。", "河豚中毒的特点是发病急速而剧烈，潜伏期一般在10分钟至3小时。起初感觉手指、口唇和舌有刺痛，然后出现恶心、呕吐、腹泻等胃肠症状。同时伴有四肢无力、发冷、口唇、指尖和肢端知觉麻痹，并有眩晕。重者瞳孔及角膜反射消失，四肢肌肉麻痹，以致身体摇摆、共济失调，甚至全身麻痹、瘫痪，最后出现语言不清、血压和体温下降。"]}, {"type": "q", "stem": "2.该致病因子含量最多的器官是（  ）", "options": ["A.皮肤、肌肉", "B.卵巢、肝脏", "C.鱼腮、鱼鳍", "D.肠、胃"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P391。", "河豚的河豚毒素含量，在卵巢、肝脏最高。"]}, {"type": "q", "stem": "3.该毒素作用的主要靶器官是（  ）", "options": ["A.肝脏", "B.血液系统", "C.肾脏", "D.神经系统"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P392。", "河豚毒素是一种非蛋白质神经毒素，其选择性地阻断细胞膜对Na+的通透性，使神经传导阻断，呈麻痹状态。"]}, {"type": "q", "stem": "[2021DTR真题]4.下列食物中，可能引起组胺食物中毒的是（  ）", "options": ["A.鲫鱼", "B.鲍鱼", "C.河豚", "D.马鲛鱼"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P393。", "高组胺鱼类：鲐鱼、秋刀鱼、金枪鱼、马鲛鱼（鲅鱼）、鲣鱼、鲹鱼、鱼师鱼、竹荚鱼等青皮红肉海水鱼。"]}, {"type": "q", "stem": "[2019DTR真题]5.石房蛤毒素中毒的主要特点是（ ）", "options": ["A.神经肌肉麻痹", "B.胃肠道炎症反应", "C.光过敏", "D.急性溶血"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P394。", "石房蛤毒素中毒特点为神经麻痹，故称为麻痹性贝类中毒。", "潜伏期短，仅数分钟至20分钟。开始为唇、牙跟和舌头周围刺痛，随后有规律地出现指尖和脚趾的麻木，随后麻木发展到手臂、腿部和颈部，病人可以做随意运动，但相当困难。病人可伴有头痛、头晕、恶心和呕吐，最后出现呼吸困难。膈肌对此毒素特别敏感，重症者常在2~24小时因呼吸麻痹而死亡，病死率为5%~18%。病程超过24小时者，则预后良好。"]}], "qn": 5}]}];
const home=document.getElementById('home'),chap=document.getElementById('chapter');
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function el(tag,cls,txt){const e=document.createElement(tag);if(cls)e.className=cls;if(txt!=null)e.textContent=txt;return e;}
function renderHome(){
  chap.classList.add('hide');home.classList.remove('hide');home.innerHTML='';
  DATA.forEach((c,i)=>{
    const card=el('div','card');
    const left=el('div');left.appendChild(el('div','t',c.name));
    left.appendChild(el('div','m',c.ntopic+' 个考点'));
    card.appendChild(left);card.appendChild(el('div','badge',c.count+' 题'));
    card.onclick=()=>renderChapter(i);home.appendChild(card);
  });window.scrollTo(0,0);
}
function renderChapter(ci){
  const c=DATA[ci];home.classList.add('hide');chap.classList.remove('hide');chap.innerHTML='';
  const back=el('div','back','← 返回目录');back.onclick=renderHome;chap.appendChild(back);
  chap.appendChild(el('h1',null,c.name)).style.color='var(--brand)';
  c.topics.forEach(tp=>{
    chap.appendChild(el('div','topic',tp.title));
    let qi=0;
    tp.items.forEach(it=>{
      if(it.type==='context'){chap.appendChild(el('div','context',it.text));return;}
      qi++;
      const q=el('div','q');
      q.appendChild(el('div','stem',it.stem));
      const letters=(it.answer.match(/[A-Da-d]/g)||[]).map(x=>x.toUpperCase());
      it.options.forEach(o=>{
        const op=el('div','opt',o);const L=(o[0]||'').toUpperCase();
        op.onclick=()=>{if(q.dataset.done)return;op.classList.toggle('sel');};
        op.dataset.letter=L;q.appendChild(op);
      });
      const btn=el('button','toggle','查看答案及解析');
      const rev=el('div','reveal');
      const ans=el('p','ans',it.answer||'答案：（原文未提供）');rev.appendChild(ans);
      const exp=el('div','exp');
      if(it.analysis && it.analysis.length){
        it.analysis.forEach((line,idx)=>{
          const p=el('p');
          if(idx===0 && /^解析/.test(line)){
            const m=line.match(/^(解析[：: ]?)(.*)$/);
            p.appendChild(el('span','lab',m[1]));p.appendChild(document.createTextNode(m[2]));
          }else{p.textContent=line;}
          exp.appendChild(p);
        });
      }else{const p=el('p');p.appendChild(el('span','lab','解析：'));p.appendChild(document.createTextNode('（原文未提供）'));exp.appendChild(p);}
      rev.appendChild(exp);
      btn.onclick=()=>{
        rev.classList.toggle('show');
        if(rev.classList.contains('show')){
          btn.textContent='收起答案及解析';q.dataset.done='1';
          q.querySelectorAll('.opt').forEach(op=>{
            const L=op.dataset.letter;
            if(letters.includes(L))op.classList.add('ok');
            else if(op.classList.contains('sel'))op.classList.add('bad');
          });
        }else{btn.textContent='查看答案及解析';}
      };
      q.appendChild(btn);q.appendChild(rev);chap.appendChild(q);
    });
  });
  window.scrollTo(0,0);
}
renderHome();
</script></body></html>
