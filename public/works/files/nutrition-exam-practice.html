s": ["解析：《中国居民膳食营养素参考摄入量（2023版）》。"]}, {"type": "q", "stem": "[2019DTR真题]5.下列哪种疾病和碘的缺乏有关（  ）", "options": ["A.克汀病", "B.巨细胞性贫血", "C.神经管畸形和无脑儿", "D.软骨病"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P134。", "胎儿与婴幼儿缺碘可引起生长发育迟缓、智力低下，严重者发生呆小症（克汀病）。"]}], "qn": 5}, {"title": "56 孕妇营养（三）", "items": [{"type": "q", "stem": "[2020RD真题]1.下列孕期营养描述中错误的是（  ）", "options": ["A.孕早期无需额外增加能量", "B.叶酸缺乏会导致胎儿神经管畸形", "C.孕期营养不良是早产和低出生体重最主要原因", "D.β-胡萝卜素摄入过多导致胎儿畸形"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P77、P133。", "大剂量维生素A可能导致自发性流产和胎儿先天畸形。β-胡萝卜素是维生素A的安全来源。故中国营养学会及世界卫生组织（WHO）均建议孕妇通过摄取富含类胡萝卜素的食物来补充维生素A。"]}, {"type": "q", "stem": "[2024DTR真题]2.妊娠期营养不良对母体健康状况的影响有（  ） ①营养性贫血 ；②骨质软化症；③营养不良性水肿；④妊娠高血压；⑤妊娠糖尿病。", "options": ["A.①②③④⑤", "B.①②③④", "C. ①②③", "D.①②④"], "answer": "答案：A", "analysis": ["解析：《中国营养科学全书》第2版P1048-P1049。", "①对，妊娠期对铁、叶酸、维生素 B₁₂等造血原料的需求增加。若摄入不足，会导致贫血。", "②对，胎儿骨骼生长需要大量钙，若母体钙摄入不足或维生素D缺乏，会导致母体骨骼中的钙被动员以满足胎儿需求，长期可引起母体骨质软化症。", "③对，蛋白质摄入不足时，母体血浆白蛋白水平降低，血浆胶体渗透压下降，导致组织间隙液体积聚，引发营养不良性水肿。", "④⑤对，孕期能量摄入过多导致孕期体重的过多增长，并因此并发妊娠期糖尿病、妊娠高血压综合征等。"]}, {"type": "q", "stem": "[2018DTR真题]3.如果孕期体重增长过多，会增加下列哪些疾病的风险（  ）①妊娠糖尿病；②新生儿体重不足；③巨大儿；④妊娠高血压。", "options": ["A.①②③", "B.①②④", "C.①③④", "D.②③④"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版 P1054。", "孕期体重增长过多增加了出生巨大儿及继发性头盆不称、妊娠期高血压综合征和妊娠糖尿病等并发症发生的风险，导致产妇围生期死亡危险性增加，也致续后发生肥胖、2型糖尿病及产后体重滞留的风险增加。"]}, {"type": "q", "stem": "[2023RD真题]4.下列关于妊娠期营养不良对胎儿健康影响的描述中，正确的是（  ）", "options": ["A.妊娠期维生素A缺乏可导致胎儿早产、低出生体重", "B.妊娠期蛋白质、能量营养不良会导致克汀病", "C.妊娠期缺碘可导致胎儿神经管畸形", "D.妊娠后期血糖升高可导致低出生体重儿"], "answer": "答案：A", "analysis": ["解析：《中国营养科学全书》第2版P1048。", "A对，妊娠期维生素A缺乏可导致胎儿早产、低出生体重。", "B错，妊娠期缺碘可导致克汀病。", "C错，妊娠期缺叶酸可导致胎儿神经管畸形。", "D错，妊娠后期血糖升高可导致巨大儿。"]}, {"type": "q", "stem": "[2023DTR真题]5.妊娠期如果严重缺碘，对胎儿发育影响最大的是（  ）", "options": ["A.内分泌系统", "B.循环系统", "C.中枢神经系统", "D.骨骼系统"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P69。", "孕妇严重缺碘可影响胎儿神经、肌肉的发育及引起胚胎期和围生期死亡率上升；胎儿与婴幼儿缺碘可引起生长发育迟缓、智力低下，严重者发生呆小症（克汀病）。"]}], "qn": 5}, {"title": "57 孕妇营养（四）", "items": [{"type": "q", "stem": "[2017RD真题]1.为预防酮症酸中毒，早孕反应严重的孕妇，每日应摄入的碳水化合物最低量是（  ）", "options": ["A.50g", "B.100g", "C.130g", "D.200g"], "answer": "答案：C", "analysis": ["解析：《中国居民膳食指南（2022）》P180。", "孕吐严重影响孕妇进食时，为保证脑组织对葡萄糖的需要，预防酮症酸中毒对胎儿的危害，《中国居民膳食营养素参考摄入量（2013版）》建议每天必需摄取至少130g碳水化合物。"]}, {"type": "q", "stem": "[2018RD真题]2.某一孕妇30岁，孕8周，体重减轻2公斤，她的饮食中错误的是（  ）", "options": ["A.饮食清淡，好消化", "B.少食多餐", "C.减少碳水化合物，减少呕吐", "D.适量补充叶酸和维生素B2"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P1056。", "每天应摄入含有130g 碳水化合物的食物，以避免酮血症发生。"]}, {"type": "q", "stem": "[2021DTR真题]3.以下减轻和缓解孕吐的措施，不建议的是（  ）", "options": ["A.孕吐严重的话，可在早上吃烤馒头片、咸面包、饼干等", "B.食物的温度不宜过高，可适当吃冷食", "C.少食多餐", "D.用水煮食物，不要糖醋味、醋味食物"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1043。", "可以根据孕妇的饮食嗜好和口味，适当吃糖醋味、醋味食物。"]}, {"type": "q", "stem": "[2019DTR真题]4.女性备孕时应增加叶酸的摄入量，下列做法中，正确的是（ ）", "options": ["A.增加鱼虾等水产品的摄入", "B.多喝牛奶", "C.常吃五谷杂粮", "D.增加蔬菜水果的摄入，可以适当服用补充剂"], "answer": "答案：D", "analysis": ["解析：《中国居民膳食指南（2022）》P183。", "富含叶酸的食物有动物肝脏、蛋类、豆类、酵母、绿叶蔬菜、水果及坚果类。但天然食物中存在的叶酸烹调加工或遇热易分解， 生物利用率较低。叶酸补充剂是稳定性好， 生物利用率高。"]}, {"type": "q", "stem": "[2024RD真题]5.为避免酮症酸中毒对胎儿神经系统的影响，早孕反应严重的孕妇也该保证每天至少摄入碳水化合物（ ）", "options": ["A.300g", "B.60g", "C.130g", "D.50g"], "answer": "答案：C", "analysis": ["解析：《中国居民膳食指南（2022）》P180。", "早孕反应严重影响进食者，应保证每天摄入至少含130g碳水化合物的食物。"]}], "qn": 5}, {"title": "58 乳母营养（上）", "items": [{"type": "q", "stem": "[2023RD真题]1.下列关于母乳中脂类的描述中，错误的是（ ）", "options": ["A.从初乳到成熟乳，脂肪含量逐渐增加", "B.母乳中饱和脂肪酸多为中长链脂肪酸和sn-2位棕榈酸酯", "C.母乳中饱和脂肪酸：单不饱和脂肪酸：多不饱和脂肪酸为2:4:4", "D.母乳中不仅含亚油酸、α-亚麻酸，还含有花生四烯酸和二十二碳六烯酸"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P1093-P1095。", "A对，初乳中脂肪含量较低，随着泌乳的进展，母乳中脂肪含量逐渐递增。", "B对，母乳中含有丰富的中链脂肪酸，约占母乳总脂肪酸的5%~10%。母乳中的长链多不饱和脂肪酸含量丰富，特别是DHA。母乳中富含十六碳饱和脂肪酸棕榈酸，约占母乳脂肪酸的25%，是母乳中主要的饱和脂肪酸。而70%的母乳棕榈酸是被酯化在甘油三酯第二位碳原子上（sn-2位）。", "C错，欧洲妇女乳脂中，饱和脂肪酸（SFA）一般占35%~40%，单不饱和脂肪酸（MUFA） 占45%~50%，多不饱和脂肪酸（PUFA）大约占15%。来自中国妇女的乳汁样本中，似乎有更高比例的PUFA，可达20%~25%，MUFA 则相对较低。2:4:4比例不对。", "D对，母乳含亚油酸、α-亚麻酸、花生四烯酸和二十二碳六烯酸。"]}, {"type": "q", "stem": "[2019RD真题]2.下列关于母乳营养特点的描述中，错误的是（  ）", "options": ["A.和成熟乳比较，初乳中含有较多的蛋白质，较少的脂肪", "B.每次喂乳，开始分泌的乳汁中含脂肪高蛋白质少", "C.母乳中的乳清蛋白多而酪蛋白少", "D.母乳中除了含有亚油酸和α-亚麻酸外，还含有花生四烯酸和DHA"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1094。", "A对，蛋白质：初乳3.55g/100g，过渡乳1.9g/100g，成熟乳1.16g/100g", "B错，后奶脂肪含量明显高于前奶。", "C对，母乳：乳清蛋白60%，牛奶：酪蛋白80%", "D对，母乳含有亚油酸、α-亚麻酸、花生四烯酸和DHA。"]}, {"type": "q", "stem": "[2021RD真题]3.以下对于初乳描述错误的是（  ）", "options": ["A.乳糖含量高于成熟乳", "B.脂肪含量低于成熟乳", "C.蛋白质含量高于成熟乳，尤其富含乳清蛋白和免疫球蛋白", "D.维生素A、E、C含量高于成熟乳"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P136。", "A错。乳糖含量低于成熟乳。"]}, {"type": "q", "stem": "[2022RD真题]4.下列关于泌乳的描述中，错误的是（  ）", "options": ["A.泌乳是一种复杂的神经反射，受神经内分泌因素的调控", "B.产后一周内分泌的乳汁为初乳，富含免疫蛋白", "C.婴儿吮吸乳头可以刺激乳母垂体分泌催产素，引起乳腺腺泡分泌乳汁", "D.产后第2周以后分泌的乳汁为成熟乳，正常泌乳量可达700~800ml"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P136。", "乳汁的分泌受两个反射的控制，其一是产奶反射，婴儿吸吮乳头可刺激乳母垂体产生催乳素，引起乳腺腺泡分泌乳汁，并存留在乳腺导管内；其二是下奶反射，吸吮乳头可引起乳母垂体后叶释放催产素，后者引起乳腺周围肌肉收缩而出现泌乳。"]}, {"type": "q", "stem": "[2024DTR真题]5.下列关于初乳的描述中，错误的是（  ）", "options": ["A.初乳中蛋白质含量高于成熟乳", "B.初乳中的铁含量与乳母膳食状况没有明显关系", "C.初乳中脂肪含量高于成熟乳", "D.初乳中的脂肪主要是甘油三酯"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P136。", "产后第1周分泌的乳汁为初乳，呈淡黄色，质地黏稠；富含免疫蛋白，尤其是分泌型免疫球蛋白A和乳铁蛋白等；乳糖和脂肪较成熟乳少。"]}], "qn": 5}, {"title": "59 乳母营养（中）", "items": [{"type": "q", "stem": "[2019DTR真题]1.几乎不能通过乳腺分泌到乳汁的是（ ）①钙；②铁；③碘；④维生素D3；⑤硫胺素", "options": ["A.①②", "B.②④", "C.③④", "D.④⑤"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P137-P138。", "人乳中铁含量低，是由于铁不能通过乳腺输送到乳汁。", "维生素D几乎不能通过乳腺，故母乳中维生素D含量很低。"]}, {"type": "q", "stem": "[2019DTR真题]2.为乳母制定食谱时，膳食维生素C摄入的目标值是（ ）", "options": ["A.125mg/d", "B.150mg/d", "C.200mg/d", "D.2000mg/d"], "answer": "答案：B", "analysis": ["解析：《中国居民膳食营养素参考摄入量2023》。", "乳母维生素C的RNI为150mg/d。"]}, {"type": "q", "stem": "[2019DTR真题]3.如果某乳母膳食钙的摄入量为1500mg/d，下面的评价中正确的是（ ）", "options": ["A.钙摄入量不足，会增加缺乏的风险", "B.钙摄入量充足", "C.钙摄入量过多，会增加肾结石的风险", "D.不能判断"], "answer": "答案：B", "analysis": ["解析：《中国居民膳食营养素参考摄入量2023》。", "乳母钙RNI为800mg/d，UL为2000mg/d。"]}, {"type": "q", "stem": "[2019RD真题]4.乳汁中含量受乳母食物影响的有（  ）①脂肪；②钙；③铁；④维生素A；⑤维生素C", "options": ["A.①②③", "B.①④⑤", "C.②③④", "D.③④⑤"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P137。", "母乳中脂肪含量受乳母膳食脂肪摄入量影响。", "人乳中主要矿物质（钙、磷、镁、钾、钠）的浓度一般不受膳食的影响。微量元素中，碘、硒、锌的膳食摄入量增加，乳汁中的含量也会相应增加。", "铁不能通过乳腺输送到乳汁。", "乳母维生素A的摄入量可影响乳汁中维生素A的含量。", "水溶性维生素大多可通过乳腺。"]}, {"type": "q", "stem": "[2022RD真题]5.下列营养素中，几乎不能通过乳腺分泌到乳汁的是（  ）", "options": ["A.维生素B2", "B.钙", "C.铁", "D.维生素B1", "A、D错，水溶性维生素大多可通过乳腺。"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P137。", "B错，每天从乳汁中排出钙的量约为300mg。", "C对，人乳中铁含量低，是由于铁不能通过乳腺输送到乳汁。"]}], "qn": 5}, {"title": "60 乳母营养（下）", "items": [{"type": "q", "stem": "[2020DTR真题]1.某产妇，做月子期间，其婆婆做月子餐，特意每日以红糖小米粥+鸡蛋为主食，经常煮鸡汤、猪蹄汤，每次煮一大锅，吃几天，目前产后4周，分泌乳量300ml，混合喂养，3小时一次。对该月子餐营养评价正确的是（  ）①多样性不足；②缺蔬菜水果；③缺富含碘和DHA的海产品；④缺乳量；⑤红糖有补铁作用。", "options": ["A.①③④⑤", "B.①②③④", "C.①②③④⑤", "D.①③④"], "answer": "答案：B", "analysis": ["解析：", "①对，全天食物种类不足12种，多样性不足。", "②对，缺蔬菜水果。", "③对，缺富含碘和DHA的海产品。", "④对，没有喝奶，缺乳量。", "⑤错，红糖没有补铁作用。"]}, {"type": "q", "stem": "[2018RD真题]2.下列措施中，可促进母亲泌乳的是（  ）①婴儿多吮吸乳头；②保证乳母良好的营养状况；③多喝猪脚汤、鲫鱼汤等；④保持愉悦心情；⑤保证充足睡眠", "options": ["A.①②③④", "B.①②③⑤", "C.①②④⑤", "D.①②③④⑤"], "answer": "答案：D", "analysis": ["解析：《中国居民膳食指南（2022）》P193、P195。", "乳母每天分泌乳汁，加上自身代谢的增加，水需要量也相应增加。每日应比孕前增加1100ml水的摄入，可以多吃流质食物如鸡汤、鲜鱼汤、猪蹄汤、排骨汤、菜汤、豆腐汤等，每餐都应保证有带汤的食物。"]}, {"type": "q", "stem": "[2019RD真题]3.某哺乳期母亲患感冒，害怕传染给宝宝，停止给宝宝母乳，三天后突然发现母乳量大量减少。如果要帮助该女士再次开始哺乳，应该做的是（  ）①对她进行心理辅导安慰；②请专业育婴按摩师按摩乳房；③多喝猪蹄汤、鱼汤；④保证充足的睡眠；⑤让婴儿多吮吸。", "options": ["A.①②③④", "B.①③④⑤", "C.②③④⑤", "D.①②③④⑤"], "answer": "答案：D", "analysis": ["解析：《中国居民膳食指南（2022）》P192、P195。", "①对，情绪影响乳汁分泌。", "②对，专业的乳房按摩有助乳汁分泌。", "③对，乳母每天分泌乳汁，加上自身代谢的增加，水需要量也相应增加。可以多吃流质食物如鸡汤、鲜鱼汤、猪蹄汤、排骨汤、菜汤、豆腐汤等，每餐都应保证有带汤的食物。", "④对，乳母要保证每日7~9小时睡眠，以促进乳汁分泌。", "⑤对，婴儿吸吮时能充分挤压乳晕下的乳窦，使乳汁排出，又能有效刺激乳头上的感觉神经末梢，促进泌乳反射，使乳汁越吸越多。"]}, {"type": "q", "stem": "[2019DTR真题]4.建议乳母应尽量避免的食物是（  ）①浓茶；②咖啡；③葡萄酒；④生食鱼片；⑤红枣。", "options": ["A.①②③", "B.①③④", "C.①②③④", "D.①②③④⑤"], "answer": "答案：C", "analysis": ["解析：《中国居民膳食指南（2022）》P94、P195。", "婴儿3个月内，乳母应避免饮用含咖啡因的饮品，如咖啡、茶。3个月后，乳母每日咖啡因摄入量应小于200mg。儿童青少年、孕妇、乳母、慢性病患者等特殊人群不应饮酒。"]}, {"type": "q", "stem": "[2018DTR真题]5.下列适合乳母的膳食烹调方法有（ ）①煮；②蒸；③煨；④炸；⑤炖；⑥煎", "options": ["A.①②③⑥", "B.①②④⑤", "C.①②④⑤⑥", "D.①②③⑤"], "answer": "答案：D", "analysis": ["解析：《中国居民膳食指南（2022）》P189。", "乳母宜选择较清淡的食物，煎炸油太多。"]}], "qn": 5}, {"title": "61 婴幼儿营养（上）", "items": [{"type": "q", "stem": "[2018DTR真题]1.婴儿期是出生后体重增长最快的时期，一般情况下，至12月龄时体重约为出生体重的儿倍（ ）", "options": ["A.2倍", "B.3倍", "C.4倍", "D.5倍"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版 P1079。", "通常足月儿3月龄体重约达出生时的2倍，12月龄体重约为出生时的3倍。"]}, {"type": "q", "stem": "[2021RD真题]2.下列关于婴儿生长发育特点的描述中，正确的是（  ）", "options": ["A.与人工喂养比，母乳喂养的新生儿发生维生素K缺乏的风险更低", "B.食管下段括约肌发育不成熟是婴儿溢奶的主要原因", "C.新生儿唾液淀粉酶活性高于成年人", "D.婴儿时期胆汁分泌多，故对脂肪的消化能力较好"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P138。", "A错。新生儿体内几乎无维生素K 的储备，肠道内以双歧杆菌占优势合成维生素K 菌群尚未建立，人乳中维生素K的含量也低（人乳约含维生素K 2~10μg/L，牛乳及婴儿配方奶约为人乳的4倍），因而新生儿尤其是纯母乳喂养儿易出现维生素K 缺乏。", "B对。婴儿由于胃幽门括约肌发育良好，贲门括约肌发育不良，加之自主神经调节功能较差，故易引起幽门痉挛而出现溢乳和呕吐。", "C错。新生儿的唾液腺发育尚不完善，唾液分泌量少，唾液中淀粉酶的含量低。", "D错。婴儿肝细胞分化不全，肝功能较差，胆汁分泌较少，影响脂肪的消化吸收。"]}, {"type": "q", "stem": "[2024RD真题]3.消化酶是婴儿胃肠道消化能力的基础，最早开始分泌的酶是（ ）", "options": ["A.脂肪酶", "B.淀粉酶", "C.胰蛋白酶", "D.乳糖酶"], "answer": "答案：A", "analysis": ["解析：《中国营养科学全书》第2版P1080。", "A对，自孕25周起，舌腺分泌的舌脂酶已很活跃。胎儿16周产生胰脂酶，但水平甚低，孕23周达成人的5%，直到足月无变化。但出生后1周即上升5倍，1~ 9个月中增至20倍。", "B错，唾液淀粉酶发育较迟，孕34周才开始分泌，出生时量少且活性低，3月龄后其活性逐渐增强，2岁达成人水平；肠淀粉酶出生时已有，而胰淀粉酶在生后4~6个月开始分泌。", "C错，胰蛋白酶在孕26~28周已能分泌足量，生后一周胰蛋白酶活性增加，一个月时已达成人水平。", "D错，乳糖酶的活力到34~38孕周才达高峰，故早产儿易发生乳糖吸收不良。"]}, {"type": "q", "stem": "[2022RD真题]4.下列关于新生儿的描述中，正确的是（  ）①胃容量小；②肠道蛋白消化酶活性已比较完善；③肝肾功能不成熟；④胃贲门括约肌发育较完善；⑤肠道黏膜屏障功能差。", "options": ["A.①②③④⑤", "B.①②③④", "C.③④⑤", "D.①③⑤"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P139。《中国营养科学全书》第2版P1080。", "①对，新生儿胃呈水平位，胃容量小。", "②错，新生儿肠道蛋白消化酶活性不完善。", "③对，肝肾功能不成熟。", "④错，新生儿由于胃幽门括约肌发育良好，贲门括约肌发育不良，加之自主神经调节功能较差，故易引起幽门痉挛而出现溢乳和呕吐。", "⑤对，新生儿肠壁薄故通透性高，屏障功能差。"]}, {"type": "q", "stem": "[2019DTR真题]5.1岁6个月孩子，体格测量的指标没有（  ）①身高；②体重；③头围；④胸围；⑤腰围。", "options": ["A.①③", "B.①④", "C.①⑤", "D.①④⑤"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P1280。", "2岁及以下婴幼儿测身长。2岁以上人群测身高。"]}], "qn": 5}, {"title": "62 婴幼儿营养（中）", "items": [{"type": "q", "stem": "[2023RD真题]1.下列关于婴儿能量消耗的描述中，错误的是（  ）", "options": ["A.婴儿生长发育耗能约占总能量的1/3", "B.婴儿食物热效应耗能约为总能量的7%~8%", "C.婴儿脑与肝脏的耗能约占总基础代谢量的30%", "D.婴儿活动耗能个体差异大，多动好哭者能量消耗远高于安静少哭的婴儿"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P1082。", "婴儿的能量消耗包括5部分：①婴儿脑与肝脏占全身重量的比例高，耗能约占总基础代谢能量的60%。②婴儿期处于生长的第一高峰期， 生长发育耗能约占总能量的1/3。③婴儿活动耗能个体差异较大，多动好哭者可高出平均值的2~3倍，而安静少哭的婴儿则可能减半。④婴儿食物的生热效应耗能为总能量需要量的7%~8%。⑤排泄耗能约占总能量的10%。"]}, {"type": "q", "stem": "[2020RD真题]2.18月龄患儿需要及时添加辅食，合理喂养，在设计辅食食谱食谱时，合理的脂肪供能比是（  ）", "options": ["A.48%E", "B.10%~15%E", "C.35%E", "D.20%~30%E"], "answer": "答案：C", "analysis": ["解析：《中国居民膳食营养素参考摄入量（2023版）》。"]}, {"type": "q", "stem": "[2019RD真题]3.早产儿应特别注意下列哪种营养素的补充（  ）", "options": ["A.铁", "B.钙", "C.维生素K", "D.维生素C"], "answer": "答案：A", "analysis": ["解析：《中国营养科学全书》第2版P1085。", "新生儿体内铁储备多少与胎龄及出生时体重成正相关，早产儿及低出生体重儿的铁储备相对不足，加上生长发育速度比足月儿快，出生后储备铁常在2~3月龄时被耗尽，在婴儿期更容易出现铁缺乏。早产儿和低出生体重儿需要比足月儿更多的铁。", "维生素K不管是足月儿，还是早产儿都要补充。"]}, {"type": "q", "stem": "[2024DTR真题]4.目前WHO等均建议所有新生儿出生后补充维生素K，其目的是（  ）", "options": ["A.预防维生素K缺乏引起的贫血", "B.预防维生素K缺乏引起的同型半胱胺酸血症", "C.预防维生素K缺乏引起的出血性病症", "D.预防维生素K缺乏引起的溶血性疾病"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P200。", "维生素K缺乏表现为凝血缺陷和出血。"]}, {"type": "q", "stem": "[2021DTR真题]5.6月龄内婴儿最主要的膳食能量来源是（  ）", "options": ["A.葡萄糖", "B.乳糖", "C.蛋白质", "D.脂肪"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P140。", "1岁以内的婴儿，尤其0~6月龄的婴儿，乳糖是其主要的能量来源，适合婴儿的胃肠道的消化吸收能力。"]}], "qn": 5}, {"title": "63 婴幼儿营养（下）", "items": [{"type": "q", "stem": "[2018RD真题]1.婴儿生后体重下降不超过多少，就可以继续母乳喂养（  ）", "options": ["A.3%", "B.5%", "C.7%", "D.9%"], "answer": "答案：C", "analysis": ["解析：《中国居民膳食指南（2022）》P204。", "开奶过程中不用担心新生儿饥饿，可密切关注新生儿体重，体重下降只要不超过出生体重的7%就应坚持纯母乳喂养。"]}, {"type": "q", "stem": "[2021RD真题]2.下列有关母乳喂养的描述中，错误的是（  ）①新生儿娩后宜尽早吸吮；②母亲乳头内陷会影响哺乳；③牛奶蛋白过敏婴儿继续母乳喂养；④母乳相关性黄疸婴儿应中断母乳喂养；⑤生后母婴同室能促进母乳喂养。", "options": ["A.②③④⑤", "B.①②③④", "C.①②③", "D.②④"], "answer": "答案：D", "analysis": ["解析：《中国居民膳食营养指南（2022）》P215。", "②错。母亲乳头内陷不影响哺乳。", "④错。母乳性黄疸， 目前不主张停止母乳喂养， 可少量多次喂养。当胆红素水平超过150mg/L时可暂停母乳喂养观察， 如明显下降， 确定为母乳性黄疸， 仍可母乳喂养。"]}, {"type": "q", "stem": "[2019RD真题]3.10个月的婴儿，添加辅食错误的说法（  ）", "options": ["A.添加含强化铁的营养辅食", "B.不加盐，不放添加剂", "C.不加糖，可以加点蜂蜜水", "D.添加煮熟的玉米、土豆"], "answer": "答案：C", "analysis": ["解析：婴儿不应进食蜂蜜，这是因为蜂蜜中可能含有肉毒杆菌的芽孢。", "1岁以上的孩子和成年人即使吃进含有肉毒杆菌芽孢的蜂蜜，肠道中的氧气也能抑制厌氧的肉毒杆菌芽孢的脱芽孢和生长繁殖，不会产生肉毒毒素；而1岁以下的婴儿肠道就是肉毒杆菌芽孢喜爱的厌氧环境，有利于肉毒杆菌繁殖产毒，而且婴儿神经系统发育不全，对肉毒毒素的反应更敏感，如果不小心食用被污染的蜂蜜，容易引起肉毒中毒。"]}, {"type": "q", "stem": "[2021DTR真题]4.婴儿开始添加辅食时，最迫切需要添加的是（  ）", "options": ["A.DHA", "B.维生素C", "C.铁", "D.锌"], "answer": "答案：C", "analysis": ["解析：《中国居民膳食指南（2022）》P222。", "满6月龄起必须添加辅食，从富含铁的泥糊状食物开始。"]}, {"type": "q", "stem": "[2021DTR真题]5.下列关于婴儿辅食添加的描述中，错误的是（  ）", "options": ["A.从泥糊状食物开始逐渐过渡到半固体或固体食物", "B.婴儿添加辅食后，即可停止哺乳", "C.每次只添加一种新食物", "D.辅食量由少到多，循序渐进"], "answer": "答案：B", "analysis": ["解析：《中国居民膳食指南（2022）》P222。", "婴儿添加辅食后，应继续母乳喂养。"]}], "qn": 5}, {"title": "64 儿童营养（上）", "items": [{"type": "q", "stem": "[2019RD真题]1.学龄前儿童缺锌的表现有（  ）①生长迟缓；②食欲不佳；③腹泻；④贫血；⑤暗适应能力下降", "options": ["A.①②", "B.①③", "C.①②③④", "D.①②③④⑤"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P65。", "锌缺乏可影响细胞核酸蛋白的合成、味蕾细胞更新、黏膜增生、角化不全、唾液中磷酸酶减少，从而导致食欲减退、异食癖、生长发育停滞等症状。"]}, {"type": "q", "stem": "[2019DTR真题]2.下列零食中，最适宜学龄前儿童食用的是（ ）", "options": ["A.奶酪", "B.果脯", "C.薯片", "D.花生米"], "answer": "答案：A", "analysis": ["解析：《中国居民膳食指南（2022）》P251。", "培养学龄前儿童淡口味， 减少对高盐、高糖、高脂食物的摄入， 有助于形成一生健康的饮食行为。"]}, {"type": "q", "stem": "[2020DTR真题]3.学龄前儿童，每天看电视、平板的时间控制在多久（ ）", "options": ["A.2h", "B.0.5h", "C.1h", "D.1.5h"], "answer": "答案：C", "analysis": ["解析：《中国居民膳食指南（2022）》P248。", "每天累计视屏时间不超过1小时， 且越少越好。"]}, {"type": "q", "stem": "[2021DTR真题]4.关于学龄前儿童膳食中，错误的是（  ）", "options": ["A.规律饮食，自主饮食，培养良好的饮食习惯", "B.选择容易消化的食物，注意色香味", "C.不挑食，不偏食不暴饮暴食", "D.每日饮奶，足量饮水，不吃零食"], "answer": "答案：D", "analysis": ["解析：《中国居民膳食指南（2022）》P247。", "合理选择零食。"]}, {"type": "q", "stem": "[2017RD真题]5.学龄前儿童群体超重/肥胖判定常用的指标包括（  ）①体质指数；②体质指数Z评分；③身高别体重Z评分；④腰臀比", "options": ["A.①②", "B.①③", "C.②③", "D.②④"], "answer": "答案：C", "analysis": ["解析：5岁以下儿童生长状况判定的Z评分界值"]}], "qn": 5}, {"title": "65 儿童营养（下）", "items": [{"type": "q", "stem": "[2017RD真题]1.学龄儿童每天应累计进行至少多长时间中等以上强度身体活动（  ）", "options": ["A.30分钟", "B.40分钟", "C.50分钟", "D.60分钟"], "answer": "答案：D", "analysis": ["解析：《中国居民膳食指南（2022）》P260。", "学龄儿童做到每天进行累计至少60分钟以有氧运动为主的中高强度（呼吸急促、心率加快、可进行语言交流；主观感觉稍费力） 身体活动。其中，每周应有3天的高强度运动（呼吸加深加快、心率大幅度增加、语言交流困难；主观感觉费力）， 如快跑、游泳、健美操、追逐游戏等；每周应有3天（隔天进行） 增强肌肉力量和/或骨健康的运动，如仰卧卷腹、俯卧撑、平板撑、引体向上、跳绳、跳高、跳远和爬山等。"]}, {"type": "q", "stem": "[2019RD真题]2.预防儿童近视的方法，那种不合适（  ）", "options": ["A.在学校每天进行30分钟户外活动", "B.进行中等强度的运动，以有氧运动为主", "C.上下学的路上，以步行为主，参加家务劳动", "D.雾霾天气，在室内进行平衡性和协调性的运动锻炼"], "answer": "答案：A", "analysis": ["解析：《中国居民膳食指南（2022）》P260。", "每天60分钟以上身体活动。"]}, {"type": "q", "stem": "[2027RD真题]3.为预防儿童维生素A缺乏，下列描述中不正确的是（  ）", "options": ["A.常食用动物肝脏", "B.多吃胡萝卜或菠菜等深色蔬菜", "C.每天多晒太阳，可帮助维生素A在体内合成", "D.吃动物肝脏比吃胡萝卜更有利于预防维生素A缺乏"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P78。", "晒太阳有助于维生素D 的合成。"]}, {"type": "q", "stem": "[2018DTR真题]4.我国儿童少年摄入添加糖的主要来源是（ ）", "options": ["A.含糖饮料", "B.饼干", "C.糖果", "D.方便面"], "answer": "答案：A", "analysis": ["解析：《中国居民膳食指南（2022）》P101。", "含糖饮料是指含糖量在5%以上的饮品。", "我国儿童少年主要通过含糖饮料来摄入添加糖。"]}, {"type": "q", "stem": "[2018DTR真题]5.下列食物中，不易引起儿童过敏的是（ ）", "options": ["A.鸡蛋", "B.牛奶", "C.苹果", "D.花生"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P370。", "常见的致敏食品主要有8类：①牛乳及乳制品；②蛋及蛋制品；③花生及其制品；④大豆和其他豆类以及各种豆制品；⑤小麦、大麦、燕麦等谷物及其制品；⑥鱼类及其制品；⑦甲壳类及其制品；⑧坚果类（核桃、芝麻等） 及其制品。"]}], "qn": 5}, {"title": "66 老年人营养（上）", "items": [{"type": "q", "stem": "[2017RD真题]1.下列关于老年人生理代谢特点描述中，正确的是（  ）①胃酸分泌减少、胃蛋白酶分泌减少；②胸腺萎缩、T淋巴细胞数呈减少；③基础代谢降低、能量需求减少；④体成分改变、体水分增加；⑤女性雌激素水平下降，因此患心血管疾病的危险性降低", "options": ["A.①②③", "B.②③④", "C.③④⑤", "D.①④⑤"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P145。", "老年人的生理代谢特点：①基础代谢率下降；②脂质代谢能力降低；③消化系统功；④体成分改变；⑤代谢功能降低；⑥体内氧化损伤加重；⑦免疫功能下降。"]}, {"type": "q", "stem": "[2017RD真题]2.从降低营养不良风险和死亡风险的角度考虑，老年人的BMI不应低于（  ）", "options": ["A.17kg/m2", "B.18.5kg/m2", "C.20kg/m2", "D.22kg/m2"], "answer": "答案：C", "analysis": ["解析：《中国居民膳食指南（2022）》P270。", "老年人适宜的BMI范围为20.0~26.9kg/m2。"]}, {"type": "q", "stem": "[2024RD真题]3.下列关于老年人生理代谢变化的描述中，正确的是（ ）", "options": ["A.甲状旁腺激素分泌增加", "B.女性雌激素分泌增加", "C.T淋巴细胞数目明显增加", "D.胃酸和胃蛋白酶分泌增加"], "answer": "答案：A", "analysis": ["解析：《中国营养科学全书》第2版P1173。", "甲状旁腺激素随着年龄增长分泌增加，因而促进骨骼中钙的释放，加上雌激素减少，使老年人，尤其是老年女性骨质疏松症发生增加。"]}, {"type": "q", "stem": "[2018DTR真题]4.下列关于老年人生理代谢特点的描述中，错误的是（  ）", "options": ["A.基础代谢率增加", "B.消化系统功能减退", "C.免疫功能下降", "D.体内脂肪组织逐渐增加"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P145。", "随着年龄的增加，老年人内分泌腺体结构和功能均发生了一系列变化，最主要的表现是激素合成、代谢和运转能力下降，组织对激素的敏感性减弱，从而影响老年人的代谢功能。老年人基础代谢一般约降低15%~20%。"]}, {"type": "q", "stem": "[2021RD真题]5.下列关于老年人生理变化的描述中，正确的是（  ）①肾小球滤过率增加，肾小管重吸收功能升高；②对咸味的阈值降低；③体内脂肪组织增加，并呈向心性分布；④胃酸、消化酶分泌减少，B族维生素的吸收减少；⑤女性雌激素随年龄增加明显降低。", "options": ["A.②③④", "B.②④⑤", "C.③④⑤", "D.①②⑤"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P145。《中国营养科学全书》第2版P1173。", "①错。肾皮质厚度以及肾小球的数量随着年龄增加而降低，老年期肾小球滤过率只有其30岁时的50%；肾小管重吸收功能降低，葡萄糖、氨基酸、维生素等营养物质易通过尿液排出体外。", "②错。对咸味的阈值升高。"]}], "qn": 5}, {"title": "67 老年人营养（下）", "items": [{"type": "q", "stem": "[2023DTR真题]1.2022年4月中国营养学会发布《中国居民膳食指南（2022）》，其中首次提出高龄老人膳食指南。高龄老人是指（  ）", "options": ["A.60岁以上", "B.85岁以上", "C.65岁以上", "D.80岁以上"], "answer": "答案：D", "analysis": ["解析：", "解析：《中国居民膳食指南（2022）》P272。", "高龄老年人常指80岁及以上的老年人。"]}, {"type": "q", "stem": "[2024RD真题]2.2024年8月，中国营养学会老年营养分会发布了2024中国老年人平衡膳食宝塔，以下内容错误的是（ ）", "options": ["A.平衡膳食宝塔推荐65~79岁老年人每周进行150~300分钟中等强度的身体活动", "B.平衡膳食宝塔第三层为奶类大豆坚果，建议摄入相当于300~500ml液体量的奶", "C.平衡膳食宝塔分五层，各层面积大小不同，体现了5大类食物和食物量的多少", "D.平衡膳食宝塔是根据老年人的能量需要水平，按照1600~2400kcal设计的"], "answer": "答案：B", "analysis": ["解析：", "B错，平衡膳食宝塔第四层为奶类大豆坚果。"]}, {"type": "q", "stem": "[2020DTR真题]3.我国目前成年人和老年人每日钙推荐摄入量分别是（  ）", "options": ["A.1000mg/d和1200mg/d", "B.均是1000mg/d", "C.800mg/d和1000mg/d", "D.800mg/d和1200mg/d"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P57。", "2013 年中国营养学会推荐成人钙的RNI 为800mg/d，老年人为1000mg/d。本题是2020年真题，当时按2013版。", "DRIs2023版已改为都是800mg/d，记新版数据。"]}, {"type": "q", "stem": "[2019RD真题]4.老年人较容易发生维生素B12缺乏的主要生理原因是（  ）", "options": ["A.唾液分泌减少", "B.胃酸分泌不足", "C.胰岛素分泌减少", "D.肠道蠕动速率降低"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P145。", "老年人胃酸分泌减少，容易发生维生素B12缺乏。"]}, {"type": "q", "stem": "[2020DTR真题]5.下列营养素中，与一般成年人比较，老年人推荐摄入量或适宜摄入量增加的是（ ）", "options": ["A.①④⑤", "B.①②", "C.②③④", "D.①②④⑤"], "answer": "答案：B", "analysis": ["①蛋白质；②维生素D；③钠；④钙；⑤钾。", "解析：《中国居民膳食营养素参考摄入量2023版》P630、P635。", "虽然是2020年老题目，直接记2023版数据吧，2013版数据忽略，免得记混。", "推荐摄入量或适宜摄入量"]}], "qn": 5}, {"title": "68 素食营养", "items": [{"type": "q", "stem": "[2017RD真题]1.长期全素食人群易出现的营养缺乏病有（  ）①蛋白质营养不良；②坏血病；③恶性贫血；④脚气病；⑤缺铁性贫血", "options": ["A.①②③", "B.①③⑤", "C.②③④", "D.②④⑤"], "answer": "答案：B", "analysis": ["解析：《中国居民膳食指南（2022）》P281。", "如果素食者膳食安排不合理， 容易引起维生素B12、n-3多不饱和脂肪酸、铁、锌、蛋白质等营养素摄入不足， 从而增加这些营养素缺乏的风险。"]}, {"type": "q", "stem": "[2018RD真题]2.素食者容易缺乏的营养素是（  ）①优质蛋白；②维生素B1；③维生素B12；④铁；⑤维生素C", "options": ["A.①②③", "B.②③④", "C.①③④", "D.①②③④⑤"], "answer": "答案：C", "analysis": ["解析：《中国居民膳食指南（2022）》P286。", "素食人群容易出现缺乏的营养素主要有优质蛋白、n-3多不饱和脂肪酸、维生素B12、维生素D、钙、铁和锌等。"]}, {"type": "q", "stem": "[2018DTR真题]3.下列维生素中，素食人群最易发生缺乏的是（ ）", "options": ["A.硫胺素", "B.维生素B12", "C.叶酸", "D.烟酸"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P94。", "素食者的膳食结构特点是以植物性食物为主，缺乏动物性食物。这样的膳食结构特点可能导致主要来自动物性食物中的某些营养素缺乏。维生素B12的食物来源主要是动物性食物，而其他三种维生素广泛存在于动植物性食物中。"]}, {"type": "q", "stem": "[2018DTR真题]4.素食者的食品中，不宜使用下列哪种胶作为增稠剂（ ）", "options": ["A.明胶", "B.卡拉胶", "C.阿拉伯胶", "D.褐藻胶"], "answer": "答案：A", "analysis": ["解析：食品添加剂明胶通常以动物的骨、皮、筋、腱和鳞等为原料经适度水解所制得常用作增稠剂。"]}, {"type": "q", "stem": "[2017RD真题]5.女性长跑运动员，素食者，准备参加国际赛事。应该注意以下哪个营养素的补充（  ）", "options": ["A.维生素C", "B.维生素E", "C.钙", "D.铁"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1244。", "高强度大运动量训练导致红细胞破坏增加、肌细胞损伤释放肌红蛋白等，铁丢失增加。", "女子耐力运动员由于经血丢失铁，加上不良的饮食习惯，常常处于铁缺乏状态。"]}], "qn": 5}, {"title": "69 运动员营养（一）", "items": [{"type": "q", "stem": "[2020RD真题]1.中度运动时心输出量增加的主要原因是（  ）", "options": ["A.心舒期心室血压增加", "B.总周边阻力增加", "C.血浆蛋白浓度增加", "D.每分钟心跳增加"], "answer": "答案：D", "analysis": ["解析：心输出量等于心率与搏出量的乘积。中度运动时心输出量增加主要是因为心率增加。"]}, {"type": "q", "stem": "[2018DTR真题]2.机体哪种物质的储备能力影响运动员的耐久力（ ）", "options": ["A.氨基酸", "B.脂肪酸", "C.糖原", "D.葡萄糖"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P1233。", "血糖是长时间运动时骨骼肌可利用的重要肌外燃料。为补偿血糖的消耗，肝糖原分解和糖异生作用增强，肝脏释放葡萄糖加速。一旦肝糖原耗竭引起血糖水平下降而使运动肌供能不足，将导致外周疲劳，同时中枢神经系统因血糖供能缺乏而产生中枢疲劳。所以，肝糖原贮量对维持长时间运动时血糖浓度起重要作用。"]}, {"type": "q", "stem": "[2019DTR真题]3.根据《运动营养食品通则GB24154-2015》，耐力类运动营养食品必须添加的成分是（ ）", "options": ["A.肌酸", "B.肽类", "C.维生素B1和维生素B2", "D.维生素B6"], "answer": "答案：C", "analysis": ["解析：《 GB24154-2015  运动营养食品通则》。"]}, {"type": "q", "stem": "[2019RD真题]4.某运动营养品添加了肌酸，下列哪些人群不适宜使用该产品（  ）①婴幼儿；②儿童；③孕妇；④哺乳期妇女；⑤老人", "options": ["A.①②③④", "B.①②", "C.①②⑤", "D.①②③④⑤"], "answer": "答案：A", "analysis": ["解析：《GB 24154-2015  运动营养食品通则》。", "对于添加了肌酸的产品应在标签中标示“孕妇、哺乳期妇女、儿童及婴幼儿不适宜食用”。"]}, {"type": "q", "stem": "5.关于运动员的生理特点说法错误的是（ ）", "options": ["A.血容量明显增大，以适应机体大量氧气和能拭的需要，以及代谢产物排出的需要", "B.运动负荷超出身体可承受的能力，可引起大脑皮质兴奋和抑制过程不协调，造成神经体液调节紊乱", "C.皮肤、肌肉血流量增多，胃肠道、消化腺体血流量减少，对营养素消化吸收能力减弱", "D.在强化训练期间，运动员免疫功能增强"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P147。", "在强化训练期间，运动员可能出现暂时性的免疫功能低下。"]}], "qn": 5}, {"title": "70 运动员营养（二）", "items": [{"type": "q", "stem": "[2023DTR真题]1.为了增加运动员的肌肉量，下列最安全的做法是（  ）", "options": ["A.适当增加蛋白质摄入，增加抗阻运动", "B.增加蛋白质摄入量，降低碳水化合物摄入量", "C.服用激素", "D.添加三倍蛋白质的营养补充剂"], "answer": "答案：A", "analysis": ["解析：《中国营养科学全书》第2版P1238。", "运动员应该通过合理的高蛋白膳食，增加优质蛋白质的摄入量，以增加肌肉量。通过力量训练增加蛋白质合成，使肌肉组织的质量和围度增加。"]}, {"type": "q", "stem": "[2024DTR真题]2.每天运动1~3小时中高强度的运动员，最合理的碳水化合物推荐量是（A）", "options": ["A.6~10g/(kg·d)", "B.3~5 g/(kg·d)", "C.5~7 g/(kg·d)", "D.8~12 g/(kg·d)"], "answer": "答案：A", "analysis": ["解析：《中国营养科学全书》第2版P1237。", "低强度或技巧类运动：3~5g/(kg·d)；中等运动计划（每日1小时）：5~7g/(kg·d)；耐力运动计划（每日约1~3小时中高强度运动）：6-10g/(kg·d)；极大运动计划（每日大于4~5小时中高强度运动）：8~12g/(kg·d)。"]}, {"type": "q", "stem": "[2019DTR真题]3.男的为了减肥，半马训练，出现肌肉痉挛，什么原因（  ）", "options": ["A.电解质紊乱", "B.钠缺乏", "C.钙缺乏", "D.维生素D缺乏"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P149。", "在高温环境中，运动员进行大运动量训练时，经汗液丢失大量盐。1L汗液中氯化钠的含量约1~4g。如不及时补充钠盐，可发生钠缺乏，轻者出现肌肉无力、食欲减退以及消化不良等表现；重者可出现恶心、呕吐、头疼、腹痛、腿痛以及肌肉抽搐等症状。"]}, {"type": "q", "stem": "[2020DTR真题]4.一位运动员在夏季大量运动后，出现恶心、呕吐、腹痛、肌肉抽搐等症状，可能是缺乏的营养素是（  ）", "options": ["A.钙", "B.镁", "C.钾", "D.钠"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P122。", "运动员夏天运动后钠随汗液大量流失。", "失氯化钠为0.5~0.75g/kg时，出现尿中无氯化物时为中度缺钠，患者出现恶心、呕吐、脉细弱、血压降低及痛性肌肉痉挛等症状。"]}, {"type": "q", "stem": "[2020RD真题]5.运动后，立即给予下列哪种饮食有助于肌肉蛋白质的合成（  ）", "options": ["A.只有蛋白质", "B.蛋白质加脂肪", "C.只有碳水化合物", "D.蛋白质加碳水化合物"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1247。", "碳水化合物有节约蛋白质作用。摄入蛋白质加碳水化合物，不需要动用蛋白质来供能，有助于肌肉蛋白质的合成。"]}], "qn": 5}, {"title": "71 运动员营养（三）", "items": [{"type": "context", "text": "[2017RD真题]运动员跑完全程马拉松后，要合理补糖，促进体内糖水平的恢复。"}, {"type": "q", "stem": "1.一般情况下，为达到良好的补糖效果，开始补糖的时间不要超过运动后多长时间（  ）", "options": ["A.1小时", "B.2小时", "C.4小时", "D.6小时"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1236。", "运动后开始补充碳水化合物的时间越早越好。运动后恢复期的前6小时为快恢复阶段，肌肉中肌糖原合成酶含量高，可使肌糖原合成速率达到最大值。此时应补充高血糖指数的碳水化合物，如葡萄糖、低聚糖、麦芽糊精、可溶性淀粉糖、玉米糖浆等，并选择高碳水化合物、高水分、低蛋白、低脂肪的食物。"]}, {"type": "q", "stem": "2.对补糖量的建议是（  ）", "options": ["A.025~0.5g/(kg·h)", "B.0.5~0.75g/(kg·h)", "C.0.75~1.0g/(kg·h)", "D.1.0~1.5 g/(kg·h)"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P1236。", "补充碳水化合物量为0.75 ~1.0g/kg。"]}, {"type": "q", "stem": "3.24小时内补糖总量应达到（  ）", "options": ["A.6~9g/kg", "B.9~16g/kg", "C.15~20g/kg", "D.20~23g/kg"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1236。", "24 小时内补充碳水化合物总量达到9~16g/kg。"]}, {"type": "context", "text": "[2019RD真题]女性长跑运动员，素食者，准备参加国际赛事。"}, {"type": "q", "stem": "4.应该注意以下哪个营养素的补充（  ）", "options": ["A.维生素C", "B.维生素E", "C.钙", "D.铁"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1244。", "高强度大运动量训练导致红细胞破坏增加、肌细胞损伤释放肌红蛋白等，铁丢失增加。", "女子耐力运动员由于经血丢失铁，加上不良的饮食习惯，常常处于铁缺乏状态。"]}, {"type": "q", "stem": "5.比赛前，应该进行以下哪类饮食（  ）", "options": ["A.高蛋白饮食", "B.高脂饮食", "C.高碳水化合物饮食", "D.高盐饮食"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P1248。", "耐力性项目比赛应进行赛前补充碳水化合物。", "补充碳水化合物的种类可选择低聚糖和低GI食物，低聚糖的渗透压约为葡萄糖的1/4 , 吸收较快，因此，可通过补充低聚糖使运动员获得较多的碳水化合物。低GI食物可以在运动中持续提供碳水化合物，减弱胰岛素反应。", "补充碳水化合物量应控制在50g/h，或1g/kg左右。"]}], "qn": 5}, {"title": "72 运动员营养（四）", "items": [{"type": "context", "text": "[2021RD真题]在2020东京奥运会上，我国短跑运动员苏炳添在男子100米半决赛上，以9秒83的成绩打破亚洲纪录，并成为我国首位进入奥运会男子100米决赛的运动员。"}, {"type": "q", "stem": "1.100米短跑比赛，运动员体内的供能物质是（  ）", "options": ["A.葡萄糖", "B.酮体", "C.游离脂肪酸", "D.ATP"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1230。", "运动时，骨骼肌作为主要的能量消耗器官，其获得能量的最快方式就是直接利用自身所储存的ATP。"]}, {"type": "q", "stem": "2.短跑运动员高强度训练后恢复期饮食结构正确的是（  ）", "options": ["A.高糖、高脂肪、适量蛋白质", "B.低糖、高脂肪、低蛋白质", "C.低糖、高脂肪、高蛋白", "D.高糖、低脂肪、适量蛋白质"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1236、P1238、P1241。", "高糖饮食可促进体内肌糖原的恢复，从而尽快消除疲劳和促进体能恢复。", "高脂肪饮食可能引起超重、体脂增加，影响身体健康和运动成绩。", "运动时蛋白质分解代谢加强，运动后适量蛋白质使机体负氮平衡得到改善。"]}, {"type": "q", "stem": "3.对长期从事大强度专项训练的短跑运动员而言，下列运动营养补充剂中，可以选择的是（  ）①乳清蛋白；②牛磺酸；③肌酸；④氨基葡萄糖；⑤支链氨基酸。", "options": ["A.①②④⑤", "B.①③④⑤", "C.①②③⑤", "D.②③④⑤"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P649、P650。", "①对。乳清蛋白的吸收较快，并含有丰富的支链氨基酸，而其中的亮氨酸至关重要，因为它能在运动过程中为肌肉提供能量。", "②对。牛磺酸能提高人体抗氧化能力，延缓疲劳的出现，促进运动后疲劳的恢复。", "③对。肌酸在体内与磷酸结合生成磷酸肌酸，磷酸肌酸可快速分解并促进ATP再合成，从而使ATP始终处于动态平衡状态，补充肌酸可直接提高体内能量储备，提高爆发力。", "④错。氨基葡萄糖是软骨组织的主要组成成分，可维持关节软骨的正常功能，短跑不需。", "⑤对。支链氨基酸可减少肌肉蛋白的分解，增加肌肉瘦体重；促进合成代谢；缓解运动后的疲劳；减轻肌肉的分解。"]}, {"type": "q", "stem": "[2022RD真题]4.某女性，长跑运动员，素食者，下列饮食建议中，不合理的是（  ）", "options": ["A.增加植物性来源脂肪摄入，减少碳水化合物摄入     B.多吃豆类和坚果，保证铁的摄入", "C.在炎热天气比赛中，不限制食盐摄入", "D.每餐增加富含维生素C的蔬菜和水果摄入"], "answer": "答案：A", "analysis": ["解析：《中国营养科学全书》第2版P1247。", "A错，耐力项目营养特点：提供充足的能量，保持适宜的血糖水平。碳水化合物占总能量60%~70%，不宜减少碳水化合物摄入。膳食脂肪可略高于其他项目，可占总能量的30%~35%，素食者可增加植物性来源脂肪摄入。"]}, {"type": "q", "stem": "[2021DTR真题]5.下列氨基酸中，能直接提供能量给骨骼肌，并可以促进运动后恢复期蛋白质合成代谢的是（  ）①缬氨酸；②丙氨酸；③亮氨酸；④异亮氨酸；⑤苯丙氨酸。", "options": ["A.①②③", "B.①③④", "C.②③④", "D.②③⑤"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1238。", "支链氨基酸（缬氨酸、亮氨酸、异亮氨酸）能直接提供能量给骨骼肌，并可以促进运动后恢复期蛋白质合成代谢。"]}], "qn": 5}, {"title": "73 特殊环境营养（一）", "items": [{"type": "context", "text": "[2022DTR真题]某大学新生入校后进行一个月的军训，在当地9月气温30~35℃，湿度80%以上，请营养师进行膳食保障。"}, {"type": "q", "stem": "1.下列关于高温环境下生理和营养代谢特点描述中，正确的是（  ）①消化腺功能减退，消化液减少；②胃酸酸度增加；③大脑神经细胞兴奋性增强；④基础代谢率增加，蛋白质分解代谢增强；⑤维生素B1、维生素B2、烟酸需要量增加。", "options": ["A.①④⑤", "B.①②④⑤", "C.②③④", "D.①②⑤"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P152-P153。", "①对，体表血管血流量增多，内脏血管收缩，血流量减少，引起消化道血液不足，胃肠道运动功能减弱，消化腺功能减退，胃液、胰液和肠液等分泌减少。", "②错，随着氯化钠丢失增加，氯离子储备下降，致使胃酸酸度降低。", "③错，高温对大脑神经细胞的抑制作用增强，中枢运动神经细胞的兴奋性降低。", "④对，高温环境中基础代谢率增加，蛋白质分解代谢增强。", "⑤对，能量消耗增加，能量代谢相关的维生素B1、维生素B2和烟酸等需要相应增加。"]}, {"type": "q", "stem": "2.关于高温环境下水盐补救措施的描述中，错误的是（  ）", "options": ["A.食盐补充量应根据出汗量来确定", "B.优先选择冰镇的含盐饮料", "C.可以通过汤水补充水分盐分", "D.如果出汗量大，应在两餐之间或高温现场及时补充含盐饮料"], "answer": "答案：B", "analysis": ["解析：冰镇饮料刺激肠胃，有损健康。"]}, {"type": "q", "stem": "3.下列关于高温环境下保证充足膳食维生素做法中，错误的是（  ）", "options": ["A.增加豆类供应", "B.用精细谷物代替全谷物", "C.保证每日一个鸡蛋", "D.膳食中增加新鲜蔬果"], "answer": "答案：B", "analysis": ["解析：全谷物较精细谷物含有更丰富的维生素。"]}, {"type": "q", "stem": "[2024RD真题]4.下列关于高温环境作业人员营养需要与保障措施的描述中，正确的是（ ）", "options": ["A.增加维生素A和维生素E摄入，弥补汗液流失", "B.每天补水不超过5L", "C.增加钠摄入，每日钠的RNI>6500mg", "D.选淡盐水补充，NaCl浓度以0.1%为宜"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P153，《中国营养科学全书》第2版P1190。", "A错，增加维生素B1、维生素B2和维生素C摄入，弥补汗液流失。", "B错，补水取决于出汗量、热辐射强度与劳动强度，以既能维待水平衡又不对机体造成负担为原则。", "C错，增加钠摄入，每日钠的RNI4000~6500mg。", "D对，选淡盐水补充，NaCl浓度以0.1%为宜。"]}, {"type": "q", "stem": "[2019DTR真题]5.高温条件下作业的工人如果不注意合理饮食的话，最有可能缺乏的营养素是（  ）", "options": ["A.维生素A", "B.维生素C", "C.维生素D", "D.维生素E"], "answer": "答案：B", "analysis": ["解析：", "解析：《营养与食品卫生学》第9版P153。", "高温环境中机体对维生素C不仅消耗增多而且需要量增加。同时，由于水溶性维生素随汗液丢失增加，可造成这些水溶性维生素过多的损失。"]}], "qn": 5}, {"title": "74 特殊环境营养（二）", "items": [{"type": "q", "stem": "[2022RD真题]1.下列关于低温环境能量和营养素代谢的描述中，错误的是（  ）", "options": ["A.低温环境，人体能量消耗减少5%~25%", "B.低温环境，对水的需要量增加，以保持体液平衡", "C.低温环境，碳水化合物和脂肪的利用均增加，但碳水化合物优先利用产热", "D.低温可以引起机体对缬氨酸、亮氨酸、异亮氨酸利用增加"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P154。", "低温可引起人体能量消耗的增加，一般情况下，总能量增加5%~25%，这一现象与基础代谢率增高、寒战、御寒服装以及体格有关，还与甲状腺素分泌亢进，使体内物质氧化释放的能量以热的形式向体外放散有关。"]}, {"type": "q", "stem": "[2023RD真题]2.下列氨基酸中，对机体寒冷适应过程有益的是（  ）", "options": ["A.苯丙氨酸", "B.精氨酸", "C.蛋氨酸", "D.赖氨酸"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P154。", "研究显示，蛋氨酸、酪氨酸可提高机体耐寒的能力。"]}, {"type": "q", "stem": "[2023RD真题]3.下列哪些情况，机体基础代谢率会升高（  ）①-20°C寒冷环境；②37°C炎热环境；③饥饿；④甲状腺功能减退。", "options": ["A.①②④", "B.②③", "C.②④", "D.①②"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P46、P153。", "寒冷、大量摄食以及体力过度消耗均可提高基础代谢水平；而禁食、饥饿或少食时基础代谢能量消耗相应降低。甲状腺功能减退，甲状腺激素分泌较少，基础代谢下降。当环境温度超过30°C时，机体能量消耗明显增加，其原因可能与基础代谢率增加、心肌收缩增强、末梢循环血量增加以及汗腺活动增强等有关。"]}, {"type": "q", "stem": "[2019RD真题]4.特殊环境描述正确的是（  ）", "options": ["A.高原―能量代谢降低", "B.高温―能量代谢降低", "C.低温―维生素B1代谢降低", "D.苯作业―维生素C代谢增加"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P153、P154、P155、P157。", "A错，低氧时，能量需要量在非高原人群基础上增加10%。", "B错，当环境温度超过30℃时，机体能量消耗明显增加。", "C错，寒冷引起能量代谢加快及能量消耗增加，与能量相关的维生素B1、维生素B2和烟酸消耗量明显增加，维生素C 和维生素A消耗增加。", "D对，苯可减少体内维生素C的储存，降低血维生素C水平，并增加机体对维生素C的消耗。"]}, {"type": "q", "stem": "[2018RD真题]5.寒冷条件下需要增加的维生素（  ）①维生素B1；②维生素B2；③烟酸；④维生素B12；⑤叶酸", "options": ["A.①②④", "B.①②③", "C.②③⑤", "D.③④⑤"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P154。", "寒冷引起能量代谢加快及能量消耗增加，与能量相关的维生素B1、维生素B2和烟酸消耗量明显增加，维生素C 和维生素A消耗增加。"]}], "qn": 5}, {"title": "75 特殊环境营养（三）", "items": [{"type": "q", "stem": "[2020RD真题]一队登山队队员有20人，预登陆海拔为5800米的高峰，请为登山队队员进行膳食指导。", "options": ["A.与平原地区相比增加30％", "B.与平原地区相比增加10％", "C.与平原地区相比减少5％", "D.与平原地区相比增加20％"], "answer": "答案：B", "analysis": ["1．下列登山队队员的能量需要量叙述正确的是（  ）", "解析：《中国营养科学全书》第2版P1197。", "从平原进入高原地区，由于基础代谢率的升高，加上呼吸加快、气温变化等原因，机体能量消耗明显高于平原。能量需要量比平原高出10%。"]}, {"type": "q", "stem": "2.登山运动员要登海拔2千米左右的高山，为预防溶血，需要补充（  ）", "options": ["A.维生素D", "B.维生素E", "C.维生素A", "D.维生素C"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1197。", "高山上，人体内产生氧化应激反应，表现为脂质过氧化产物增加。当维生素E缺乏时，红细胞膜上的部分脂质失去抗氧化剂的保护作用，红细胞膜的完整性受到破坏，出现溶血。故应补充维生素E以预防溶血。"]}, {"type": "q", "stem": "3.给登山队队员补水的建议，合理的是（  ）", "options": ["A.适当补充水分", "B.大量饮水", "C.适当补充水分，但初入高原者应慎重补充水分", "D.应限制水分的摄入"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P1199。", "适当补水可维持体液平衡，促进食欲，防止水电解质代谢紊乱，但初入高原者应慎重补充水分，以预防脑水肿和肺水肿。"]}, {"type": "q", "stem": "4.高原环境下，心血管系统会发生一系列变化，以下说法错误的是（  ）", "options": ["A.心肌收缩力下降，易导致心肌功能衰竭和猝死", "B.毛细血管损伤，易形成局部血栓", "C.红细胞和 Hb增多，易引发高原心脏病", "D.血浆黏度降低，减轻心脏负担"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P155。", "高原环境下红细胞和Hb增多，血浆黏度会增加，而非降低，会加重心脏负担，易诱发高原心脏病，故 D 错误。"]}, {"type": "q", "stem": "5.关于高原环境对产能营养素代谢的影响，下列说法错误的是（ ）", "options": ["A.蛋白质和氨基酸分解代谢增强，尿氮排出增加", "B.脂肪动员增加，分解代谢加强，严重时可引发酮血症", "C.碳水化合物的有氧代谢增强，糖原储备量增加", "D.无氧酵解增强，血乳酸和丙酮酸含量增加"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P155。", "高原环境下碳水化合物的有氧代谢受阻，无氧酵解增强，糖原储备量减少，而非有氧代谢增强、糖原储备量增加，故 C 错误。"]}], "qn": 5}, {"title": "76 特殊环境营养（四）", "items": [{"type": "q", "stem": "[2017RD真题]1.对铅作业人员采取的下列营养措施中，不适宜的是（  ）", "options": ["A.增加维生素C", "B.增加优质蛋白质", "C.增加脂肪的摄入", "D.增加B族维生素的摄入"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P157。", "补充维生素C可维持巯基酶活性，促使还原型谷胱甘肽与铅离子结合排出而解毒。还能与铅结合形成难溶的抗坏血酸铅盐，经粪便排出。", "增加富含巯基氨基酸（蛋氨酸和胱氨酸）的优质蛋白质的摄入，提高谷胱甘肽铅复合物排铅解毒的作用。", "脂肪可促进铅在小肠的吸收，加重铅的毒性作用，应限制脂肪的摄入量。", "适量补充维生素B12和叶酸，以促进红细胞的生成和血红蛋白的合成；维生素B1、B2和B6均有神经系统的保护作用，对防治铅中毒也有着重要的意义。"]}, {"type": "q", "stem": "[2019DTR真题]2.下列哪种金属的毒性最易造成贫血（  ）", "options": ["A.铬", "B.铅", "C.镉", "D.砷"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P156、P275。", "铅主要损害造血系统、神经系统和肾脏。常见的症状和体征为贫血、神经衰弱、烦躁、失眠、食欲缺乏、口有金属味、腹痛、腹泻或便秘、头昏、头痛、肌肉关节疼痛等。", "铅通过抑制巯基酶活性，使血红蛋白合成减少。由于在肠道吸收过程中，铅与铁等矿物质的转运蛋白相同，相互间存在竞争性抑制作用，血铅增高会直接降低铁的吸收率。"]}, {"type": "q", "stem": "3.铅作业人员的膳食原则中，关于急性铅中毒的膳食调整，下列说法正确的是（ ）", "options": ["A. 以富含磷和硫的肉类和谷类为主，促进铅从骨骼中释放入血", "B. 以富含钠、钾和钙等的水果、蔬菜以及奶类为主，缓解铅的急性毒性", "C. 直接大量补充维生素 C，无需搭配其他食物", "D. 全程只食用富含磷和硫的食物，无需交替搭配"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P156。", "急性铅中毒时应以富含钠、钾和钙等的水果、蔬菜以及奶类为主，使血中高浓度的磷酸氢铅转变为磷酸铅沉积于骨骼中，缓解铅的急性毒性，随后再采取食物交替的方法促进排铅。"]}, {"type": "q", "stem": "4.铅在体内代谢过程中，下列关于铅对营养素代谢影响的说法，错误的是（  ）", "options": ["A. 抑制巯基酶活性，减少血红蛋白合成", "B. 降低锌、铁和钙等的吸收率", "C. 促进维生素 C 可逆的氧化过程，使其失去生理功能", "D. 使 1,25-(OH)2D3的分解代谢加强，影响钙的吸收利用"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P156。", "铅会促进维生素 C不可逆的氧化过程，使其失去生理功能，而非可逆过程，故 C 错误。"]}, {"type": "q", "stem": "5.铅作业人员补充适量矿物质的主要作用是（ ）", "options": ["A. 钙、铁、锌、铜可竞争性抑制铅的吸收，减少铅在体内的蓄积", "B. 钙可促进铅在骨骼中的溶解，加速铅释放", "C. 铁会促进铅的吸收，加重铅中毒", "D. 锌会降低巯基酶活性，加重铅对血红蛋白合成的抑制"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P157。", "补充钙、铁、锌、铜等矿物质，可通过竞争性抑制减少铅的吸收，降低铅在体内的毒性作用，故 A 正确。"]}], "qn": 5}, {"title": "77 特殊环境营养（五）", "items": [{"type": "q", "stem": "[2021RD真题]1.下列关于环境或职业性有害因素及其对健康危害相应关系的描述中，错误的是（  ）", "options": ["A.慢性镉中毒—肾脏损害", "B.慢性三硝基甲苯中毒—白内障", "C.砷中毒—骨质疏松、贫血", "D.慢性苯中毒—再生障碍性贫血、白血病"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P157、P274、P276。", "A对。镉中毒主要损害肾脏、骨骼和消化系统。肾脏是镉慢性中毒的靶器官，引起蛋白尿、氨基酸尿、糖尿和高钙尿，高钙尿导致体内出现负钙平衡，造成软骨症和骨质疏松。镉干扰膳食中铁的吸收和加速红细胞破坏，可引起贫血。", "B对。三硝基甲苯（TNT）可引起眼晶状体混浊，最后发展为白内障。", "C错。急性砷中毒主要表现是胃肠炎症状，慢性中毒主要表现为神经衰弱症候群，皮肤色素异常（白斑或黑皮症），手掌和足底皮肤过度角化。", "D对。慢性苯中毒对造血系统损害为主，严重者可以发展为再生障碍性贫血或白血病。"]}, {"type": "q", "stem": "2.苯对机体的毒作用中，慢性中毒的主要损害系统是（ ）", "options": ["A.中枢神经系统", "B.呼吸系统", "C.造血系统", "D.消化系统"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P157。", "苯急性中毒主要麻醉中枢神经系统，慢性中毒则以损害造血系统为主，严重者可发展为再生障碍性贫血或白血病。"]}, {"type": "q", "stem": "3.苯作业人员膳食营养需要中，限制脂肪摄入的主要原因是（ ）", "options": ["A.脂肪会降低苯的解毒酶活性", "B.脂肪会促进苯的吸收和蓄积", "C.脂肪会减少维生素 C 的吸收", "D.脂肪会抑制葡萄糖醛酸的生成"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P157。", "苯具有强的亲脂性，脂肪会促进苯的吸收和蓄积，因此苯作业人员需限制脂肪摄入。"]}, {"type": "q", "stem": "4.关于苯对营养素代谢的影响，下列说法错误的是（ ）", "options": ["A.增加蛋白质的损失", "B.减少铁的吸收", "C.增加维生素 C 的消耗", "D.促进维生素和矿物质的吸收利用"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P157。", "苯会使得机体维生素和矿物质摄入不足、吸收与利用障碍，而非促进其吸收利用。"]}, {"type": "q", "stem": "[2019RD真题]5.特殊环境描述正确的是（  ）", "options": ["A.高原―能量代谢降低", "B.高温―能量代谢降低", "C.低温―维生素B1代谢降低", "D.苯作业―维生素C代谢增加"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第8版P198、P202、P203。", "A错，低氧时，能量需要量在非高原人群基础上增加10%。", "B错，当环境温度超过30℃时，机体能量消耗明显增加。", "C错，寒冷引起能量代谢加快及能量消耗增加，与能量相关的维生素B1、维生素B2和烟酸消耗量明显增加，维生素C 和维生素A消耗增加。", "D对，苯可减少体内维生素C的储存，降低血维生素C水平，并增加机体对维生素C的消耗。"]}], "qn": 5}, {"title": "78 特殊环境营养（六）", "items": [{"type": "q", "stem": "[2021R真题]1.辐射工作人员易缺乏的维生素是（  ）", "options": ["A.维生素D", "B.维生素K", "C.维生素C", "D.泛酸"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P158。", "由于辐射引起机体产生大量的活性氧自由基，促进了抗氧化维生素（如维生素C、维生素E和β-胡萝卜素等）的消耗；另外，血中B族维生素含量减少，尿B族维生素尤其是维生素B1排出量增加，组织对维生素的利用率下降。"]}, {"type": "q", "stem": "2.电离辐射对产能营养素代谢的影响，下列说法错误的是（ ）", "options": ["A.能量代谢率高者，辐射损伤更严重", "B.蛋白质合成受阻，氨基酸分解代谢增强，易出现负氮平衡", "C.脂肪合成加快，易引发高脂血症", "D.机体对糖的利用能力增强，糖酵解作用加强"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P158。", "电离辐射会加强氨基酸糖异生作用，减弱糖酵解作用，机体对糖的利用能力异常，而非利用能力增强、糖酵解加强。"]}, {"type": "q", "stem": "3.接触电离辐射人群的膳食营养需要中，关于产能营养素供给，下列说法错误的是（ ）", "options": ["A.能量、蛋白质和必需氨基酸摄入不足会增加机体对辐射的敏感性", "B.以补充优质蛋白质为主", "C.可适当增加必需脂肪酸和 ω-3 多不饱和脂肪酸摄入", "D.应增加脂肪占总能量的比例，提升能量供给"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P158。", "接触电离辐射人群不建议增加脂肪占总能量的比例，还需控制血脂水平。"]}, {"type": "q", "stem": "4.关于电离辐射对维生素代谢的影响，下列说法错误的是（ ）", "options": ["A.会促进维生素 C、维生素 E 等抗氧化维生素的消耗", "B.血中 B 族维生素含量减少", "C.尿中维生素 B1排出量增加，组织对其利用率下降", "D.会提高机体对所有维生素的合成能力"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P158。", "电离辐射会增加抗氧化维生素消耗、降低 B 族维生素含量与利用率，并不会提高机体对所有维生素的合成能力。"]}, {"type": "q", "stem": "5.电离辐射对矿物质代谢的影响，下列说法错误的是（ ）", "options": ["A. 易出现高钾血症，尿钾、钠和氯离子排出增多", "B. 呕吐、腹泻会引发钠、氯离子丢失，导致电解质紊乱", "C. 血清铁、锌、铬、硒、铜等含量会发生改变", "D. 会促进矿物质在体内的储存，减少流失"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P158。", "电离辐射会导致矿物质排出增多、电解质紊乱，而非促进储存、减少流失。"]}], "qn": 5}]}, {"name": "四、公共营养（营养调查与评价）", "count": 40, "ntopic": 8, "topics": [{"title": "79 膳食营养素参考摄入量的制定", "items": [{"type": "q", "stem": "[2018RD真题]1.某营养素的EAR为500mg，标准差为150，该营养素RNI为（  ）", "options": ["A.550mg", "B.600mg", "C.650mg", "D.800mg"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P162。", "如果已知某种营养素的EAR及其标准差，则其RNI值为EAR加两个标准差，即RNI=EAR+2SD=500+2×150=800mg。"]}, {"type": "q", "stem": "[2024RD真题]2.下列关于成年人膳食营养参考摄入量制定方法的描述中，错误的是（  ）", "options": ["A.UL：UL= NOAEL/LOAEL×UF", "B. AI：健康人群调查的营养素平均摄入量", "C.RNI：RNI=EAR+2SD", "D.EAR：平均值计算法"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P162。", "A错，UL= NOAEL/ UF或UL =LOAEL/ UF。"]}, {"type": "q", "stem": "[2018DTR真题]3.在DRIs中，以EAR为基础制定的指标是（  ）", "options": ["A.RNI", "B.UL", "C.AI", "D.PI"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P162。", "如果已知某种营养素的EAR及其标准差，则其RNI值为EAR加两个标准差，即RNI=EAR+ 2SD；如果资料不充分，不能计算某营养素EAR的标准差时，一般设定EAR的变异系数为10%，RNI定为EAR+20%EAR，即RNI=1.2×EAR。"]}, {"type": "q", "stem": "[2021DTR真题]4.下列DIRs指标中，通过膳食调查摄入营养素中位数获得的是（  ）", "options": ["A.RNI", "B.UL", "C.AI", "D.EAR"], "answer": "答案：C", "analysis": ["解析：营养与食品卫生学》第9版P163。", "AI一般采用膳食调查中营养素摄入量的中位数值，也可以是通过实验研究或人群观察确定的估算值。。"]}, {"type": "q", "stem": "[2022RD真题]5.已知我国成人维生素C的UL，根据LOAEL值推算，不确定系数UF为1.5，则维生素C的LOAEL值是（  ）", "options": ["A.30000 mg/d", "B.400 mg/d", "C.3000 mg/d", "D.1333.3 mg/d"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P163。", "成年人的UL。计算公式为UL=NOAEL÷UF。如不能确定NOAEL，则UL=LOAEL÷UF。", "成人维生素C UL为2000mg/d，则维生素C LOAEL=UL×UF=2000×1.5=3000mg/d。"]}], "qn": 5}, {"title": "80 膳食模式", "items": [{"type": "q", "stem": "[2017RD真题]1.DASH和地中海膳食对心血管疾病有益。DASH中的S指的是（  ）", "options": ["A.sodium", "B.stop", "C.solution", "D.seafood"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P164。", "高血压治疗膳食（dietary approaches to stop hypertension，DASH）由美国国立卫生研究院，美国心脏、肺和血液研究所制订。", "该膳食特点为富含水果、蔬菜，包括全谷类、家禽、鱼类、坚果。", "其富含的营养素有：钾、镁、钙和蛋白质，而总脂肪、饱和脂肪酸、胆固醇含量较低，富含膳食纤维。"]}, {"type": "q", "stem": "[2021RD真题]2.下列膳食模式中，根据目前营养证据支持系统，可改善血脂异常的是（  ）①地中海膳食模式；②DASH膳食；③低脂膳食；④素食模式；⑤高碳水化合物膳食模式。", "options": ["A.①②③④", "B.②③④", "C.①②③④⑤", "D.①②③"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P164。", "碳水化合物摄入过多，会转化成脂肪。"]}, {"type": "q", "stem": "[2021RD真题]3.关于DASH膳食的特点，描述错误的是（  ）", "options": ["A.低胆固醇", "B.高膳食纤维", "C.高铁", "D.高镁"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P164。", "高血压治疗膳食（dietary approaches to stop hypertension，DASH）DASH由美国国立卫生研究院，美国心脏、肺和血液研究所制订。", "该膳食特点为富含水果、蔬菜，包括全谷类、家禽、鱼类、坚果，其富含的营养素有：钾、镁、钙和蛋白质，而总脂肪、饱和脂肪酸、胆固醇含量较低，富含膳食纤维。"]}, {"type": "q", "stem": "[2022RD真题]4.《中国居民膳食指南（2022）》首次推荐了东方健康膳食模式，下列关于东方健康膳食模式的描述中，错误的是（  ）", "options": ["A.膳食特点尤其以丰富蔬菜水果、多红肉和豆类食物为主要特征", "B.基于我国浙江、上海、江苏、福建等地区为主要代表", "C.膳食特点以食物多样，清淡少油为主", "D.该地区居民同时具有较高的身体活动量"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P165。", "东方健康膳食模式主要特点：清淡少盐，食物多样，谷物为主，蔬菜水果充足，鱼虾等水产品丰富，奶类豆类丰富等，并具有较高的身体活动量。"]}, {"type": "q", "stem": "[2023DTR真题]5.在DASH饮食中，也要控制的是（  ）①饱和脂肪酸；②反式脂肪酸；③胆固醇；④酒精；⑤钠。", "options": ["A.②③④", "B.①②④⑤", "C.②③④⑤", "D.①②③④⑤"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P164。", "DASH由美国国立卫生研究院，美国心脏、肺和血液研究所制订。该膳食特点为富含水果、蔬菜，包括全谷类、家禽、鱼类、坚果，其富含的营养素有：钾、镁、钙和蛋白质，而总脂肪、饱和脂肪酸、胆固醇含量较低，富含膳食纤维。反式脂肪酸、酒精、钠也要控制。"]}], "qn": 5}, {"title": "81 营养调查（上）", "items": [{"type": "q", "stem": "[2024RD真题]1.关于《中国居民营养健康状况监测》，说法错误的是（ ）", "options": ["A.成果是《中国居民营养与慢性病状况报告》", "B.前身是1959年、1982年、1992年三次营养调查", "C.2001年与高血压、糖尿病合并，即2002中国居民营养健康状况调查", "D.2010年起变为常规监测，每4～5年完成一个周期的营养健康状况监测"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P166。", "2002年的第四次调查首次将营养调查与慢性病（高血压、糖尿病等）调查一起开展，而非2001年。"]}, {"type": "q", "stem": "2.我国将 “中国居民营养与健康状况调查” 调整为五年一周期的常规性监测工作的年份是（  ）", "options": ["A.1959 年", "B.1982 年", "C.2002 年", "D.2010 年"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P166。", "2010 年，卫生部将原十年一次的调查改为五年一周期的 “中国居民营养与健康状况监测” 工作。"]}, {"type": "q", "stem": "3.营养调查的核心内容不包括以下哪一项（  ）", "options": ["A.膳食调查", "B.体格测量（身高、体重等）", "C.人体营养水平的实验室检测", "D.RCT临床试验"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P166。", "营养调查的内容由五部分组成：一般情况调查、膳食调查、体格测量、人体营养水平的实验室检测、营养相关疾病的临床检查。"]}, {"type": "q", "stem": "4.关于我国全国营养调查的历史，下列说法正确的是（  ）", "options": ["A.我国仅在 1959 年开展过一次全国营养调查", "B.2002 年第四次全国营养调查首次与慢性病调查合并开展", "C.1992 年的调查是 “第一次中国居民营养与健康状况调查”", "D.2010 年后的监测工作仍为十年一个周期"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P166。", "2002 年第四次全国营养调查与慢性病调查合并，即 “第一次中国居民营养与健康状况调查”；1959、1982、1992 年已开展三次调查，2010 年后改为五年一周期。"]}, {"type": "q", "stem": "5.下列哪项不属于营养调查的主要目的（  ）", "options": ["A.了解不同地区、年龄和性别人群的能量和营养素摄入情况", "B.直接治疗调查发现的所有营养相关疾病", "C.分析营养相关疾病的病因与影响因素", "D.为国家制定营养干预策略提供数据支持"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P166。", "营养调查的核心目的是了解状况、分析问题、提供决策依据，并不包含直接治疗疾病的功能。"]}], "qn": 5}, {"title": "82 营养调查（中）", "items": [{"type": "q", "stem": "[2017RD真题]1.下列关于膳食调查中食物频率法的描述中，错误的是（  ）", "options": ["A.可用于了解一定时间内的日常食物摄入量", "B.可研究既往膳食习惯与某些慢性病的关系", "C.如果为了调查某些营养素的摄入量，要调查富含这种营养素的食物", "D.该方法能较准确地提供每天食物摄入量"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P167。", "食物频数法收集被调查对象过去一段时间（数周、数月或数年）内各种食物消费频率及消费量，从而获得个人长期食物和营养素平均摄入量。食物频率法可快速得到平时各种食物摄入的种类和数量，反映长期膳食行为，其结果可作为研究慢性病与膳食模式关系的依据，也可供膳食咨询指导之用。"]}, {"type": "q", "stem": "[2017RD真题]2.若研究膳食习惯与某些慢性病的关系，建议选择的膳食调查方法是（  ）①称重法；②记账法；③24小时回顾法；④食物频率法", "options": ["A.①②", "B.②③", "C.②④", "D.①④"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P780、P782。", "膳食调查方法一般有称重法、记账法、膳食回顾法、化学分析法和食物频率法等。其中能反映长期膳食行为的方法有记账法和食物频率法。"]}, {"type": "q", "stem": "[2021RD真题]3.为养老院老人做个性化饮食指导。下列适宜采用的膳食调查方法是（  ）", "options": ["A.24小时膳食回顾法", "B.称重法", "C.记账法", "D.食物频率法"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P779-P781。", "A错。不适合75岁以上老人。", "B错。太费时费力，不适合大规模调查。", "C错。难以分析个体膳食摄入情况。", "D对。可以获得个人较长期食物和营养素的平均摄入量。"]}, {"type": "q", "stem": "[2020DTR真题]4.对5岁以下儿童开展膳食调查，最合适的是（ ）", "options": ["A.记账法", "B.称重法", "C.24小时回顾法结合膳食史法", "D.24小时回顾法"], "answer": "答案：A", "analysis": ["解析：《中国营养科学全书》第2版P1275。", "记账法耗费人力少，适合于家庭、托幼机构、学校和部队的调查。", "称重法一般适合于家庭、个人及特殊人群的膳食调查，不适合大规模流行病学调查，也不适合长期膳食调查。", "24小时回顾法的准确与否取决于调查对象的短期记忆能力，因此一般不适合于7岁以下儿童和75岁及以上老年人。"]}, {"type": "q", "stem": "[2019RD真题]5.可能会受季节影响的调查法是（  ）①24小时回顾法；②称重法；③记账法；④食物频率法；⑤膳食史法", "options": ["A.①③④⑤", "B.①②③④⑤", "C.①②④", "D.①②③"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P779。", "①对，24小时回顾法常采用3天24小时回顾法。", "②对，称重法每次调查不超过一周。通常情况下不宜超过3~4天。", "③对，记账法调查较长时期的膳食，适合于进行全年不同季节的调查。", "④ ⑤错，食物频率法、膳食史法不受季节影响。"]}], "qn": 5}, {"title": "83 营养调查（下）", "items": [{"type": "q", "stem": "[2017RD真题]1.某男性患者在营养门诊进行体格测量，身高175cm，体重90kg，腰围98cm，臀围101cm，上臂周长339mm，肱三头肌皮褶厚度19.5mm。该患者的BMI（kg/m2）值是（  ）", "options": ["A.22.0", "B.26.4", "C.29.4", "D.31.4"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P168。", "BMI=体重(kg)/[身高(m)]2=90/1.752=29.4。"]}, {"type": "q", "stem": "[2020DTR真题]2.在进行体格测量时，某营养技师用钢卷尺测量了一位20岁学生的身高为175cm，腰围98cm，臀围101cm，用体重秤测得其体重90kg，体检发现躯干部位有出血点且60mm范围内可达10个，其余未见异常。在测量腰围时，该营养技师按下列步骤进行测量：被测者自然站立，低头含胸，测量者选择被测者腰部最粗部位作为测量点将钢卷尺绕腰一周，在吸气末呼气初开始读数，并记录读数：100cm。该学生的体型是（  ）", "options": ["A.肥胖", "B.向心性肥胖", "C.正常", "D.超重"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P168。", " （PG-SGA）", "D.微型营养评估（MNA）"], "answer": "答案：A", "analysis": ["解析：《中国营养科学全书》第2版P1476。", "营养风险筛查2002（NRS2002）—营养风险筛查的首选；主观整体评估（SGA）—主要用于住院患者营养评定；患者主观整体评估（PG-SGA）—主要用于肿瘤患者的营养评定；微型营养评估（MNA）—适用于老年人的营养评定。"]}], "qn": 5}, {"title": "86 营养评定", "items": [{"type": "q", "stem": "[2021RD真题]1.患者，女，65岁。7个月前因发现右侧颈部肿块，后入院诊断为恶性肿瘤，鳞状细胞癌，进行放、化疗治疗。经营养筛查患者存在营养风险，下一步最适合的营养评估方法是（  ）", "options": ["A.PG-SGA", "B.NRS-2002", "C.PGA", "D.MNA"], "answer": "答案：A", "analysis": ["解析：《中国营养科学全书》第2版P1479。", "患者参与的主观全面评定（patient-generated subjective global assessment，PG-SGA）主要用于肿瘤患者的营养评定。", "主观全面评定（subjective global assessments，SGA）主要用于住院患者营养评定。", "微型营养评定（mini nutritional assessment，MNA）主要适用于养老院和社区老人。"]}, {"type": "q", "stem": "[2020RD真题]2.关于主观综合性营养评估（SGA）说法错误的是（  ）", "options": ["A.需要了解肌酐", "B.需要了解食欲情况", "C.需要了解体重情况", "D.需要了解消化道情况"], "answer": "答案：A", "analysis": ["解析：《中国营养科学全书》第2版P1479。", "主观综合性营养评估（SGA）评估内容包括病史与体格检查两个方面：病史主要包括5个方面的内容：①体重变化；②进食量变化；③胃肠道症状；④活动能力改变；⑤疾病状态下的代谢需求。", "体格检查主要包括3个方面：①皮下脂肪的丢失；②肌肉的消耗；③水肿（体液）情况。"]}, {"type": "q", "stem": "3.以下选项中属于纯评估性质的量表有（ ）", "options": ["A.NRS2002、SGA", "B.MNA、MUST", "C.SGA、PG-SGA", "D.NRS2002、MUST"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P180。", "NRS2002属于纯筛查性质的；SGA、PG-SGA属于纯评估性质的；MNA、MUST兼备筛查与评估功能。"]}, {"type": "q", "stem": "4.临床结局不包括（ ）", "options": ["A.感染性并发症发生率", "B.住院时间", "C.住院费用", "D.蛋白质-能量营养不良"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1475。", "临床结局包括感染性并发症发生率、住院时间、住院费用、生活质量、成本－效果比等。"]}, {"type": "q", "stem": "[2025RD真题]5.下列方法中可用于诊断营养不良的是（  ）", "options": ["A.NRS-2022", "B.GLIM", "C.MUST", "D.MNA-SF"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P180。", "全球营养组织的营养不良倡议（Global Leadership Initiative on Malnutrition，GLIM）是2019年由全球多个营养组织倡导推出的新型通用型营养评估工具，可用于诊断营养不良。"]}], "qn": 5}]}, {"name": "五、临床营养", "count": 129, "ntopic": 25, "topics": [{"title": "87-90 普食、软食、半流质、流质", "items": [{"type": "context", "text": "[2017RD真题]某门诊患者，女，69岁，反复出现上腹隐痛，伴腹胀、嗳气，食欲不佳，大便尚可。胃镜显示：慢性萎缩性胃炎；血常规：白细胞为5.4×109/L，红细胞为3.41×1012/L，血红蛋白为115.0g/L。"}, {"type": "q", "stem": "1.下列哪种膳食医嘱，适用于该患者（  ）", "options": ["A.普食", "B.软食", "C.半流质", "D.流质"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1462。", "慢性萎缩性胃炎患者宜少量多餐，进食易消化的少渣软食。"]}, {"type": "q", "stem": "2.适合该患者的相应膳食，依据个体化营养治疗方案，能量供应的适宜范围是（  ）", "options": ["A.1500~1700kcal/d", "B.2000~2200kcal/d", "C.1700~1950kcal/d", "D.1200~1500kcal/d"], "answer": "答案：C", "analysis": ["解析：《中国居民膳食营养素参考摄入量（2013版）》。", "推荐65~80岁女性每日能量摄入范围为1700~1950kcal/ d。", "《中国居民膳食营养素参考摄入量（2023版）》推荐65岁~，女性每日能量摄入范围为1550~1850kcal/d。", "本题是2017年真题，当时以2013版为准，现在记2023版数据。"]}, {"type": "q", "stem": "3.适合该患者的相应膳食，长期食用最易出现下列哪种营养素的缺乏（  ）", "options": ["A.蛋白质", "B.锌", "C.镁", "D.维生素C"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1462。", "长期采用软饭的患者因蔬菜切碎，煮软过程中维生素C损失较多，应注意适当补充。"]}, {"type": "q", "stem": "[2021DTR真题]4.男性，70岁，因肺炎住院，低热，无其他消化系统疾病，首选的饮食是（  ）", "options": ["A.普食", "B.软食", "C.半流质", "D.流质"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1462、P1463。"]}, {"type": "q", "stem": "[2021DTR真题]5.为患者配制软食，下列食物中，可以选择的是（  ）", "options": ["A.辣子鸡丁", "B.炸素丸子", "C.葱油鱼丸", "D.红烧大排"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P1462。", "软食膳食原则"]}, {"type": "context", "text": "1.食物无刺激性、易消化。"}, {"type": "context", "text": "2.肉类、鸡鸭、蔬菜等食物皆应去骨、切小、制软。"}, {"type": "context", "text": "3.主食以粥、馒头、软饭、面条等为主。"}, {"type": "q", "stem": "[2017RD真题]6.配制半流质主食，下列哪种食物不宜作为主料选用（  ）", "options": ["A.粳米", "B.糙米", "C.籼米", "D.香米"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1463。", "半流质膳食的各种食物皆应细， 软碎，少粗纤维，易咀嚼，易吞咽。糙米含粗纤维多，不适宜。"]}, {"type": "q", "stem": "[2021DTR真题]7.若为患者配制半流质膳食，下列食物中，不宜选择（  ）①粳米；②糙米；③籼米；④韭菜；⑤胡萝卜。", "options": ["A.①③④", "B.②④⑤", "C.②③④⑤", "D.②④"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1463。", "半流质膳食应采用无刺激性的半固体食物。各种食物皆应细， 软碎，少粗纤维，易咀嚼，易吞咽。糙米、韭菜、胡萝卜含粗纤维多，不适宜。"]}, {"type": "q", "stem": "[2020RD真题]8.肺结核胃溃疡发作期饮食，适宜的是（  ）", "options": ["A.流质膳食", "B.半流质膳食", "C.普通膳食", "D.软食"], "answer": "答案：A", "analysis": ["解析：《中国营养科学全书》第2版P1462。", "流质膳食适用对象：高热、大手术后、急性消化道炎症、咀嚼吞咽困难、危重患者及各种临床管饲患者等。肺结核胃溃疡发作期存在急性消化道炎症，应采用流质膳食。"]}, {"type": "q", "stem": "[2020RD真题]9.关于医院常规膳食描述错误的是（  ）", "options": ["A.根据基本营养要素制定", "B.以治疗为主，可以忽略平衡膳食", "C.包括普食、软食、半流质、流质", "D.在食材选择和烹饪方式的选择，可根据个体营养需求"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1463。", "B错，医院治疗膳食以治疗为主， 但仍以平衡膳食为前提，而医院常规膳食不以治疗为主。"]}, {"type": "q", "stem": "[2020DTR真题]10.在医院常规膳食中，以下哪种不是清流质（ ）", "options": ["A.蔬菜汁", "B.米汤", "C.全脂牛奶", "D.鲜榨果汁"], "answer": "答案：C", "analysis": ["解析：《临床营养学》第3版P166。", "清流质：是一种不含产气食物及残渣最少，较流质膳食更为清淡的液体食物，可选用过箩猪肉汤、过箩牛肉汤、过箩米汤、排骨汤、过滤蔬菜汤、过滤果汁、果汁胶冻、稀藕粉、淡荼等。"]}], "qn": 10}, {"title": "91-92 高蛋白、低蛋白膳食", "items": [{"type": "context", "text": "[2020RD真题]张某，女性 身高163cm，体重65kg，某日因办公室突发火灾被困，被救出后送医院急救，全身有50%的体表面积烧伤，吸入性损伤，辅助检查：血糖7.6mmol/L，白蛋白47g/L，C-反应蛋白150mg/L，肌酐54μmol/L。"}, {"type": "q", "stem": "1.下列膳食中，适合该患者的是（  ）", "options": ["A.低胆固醇膳食", "B.低蛋白膳食", "C.高能量高蛋白膳食", "D.低盐膳食"], "answer": "答案：C", "analysis": ["解析：《临床营养学》第3版P416。", "大面积烧伤后，机体分解代谢增强，耗氧量及产热增加，蛋白质过度分解，适合高能量高蛋白膳食 。"]}, {"type": "q", "stem": "[2020DTR真题]2.大面积烧伤患者宜采用的饮食建议是（ ）", "options": ["A.低盐饮食", "B.低蛋白饮食", "C.高能量高蛋白饮食", "D.低胆固醇饮食"], "answer": "答案：C", "analysis": ["解析：《临床营养学》第3版P416。", "大面积烧伤后，机体分解代谢增强，耗氧量及产热增加，蛋白质过度分解，适合高能量高蛋白饮食 。"]}, {"type": "q", "stem": "[2017RD真题]3.低蛋白膳食不适用于（  ）", "options": ["A.急性肾炎的患者", "B.肝功能衰竭的患者", "C.恶性肿瘤的患者", "D.尿毒症的患者"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P1463。", "低蛋白膳食适用于急性肾炎、慢性肾衰竭、急性肾衰竭少尿期、肝昏迷前期、膳食中需要严格限制蛋白质总量的患者。"]}, {"type": "q", "stem": "[2021DTR真题]4.配制低蛋白膳食时，下列主食中，不适合选用的是（  ）", "options": ["A.红豆饭", "B.藕粉", "C.山药粥", "D.麦淀粉面条"], "answer": "答案：A", "analysis": ["解析：《中国营养科学全书》第2版P1464。", "低蛋白膳食可用食物：谷类、水果、蔬菜、麦淀粉、藕粉、杏仁淀粉、适量的油脂和食糖。淀粉膳食可用各类淀粉如小麦淀粉、玉米淀粉、豌豆淀粉等，土豆、山药、芋艿、粉皮、蔗糖；水果、蔬菜（限钾患者须适量）。"]}, {"type": "q", "stem": "[2018DTR真题]5.急性肾小球肾炎患者应注意采用下列哪种膳食进行营养治疗（ ）", "options": ["A.低碳水化合物膳食", "B.低嘌呤膳食", "C.低脂膳食", "D.低蛋白膳食"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1463。", "低蛋白膳食适用于急性肾炎、慢性肾衰竭、急性肾衰竭少尿期、肝昏迷前期、膳食中需要严格限制蛋白质总量的患者。"]}], "qn": 5}, {"title": "93-95  低盐、无盐、低钠膳食", "items": [{"type": "q", "stem": "1.关于低盐膳食描述正确的是（ ）", "options": ["A.控制全日膳食总含盐量在1~3g", "B. 控制全日膳食总含盐量在2~5g", "C. 控制全日膳食总含盐量在2~4g", "D. 控制全日膳食总含盐量在1~4g"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1464。", "低盐膳食控制全日膳食总含盐量在1~4g。"]}, {"type": "q", "stem": "2.以下哪种食物，妊娠期高血压患者不宜选用（ ）", "options": ["A. 豆花", "B. 火腿", "C. 饺子", "D. 酸奶"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1464。", "妊娠期高血压患者适用低盐膳食，火腿不宜选用。"]}, {"type": "q", "stem": "[2020DTR真题]3.关于无盐膳食饮描述正确的是（ ）", "options": ["A.全日膳食含钠小于1500mg", "B.每日盐摄入低于3g", "C.全日膳食含钠小于1000mg", "D.当日膳食含钠小于1200mg"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P1464。", "无盐膳食特点：在食物选择和烹调加工过程中避免含盐、酱油和其他钠盐的调味品，全日膳食总含钠量在1000mg 以下。"]}, {"type": "q", "stem": "4.关于低钠膳食描述正确的是（ ）", "options": ["A.全日含钠量在200~300mg", "B.全日含钠量在400~600mg", "C.全日含钠量在500~800mg", "D.全日含钠量在300~500mg"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1464。", "低钠膳食特点：本膳食的含钠量在300~500mg, 此膳食需在医务人员的监测下短期使用。"]}, {"type": "q", "stem": "5.以下低钠膳食可使用的蔬菜是（ ）", "options": ["A.油菜墓", "B.雍菜", "C.芹菜", "D.紫甘蓝"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1464。", "低钠膳食食物选择：除参照低盐、无盐膳食外，避免皮蛋、海产品、含盐或碱的馒头糕点，含钠高的蔬菜如油菜薹、蕹菜、芹菜、茴香、蒿子秆等，含钠高的食物和调味料，刺激性调味品皆应免用。"]}], "qn": 5}, {"title": "96-97 低脂、低胆固醇膳食", "items": [{"type": "q", "stem": "[2019RD真题]1.陈某，男，69岁，因突发左侧肢体无力17小时就诊。患者左上肢无力，不能持物，左下肢行走摇晃，伴持续性头痛，无恶心、呕吐、饮水呛咳等。CT示“右侧脑出血，出血量约7ml” 。患者既往有高血压病史3年，入院后血压为150/89mmHg，总胆固醇6.79mmol/L、甘油三酯1.91mmol/L、低密度脂蛋白4.76mmol/L，余未见异常。现诊断为脑出血、 高血压2级、高脂血症。", "options": ["A.≤30g", "B.≤40g", "C.≤50g", "D.≤60g"], "answer": "答案：C", "analysis": ["该患者的全日脂肪应控制在（  ）", "解析：《中国营养科学全书》第2版P1465。", "低脂膳食一般限制：脂肪占总能量的25%以下，如高脂血症、高血压、冠心病患者要定期计算膳食的脂肪总量在50g以下。中度限制：脂肪占总能量的20%以下，脂肪总量控制在30g以下，如胆囊炎的恢复期、脂肪吸收不良患者。严格限制：脂肪摄入量在15g以下，如急性胰腺炎、急性胆囊炎等患者。"]}, {"type": "q", "stem": "2.以下不属于低脂膳食适用对象是（ ）", "options": ["A. 肝硬化", "B. 冠心病", "C. 胰腺炎", "D. 肾结石"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1465。", "低脂膳食适用对象：急慢性肝炎，肝硬化，胆囊疾患，胰腺炎，高脂血症，冠心病，高血压。"]}, {"type": "q", "stem": "3.低脂膳食要求每日膳食中饱和脂肪酸占总能量的（ ）", "options": ["A.<10%", "B.<15%", "C.<18%", "D.≤15%"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P185。", "低脂膳食除了限制膳食中总脂肪摄入量以外，还要求饱和脂肪酸供能比<10%。"]}, {"type": "q", "stem": "4.以下不属于低胆固醇膳食适用对象是（ ）", "options": ["A.急性肠炎", "B.冠心病", "C.胆石症", "D.高血压"], "answer": "答案：A", "analysis": ["解析：《中国营养科学全书》第2版P1465。", "低胆固醇膳食适用对象：高胆固醇血症、高甘油三酯血症、高脂蛋白血症、高血压、动脉粥样硬化、冠心病、胆石症、肥胖症等患者。"]}, {"type": "q", "stem": "5.以下食物，低胆固醇膳食少用或不用的是（ ）", "options": ["A.鱼虾", "B.低脂奶", "C.动物内脏", "D.鸡胸肉"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P1465。", "低胆固醇膳食少用和不用食物：油条、油饼、油酥点心、全脂奶、肥肉、肥禽、蟹黄、动物内脏、牛羊猪油及其他含脂肪高的食品，以及鱿鱼、乌贼鱼、动物脑等含胆固醇高的食物。"]}], "qn": 5}, {"title": "98-99 少渣、高纤维膳食", "items": [{"type": "q", "stem": "[2019RD真题]1.适合少渣饮食的疾病是（  ）", "options": ["A.高血压", "B.食道炎", "C.乳糖不耐受", "D.便秘"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书 》第2版P1465。", "少渣饮食适用对象：各种急性和慢性肠炎、伤寒、痢疾、腹泻、食管静脉曲张、结肠憩室炎、肠道肿瘤、消化道少量出血、肠道及食管管腔狭窄、肛部肿瘤和会阴部手术等情况。"]}, {"type": "q", "stem": "[2019DTR真题]2.不属于少渣饮食的是（ ）", "options": ["A.鸡蛋羹", "B.豆腐脑", "C.燕麦糙米粥", "D.清蒸鲈鱼"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P1465。", "少渣膳食需要限制膳食中的粗纤维，其目的是减少对消化道的刺激和梗阻，减少肠道蠕动，减少粪便的量和粪便的运行。", "少用和不用食物：各种租粮、大块的肉、油炸食物、强烈刺激性调味品、整粒的豆、坚果、多纤维的蔬菜水果，如：芹菜、韭菜、蒜薹、豆芽、菠萝等。"]}, {"type": "q", "stem": "3.关于少渣膳食，描述不正确的是（ ）", "options": ["A.减少对消化道的刺激和梗阻", "B.减少肠道蠕动", "C.减少粪便的量和粪便的运行", "D.促进粪便中有害物质排出"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1465。", "少渣膳食需要限制膳食中的粗纤维，其目的是减少对消化道的刺激和梗阻，减少肠道蠕动，减少粪便的量和粪便的运行。"]}, {"type": "q", "stem": "4.以下不属于高纤膳食适用对象的是（ ）", "options": ["A.无张力便秘", "B.肛门手术后恢复期", "C.无并发症的憩室病", "D.食管静脉曲张"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1465。", "高纤膳食适用对象：无张力便秘、无并发症的憩室病、肛门手术后恢复期，其他需要增加膳食纤维的慢性病如高胆固醇血症、糖尿病、肥胖症等。"]}, {"type": "q", "stem": "5.以下食物，高纤膳食少用或不用的是（ ）", "options": ["A.韭菜", "B.芹菜", "C.白面包", "D.海带"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P1465。", "高纤膳食少用和不用食物辛辣刺激性食物，过于精细的食品。"]}], "qn": 5}, {"title": "100-102 高能量、低能量、限能量平衡膳食", "items": [{"type": "q", "stem": "[2022RD真题]1.下列疾病中，能采用高能量膳食的是（  ）", "options": ["A.痛风", "B.脂肪肝", "C.甲状腺功能亢进", "D.糖尿病"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P1465。", "高能量膳食适用对象：严重烧伤和创伤、高热、体重过低、贫血、结核病、伤寒、甲亢、疾病恢复期患者。"]}, {"type": "q", "stem": "[2020DTR真题]2.某女，24岁，身高165cm，体重84kg，单纯性肥胖，备孕状态，寻求营养干预方案。若营养师为该女性采用限能量平衡膳食减重，下面描述错误的是（  ）", "options": ["A.能量摄入按1300kcal/d设计食谱", "B.脂肪供能比20％～30％，碳水供能比40％～55％为宜", "C.增加蛋白质供给比例，占总能量的15％～20％", "D.为避免便秘，增加膳食纤维摄入，40～60g/d"], "answer": "答案：D", "analysis": ["解析：《中国超重/肥胖医学营养治疗专家共识（2016年版）》：限能量平衡膳食每日供能1000～1500kcal。适当提高蛋白质供给量比例（1.2~1.5g/kg，或15%～20%），脂肪供能比20％～30％，碳水供能比40％～55％为宜。保证膳食纤维的摄入量25~30g/d。", "《中国超重肥胖医学营养治疗指南（2021）》：限能量平衡膳食碳水化合物占每日总能量的55%～60%，脂肪占每日总能量的25%～30%。"]}, {"type": "q", "stem": "[2021RD真题]3.成人采用限能量平衡饮食减重，以下正确的是（  ）", "options": ["A.蛋白质宜占总能量的30％以上", "B.碳水化合物宜占总能量的40％~55％", "C.每天的总能量最多是1200kcal", "D.脂肪不能超过总能量的20％"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1467。", "A错，适当提高蛋白质供给量比例，按照1.2~1.5g/kg体重或15%~20%。", "B对，限能量平衡膳食碳水化合物的供能比例以40%~55%为宜。", "C错，每日供给能量1000~1500kcal。", "D错，脂肪的供能以20%~30%为宜，过低或过高都会导致膳食模式的不平衡。"]}, {"type": "q", "stem": "[2024DTR真题]4.男，28岁，身高182cm，体重96kg，为控制体重，建议他采取哪种膳食模式是（  ）", "options": ["A.低钠饮食", "B.限能量平衡饮食", "C.生酮饮食", "D.低蛋白饮食"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1786。", "该男子BMI=96÷1.82÷1.82≈29.0>28，肥胖。", "限能量平衡饮食有效减轻体重，降低体脂，改善代谢，易长期坚持达到减肥目标，无健康风险。适于所有年龄阶段及不同程度的超重及肥胖人群。"]}, {"type": "q", "stem": "[2020DTR真题]5.大面积烧伤患者宜采用的饮食建议是（ ）", "options": ["A.低盐饮食", "B.低蛋白饮食", "C.高能量高蛋白饮食", "D.低胆固醇饮食"], "answer": "答案：C", "analysis": ["解析：《临床营养学》第3版P416。", "大面积烧伤后，机体分解代谢增强，耗氧量及产热增加，蛋白质过度分解，适合高能量高蛋白饮食 。"]}], "qn": 5}, {"title": "103 低嘌呤膳食", "items": [{"type": "q", "stem": "[2021DTR真题]1.嘌呤含量从高到低排序，正确的是（  ）", "options": ["A.沙丁鱼>鸡蛋>豆干>糙米", "B.鸡蛋>豆干>糙米>沙丁鱼", "C.豆干>沙丁>鸡蛋>糙米", "D.沙丁鱼>豆干>糙米>鸡蛋"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1467。", "沙丁鱼—嘌呤含量高（150~1000mg）豆干、糙米—嘌呤含量较高（50~150mg）鸡蛋—嘌呤含量很少（<50mg）。"]}, {"type": "q", "stem": "2.低嘌呤膳食，每日膳食中嘌呤的摄入量（ ）", "options": ["A.150mg/d以下", "B.150~200mg/d", "C.150~250mg/d", "D.200~250mg/d"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P1467。", "低嘌呤膳食：限制膳食中嘌呤的摄入量每日在150~250mg/d，减少外源性嘌呤的来源，降低血清尿酸的水平。"]}, {"type": "q", "stem": "3.关于低嘌呤膳食，优质蛋白质不宜选用（ ）", "options": ["A.奶粉", "B.鸡蛋", "C.海鲜", "D.干酪"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P1467。", "海鲜一般是高嘌呤的食物。"]}, {"type": "q", "stem": "4.属于低嘌呤食物的是（ ）", "options": ["A.鸭肉", "B.豆腐", "C.蘑菇", "D.土豆"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1467。", "鸭肉、豆腐、蘑菇—中等嘌呤（50~150mg）土豆—低嘌呤（<50mg）。"]}, {"type": "q", "stem": "5.关于低嘌呤膳食，描述不正确的是（ ）", "options": ["A.蛋白质按理想体重每日为1g/kg，全日50~65g", "B.脂肪供能比 20%~25%", "C.宜供给充足B族维生素和维生素C", "D.每日入液量保持1500~2000ml"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1467。", "无肾功能不全时宜多喝水。每日入液量保持2000~3000ml，以增加尿酸的排出。"]}], "qn": 5}, {"title": "104 肠内营养适应证禁忌证", "items": [{"type": "q", "stem": "1.临床营养支持的选择原则是（ ）", "options": ["A.首选肠外营养", "B.只要胃肠功能允许，尽量采用肠内营养", "C.只要胃肠功能允许，尽量采用肠外营养", "D.无需考虑胃肠功能，尽量采用肠内营养"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P191。", "临床营养支持的基本原则是：对于胃肠道有一定的消化吸收功能者，首选肠内营养的方式，但在肠内营养无法满足机体营养需求时，可用肠外营养补足；如需要大量营养素的补充或希望在较短的时间内改善营养状况时，可选用肠外营养。所以选项B正确。"]}, {"type": "q", "stem": "2.肠内营养适用于（ ）", "options": ["A.活动性上消化道出血", "B.严重吸收不良综合征", "C.完全性器质性肠梗阻", "D.食道癌术后"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1484。", "肠内营养的禁忌证：严重感染、衰竭和休克等；术后消化道麻痹所致肠功能障碍；完全性器质性肠梗阻；活动性消化道出血；高流量小肠瘘；严重腹泻和极度吸收不良时；严重腹腔内感染。"]}, {"type": "q", "stem": "3.肠内营养的英文缩写是（ ）", "options": ["A.PN", "B.EN", "C.TPN", "D.ONS"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1493。", "PN：parenteral nutrition，肠外营养。", "EN：enteral nutrition，肠内营养。", "TPN：total parenteral nutrition，全肠外营养。", "ONS：oral nutritional supplement，口服营养补充。"]}, {"type": "q", "stem": "4.肠内营养适用于（ ）", "options": ["A.严重呼吸衰竭", "B.唇腭裂手术后", "C.严重吸收不良综合征", "D.胃肠道梗阻"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1484。", "肠内营养的禁忌证：严重感染、衰竭和休克等；术后消化道麻痹所致肠功能障碍；完全性器质性肠梗阻；活动性消化道出血；高流量小肠瘘；严重腹泻和极度吸收不良时；严重腹腔内感染。"]}, {"type": "q", "stem": "5.肠内营养适用于（ ）", "options": ["A.脑外伤昏迷", "B.高流量小肠瘘", "C.术后消化道麻痹", "D.胃肠道梗阻"], "answer": "答案：A", "analysis": ["解析：《中国营养科学全书》第2版P1484。", "肠内营养的禁忌证：严重感染、衰竭和休克等；术后消化道麻痹所致肠功能障碍；完全性器质性肠梗阻；活动性消化道出血；高流量小肠瘘；严重腹泻和极度吸收不良时；严重腹腔内感染。"]}], "qn": 5}, {"title": "105 匀浆膳", "items": [{"type": "q", "stem": "[2019RD真题]1.下列关于匀浆膳的描述中，错误的是（  ）", "options": ["A.匀浆不能煮沸", "B.如果是连续滴注，匀浆常温下放置不要超过8小时", "C.匀浆应是液体状的", "D.匀浆必须在严格无菌的环境下制备"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1484。", "如果是连续滴注，匀浆常温下放置不超过6小时。"]}, {"type": "q", "stem": "2.关于匀浆膳的叙述，下列哪项是正确的（ ）", "options": ["A.仅用于昏迷病人", "B.需要胃肠道消化", "C.无渣膳食", "D.只能管饲"], "answer": "答案：B", "analysis": ["解析：《临床营养学》第3版P188。", "匀浆膳属于非要素制剂，需要胃肠道消化 。"]}, {"type": "q", "stem": "3.下列关于匀浆膳的叙述，错误的是（ ）", "options": ["A.制备后的匀浆应该经过过滤", "B.家庭制作的肠内营养膳可用于空肠造口术", "C.每隔4小时用30ml水冲洗喂养管以预防管道阻塞", "D.匀浆膳可以冷藏"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1484。", "家庭制作的肠内营养膳只能用于胃造口术或从胃管喂养，假如喂养管被放置在十二指肠或空肠内，必须选择无菌配方。"]}, {"type": "q", "stem": "4.下列关于家庭自制匀浆膳的叙述，错误的是（ ）", "options": ["A.可根据实际情况调整营养素成分", "B.价格较低、制备方便灵活", "C.性质不稳定，固体成分易于沉降及浓度较高，不易通过细孔径鼻饲管", "D.维生素和矿物质的含量明确"], "answer": "答案：D", "analysis": ["解析：《临床营养学》第3版P188。", "自制匀浆膳的优点在于：①三大营养素及液体量明确；②可根据实际情况调整营养素成分；③价格较低、制备方便灵活。", "缺点在于：①维生素和矿物质的含量不明确或差异较大；②性质不稳定，固体成分易于沉降及浓度较高，不易通过细孔径鼻饲管。"]}, {"type": "q", "stem": "5.下列关于商品匀浆膳的叙述，错误的是（ ）", "options": ["A.无菌、即用的均质液体", "B.成分明确，营养成分容易调整", "C.可通过细孔径鼻饲管", "D.价格较高"], "answer": "答案：B", "analysis": ["解析：《临床营养学》第3版P188。", "商品匀浆膳系无菌、即用的均质液体，其成分明确，可通过细孔径鼻饲管，使用较为方便，缺点是营养成分不易调整，价格较高。"]}], "qn": 5}, {"title": "106 肠内营养制剂", "items": [{"type": "q", "stem": "[2019RD真题]1.某成年男性患者，因突发剧烈腹痛行剖腹探查术，术中发现小肠坏死，切除小肠约5m。术后，该患者应首先选用哪种肠内营养制剂（  ）", "options": ["A.无膳食纤维型整蛋白制剂", "B.膳食纤维型整蛋白制剂", "C.无膳食纤维型短肽制剂", "D.膳食纤维型短肽制剂"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P1592。", "小肠广泛切除术后的前1~2个月，以严重腹泻为主要特征，应无膳食纤维。", "短肽制剂的氮源为蛋白水解后形成的短肽，稍加消化即可完全吸收，无残渣，主要适用于消化肠道吸收功能较差的患者。"]}, {"type": "q", "stem": "2.以下不属于肠内营养制剂的是（ ）", "options": ["A.要素膳", "B.非要素膳", "C.组件膳", "D.流质膳食"], "answer": "答案：D", "analysis": ["解析：《临床营养学》第3版P188。", "按照氮的来源，可将肠内营养制剂分为非要素制剂、要素制剂及组件制剂三大类。"]}, {"type": "q", "stem": "3.以某种或某类营养素为主的肠内营养制剂是（ ）", "options": ["A.要素膳", "B.非要素膳", "C.组件膳", "D.特殊营养膳食"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P1485。", "组件型配方：仅以某种或某类营养素为主的肠内营养制剂，可以作为某些营养素缺乏的补充，满足患者的特殊需求。"]}, {"type": "q", "stem": "4.关于要素膳，描述错误的是（ ）", "options": ["A.营养全面", "B.可直接或接近直接吸收", "C.不含残渣或残渣极少", "D.含乳糖，不适用于乳糖不耐受者"], "answer": "答案：D", "analysis": ["解析：《临床营养学》第3版P188。", "要素膳不含乳糖，适用于乳糖不耐受者。"]}, {"type": "q", "stem": "5.一般来说，氨基酸配方肠内营养制剂，非蛋白氮热能与氮的比值是（ ）", "options": ["A.200：1（kcal：g）", "B.100：1（kcal：g）", "C.150：1（kcal：g）", "D.50:1（kcal：g）"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P1484。", "氨基酸配方是由游离氨基酸、单糖和双糖，以及不同剂量的MCT和（或）必需脂肪酸组成。多数单体配方有以下特点：能量密度为1kcal/ml；含氮浓度约7g/L；非蛋白氮热能与氮的比值是150:1（kcal：g）； 渗 透压较高（500~900mOsmol/L）。"]}], "qn": 5}, {"title": "107 特殊医学用途配方食品", "items": [{"type": "q", "stem": "[2020RD真题]1.据食品安全法规定，以下属于特殊食品的是（  ）①保健食品；②特殊医学用途配方食品③运动营养食品；④婴幼儿配方食品；⑤孕妇及乳母营养食品", "options": ["A.①②③④", "B.①②③④⑤", "C.①②④", "D.①②"], "answer": "答案：C", "analysis": ["解析：国家对保健食品、特殊医学用途配方食品和婴幼儿配方食品等特殊食品实行严格监督管理。"]}, {"type": "q", "stem": "2.关于特殊医学用途配方食品，描述错误的是（ ）", "options": ["A.必须在医生或临床营养师指导下食用", "B.必须单独食用，不能与其他食品配合食用", "C.可满足进食受限、消化吸收障碍等特殊需要", "D.配方是专门加工配制而成的"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1486。", "特殊医学用途配方食品单独食用或与其他食品配合食用。"]}, {"type": "q", "stem": "[2021RD真题]3.某公司计划为一款糖尿病全营养配方产品发布广告，下列选项正确的是（  ）", "options": ["A.邀请明星作为广告代言人代言该产品", "B.在《中华临床营养学杂志》上刊登广告", "C.邀请营养师作为广告代言人推荐该产品", "D.广告中说明该糖尿病全营养配方产品对糖尿病有效率达90%"], "answer": "答案：B", "analysis": ["解析：《中华人民共和国广告法》、《药品、医疗器械、保健食品、特殊医学用途配方食品广告审查管理暂行办法》。", "A错。不得利用广告代言人作推荐、证明。", "B对。特殊医学用途配方食品中的特定全营养配方食品广告只能在国务院卫生行政部门和国务院药品监督管理部门共同指定的医学、药学专业刊物上发布。", "C错。特殊医学用途配方食品广告不得使用科研单位、学术机构、行业协会或者专家、学者、医师、药师、临床营养师、患者等的名义或者形象作推荐、证明。", "D错。不得说明治愈率或者有效率。"]}, {"type": "q", "stem": "[2018RD真题]4.根据GB 29922-2013，在设计适用于10岁以上人群的全营养配方食品时，其所含蛋白质应为（  ）", "options": ["A.≥2g/100kcal，优质蛋白质≥30%", "B.≥2g/100kcal，优质蛋白质≥50%", "C.≥3g/100kcal，优质蛋白质≥30%", "D.≥3g/100kcal，优质蛋白质≥50%"], "answer": "答案：D", "analysis": ["解析：《GB 29922-2013　特殊医学用途配方食品通则》。", "适用于1～10岁人群的全营养配方食品中蛋白质的含量应不低于0.5g/100kJ（2g/100kcal），其中优质蛋白质所占比例不少于50%。", "适用于10岁以上人群的全营养配方食品所含蛋白质的含量应不低于0.7g/100kJ （3g/100kcal），其中优质蛋白质所占比例不少于50%。"]}, {"type": "q", "stem": "5.下列关于特殊医学用途配方食品的描述，错误的是（ ）", "options": ["A.产品可以声称对疾病的预防和治疗功能", "B.产品形态与普通食品相似，食用方便，接受程度高", "C.可满足进食受限、消化吸收障碍等特殊需要", "D.能更好地适应特定疾病状态或疾病某一阶段的营养需求"], "answer": "答案：A", "analysis": ["解析：《中国营养科学全书》第2版P1486。", "特殊医学用途配方食品不是药品，不能替代药物的治疗作用，产品也不得声称对疾病的预防和治疗功能。"]}], "qn": 5}, {"title": "108 肠内营养的途径和方法", "items": [{"type": "q", "stem": "[2020RD真题]1.李某，胃肠功能正常，因鼻咽癌手术放疗后无法吞咽，医生决定采用管饲治疗法，以满足其个体营养需求，宜采用以下哪种方法（  ）", "options": ["A.结肠造口", "B.胃造口", "C.鼻胃管", "D.鼻肠管"], "answer": "答案：B", "analysis": ["解析：《鼻咽癌患者的营养治疗共识》。", "鼻咽癌患者绝大部分在接受放疗过程中会出现明显的黏膜炎、味觉改变、唾液黏稠、恶心及呕吐等不良反应。经鼻放置导管可能会进一步加重上述不良反应；由于鼻咽癌患者放疗期间需要面罩进行固定，经鼻留置导管可能会因操作不慎影响摆位准确性；经鼻放置导管存在一定的误吸风险，且导管偏细，容易发生堵塞。经皮内镜下胃造瘘术（PEG）或空肠造瘘术（PEJ）位置不易变动，较少刺激到头颈部黏膜，使患者有更好的生活质量，且由于胃/空肠造瘘管的直径比鼻饲管大，经管注入的食物和药物更容易通过，不易发生堵塞。故选B。"]}, {"type": "q", "stem": "[2021RD真题]2.张xx，女，69岁。身高159cm，体重48Kg。血压185/90mmHg，脉搏68次/min。因进行性吞咽困难以致无法吞咽口腔分泌物1个月而入院就诊。经诊断为食管反流症、老年痴呆。患者入院后被施行空肠造瘘术，刚开始采用含纤维素的标准型整蛋白肠内营养制剂通过注射器间断性缓慢注入，但出现了胃胀和呕吐症状，因此改为经泵滴注肠内营养液。现体重维持在50kg，血浆白蛋白40g/L，患者要求回家治疗。鉴于该患者的清况，最适宜的家庭肠内营养途径是（  ）", "options": ["A.鼻胃管", "B.鼻十二指肠管", "C.胃造瘘管", "D.空肠造瘘管"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1487、P1491。", "鼻饲置管主要用于短期患者（一般短于6周）。患者家庭肠内营养是一个长期的过程。", "胃造瘘管可能导致反流、吸入性肺炎并发症，不适合该食管反流症患者。"]}, {"type": "q", "stem": "[2018RD真题]3.一位中老年男性入院，初步诊断脑卒中，意识丧失，浅昏迷。经过治疗，20天后依然昏迷，洼田饮水试验V级，营养支持宜用（  ）", "options": ["A.经口营养", "B.鼻饲管营养", "C.经胃或空肠造口", "D.静脉营养"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P1563。", "为了保证患者安全，在无法经口摄食的患者建议在脑卒中早期（最初的7天内）给予鼻胃管饮食，当预期会持续较长时间（>4周）仍不能安全吞咽时，建议放置经皮胃造口导管。"]}, {"type": "q", "stem": "4.重度食管炎营养支持应采用的有效途径为（ ）", "options": ["A.经鼻胃管管饲", "B.经口进食", "C.静脉营养", "D.经直肠营养"], "answer": "答案：A", "analysis": ["解析：《中国营养科学全书》第2版P1487。", "重度食管炎应减少食物对病灶的刺激，故采用经鼻胃管管饲。"]}, {"type": "q", "stem": "5.管饲营养的置管方式，除外（ ）", "options": ["A.经鼻－胃置管", "B.外周静脉置管", "C.鼻－十二指肠", "D.空肠造瘘置管"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1487。", "管饲营养是指对于上消化道通过障碍者，经鼻胃、鼻十二指肠、鼻－空肠置管，或经颈食管、胃、空肠造瘘置管，输注营养制剂的营养支持方法，属肠内营养。外周静脉置管属于肠外营养。"]}], "qn": 5}, {"title": "109 肠内营养输注管理", "items": [{"type": "q", "stem": "1.输注肠内营养液的温度应保持在（ ）", "options": ["A.25℃左右", "B.30℃左右", "C.37℃左右", "D.41℃左右"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P1489。", "输注肠内营养液的温度应保持在37℃左右，过冷的肠内营养液可能引起患者腹泻。"]}, {"type": "q", "stem": "2.以下管饲营养输注方式，用于能够活动或不想连续使用喂养泵的患者的是（ ）", "options": ["A.推注法", "B.夜间输注法", "C.连续输注法", "D.间歇滴注法"], "answer": "答案：A", "analysis": ["解析：《中国营养科学全书》第2版P1489。", "推注法：将—定量的营养液在一定时间内用注射器（容量>50ml）缓慢推注。推注的速度不能快于30ml/min。此种方法多用于能够活动或不想连续使用喂养泵的患者。"]}, {"type": "q", "stem": "3.下列关于管饲营养的叙述，错误的是（ ）", "options": ["A.禁止经喂养管注入药物", "B.在肠内营养刚刚开始的1~3天内，采用低浓度、低剂量、低速度的喂养方式", "C.误吸风险高的老年患者，床头抬高30°~45°的体位，以减少反流误吸的风险", "D.输注系统必须能尽量减少被污染的机会（规范的操作、尽可能减少接口等）"], "answer": "答案：A", "analysis": ["解析：《中国营养科学全书》第2版P1489。", "A错，如要经喂养管注入药物，必须征得药师的许可（以避免喂养管堵塞和药物－营养素的相互作用）。"]}, {"type": "q", "stem": "4.下列关于管饲营养导管冲洗的叙述，错误的是（ ）", "options": ["A.含有膳食纤维的混悬液制剂容易发生堵管", "B.持续输注过程中，应每隔4小时即用20ml 温水脉冲式冲洗导管", "C.蛋白质沉淀导致堵管，可采用胰酶制剂、碳酸氢钠冲洗", "D.尽量将不同药物混在一起输注，减少输注时间"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1489。", "不同药物混在一起可能发生相互作用，造成堵管，故尽量避免混用不同药物。"]}, {"type": "q", "stem": "5.对于采用注射器推注的家庭肠内营养患者，建议单次推注总量控制在（ ）", "options": ["A.300ml以内", "B.250ml以内", "C.200ml以内", "D.150ml以内"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P1489。", "对于采用注射器推注的家庭肠内营养患者，建议缓慢推注，且单次推注总量控制在200ml以内。"]}], "qn": 5}, {"title": "110 肠内营养常见并发症防治", "items": [{"type": "q", "stem": "[2021RD真题]1.某重症患者，入院时意识不清，有气管插管。同时放置鼻胃管。给予肠内营养。次日检查发现该患者胃液残留达250ml。下列给出的处置方法中合理的是（  ）①将床头抬高30~40度，以减少反流误吸的风险；②考虑在肠内营养配方中加入膳食纤维，以促进胃肠蠕动；③考虑给予胃肠动力药；④考虑降低注射速度或改用鼻饲管；⑤停止管饲营养，考虑开始全静脉营养，以降低吸入性肺炎的风险。", "options": ["A.①②④", "B.①④⑤", "C.②③④", "D.①③④"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1490。", "②错。如有便秘，可加膳食纤维。本题患者不适合。", "⑤错。胃肠道有功能，尽量肠内。"]}, {"type": "q", "stem": "2.以下不属于肠内营养并发症的是（ ）", "options": ["A.恶心 、呕吐、腹泻", "B.水电解质平衡紊乱", "C.吸入性肺炎", "D.肠道黏膜萎缩"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1490。", "A对，恶心 、呕吐、腹泻是肠内营养胃肠道并发症。", "B对，水电解质平衡紊乱是肠内营养代谢性并发症。", "C对，吸入性肺炎是肠内营养机械性并发症。", "D错，肠道黏膜萎缩是肠外营养并发症。"]}, {"type": "q", "stem": "[2020RD真题]3.胃癌患者术前进行营养干预数天后进行胃空肠吻合术，术后肠内营养供给量递增至800ml时腹泻，下列改善耐受性措施中，不宜选择的是（  ）", "options": ["A.改换肠内营养剂", "B.减少供给量", "C.减缓输注速度", "D.加水稀释肠内营养液"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1490。", "《中国营养科学全书》第2版P1490。", "A对，比如改用含有可溶性膳食纤维的肠内营养配方。", "B错，减少供给量可导致能量及营养素供给不足。", "C对，减缓输注速度可缓解腹泻。", "D对，加水稀释可降低肠内营养液渗透压，缓解渗透性腹泻。"]}, {"type": "q", "stem": "4.经鼻胃管营养常见的并发症有（ ）", "options": ["A.气胸", "B.吸入性肺炎", "C.电解质紊乱", "D.糖代谢紊乱"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1490。", "经鼻胃管营养受体位的影响，主要由于胃压大、食物反流、误吸造成吸入性肺炎。"]}, {"type": "q", "stem": "5.管饲引起腹泻的原因有（ ）", "options": ["A.灌注速度太慢", "B.乳糖不耐症", "C.营养液温度40℃左右", "D.营养液浓度太低"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1490。", "管饲引起腹泻的原因可以是机体缺乏乳糖酶，导致乳糖不耐症。"]}], "qn": 5}, {"title": "111 肠内营养的监测和评估", "items": [{"type": "q", "stem": "1.放置鼻胃管的危重病者胃底或胃体的允许潴留量应（ ）", "options": ["A.≤300ml/次", "B.≤200ml/次", "C.≤100ml/次", "D.≤50ml/次"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1491。", "胃内喂养开始应定时监测胃残液量，放置鼻胃管的危重病者胃底或胃体的允许潴留量应≤200ml/次。而胃肠造口管的允许潴留量应≤100ml/次。"]}, {"type": "q", "stem": "2.胃肠造口管的危重病者允许潴留量应（ ）", "options": ["A.≤300ml/次", "B.≤200ml/次", "C.≤100ml/次", "D.≤50ml/次"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P1491。", "胃内喂养开始应定时监测胃残液量，放置鼻胃管的危重病者胃底或胃体的允许潴留量应≤200ml/次。而胃肠造口管的允许潴留量应≤100ml/次。"]}, {"type": "q", "stem": "3.肠内营养的监测不包括（ ）", "options": ["A.监测肠内营养制剂的浓度和滴注速度", "B.监测鼻饲管位置", "C.每天测体温、血压，脉搏", "D.胃内喂养开始时，每隔2～4小时检查胃残留物的体积"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P1491。", "体温、血压，脉搏是肠外营养的监测指标。"]}, {"type": "q", "stem": "4.以下属于肠内营养监测的是（）", "options": ["A.血清渗透压", "B.24小时尿钠、尿钾及其他电解质定量", "C.胆囊超声检查", "D.血尿素氮和肌酐"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1491。", "血尿素氮和肌酐是肠内营养监测中代谢方面监测的一种。"]}, {"type": "q", "stem": "5.以下肠内营养监测指标中，需每天监测一次的是（ ）", "options": ["A.血糖", "B.体重", "C.血尿素氮和肌酐", "D.红细胞计数和血红蛋白"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1491。", "A错，血糖每天3次直到稳定后2~3次/周。", "B对，体重每天1次。", "C错，血尿素氮和肌酐1~2次/周。", "D错，红细胞计数和血红蛋白1次/周。"]}], "qn": 5}, {"title": "112 肠外营养的适应证和禁忌证", "items": [{"type": "q", "stem": "[2017RD真题]1.当患者存在下列哪种情况时，不能给予肠外营养（  ）", "options": ["A.营养不良", "B.大面积烧伤", "C.克罗恩病", "D.严重代谢紊乱"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1493。", "在机体存在内环境紊乱的情况下，营养支持治疗非但不能使机体有效利用营养物质，反而可能因增加代谢负荷而加剧代谢和内环境紊乱，导致营养治疗相关的并发症，如水钠潴留、电解质紊乱或再喂养综合征等。"]}, {"type": "q", "stem": "[2020RD真题]2.李某，男，70岁，身高170cm，近期体重下降4kg，目前58kg，近1周饮食摄入量减少25%~50%，偶有呕吐，胃镜检显示幽门肿瘤和幽门管狭窄，病理活检确定为胃癌，目前收住院，拟手术冶疗。实验室检测：电解质、肝肾功正常，血浆白蛋白34g/L，前白蛋白180mg/L，粪便隐血++。术前流质饮食+口服营养补充剂饮食干预后，若3~5天饮食量仅达到目标需要量（  ）时，需进行肠外营养", "options": ["A.50%", "B.60%", "C.70%", "D.80%"], "answer": "答案：B", "analysis": ["解析：《肿瘤营养治疗通则》。", "营养不良的五阶梯治疗模式：首先选择营养教育，然后依次向上晋级选择ONS、完全肠内营养（TEN）、部分肠外营养（PPN）、全肠外营养（TPN）。参照ESPEN 指南建议，当下一阶梯不能满足60% 目标能量需求3~5 天时，应该选择上一阶梯。"]}, {"type": "q", "stem": "[2021RD真题]3.女，29岁，160cm， 26.5kg， 前两年开始减肥，体重下降，消瘦2年，近来为继续追求体重下降，拒绝进食，近来拒食，入院，体检皮肤菲薄，全身肌肉明显萎缩，腹部凹陷，腹水，骨质疏松，排除结核，肿瘤，诊断为神经性厌食，营养不良性肝损伤。", "options": ["A.每日能量提供2200~2500kcal，5~6餐，持续3天", "B.每日能量提供1400~1500kcal，5~6餐，持续2周", "C.肠外＋肠内营养，持续2周", "D.全肠外营养支持，持续1周", "A.食管胃肠道先天畸形", "B.长期腹泻", "C.可以经口进食的烧伤患者", "D.急性重症胰腺炎"], "answer": "答案：C", "analysis": ["下列营养支持方案合适的是（  ）", "解析：《中国营养科学全书》第2版P1671。", "营养治疗主要以经口进食的方式实现营养重建，至少要经历三个阶段－稳定阶段、恢复阶段、巩固维持阶段。", "稳定阶段的营养方案本阶段的目标是纠正患者脱水、水电解质紊乱，稳定生命体征。本阶段应保证患者每日能量摄入在1400~1500kcal，建议分5~6餐完成。稳定阶段持续时间可在2~4周。", "在神经性厌食症营养治疗中，肠内营养只是用于严重病例及抢救生命的短期治疗方法。", "应该尽一切可能地避免肠外营养。", "4.肠外营养支持不适用于（ ）", "解析：《中国营养科学全书》第2版P1493。", "可以经口进食的烧伤患者应该优先考虑使用肠内营养。"]}, {"type": "q", "stem": "5.完全肠梗阻患者应采用的营养支持方式是（ ）", "options": ["A.普通膳食", "B.软食", "C.半流质", "D.静脉营养"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1493。", "静脉营养就是肠外营养，完全肠梗阻是肠内营养的禁忌证，须使用肠外营养治疗。"]}], "qn": 4}, {"title": "113 肠外营养制剂及其应用", "items": [{"type": "q", "stem": "[2019RD真题]1.若给急性肠梗阻患者采用肠外营养，其配方中不应考虑给予的液体是（  ）", "options": ["A.10%葡萄糖", "B.10%脂肪乳", "C.20%甘露醇", "D.8.5%复方氨基酸液"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P1493、P1494。", "肠外营养制剂包括经静脉用的复方氨基酸溶液、葡萄糖溶液、脂肪乳剂、水溶性和脂溶性维生素、矿物质等。", "20%甘露醇属于高渗溶液，有脱水作用，如用于颅脑外伤或者是脑水肿降低颅压。"]}, {"type": "q", "stem": "[2021RD真题]2.下列有关肠外营养制剂组方中添加物的描述中，错误的是（  ）", "options": ["A.肉碱（Carnitine）有利于氨基酸的平衡", "B.谷氨酰胺可提供小肠和免疫细胞能量", "C.中链脂肪（MCTs）可快速氧化，提供能量", "D.牛磺酸（Taurine）有助于降低氧化压力"], "answer": "答案：A", "analysis": ["解析：《中国营养科学全书》第2版P1494。", "长链脂肪酸需依赖肉碱（Carnitine）作为载体进入线粒体氧化代谢和供能。"]}, {"type": "q", "stem": "[2017RD真题]3.临床常用的脂肪乳剂中通常不包括下列哪种成分（  ）", "options": ["A.大豆油", "B.菜籽油", "C.橄榄油", "D.深海鱼油"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1494。", "临床常用的脂肪乳剂（ IVFE ）种类：第一代IVFE为大豆油脂肪乳剂。", "第二代IVFE由大豆油与椰子油/棕榈油中的长链/中链脂肪酸（LCT/MCT） 混合的脂肪乳剂。", "第三代IVFE为橄榄油与大豆油混合的脂肪乳剂。", "第四代IVFE包括由单一鱼油和鱼油与前几代IVFE中的一种或多种植物油混合的脂肪乳剂。"]}, {"type": "q", "stem": "4.在肠外营养支持中，对使用谷氨酰胺制剂的优点表述错误的是（ ）", "options": ["A.能保护肠黏膜屏障功能", "B.在药理剂量作用下可促进胰岛素的分泌", "C.缓解应激时谷氨酰胺水平的下降", "D.改善机体代谢、氮平衡"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1495。", "谷氨酰胺能缓解应激时谷氨酰胺水平的下降，改善机体代谢、氮平衡；谷氨酰胺是肠黏膜细胞和各种快速生长、分化细胞（如淋巴细胞）的主要能源，能促进肌肉蛋白质的合成，因此能保护肠黏膜屏障功能，改善机体免疫状况，但不能促进胰岛素的分泌。"]}, {"type": "q", "stem": "5.属于肠外营养制剂的是（ ）", "options": ["A.要素膳", "B.蛋白质组件", "C.脂肪乳剂", "D.匀浆膳"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P1494。", "要素膳是要素型肠内营养制剂，蛋白质组件属于组件型肠内营养制剂，匀浆膳属于非要素型肠内营养制剂，先天性氨基酸代谢缺陷症膳属于特殊应用型肠内营养制剂；脂肪乳剂属于肠外营养制剂，因此选择C项。"]}], "qn": 5}, {"title": "114 肠外营养处方构成要素", "items": [{"type": "q", "stem": "[2017RD真题]1.长期行全肠外营养（TPN）治疗的患者，应予补充微量元素。其中最常见缺乏的微量元素是（  ）", "options": ["A.碘", "B.铜", "C.锌", "D.铬"], "answer": "答案：C", "analysis": ["解析：禁食超过1个月者，可出现微量元素缺乏，最常见的是锌缺乏，其次是铜缺乏和铬缺乏。", "因为人体内锌的储备量很少，锌的耗竭时间短，肠外营养支持时如果不能足量补充锌，患者很快就会出现锌缺乏，导致皮炎、伤口愈合困难等临床表现。再加之患者原发性疾病的影响，锌的需要量和丢失量也都有不同程度增加，因此肠外营养支持时要给予患者生理需要量之外的锌供应。"]}, {"type": "q", "stem": "2.下列不属于肠外营养的营养物质是（ ）", "options": ["A.葡萄糖", "B.氨基酸", "C.整蛋白", "D.维生素"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P1496。", "肠外营养制剂没有统一配方，应根据病人的年龄、性别、体重或体表面积以及病情需要等制备。肠外营养制剂的组成成分包括蛋白质（氨基酸）、脂肪、糖类、维生素、微量元素、电解质和水等。要求无菌、无毒、无热源，具有适宜的渗透压和pH，良好的相容性、稳定性。"]}, {"type": "q", "stem": "3.临床判断患者实际能量消耗的金标准是（ ）", "options": ["A.直接测热法", "B.间接测热法", "C.双标水法", "D.心率监测联合运动感应器法"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1495。", "间接能量测定系利用间接能量测定仪测得人体的实际能量消耗。其基本原理是测定人体在一定时间内的O2消耗量和CO2的产生量，由此推算呼吸商，根据相应的氧热价间接计箕出该段时间内人体的实际能量消耗。间接能量测定作为临床判断患者实际能量消耗和营养素利用情况的金标准，已被多国的肠外肠内营养指南推荐。"]}, {"type": "q", "stem": "4.临床上，常用Harris-Benedict公式计算患者能量消耗，其公式为（ ）", "options": ["A.AEE =BEE×活动系数（AF）×损伤应激系数（IF） ×体温系数（TF）", "B.AEE =BEE×活动系数（AF）×损伤应激系数（IF）", "C.AEE =BEE×活动系数（AF）×体温系数（TF）", "D.AEE =BEE×损伤应激系数（IF） ×体温系数（TF）"], "answer": "答案：A", "analysis": ["解析：《中国营养科学全书》第2版P1495。", "基础能量消耗（BEE)是指机体维持正常生理功能和内环境稳定及交感神经系统活动所消耗的能量。", "实际能量消耗（AEE） =BEE×活动系数（AF）×损伤应激系数（IF） ×体温系数（TF）。"]}, {"type": "q", "stem": "[2021RD真题]5.为某急性肠梗阻患者注射肠外营养剂，营养剂的氮（g）：非蛋白质能量（kcal）=1：150，那么该制剂中的蛋白质含量（  ）", "options": ["A.20%", "B.16.7%", "C.14.3%", "D.25%"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P1496。", "肠外营养制剂总能量由葡萄糖、脂肪和氨基酸构成。", "假设营养制剂中，氮为1g，则蛋白质为6.25g蛋白质供能为6.25×4kcal=25kcal，非蛋白质供能为1×150=150kcal总能量为150+25=175kcal，蛋白质供能比为25/175×100%=14.3%。"]}], "qn": 5}, {"title": "115 全营养混合液配置和稳定性", "items": [{"type": "q", "stem": "[2017RD真题]1.在配制静脉营养液时，微量元素可以先加入到哪种液体中（  ）①脂肪乳剂；②氨基酸；③葡萄糖；④注射用水；⑤维生素", "options": ["A.①②", "B.①⑤", "C.②③", "D.②④"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P1497。《规范肠外营养液配制》。", "肠外营养液的配制顺序：①将磷酸盐加入氨基酸或高浓度葡萄糖中；②将其他电解质、微量元素加入葡萄糖液（或氨基酸）中；③用脂溶性维生素溶解水溶性维生素后加入脂肪乳剂中；④将氨基酸先加入三升袋内，后将葡萄糖等液体加入三升袋内混合；⑤将含钙盐的溶液加入三升袋内混合；⑥目视检查三升袋内有无浑浊、异物、变色以及沉淀生成；⑦完成上述操作后，将脂肪乳剂加入三升袋中；⑧应一次性不间断地完成配制操作，并不断轻摇三升袋，使其混合均匀。配制完毕后，尽可能排净袋中空气，悬挂以观察是否出现开裂、渗漏、沉淀、异物、变色等异常情况；⑨配制完成的营养液配方用标签表明，包括总容量、成分、建议输注时间和有效期等。"]}, {"type": "q", "stem": "2.全静脉营养液配制过程中，不正确的操作是（ ）", "options": ["A.电解质与微量元素能直接加入脂肪乳剂内", "B.胰岛素在混合营养液中稳定，可与各种静脉营养制剂配伍混合", "C.磷制剂与钙制剂未经充分溶解不能直接混合", "D.应含有足量的氨基酸溶液"], "answer": "答案：A", "analysis": ["解析：《中国营养科学全书》第2版P1497。《规范肠外营养液配制》。", "电解质与微量元素不能直接加入脂肪乳剂内，以免影响营养液的稳定性。"]}, {"type": "q", "stem": "3.关于配制肠外营养液说法错误的是（ ）", "options": ["A.磷酸钾盐与葡萄糖酸钙配伍易产生沉淀", "B.钙剂和磷酸盐应分别加在不同的溶液内稀释，以免出现沉淀", "C.混合营养液中的氨基酸浓度不可小于2.5%", "D.选用葡萄糖酸钙比选用氯化钙更易与磷酸盐作用产生磷酸盐沉淀"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1497。《规范肠外营养液配制》。", "氯化钙比葡萄糖酸钙更易离解，故选用氯化钙比选用葡萄糖酸钙更易与磷酸盐作用产生磷酸盐沉淀，故D选项说法错误。"]}, {"type": "q", "stem": "4.关于全静脉营养液的混合标准，下列描述错误的是（ ）", "options": ["A.葡萄糖的最终浓度为10%～23%", "B.总容量应≥1.5L", "C.葡萄糖量不应少于氨基酸量", "D.氨基酸、葡萄糖、脂肪乳剂的容量比为2:1:1或1:1:1或2:1:0.5"], "answer": "答案：", "analysis": ["解析：《中国营养科学全书》第2版P1497。《规范肠外营养液配制》。", "氨基酸分子可吸附在油水界面上，其缓冲作用可减轻葡萄糖溶液降低脂肪乳剂稳定性的有害作用。因此为了维持全静脉营养液的稳定性，氨基酸量不应少于葡萄糖量，C选项表述正好相反。"]}, {"type": "q", "stem": "[2017RD真题]5.设计静脉营养配方时，阳离子在配方中的浓度会影响到营养液的稳定性。下列描述中，正确的是（  ）①钾和钠离子总和小于150mmol/L；②镁离子浓度小于3.4mmol/L；③钙离子浓度小于3.4mmol/L；④镁离子浓度小于1.7mmol/L", "options": ["A.①②", "B.①③", "C.①④", "D.③④"], "answer": "答案：A", "analysis": ["解析：全合一营养液中电解质阳离子达一定浓度时，即可中和脂粒表面的负电荷，减除其相互间的排斥力，促使脂粒凝聚。阳离子的离子价越高，中和负电荷的能力越强，越容易促使脂粒凝聚。当Na+为100mmol/L，K+为50mmol/L时，将导致脂肪乳剂丧失稳定性；Ca2+为1.7mmol/L时，Mg2+为3.4mmol/L时，可引起沉淀；三价阳离子的作用较二价阳离子更强。"]}], "qn": 5}, {"title": "116 肠外营养输注方式和静脉通路", "items": [{"type": "q", "stem": "[2021RD真题]1.男性，18岁，172cm，62kg。腹痛腹泻一月有余，服用肠胃药无改善。1周前腹痛加重，量体温38 ℃，早起剧烈呕吐，少量黑便。到医院急诊，拍X光诊断为急性肠梗阻。入院当天应当（  ）", "options": ["A.软食", "B.中心静脉输注", "C.禁食+周围静脉输注", "D.鼻胃管流食"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P1484、P1497。", "急性肠梗阻应禁食，也是肠内营养的禁忌证。", "外周静脉输注适用于短期（<2周） PN。"]}, {"type": "q", "stem": "[2018RD真题]2.不易产生静脉炎和形成静脉血栓的肠外营养输入路径是（  ）", "options": ["A.上腔静脉", "B.外周静脉", "C.肠系膜静脉", "D.门静脉"], "answer": "答案：A", "analysis": ["解析：《中国营养科学全书》第2版P1497。", "上腔静脉管径和血流量大，不易产生静脉炎和形成静脉血栓。"]}, {"type": "q", "stem": "3.在肠外营养中，外周静脉输入途径的优点是（ ）", "options": ["A.对渗透压的耐受性好", "B.输人的液体对血管壁产生的刺激小", "C.输入营养液的速度快", "D.安全性高，并发症少而轻", "A、B、C项是中心静脉输入途径的优点，D是外周静脉输入途径的优点。"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1497。"]}, {"type": "q", "stem": "4.对肠外营养液持续性输注法的表述，错误的是（ ）", "options": ["A.采用此法时胰岛素的分泌较平稳", "B.采用此法对机体内环境的影响较小", "C.采用此法时血糖值较平稳", "D.采用此法时常出现高钠血症"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1497。", "持续性输注对机体氮源、能量及其他营养物质的供给处于持续状态，因此胰岛素的分泌和血糖值较平稳，对机体内环境的影响较小；且持续性输注时，胰岛素的分泌保持在高水平状态，阻止了脂肪分解，促进脂肪合成，并使葡萄糖以糖原形式储存在肝脏，常出现脂肪肝和肝大，故D项说法错误。"]}, {"type": "q", "stem": "5.外周静脉营养的优点是（ ）", "options": ["A.便于临床观察，可早期发现插管处静脉炎征象并做及时处理", "B.对输注液体的浓度和酸碱度的限制小", "C.能量大限度地按机体的需要以较大幅度调整输入液体的量、浓度", "D.输入的液体可很快被稀释而不致对血管壁刺激，不易产生静脉炎"], "answer": "答案：A", "analysis": ["解析：《中国营养科学全书》第2版P1497。", "选项B、C、D均是中心静脉营养的优点，只有选项A是外周静脉营养的优点。"]}], "qn": 5}, {"title": "117 肠外营养监测和管理", "items": [{"type": "q", "stem": "1.属于肠外营养监测的是（ ）", "options": ["A.胃肠道耐受性监测", "B.肝功能实验", "C.喂养管位置监测", "D.喂养管阻塞监测"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1498。", "肝损害是肠外营养实施中常见的并发症，所以肝功能实验是肠外营养监测的一个主要内容，因此正确答案为B。"]}, {"type": "q", "stem": "2.对于接受肠外营养肝胆系统是否受损，是否有代谢性骨病，常需监测患者的（ ）", "options": ["A.血清维生素和微量元素浓度", "B.肝胆超声检查和骨密度检测", "C.尿3-甲基组氨酸测定", "D.血清渗透压"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1498。", "肝胆超声检查和骨密度检测可以及时了解肝胆系统是否受损，是否存在代谢性骨病，选B。"]}, {"type": "q", "stem": "3.肠外营养的特殊监测指标中，衡量机体蛋白质水平的灵敏指标是（ ）", "options": ["A.血清维生素和微量元素浓度", "B.肝胆超声检查和骨密度检测", "C.尿3-甲基组氨酸测定", "D.肌酐身高指数"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1498。", "肌酐身高指数是衡量机体蛋白质水平的灵敏指标，选D。"]}, {"type": "q", "stem": "4.对于接受肠外营养的危重患者，为及时调整治疗措施，常需监测患者的（ ）", "options": ["A.血清维生素和微量元素浓度", "B.肝胆超声检查和骨密度检测", "C.尿3-甲基组氨酸测定", "D.血清渗透压"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1498。", "如疑有血液高渗情况，应及时测定血清渗透压，方便及时调整治疗措施，选D。"]}, {"type": "q", "stem": "5.不属于肠外营养监测的是（ ）", "options": ["A.记录24小时出入水量", "B.定期测定血清电解质", "C.定期测定血尿素氮和血糖", "D.定期测定胃肠道耐受性"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1498。", "定期测定胃肠道耐受性是肠内营养特有的监控内容，其余3项都属于肠外营养监控范围，因此正确答案为D。"]}], "qn": 5}, {"title": "118 肠外营养机械性并发症", "items": [{"type": "q", "stem": "1.肠外营养支持常见的机械性并发症是（ ）", "options": ["A.气胸、血胸", "B.恶心呕吐", "C.电解质紊乱", "D.糖代谢紊乱"], "answer": "答案：A", "analysis": ["解析：《中国营养科学全书》第2版P1498。", "肠外营养支持常见的并发症包括机械性并发症（气胸、血胸）、感染性并发症、代谢性并发症、肠外营养相关性肝病。"]}, {"type": "q", "stem": "2.以下不属于肠外营养机械性并发症的是（ ）", "options": ["A.气胸", "B.血管损伤", "C.胸导管损伤", "D.糖代谢紊乱", "A、B、C项都属于肠外营养机械性并发症，D属于肠外营养代谢性并发症。"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1498。"]}, {"type": "q", "stem": "3.下列关于肠外营养机械性并发症的描述，错误的是（ ）", "options": ["A.气胸多发生于锁骨下静脉穿刺时", "B.空气栓塞少见。多为瞬间发生，且后果严重", "C.血管损伤主要与在同一个部位反复穿刺有关", "D.胸导管损伤多为右侧锁骨下静脉穿刺时误伤所致"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1499。", "胸导管损伤多为左侧锁骨下静脉穿刺时误伤所致。"]}, {"type": "q", "stem": "4.为预防血栓性浅静脉炎的发生，TNA的渗透压以（）为宜", "options": ["A.<900mOsm/L", "B.>900mOsm/L", "C.<1200mOsm/L", "D.>1200mOsm/L"], "answer": "答案：A", "analysis": ["解析：《中国营养科学全书》第2版P1499。", "TNA的渗透压以<900mOsm/L为宜。"]}, {"type": "q", "stem": "5.属于肠外营养机械性并发症的是（ ）", "options": ["A.导管阻塞", "B.导管内血栓形成", "C.吸入性肺炎", "D.腹痛、腹泻", "A、C选项是肠内营养机械性并发症；D选项是肠内营养胃肠道并发症；B选项是肠外营养机械性并发症。"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1499。"]}], "qn": 5}, {"title": "119 肠外营养感染性并发症", "items": [{"type": "q", "stem": "1.肠外营养支持最严重的感染性并发症是（ ）", "options": ["A.肠源性感染", "B.穿刺部位感染", "C.导管相关血流感染", "D.导管阻塞"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P1499。", "导管相关血流感染多见于长期PN和HPN的患者，是PN治疗时最为严重的并发症，不仅增加医疗费用，更危及生命；需极为重视和加强预防。"]}, {"type": "q", "stem": "2.下列关于肠外营养感染性并发症的描述中，错误的是（ ）", "options": ["A.穿刺部位感染多与穿刺置管时的无菌操作和置管后的局部护理有关", "B.穿刺部位感染，禁止用抗生素", "C.若留置深静脉导管的患者出现临床难以解释的发热、寒战或伴精神萎靡，反应淡漠或烦躁不安，甚至休克，即应考虑导管相关血流感染", "D.与PN相关的感染性并发症通常严重甚至危及生命"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1499。", "穿刺部位感染，必要时考虑全身性应用抗生素，以避免成为全身性感染的原发灶。"]}, {"type": "q", "stem": "3.下列关于肠外营养肠源性感染性并发症的描述中，错误的是（ ）", "options": ["A.多见于短期TPN患者", "B.患者肠腔内细菌易位，甚至并发肠源性的全身性感染", "C.肠源性感染的方式较为隐匿", "D.提倡首选肠内营养或在PN时尽可能增加经口摄入或EN，可预防肠源性感染性并发症"], "answer": "答案：A", "analysis": ["解析：《中国营养科学全书》第2版P1499。", "肠外营养肠源性感染性并发症多见于长期TPN患者。"]}, {"type": "q", "stem": "4.下列不属于肠外营养感染性并发症的是（ ）", "options": ["A.肠源性感染", "B.穿刺部位感染", "C.导管相关血流感染", "D.血栓性浅静脉炎", "A、B、C项都属于肠外营养感染性并发症，D是肠外营养机械性并发症。"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1499。"]}, {"type": "q", "stem": "5.下列关于肠外营养导管相关性感染防治的描述中，错误的是（ ）", "options": ["A.严格按无菌技术要求穿刺置管", "B.需长期PN者，最好选择周围静脉置管", "C.采用TNA方式输注，输液管路上应用合适的滤器", "D.如果导管或血液培养呈阳性，则根据相关微生物的敏感性选择合适的抗生素"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1499。", "需长期PN者，最好选择隧道式中心静脉置管；有气管切开者应避开锁骨上区置管，可选择PICC。"]}], "qn": 5}, {"title": "120 肠外营养代谢性并发症", "items": [{"type": "q", "stem": "1.下列不属于肠外营养代谢性并发症的是（ ）", "options": ["A.高血糖", "B.脂肪超载综合症", "C.PNALD", "D.腹泻", "A、B、C项都属于肠外营养代谢性并发症，D是肠内营养胃肠道并发症。"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1500。"]}, {"type": "q", "stem": "2.下列关于肠外营养代谢性并发症的描述中，错误的是（ ）", "options": ["A.宜优选TNA方式输注，预防高血糖或低血糖", "B.一旦发生高渗性高血糖非酮症昏迷，应立即停输葡萄糖溶液或含有葡萄糖的营养液", "C.有高甘油三酯血症者需限制脂肪乳剂的剂量或禁用", "D.抗氧化剂治疗PNALD的无选择"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1500。", "氧化应激被认为是导致肝细胞损伤和凋亡的大“冲击”。", "抗氧化剂被认为是治疗PNALD的一种选择。", "脂肪乳剂的选择及其中维生素E的含量也是一个重要因素。"]}, {"type": "q", "stem": "3.下列关于预防PNALD的描述中，错误的是（ ）", "options": ["A.减少禁食时间，尽早恢复饮食或EN", "B.控制脂肪剂量不超过1.5g/(kg·d)", "C.采用循环输注方式", "D.加强PN期间的监测和管理"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1500。", "根据个体患者的血脂、血糖水平和肝功能等合理配置PN的糖脂比和热氮比；选用合适的脂肪乳剂；控制脂肪剂量不超过1.0g/(kg·d)。"]}, {"type": "q", "stem": "4.下列不属于肠外营养代谢性并发症的是（ ）", "options": ["A.气胸", "B.PNALD", "C.高甘油三脂血症", "D.低血糖"], "answer": "答案：A", "analysis": ["解析：《中国营养科学全书》第2版P1500。", "A是肠外营养机械性并发症，B、C、D项都属于肠外营养代谢性并发症。"]}, {"type": "q", "stem": "5.下列关于PNALD的描述中，错误的是（ ）", "options": ["A.PNALD即肠外营养相关性肝病", "B.多见于长期PN治疗的肠衰竭/短肠综合征婴幼儿和成人", "C.用大豆油脂肪乳替代PN配方中的鱼油脂肪乳部分在预防和逆转PNALD的过程中起重要作用", "D.终末期PNALD患者可考虑器官移植"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P1500。", "用鱼油脂肪乳替代PN配方中的部分大豆油脂肪乳在预防和逆转PNALD的过程中起重要作用。此可能与鱼油脂肪乳富含n-3多不饱和脂肪酸，不含植物固醇，有助于下调促炎反应或平衡n-6多不饱和脂肪酸的促炎作用和较多的抗氧化作用有关。"]}], "qn": 5}, {"title": "121 再喂养综合征", "items": [{"type": "q", "stem": "[2020RD真题]1.为避免出现再喂养综合征早期应补充哪些营养素（  ）", "options": ["A.钾钙磷", "B.钙磷镁", "C.钾磷镁", "D.钾钠镁"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P1501。", "再喂养时合成代谢增强，血浆磷、镁和钾离子不断向细胞内转移，若无外源性摄入或补充则致细胞外（血浆）水平快速下降而不能维持机体正常的代谢所需，遂出现水、电解质紊乱和代谢异常。"]}, {"type": "q", "stem": "[2021RD真题]2.下列疾病中，当患者经静脉营养支持治疗出现再喂养综合征后可继发（  ）", "options": ["A.坏血病", "B.wernicke脑病", "C.夜盲症", "D.甲状腺肿大"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1501。", "再喂养后，随着葡萄糖供给和氧化代谢增强，对维生素B1的需求相应增加，若未及时补充，容易出现维生素B1缺乏，甚至Wernicke脑病。"]}, {"type": "q", "stem": "3.再喂养综合征常见的临床表现不包括（ ）", "options": ["A.低磷血症", "B.低镁血症", "C.低钾血症", "D.低钠血症"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P1501。", "再喂养综合征出现的电解质紊乱相关的症状包括：低磷血症、低镁血症、低钾血症。"]}, {"type"
