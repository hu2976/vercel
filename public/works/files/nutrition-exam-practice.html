始人之一；④2025年是中国营养学会成立80周年；⑤1962年中国营养学会发布首个居民膳食指南。", "options": ["A.①④", "B.③⑤", "C.②⑤", "D.③④"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P3-P4。", "①错，《饮膳正要》是元朝忽思慧所著，非战国时期。", "②错，“五谷为养、五果为助、五畜为益、五菜为充”出自《黄帝内经·素问》。", "③对，吴宪是中国现代营养学的奠基人，是中国营养学会和《营养学报》的创始人之一。", "④正，中国营养学会成立于1945年，2025年恰逢学会成立80周年。", "⑤错，中国营养学会于1989年发布了我国第一个居民膳食指南，而非1962年。"]}], "qn": 5}, {"title": "2 营养学基础概述", "items": [{"type": "q", "stem": "[2017RD真题]1.下列针对个体应用DRIs进行评价和计划膳食的描述中，不正确的是（  ）", "options": ["A.EAR：用以估计日常摄入量不足的概率", "B.RNI：日常摄入量达到或超过此水平则摄入不足的概率为0", "C.AI：日常摄入量达到或超过此水平则摄入不足的概率很低", "D.UL：日常摄入量超过此水平可能面临健康风险"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P15。", "膳食营养素推荐摄入量（RNI）指可满足某一特定性别、年龄及生理状况群体97%~98%个体需要量的摄入水平。一个群体的平均摄入量达到RNI水平时，人群中有缺乏可能的个体仅占2%~3%，也就是绝大多数（而不是全部）的个体都没有发生缺乏症的危险。"]}, {"type": "q", "stem": "[2018RD真题]2.某营养素的EAR为500mg，标准差为150，该营养素RNI为（  ）", "options": ["A.550mg", "B.600mg", "C.650mg", "D.800mg"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P16。", "如果已知某种营养素的EAR及其标准差，则其RNI值为EAR加两个标准差，即RNI=EAR+2SD=500+2×150=800mg。"]}, {"type": "q", "stem": "[2021DTR真题]3.下列DRIs指标中，通过膳食调查摄入营养素中位数获得的是（  ）", "options": ["A.RNI", "B.UL", "C.AI", "D.EAR"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P162。", "当人群营养素需要量呈偏态分布时，可以将数据转换成正态分布，利用转换后的数据计算，用百分位数P50来估算EAR。"]}, {"type": "q", "stem": "[2019RD真题]4.体重70kg的成年男性，体内含有多少公斤水分（ ）", "options": ["A.56", "B.42", "C.28", "D.14"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P14。", "成年人体内的水分大约占体重的60%。"]}, {"type": "q", "stem": "[2022DTR真题]5.下列关于宏量营养素的描述，正确的是（ ）", "options": ["A.人体对宏量营养素的需要量每天都大于100g", "B.宏量营养素也称产能营养素", "C.人体宏量营养素包括蛋白质、脂肪、碳水化合物和常量元素", "D.宏量营养素人体含量都占体重20%以上"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P14。", "人体对宏量营养素需要量较大，包括碳水化合物、脂类和蛋白质，这三种营养素经体内氧化可以释放能量，又称为产能营养素。"]}], "qn": 5}, {"title": "3 蛋白质（上）", "items": [{"type": "q", "stem": "[2017RD真题]1.正氮平衡最常见于下列哪类人群（  ）", "options": ["A.孕妇", "B.消耗性疾病患者", "C.健康成年男性", "D.宇航员"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P23。", "B=I- ( U+F+S)B：氮平衡；I：摄入量；U：尿氮；F：粪氮；S：皮肤等氮损失"]}, {"type": "q", "stem": "[2021RD真题]2.下列对蛋白质消化吸收过程中描述正确的是（  ）", "options": ["A.蛋白质必须水解成氨基酸才能被小肠吸收", "B.丝氨酸、甘氨酸、组氨酸、蛋氨酸代谢过程可产生一碳单位", "C.胃蛋白酶对乳中的酪蛋白有凝乳作用，对婴儿有重要意义", "D.蛋白质消化从口腔开始，主要在小肠进行"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P22。《中国营养科学全书》第2版P45。", "A错。少数蛋白质大分子和多肽也能被小肠吸收。", "B错。能生成一碳单位的氨基酸有：丝氨酸、色氨酸、组氨酸、甘氨酸。", "C对。胃蛋白酶对乳中的酪蛋白有凝乳作用，这对婴儿较为重要，因为乳液疑成乳块后在胃中停留时间延长，有利于充分消化。", "D错。蛋白质消化从胃开始。"]}, {"type": "q", "stem": "[2018DTR真题]3.下列哪种氨基酸仅为婴儿必需氨基酸（ ）", "options": ["A.组氨酸", "B.色氨酸", "C.亮氨酸", "D.蛋氨酸"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P19。", "人体必需氨基酸为亮氨酸、异亮氨酸、赖氨酸、蛋氨酸、苯丙氨酸、苏氨酸、色氨酸，缬氨酸、组氨酸，其中组氨酸仅为婴儿必需氨基酸。", "巧记：婴儿是家里的小祖（组）宗。"]}, {"type": "q", "stem": "[2019DTR真题]4.下列氨基酸组合中，全部属于必需氨基酸的是（ ）", "options": ["A.亮氨酸、精氨酸、缬氨酸、苏氨酸", "B.缬氨酸、酪氨酸、苯丙氨酸、蛋氨酸", "C.苯丙氨酸、赖氨酸、亮氨酸、异亮氨酸", "D.苏氨酸、半胱氨酸、精氨酸、组氨酸"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P19。", "构成人体蛋白质的氨基酸有20种，其中9种氨基酸为必需氨基酸，即异亮氨酸、亮氨酸、赖氨酸、蛋氨酸、苯丙氨酸、苏氨酸、色氨酸、缬氨酸和组氨酸。"]}, {"type": "q", "stem": "[2019DTR真题]5.下列关于蛋白质生理功能描述中，错误的是（ ）", "options": ["A.是构成机体组织，器官的重要成分", "B.供给能量", "C.构成体内各种重要的生理活性物质，调节生理功能", "D.抗生酮作用"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P43。", "脂肪在体内分解代谢，需要葡萄糖的协同作用。当膳食中碳水化合物供应不足时，食物脂肪或体内脂肪被动员并加速分解为脂肪酸来供应能量。这一代谢过程中，由于草酰乙酸不足，脂肪酸不能彻底氧化而产生过多的酮体，酮体不能及时被氧化而在体内蓄积，以致产生酮血症和酮尿症。膳食中充足的碳水化合物可以防止上述现象的发生，因此称为碳水化合物的抗生酮作用。"]}], "qn": 5}, {"title": "4 蛋白质（下）", "items": [{"type": "q", "stem": "[2020RD真题]1.下列关于食物蛋白质营养评价的描述中，错误的是（  ）", "options": ["A.进行蛋白质真消化率测定时，需要考虑粪代谢氮", "B.蛋白质功效比值和生物价都是评价蛋白质利用率的方法", "C.氨基酸评分仅考虑蛋白质氨基酸组成，未考虑蛋白质消化率", "D.蛋白质净利用率=蛋白质功效比值×消化率"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P25。", "蛋白质净利用率=生物价×消化率"]}, {"type": "q", "stem": "[2020RD真题]2.为评价某食物蛋白质营养价值，进行大鼠喂食氮代谢实验，测定结果如下，摄入氮450g，粪氮22g，粪内源氮4g，尿氮235g，尿内源氮12g。该食物蛋白质的生物价（%）是（  ）", "options": ["A.96", "B.46", "C.52", "D.48"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P24。", "吸收氮 = 摄入氮 -（粪氮 - 粪内源氮）= 450 -（22-4）= 432储留氮 = 吸收氮 -（尿氮 - 尿内源氮）= 432 -（235-12）= 209生物价（%） = 储留氮/吸收氮×100% = 209/432 ×100% = 48%"]}, {"type": "q", "stem": "[2018RD真题]3.按照公式[食物氮-（粪氮-粪代谢氮）]÷食物氮×100%，计算出来的是（  ）", "options": ["A.蛋白质真消化率", "B.蛋白质表观消化率", "C.蛋白质净利用率", "D.生物价"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P24。"]}, {"type": "q", "stem": "[2018RD真题]4.下列血清蛋白中，常用于评估人体蛋白质营养状况的是（  ）①白蛋白；②运铁蛋白；③血红蛋白；④视黄醇结合蛋白；⑤前白蛋白。", "options": ["A.①②③④⑤", "B.①⑤", "C.①③⑤", "D.①②④⑤"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P28。"]}, {"type": "q", "stem": "[2017RD真题]5.某男性患者在营养门诊进行体格测量，身高175cm，体重90kg，腰围98cm，臀围101cm，上臂周长339mm，肱三头肌皮褶厚度19.5mm。该患者的上臂肌围值是多少（  ）", "options": ["A.31.95cm", "B.29.95cm", "C.27.78cm", "D.25.78cm"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P28。", "上臂肌围（arm muscle circumference ，AMC）上臂周长（arm circurnference，AC）肱三头肌皮褶厚度（triceps skin-fold thickness，TSF）AMC (mm) =AC (mm) -3.14×TSF(mm) =339-3.14×19.5=277.8(mm)"]}], "qn": 5}, {"title": "5 脂类（上）", "items": [{"type": "q", "stem": "[2017RD真题]1.下列脂肪酸中，作为前体物质合成前列腺素的是（  ）", "options": ["A.棕榈酸", "B.油酸", "C.α-亚麻酸", "D.花生四烯酸"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P32。", "前列腺素（PG）存在于许多器官中，有多种生理功能，如使血管扩张和收缩、神经传导、影响肾脏对水的排泄，奶中的前列腺素可以防止婴儿消化道损伤等。", "二十碳四烯酸（花生四烯酸）、二十碳五烯酸（EPA）等，在环氧化酶和脂氧合酶的作用下生成一系列类二十烷酸，包括前列腺素（PG）、血栓素（TXA） 以及白三烯（LT）等。"]}, {"type": "q", "stem": "[2017RD真题]2.下列哪种脂肪酸的化学式是C17H33COOH（  ）", "options": ["A.硬脂酸", "B.亚油酸", "C.α-亚麻酸", "D.油酸"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P31。", "饱和脂肪酸分子式：CnH2nO2，单不饱和脂肪酸分子式：CnH2n-2O2，多不饱和脂肪酸分子式：CnH2n-2xO2，其中，n为C原子数，x为双键数。根据题目中的分子式C18H34O2可判断为18碳单不饱和脂肪酸。", "硬脂酸为饱和脂肪酸，亚油酸为具有两个不饱和键的n-6多不饱和脂肪酸，α-亚麻酸为具有3个不饱和键的n-3多不饱和脂肪酸，油酸为n-9单不饱和脂肪酸。"]}, {"type": "q", "stem": "[2018DTR真题]3.下列脂肪酸中，属于必需脂肪酸的是（ ）①亚油酸；②棕榈酸；③油酸；④α-亚麻酸；⑤DHA", "options": ["A.①②", "B.①④", "C.③④⑤", "D.①④⑤"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P32。", "必需脂肪酸是指人体必需，自身不能合成，需要从食物中获得的脂肪酸，包括亚油酸和α-亚麻酸。"]}, {"type": "q", "stem": "[2017RD真题]4.世界卫生组织（WHO）建议膳食反式脂肪酸最大摄入量不超过总能量的多少（  ）", "options": ["A.1%E", "B.2%E", "C.4%E", "D.8%E"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P36。", "FAO2010报告将反式脂肪酸的可耐受最高摄入量（UL）定义为小于1%E。《中国居民膳食营养素参考摄入量（2013版）》参考FAO数据，将我国2岁以上儿童及成年人膳食中来源于食品工业加工产生的反式脂肪酸的UL定为小于1%E，大致相当于2g。"]}, {"type": "q", "stem": "[2018DTR真题]5.我们从膳食中获得的脂肪，主要是（ ）", "options": ["A.甘油三酯", "B.卵磷脂", "C.胆固醇", "D.神经鞘磷脂"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P29。", "脂类包括脂肪和类脂，脂肪又称甘油三酯，类脂主要包括磷脂和固醇类。食物中脂类主要是由甘油三酯构成，故通过膳食而获得的脂类主要是甘油三酯。"]}], "qn": 5}, {"title": "6 脂类（下）", "items": [{"type": "q", "stem": "[2020RD真题]1.下列关于脂肪的描述中，正确的是（  ）", "options": ["A.食物脂肪消化率与其熔点密切相关，熔点高于50℃的较难消化", "B.自然环境下，不存在反式脂肪酸", "C.花生四烯酸可由α-亚麻酸合成", "D.油酸属于多不饱和脂肪酸，棕榈酸属于饱和脂肪酸"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P36。", "食物脂肪的消化率与其熔点密切相关。熔点低于体温的脂肪消化率可高达97%~98%; 高于体温的脂肪消化率约90%; 熔点高于50°C的脂肪较难消化，多见于动物脂肪。含不饱和脂肪酸和短链脂肪酸越多的脂肪，熔点越低，越容易消化，多见于植物脂肪。一般植物脂肪的消化率要高于动物脂肪。"]}, {"type": "q", "stem": "[2020RD真题]2.神经鞘磷脂的结构有（  ）①脂肪酸酰基；②磷酸胆碱；③神经鞘氨醇；④甘油；⑤肌醇", "options": ["A.①②③④⑤", "B.①②③", "C.①②③④", "D.①②"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P34。", "磷脂按其组成结构可以分为两类：一类是磷酸甘油酯，另一类是神经鞘磷脂，其分子结构中含有脂肪酰基、磷酸胆碱和神经鞘氨醇，但不含甘油。神经鞘磷脂是膜结构的重要磷脂，它与卵磷脂并存于细胞膜外侧。"]}, {"type": "q", "stem": "[2017RD真题]3.膳食纤维在结肠中可被细菌发酵产生什么物质（  ）", "options": ["A.葡萄糖", "B.肌醇", "C.果糖", "D.短链脂肪酸"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P33。", "人体内短链脂肪酸主要来源于食物中膳食纤维、抗性淀粉、低聚糖和糖醇等在结肠内被肠道微生物发酵的产物。"]}, {"type": "q", "stem": "[2021DTR真题]4.关于胆固醇生理功能描述中，错误的是（  ）", "options": ["A.细胞膜的成分之一", "B.可合成性激素", "C.可以转变为胆酸", "D.具有很强的乳化作用"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P34。", "胆固醇不具有很强的乳化作用。", "磷脂可以使体液中的脂肪悬浮在体液中，有利于其吸收、转运和代谢。由于磷脂的乳化作用，在食品加工中也被广泛应用，如在人造奶油、蛋黄酱和巧克力生产中常以磷脂（如卵磷脂）作为乳化剂。"]}, {"type": "q", "stem": "[2019DTR真题]5.DHA对胎儿什么器官组织发育有益（ ）", "options": ["A.大脑和视网膜", "B.肠道和肾脏", "C.免疫功能和心脏", "D.肾脏和心脏"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P33。", "DHA是视网膜光受体中最丰富的多不饱和脂肪酸， 是维持视紫红质正常功能所必需的。同时，DHA还具有促进胎儿大脑发育的作用。"]}], "qn": 5}, {"title": "7 碳水化合物（一）", "items": [{"type": "q", "stem": "[2017RD真题]1.不能用还原糖法直接测定分析的糖是（  ）", "options": ["A.蔗糖", "B.果糖", "C.葡萄糖", "D.乳糖"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P38。", "分子结构中含有还原性基团（如游离醛基、半缩醛羟基或游离羰基）的糖被称为还原糖，包括葡萄糖、果糖、半乳糖、乳糖和麦芽糖等。", "蔗糖是非还原糖。", "另外，多糖也无还原性。"]}, {"type": "q", "stem": "[2020DTR真题]2.关于寡糖的描述中，错误的是（ ）", "options": ["A.具有甜味", "B.具有水溶性", "C.可被体内消化酶分解", "D.由3~9个单糖分子组成"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P385，《中国营养科学全书》第2版P79、P81。", "A对，寡糖甜度通常只有庶糖的30%~60%。", "B对，单糖、双糖、寡糖、糊精、果胶都溶于水。", "C错，多数寡糖不能被体内消化酶分解 。", "D对，寡糖是由3以上10个以下的单糖分子通过糖苷键构成的聚合物。"]}, {"type": "q", "stem": "[2018DTR真题]3.下列物质中，属于低聚糖的是（ ）", "options": ["A.蔗糖", "B.水苏糖", "C.果糖", "D.纤维素"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P38。", "碳水化合物根据其聚合度分为糖、低聚糖和多糖三类。", "糖（1~2）包括单糖、双糖和糖醇；低聚糖（3~9）也称寡糖，由3~9 个单糖分子通过糖苷键构成；多糖（≥10）可以分为淀粉和非淀粉多糖。", "果糖是单糖，蔗糖是双糖，纤维素是多糖，水苏糖和棉子糖是低聚糖。"]}, {"type": "q", "stem": "[2020RD真题]4.下列关于淀粉的说法，错误的是（  ）", "options": ["A.由聚合方式不同，分为直链淀粉和支链淀粉", "B.支链淀粉遇碘产生棕色反应，易使食物糊化，从而提高消化率", "C.直链淀粉遇碘变蓝色，易老化，形成难消化的抗性淀粉", "D.直链淀粉是D-葡萄糖残基以β-1，4糖苷键连接而成的线性结构"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P38。", "D错，直链淀粉是D-葡萄糖残基以α-1，4糖苷键连接而成的线性结构。"]}, {"type": "q", "stem": "[2018DTR真题]5.下列关于碳水化合物的分类中，对应关系正确的是（ ）", "options": ["A.蔗糖－单糖", "B.麦芽糖－低聚糖", "C.果胶－多糖", "D.果糖－双糖"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P38。", "蔗糖－双糖。", "麦芽糖－双糖。", "果糖－单糖。"]}], "qn": 5}, {"title": "8 碳水化合物（二）", "items": [{"type": "q", "stem": "[2017RD真题]1.下列食物中GI值大于70的是（  ）①胡萝卜；②苹果；③香蕉；④燕麦片；⑤西瓜", "options": ["A.①③④", "B.①④⑤", "C.②③⑤", "D.③④⑤"], "answer": "答案：B", "analysis": ["解析：《中国食物成分表》第6版。", "胡萝卜71，苹果36，香蕉52，燕麦片83，西瓜72。"]}, {"type": "q", "stem": "[2020DTR真题]2.下列糖类中，GI由高至低排序正确的是（ ）", "options": ["A.蔗糖>葡萄糖>果糖>乳糖", "B.葡萄糖>蔗糖>乳糖>果糖", "C.葡萄糖>蔗糖>果糖>乳糖", "D.蔗糖>乳糖>葡萄糖>果糖"], "answer": "答案：B", "analysis": ["解析：《中国居民膳食指南（2022）》P107。", "麦芽糖105，葡萄糖100，蔗糖65，乳糖46，果糖23。"]}, {"type": "q", "stem": "[2018DTR真题]3.下列哪一组食物属于低血糖生成指数（GI） 食物（ ）", "options": ["A.土豆，面条，大米", "B.南瓜，玉米粉，胡萝卜", "C.菠萝，酸奶，甘薯", "D.荞麦，绿豆，大豆"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P40。", "低GI食物指GI<55。", "土豆62，面条81.6，大米饭83，南瓜75，玉米粗粉（煮）68，胡萝卜71，菠萝66，酸奶48，甘薯54，荞麦54，绿豆27，黄豆（浸泡）18。"]}, {"type": "q", "stem": "[2018RD真题]4.食物的GI值和GL值可以作为糖尿病患者选择碳水化合物食物的重要指标。西瓜的GI值是72，若食用200g（可食部），请计算GL值（  ）。（西瓜碳水化合物含量：7g/100可食部）", "options": ["A.5", "B.10", "C.14.4", "D.144"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P40。", "GL = 摄入食品中碳水化合物的重量×食品的GI值/100= 200×0.07×72/100 = 10.08 ≈ 10。"]}, {"type": "q", "stem": "[2020RD真题]5.下列营养因素中，对血糖影响最大的是（  ）", "options": ["A.食物碳水化合物的种类", "B.食物的GI值", "C.食物碳水化合物总重量", "D.甜食的摄入量"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P40。", "餐后血糖水平除了与碳水化合物的血糖指数高低有关外，还与食物中碳水化合物的含量密切相关。GI高的食物，如果碳水化合物含量很少，尽管其容易转化为血糖，但对血糖总体水平的影响并不大。"]}], "qn": 5}, {"title": "9 碳水化合物（三）", "items": [{"type": "q", "stem": "[2023DTR真题]1.下列关于益生元的描述中，错误的是（  ）", "options": ["A.益生元属于非生糖碳水化合物", "B.异麦芽低聚糖、乳果糖都是益生元", "C.益生元能被人体消化系统消化和吸收", "D.益生元能促进肠道益生菌的生长和繁殖"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P41。", "益生元的概念是由不消化的碳水化合物派生出来的，是指不被人体消化系统消化和吸收，能够选择性地促进宿主肠道内原有的一种或几种有益细菌（益生菌）生长繁殖的物质，通过有益菌的繁殖增多，抑制有害细菌生长，从而达到调整肠道菌群，促进机体健康的目的。这类物质最具代表性的有乳果糖、异麦芽低聚糖等。"]}, {"type": "q", "stem": "[2019RD真题]2.关于益生元的说法，错误的是（  ）", "options": ["A.益生元是一种能被某些肠道微生物利用而对人体健康有益的物质", "B.菊粉、低聚果糖、聚葡萄糖、乳果糖都是益生元", "C.益生元是碳水化合物，碳水化合物不一定是益生元", "D.益生元具有调节肠道菌群，提高免疫力的作用"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P380。益生元的定义，并没有限定益生元必须属于碳水化合物。", "《中国营养学会益生元与健康专家共识》。益生元定义特指一般不能被人体所消化吸收但可被人体微生物选择性利用，能够改善肠道微生物组成和/或活性从而益于人体健康的食物成分。目前证据等级较高，得到公认的益生元几乎都属于碳水化合物。"]}, {"type": "q", "stem": "[2018DTR真题]3.我国儿童少年摄入添加糖的主要来源是（  ）", "options": ["A.含糖饮料", "B.饼干", "C.糖果", "D.方便面"], "answer": "答案：A", "analysis": ["解析：《中国居民膳食指南（2022）》P101。", "含糖饮料是指含糖量在5%以上的饮品。我国儿童少年主要通过含糖饮料来摄入添加糖。"]}, {"type": "q", "stem": "4.关于低碳水化合物膳食（LCD），下列说法错误的是（  ）", "options": ["A.一般指碳水化合物供能占比在 40% 以下的膳食", "B.可能与降低 2 型糖尿病、肥胖等发生风险有关", "C.长期 LCD 的潜在副作用已被明确证实", "D.对冠心病、痛风及肾病患者可能存在不利影响"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P40。", "长期LCD 是否存在副作用甚至是危害还不确定。"]}, {"type": "q", "stem": "5.下列关于低碳饮食的意义，说法正确的是（ ）", "options": ["A.仅关注减少个人体重，不涉及环境影响", "B.只需要选择当季食物，无需考虑加工方式", "C.能满足个体健康需求，同时兼顾低碳排放，促进可持续发展", "D.主要依赖减少肉类摄入来实现低碳目标"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P41。", "低碳饮食不仅可以满足个体健康需求，还可兼顾低碳排放量，实现人与环境的可持续性发展。"]}], "qn": 5}, {"title": "10 碳水化合物（四）", "items": [{"type": "q", "stem": "[2020RD真题]1.按照《中国居民膳食营养素参考摄入量（2013）》关于碳水化合物的推荐，错误的是（  ）", "options": ["A.正常成年人碳水化合物AMDR为55%~65%", "B.膳食纤维推荐摄入量为25~30g", "C.4岁以上，添加糖AMDR≤10%E", "D.孕期每天碳水化合物摄入不小于130g"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P44。", "A错，正常成年人碳水化合物AMDR为50%~65%。"]}, {"type": "q", "stem": "[2018DTR真题]2.根据《中国居民膳食指南(2016)》建议，每天摄入添加糖提供的能量不超过总能量的比例是（  ）", "options": ["A.5%", "B.10%", "C.15%", "D.20%"], "answer": "答案：B", "analysis": ["解析：每天添加糖的量不超过50g，不超过总能量的比例为10%。"]}, {"type": "q", "stem": "[2024DTR真题]3.下列营养素中，具有抗生酮作用的是（  ）", "options": ["A.蛋白质", "B.脂类", "C.膳食纤维", "D.碳水化合物"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P43。", "脂肪在体内分解代谢，需要葡萄糖的协同作用。当膳食中碳水化合物供应不足时，食物脂肪或体内脂肪被动员并加速分解为脂肪酸来供应能量。这一代谢过程中，由于草酰乙酸不足，脂肪酸不能彻底氧化而产生过多的酮体，酮体不能及时被氧化而在体内蓄积，以致产生酮血症和酮尿症。膳食中充足的碳水化合物可以防止上述现象的发生，因此称为碳水化合物的抗生酮作用。"]}, {"type": "q", "stem": "[2022RD真题]4.下列关于碳水化合物消化吸收的描述中，正确的是（  ）", "options": ["A.小肠粘膜上皮细胞表面含有麦芽糖酶、乳糖酶和蔗糖酶，可以把未消化的碳水化合物完全消化成葡萄糖、果糖和半乳糖", "B.单糖在小肠内仅能通过被动扩散吸收", "C.胰淀粉酶可以把支链淀粉全部水解为葡萄糖", "D.胃液中含有胃淀粉酶，可部分水解碳水化合物"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P41。", "A对，小肠黏膜上皮细胞刷状缘含丰富的α-糊精酶、糖淀粉酶、麦芽糖酶、异麦芽糖酶、蔗糖酶及乳糖酶，将可消化淀粉中的多糖及寡糖完全分解为葡萄糖及少量果糖和半乳糖。", "B错，葡萄糖的吸收机制分为3个途径：主动吸收、被动吸收以及通过细胞间隙直接吸收。", "C错，胰淀粉酶通过水解α-1,4-糖苷键使淀粉变成麦芽糖、麦芽三糖（约占65%)、异麦芽糖、α-临界糊精及少量葡萄糖等。", "D错，胃液不含任何能水解碳水化合物的酶，其所含的胃酸只能水解少量碳水化合物。"]}, {"type": "q", "stem": "[2017RD真题]5.膳食纤维在结肠中可被细菌发酵产生什么物质（  ）", "options": ["A.葡萄糖", "B.肌醇", "C.果糖", "D.短链脂肪酸"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P33。", "膳食纤维在结肠中发酵所产生的短链脂肪酸可降低肠道pH，从而改变肠内微生物菌群的构成与代谢，诱导益生菌大量繁殖。"]}], "qn": 5}, {"title": "11 能量（上）", "items": [{"type": "q", "stem": "[2017RD真题]1.某人一天饮食中含碳水化合物250g，脂肪60g，蛋白质50g，则其中脂肪提供的能量占该日总能量的比例是（  ）", "options": ["A.17%", "B.27%", "C.31%", "D.45%"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P45。", "该饮食的总能量为：250×4 + 60×9 + 50×4 = 1740kcal，其中脂肪提供的能量：60×9 = 540kcal，脂肪供能比为：540÷1740×100% = 31%。"]}, {"type": "q", "stem": "[2018DTR真题]2.一般情况下，进食蛋白质可使能量消耗增加（ ）", "options": ["A.0~5%", "B.5%~10%", "C.15%~20%", "D.20%~30%"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P48。", "蛋白质的食物热效应最高，占其所产生能量的20%~30%。", "脂肪和碳水化合物分别为0%~5%与5%~10%。", "成年人摄入的混合膳食，每日由于食物热效应而额外增加的能量消耗，相当于基础代谢的10%。"]}, {"type": "q", "stem": "[2018DTR真题]3.成年人的能量消耗主要用于（ ）①生长发育；②基础代谢；③食物特殊动力作用；④身体活动", "options": ["A.①②③", "B.①②④", "C.②③④", "D.①②③④"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P46。", "一般成年人的能量消耗主要用于基础代谢、食物特殊动力作用和身体活动。孕期额外能量消耗增加主要包括胎儿生长发育和孕妇子宫、乳房与胎盘的发育及母体脂肪的储存以及这些组织的自身代谢等。", "哺乳期乳母产生乳汁及乳汁自身含有的能量等也需要额外的能量消耗。", "幼儿、儿童、青少年还应包括生长发育的能量需要。", "创伤患者康复期，也需要额外的能量。"]}, {"type": "q", "stem": "[2022RD真题]4.下列关于机体能量消耗的描述中，错误的是（  ）", "options": ["A.食物热效应作用从高到低为：脂肪、碳水化合物、蛋白质", "B.体重越重者，能量消耗越多", "C.基础代谢约占人体总能量消耗60%～70%，是人体能量消耗的主要部分", "D.肌肉越发达者，身体活动能量消耗越多"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P48。", "A错，食物中不同产能营养素的食物热效应不同，其中蛋白质的食物热效应最大，为本身产生能量的20%~30%，而脂肪和碳水化合物分别为0%~5%与5%~10%。"]}, {"type": "q", "stem": "[2019DTR真题]5.对一般成年人来讲，基础代谢消耗的能量占人体总能量消耗的比例是（  ）", "options": ["A.10%", "B.15%~30%", "C.35%~55%", "D.60%~70%"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P46。", "基础代谢是指维持机体最基本的生命活动所需要的能量消耗，占人体总能量消耗的60%~70%。"]}], "qn": 5}, {"title": "12 能量（下）", "items": [{"type": "q", "stem": "[2023DTR真题]1.双标水法主要用于（  ）", "options": ["A.评价食物蛋白质的营养价值", "B.测定膳食碳水化合物的吸收率", "C.测定总能量消耗", "D.评价脂肪酸的饱和程度"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P49。", "双标水法采用稳定同位素（双标水）法测定人体一定时间（一般为7~15天）内日常生活和工作环境中自由活动的总能量消耗量的方法。"]}, {"type": "q", "stem": "[2024DTR真题]2.男，35岁，基础代谢能量消耗为1500kcal/d，身体活动水平1.5，他的能量需要量是（  ）", "options": ["A.1500kcal", "B.1000kcal", "C.2250kcal", "D.2100 kcal"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P50。", "能量需要量（EER）=基础能量消耗（BEE）×身体活动水平（PAL）=1500×1.5=2250kcal。"]}, {"type": "q", "stem": "[2023RD真题]3.根据中国居民膳食营养素参考摄入量（2023版），4岁儿童的供能营养素的AMDR为（蛋白质，脂肪，碳水化合物）（  ）", "options": ["A.10%~20%；20%~30%；50%~65%", "B.8%~20%；30%~50%；45%~55%", "C.8%~20%；20%~30%；50%~65%", "D.45%~60%；10%~20%；40%~55%"], "answer": "答案：C", "analysis": ["解析：《中国居民膳食营养素参考摄入量DRIs（2023）》P633。", "4岁儿童的供能营养素的AMDR（蛋白质，脂肪，碳水化合物）为8%~20%；20%~30%；50%~65%。"]}, {"type": "q", "stem": "[2017RD真题]4.下列关于人体能量消耗测定方法的描述中，错误的是（  ）", "options": ["A.直接测热法是测量总能量消耗最准确的方法", "B.气体代谢法可以获得受试者的基础能量消耗或不同身体活动的能量消耗", "C.双标水法不能用于孕妇、乳母以及老年人等特殊群体", "D.心率监测法是一种简易的监测和评价总能量消耗的方法"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P48-P49、《中国营养科学全书》第2版P733。"]}, {"type": "q", "stem": "[2019RD真题]5.一女士中速步行（5km/h），MET3.5，女性50kg，步行1小时，消耗能量（  ）", "options": ["A.35kcal", "B.71kcal", "C.175kcal", "D.350kcal"], "answer": "答案：C", "analysis": ["解析：《中国居民膳食指南（2022）》P32。", "国际上身体活动强度的通用单位是能量代谢当量（metabolic equivalence of energy，MET）, 1MET相当于能量消耗为1kcal/(kg·h)或消耗3.5ml O2/ (kg·min) 的活动强度。", "该女士消耗能量=3.5×1×50=175kcal。"]}], "qn": 5}, {"title": "13 钙磷（上）", "items": [{"type": "q", "stem": "[2020RD真题]1.以下矿物质中能与维生素K依赖的凝血因子结合，调控凝血作用的是（  ）", "options": ["A.钙", "B.铜", "C.锰", "D.磷"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P55。", "凝血因子Ⅳ就是Ca2+，能够促使活化的凝血因子在磷脂表面形成复合物而促进血液凝固。"]}, {"type": "q", "stem": "[2020DTR真题]2.人体内含量最多的矿物质是（ ）", "options": ["A.钙", "B.镁", "C.钠", "D.钾"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P54。", "钙是人体含量最多的矿物质元素，占成人体重的1.5%~2.0%。"]}, {"type": "q", "stem": "[2024RD真题]3.下列关于矿物质磷的描述中，错误的是（  ）", "options": ["A.合理的钙磷比例有利于磷的吸收，钙磷适宜比值为1:2", "B.磷的生理功能包括参与能量代谢、构成细胞膜、调节酸碱平衡", "C.长期静脉营养的患者容易发生低磷血症", "D.体内磷的85%集中于骨和牙齿组织，主要存在形式是无机磷酸盐"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P55。", "A错，合理的钙磷比例有利于磷的吸收，钙磷适宜比值为2:1 。"]}, {"type": "q", "stem": "[2021RD真题]4.下列关于钙、磷代谢描述中，正确的是（  ）①钙在小肠吸收率比磷高；②99%的磷存在于血液中；③血液中钙的95%都是以游离态存在；④钙在肠道的吸收受维生素D调控；⑤人体不能吸收植酸中的磷。", "options": ["A.①④", "B.③④", "C.④⑤", "D.②⑤"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P54-P55。《中国营养科学全书》第2版P110。", "①错。成年人吸收率，钙20%，磷55%~70%。", "②错。体内的磷约有85%~90%以羟磷灰石形式存在于骨骼和牙齿中。", "③错。人体血液中的钙46.0%为蛋白结合钙，包括白蛋白结合钙和球蛋白结合钙，6.5%为与柠檬酸或无机酸结合的复合钙，其余47.5%为离子化钙。", "④对。1,25-(OH)2-D3可诱导一种特异的钙结合蛋白的合成。钙结合蛋白在小肠黏膜细胞促进钙的吸收。", "⑤对。人体肠黏膜缺乏植酸酶，故含有植酸的谷胚所形成的植酸磷酸盐不能为人体吸收。"]}, {"type": "q", "stem": "[2022DTR真题]5.下列关于钙的叙述，正确的是（  ）", "options": ["A.钙是超氧化物歧化酶的组成成分", "B.钙参与机体蛋白质与核酸的合成", "C.钙是人体内含量最多的矿物质", "D.草酸和植酸可以促进肠道钙吸收"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P54。", "钙是人体含量最多的矿物质元素，占成人体重的1.5%~2.0%。"]}], "qn": 5}, {"title": "14 钙磷（中）", "items": [{"type": "q", "stem": "[2017RD真题]1.下列膳食成分中，有利于肠道钙吸收的是（  ）①乳糖；②乳酸；③维生素D；④脂肪酸；⑤膳食纤维", "options": ["A.①②③", "B.④⑤", "C.②③④", "D.①③④"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P55。", "促进：酸性氨基酸；乳糖；维生素D；低磷。", "抑制：草酸、植酸、磷酸；膳食纤维；脂肪酸；咖啡因和酒精。"]}, {"type": "q", "stem": "[2020DTR真题]4.丁先生，81岁，被诊断为老年性骨质疏松。医生建议他补充钙。下列食物中，影响钙吸收效率的是（ ）", "options": ["A.牡蛎", "B.鸡蛋", "C.咖啡", "D.牛奶"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P1543。", "咖啡因摄入可以在一定程度上降低钙的吸收。"]}, {"type": "q", "stem": "[2021DTR真题]3.下列糖中，能促进钙吸收的是（  ）", "options": ["A.麦芽糖", "B.蔗糖", "C.葡萄糖", "D.乳糖"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P124。", "乳糖经肠道菌发酵产酸，降低肠内pH，与钙形成乳酸钙复合物可增强钙的吸收。"]}, {"type": "q", "stem": "[2022RD真题]4.下列关于钙吸收的描述，正确的是（  ）", "options": ["A.植酸、草酸和脂肪酸可以促进钙的吸收", "B.婴儿期和孕期，膳食钙的吸收率可达90%", "C.钙的吸收主要在小肠末端", "D.1,25-(OH)2维生素D的生成减少，会降低钙的吸收率"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P55。", "A错，植酸、草酸和脂肪酸可以抑制钙的吸收。", "B错，婴儿的钙吸收率大于50%，孕期和哺乳期钙的吸收率达到30%~60%。", "C错，肠道对钙的吸收主要在小肠上段。", "D对，1,25-(OH)2维生素D促进肠黏膜对钙的吸收，其生成减少会降低钙的吸收率。"]}, {"type": "q", "stem": "[2024RD真题]5.影响钙吸收的营养素有（  ）①镁；②钠；③钾；④锌；⑤胆碱。", "options": ["A.①②④      B.①②③④      C.①④      D.①③④"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2 版P114、P142。", "①对，由于镁与钙的吸收途径相同，两者在肠道竞争吸收。", "④对，钙与锌存在相互拮抗作用，高钙摄入可抑制锌吸收，反之锌过量也可影响钙的吸收。", "故选C。"]}], "qn": 5}, {"title": "15 钙磷（下）", "items": [{"type": "q", "stem": "[2020RD真题]1.某女童，11月龄，存在多汗、夜惊、神情呆滞，易激惹等表现，经检查有枕秃、方颅，在肋骨与肋骨交界区呈现钝圆形隆起，外观似串珠，两下肢弯曲有“O”型腿样变化。该患儿的体征表现可能和下列哪种营养素的缺乏有关（  ）", "options": ["A.氟", "B.钙", "C.磷", "D.碘"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P56。", "维生素D缺乏时，由于骨骼不能正常钙化，易引起骨骼变软和弯曲变形，形成“X”或“O”形腿。胸骨外凸（“鸡胸”），肋骨与肋软骨连接处形成“肋骨串珠”。"]}, {"type": "q", "stem": "[2020RD真题]2.某女童，11月龄，存在多汗、夜惊、神情呆滞，易激惹等表现，经检查有枕秃、方颅，在肋骨与肋骨交界区呈现钝圆形隆起，外观似串珠，两下肢弯曲有“O”型腿样变化。", "options": ["A.佝偻病", "B.甲状腺肿", "C.氟骨症", "D.骨质疏松"], "answer": "答案：A", "analysis": ["该症状被称为（  ）", "解析：《营养与食品卫生学》第9版P56。", "该患儿可能患佝偻病。"]}, {"type": "q", "stem": "[2020RD真题]3.某女童，11月龄，存在多汗、夜惊、神情呆滞，易激惹等表现，经检查有枕秃、方颅，在肋骨与肋骨交界区呈现钝圆形隆起，外观似串珠，两下肢弯曲有“O”型腿样变化。下列食物中应增加摄入的是（  ）", "options": ["A.菠菜", "B.土豆泥", "C.竹笋", "D.奶及奶制品"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P57。", "奶及奶制品不仅钙含量高，其吸收率也高，是钙的良好来源。"]}, {"type": "q", "stem": "[2018DTR真题]4.为某成年男性制订食谱时，其膳食钙摄入目标值是（ ）", "options": ["A.650mg/d", "B.800mg/d", "C.2000mg/d", "D.不能确定"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P16。", "RNI的主要用途是作为个体每日摄入该营养素的推荐值，是健康个体膳食摄入营养素的目标。 18~49岁成人钙RNI—800mg。"]}, {"type": "q", "stem": "[2020DTR真题]5.某男，56岁，身高170cm，体重75公斤，因为有高血压、高血脂，平时不吃动物内脏，动物类的食物用鱼肉来代替，每天约150克，不喝牛奶，平时主要喝豆浆，他有牙齿脱落的问题，因为牙齿怕酸，也很少吃蔬菜水果。如果他按照这样长久饮食，会出现哪种矿物质缺乏（ ）", "options": ["A.钙", "B.镁", "C.钾", "D.硒"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P57。", "奶及奶制品不仅钙含量高，其吸收率也高，是钙的良好来源。该男子长期不喝牛奶，可能会出现钙缺乏。"]}], "qn": 5}, {"title": "16 钾", "items": [{"type": "q", "stem": "[2017RD真题]1.下列哪种矿物质含量可用来判断机体“瘦体重”的含量（  ）", "options": ["A.钾", "B.钙", "C.钠", "D.磷"], "answer": "答案：A", "analysis": ["解析：《中国营养科学全书》第2版P977。", "通常把身体组分分为脂肪（fatmass，FM）和去脂体重（瘦体重，fat-free mass，FFM）两部分。", "由于钾仅存在于人体的FFM中。每公斤FFM中约含钾 68.1mmol，所以40K可用作FFM的测定参数，按下式可求瘦体重：FFM=K（mmol）÷68.1。"]}, {"type": "q", "stem": "[2017RD真题]2.根据《中国居民膳食营养素参考摄入量（2013版）》，成年人钾的AI值和PI值分别是多少（  ）", "options": ["A.200mg和360mg", "B.300mg和500mg", "C.1500mg和2000mg", "D.2000mg和3600mg"], "answer": "答案：D", "analysis": ["解析：《中国居民膳食营养素参考摄入量（2023版）》，直接记新版数据。"]}, {"type": "q", "stem": "[2018RD真题]3.下列关于常量元素及其功能的描述，错误的是（  ）", "options": ["A.钙—维持神经和肌肉的活动", "B.磷—调节酸碱平衡", "C.镁—促进骨骼生长和神经肌肉的兴奋性", "D.钾—抗氧化功能"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P58。", "钾的生理功能：①参与糖和蛋白质代谢；②维持细胞正常的渗透压和酸碱平衡；③维持神经肌肉的应激性；④维持心肌的正常功能；⑤降低血压的作用。"]}, {"type": "q", "stem": "[2018RD真题]4.考虑患者有高血压，营养师建议他增加高钾的食物，下列食物中可选用的是（  ）①香蕉；②马铃薯；③冬菇；④大米；⑤牛肉。", "options": ["A.①②③", "B.①②⑤", "C.②③④", "D.③④⑤"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P59。", "大部分食物都含有钾，但豆类、蔬菜和水果是钾最好的来源。", "香蕉256，马铃薯347，冬菇（干）1155，稻米（代表值）112，牛肉（代表值）212。"]}, {"type": "q", "stem": "[2023RD真题]5.下列关于矿物质钾的描述中，错误的是（  ）", "options": ["A.钾参与糖原和蛋白质的合成代谢", "B.摄入的钾80%由粪便排出", "C.豆类、蔬菜和水果是钾的良好来源", "D.各种体液内都含钾，98%存在于细胞内液"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P58。", "A对，葡萄糖和氨基酸经过细胞膜进入细胞合成糖原和蛋白质的过程，必须有钾离子参与。", "B错，摄入的钾80%~90%经由肾脏排出。", "C对，豆类、蔬菜和水果是钾最好的来源。", "D对，各种体液内都含钾，98%存在于细胞内液。"]}], "qn": 5}, {"title": "17 钠", "items": [{"type": "q", "stem": "[2020RD真题]1.循证医学证据显示，下列膳食增加心血管疾病的风险是（  ）", "options": ["A.富含钾的食物", "B.富含植物甾醇的食物", "C.富含钠的食物", "D.富含多不饱和脂肪酸的食物"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P214。", "钠盐摄入过多可使血容量增加而引起血压升高。"]}, {"type": "q", "stem": "[2020RD真题]2.运动员夏天运动后，恶心、呕吐、头痛、腹痛、腿痛、肌肉抽搐，是缺乏哪样营养素（  ）", "options": ["A.钙", "B.铁", "C.锌", "D.钠"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P122。", "运动员夏天运动后钠随汗液大量流失。", "失氯化钠为0.5~0.75g/kg时，出现尿中无氯化物时为中度缺钠，患者出现恶心、呕吐、脉细弱、血压降低及痛性肌肉痉挛等症状。"]}, {"type": "q", "stem": "[2022RD真题]3.下列矿物质中，在小肠内吸收率最高的是（  ）", "options": ["A.钠", "B.磷", "C.镁", "D.钙"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P55、P59、P61。", "摄入的钠在小肠几乎完全被吸收。磷吸收率约为70%。镁吸收率约30%~50%。钙吸收率一般介于20%~60%。"]}, {"type": "q", "stem": "[2020RD真题]4.对一个高血压患者宣教，检测其24小时排尿2L，尿钠浓度85mEq/L，由此可得出他该日食盐摄入量为（  ）", "options": ["A.10g", "B.12g", "C.14g", "D.8g"], "answer": "答案：A", "analysis": ["解析：《中国营养科学全书》第2版P123。", "钠摄入量很高时，机体钠可维持在基础水平，从尿液排出的钠接近其摄入量，且在正常状况下（出汗不多、无腹泻）， 摄入的钠约98%从尿液排出，据此可用平衡试验或测定尿钠排出量来评价机体的钠营养状况。24小时尿钠排出量=24小时食盐中钠摄入量。", "氯化钠的分子量是58.5，日均食盐摄入量（g/d）≈24h尿钠（mmol）×58.5/1000，mEq/L=mmol/L×原子价。", "该日食盐摄入量（g）=24h尿钠（mmol）×58.5/1000=85/1×2×58.5/1000≈10。"]}, {"type": "q", "stem": "[2023RD真题]5.市售钠盐调味品有（  ）①麻油；②酱油；③味极鲜；④味精；⑤辣椒酱。", "options": ["A.①②④", "B.②③④", "C.①③④", "D.③④⑤"], "answer": "答案：B", "analysis": ["解析：", "①错，麻油通常不含钠盐，主要是芝麻油，是一种油脂。", "②对，酱油是一种含有较高钠盐的调味品。", "③对，味极鲜通常含有钠盐，用于增加食物的鲜味。", "④对，味精学名是谷氨酸钠，含有钠。", "⑤错，辣椒酱根据其配方不同，可能含有不同量的钠，但通常辣椒酱的辣味成分本身不含钠。"]}], "qn": 5}, {"title": "18 镁", "items": [{"type": "q", "stem": "[2018RD真题]1.下列关于常量元素及其功能的描述，错误的是（  ）", "options": ["A.钙—维持神经和肌肉的活动", "B.磷—调节酸碱平衡", "C.镁—促进骨骼生长和神经肌肉的兴奋性", "D.钾—抗氧化功能"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P118。", "钾的生理功能：", "①参与糖和蛋白质代谢；②维持细胞渗透压和酸碱平衡；③维持神经肌肉的应激性和正常功能；④维持心肌的正常功能；⑤降低血压的作用。"]}, {"type": "q", "stem": "[2019RD真题]2.人体中镁主要存在于什么组织（  ）", "options": ["A.心脏", "B.肌肉", "C.骨骼", "D.肝脏"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P60。", "正常成人体内含镁约20~38g，其中60%~65%存在于骨骼，27%存在于肌肉、肝脏、心脏、胰腺等组织。"]}, {"type": "q", "stem": "[2023RD真题]3.下列营养素中，摄入过多影响镁吸收的是（  ）", "options": ["A.碘", "B.钙", "C.钾", "D.钠"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P615。", "镁的摄入水平及食物中钙、磷、乳糖含量等，均可影响机体对镁的吸收。"]}, {"type": "q", "stem": "[2024RD真题]4.下列天然食品色素中，含有Mg2+的是（ ）", "options": ["A.虾红素", "B.花青素", "C.叶黄素", "D.叶绿素"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P117。", "由于叶绿素是镁卟啉的鳌合物，所以绿叶蔬菜中含丰富的镁。"]}, {"type": "q", "stem": "[2020DTR]5.对缺血性心肌有保护作用的营养素及含此营养素丰富的食物（  ）", "options": ["A.钾，土豆、香蕉、绿叶蔬菜", "B.镁，深色蔬菜、小米、豆类、面粉", "C.维生素E，坚果", "D.铁，内脏和红肉"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P117、P1559。", "镁对降低血清胆固醇有重要作用，可减缓动脉粥样硬化病变的形成、钙盐和胆固醇在血管壁内的沉积。绿叶蔬菜中含丰富的镁，其次是粗粮、坚果。"]}], "qn": 5}, {"title": "19 铁（上）", "items": [{"type": "q", "stem": "[2017RD真题]1.人体每天铁的排泄不超过1mg，主要排泄途径是（  ）", "options": ["A.肠道", "B.尿液", "C.皮肤", "D.汗液"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P63。"]}, {"type": "q", "stem": "[2019DTR真题]2.下列膳食因素中，抑制铁吸收的是（ ）", "options": ["A.维生素C", "B.植酸", "C.柠檬酸", "D.组氨酸"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P63。", "促进：蛋白质、氨基酸、维生素C、A、叶酸、B12、B2、柠檬酸、乳酸、丙酮酸、琥珀酸以及酒石酸 。", "抑制：铅、铬、锰过多摄入、EDTA、植酸、丹宁、多酚。"]}, {"type": "q", "stem": "[2020DTR真题]3.为改善缺铁营养，错误的是（ ）", "options": ["A.增加富含维生素C的水果", "B.食谱中加更多菠菜", "C.加畜肉", "D.食用面制品尽可能发酵"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P63。", "菠菜中膳食纤维、草酸都阻碍铁吸收，不宜多食。"]}, {"type": "q", "stem": "[2018DTR真题]4.下列哪种饮料，有助于膳食铁的吸收（ ）", "options": ["A.可乐", "B.奶茶", "C.橙汁", "D.茶饮料"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P63。", "维生素C不仅能作为还原物质使Fe3+还原为Fe2+，而且能与铁鳌合形成可溶性小分子络合物，有利于铁吸收。"]}, {"type": "q", "stem": "[2021DTR真题]5.膳食铁吸收率会增加的是（  ）", "options": ["A.动物性食物中的锌、钙", "B.血红蛋白浓度>130g/L", "C.机体铁储存量下降", "D.植物性食物中的植酸、草酸、多酚类"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P63。", "机体铁营养状况、生理与病理改变都可以影响铁的吸收，如贫血、孕期、生长发育可使铁的需要增加；月经过多，钩虫感染，痢疾，血吸虫病等因铁丢失增加，促进机体增加铁的吸收。"]}], "qn": 5}, {"title": "20 铁（下）", "items": [{"type": "q", "stem": "[2019RD真题]1.哪一项目指标升高，表示有铁缺乏风险（  ）", "options": ["A.血清铁蛋白SF", "B.运铁蛋白饱和度TS", "C.血清运铁蛋白受体sTfR", "D.血红蛋白Hb"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P134。", "血清运铁蛋白受体（sTfR）反映了未成熟红细胞中受体的数量和红细胞生成水平。目前认为sTfR是比较可靠的鉴定机体铁缺乏的指标，与组织缺铁的程度成负相关。早期缺铁即可诊断，缺铁性贫血时比正常值（0.9~2.3mg/L）高3~4倍。它不受性别、年龄、妊娠炎症性疾病、感染以及其他慢性病的影响，能准确反映机体铁状况，灵敏度高，早期缺铁即可诊断。"]}, {"type": "q", "stem": "[2021RD真题]2.下列关于铁的描述中，正确的是（  ）", "options": ["A.铁蛋白和含铁血黄素为功能性铁", "B.铁缺乏会导致铁色素沉着症", "C.血红蛋白是缺铁状态的晚期指标，早期缺铁诊断可以采用血清运铁蛋白受体", "D.非血红素铁的吸收率高于血红素铁"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P64。", "A错。铁蛋白和含铁血黄素为储存铁。", "B错。铁过量会导致铁色素沉着症。", "C对。血红蛋白是缺铁的晚期指标。血清运铁蛋白受体反映了未成熟红细胞中受体的数量和红细胞生成水平，该指标灵敏度高，早期缺铁即可诊断。", "D错。血红素铁的生物利用高，有效吸收率为15%~35%；而非血红素铁则需先被还原成二价铁才能被吸收，其有效吸收率仅为2%~20%。"]}, {"type": "q", "stem": "[2017RD真题]3.某女性患者，70岁，易烦躁，机体抵抗力下降，生化检查可见血清铁和铁蛋白下降，运铁蛋白饱和度下降，游离原卟啉浓度上升，血红蛋白为120g/L，此患者铁缺乏状态可能处于（  ）", "options": ["A.贫血期", "B.铁减少期", "C.红细胞生成缺铁期", "D.血红蛋白形成减少期"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P63。", "铁缺乏三阶段（减—缺—贫）：", "①铁减少期（ID）：体内储存铁↓，血清铁蛋白↓，无临床症状；", "②红细胞生成缺铁期（IDE）：血清铁蛋白↓，血清铁↓，铁结合力↑（运铁蛋白饱和度↓），游离原卟啉浓度↑；", "③缺铁性贫血期（IDA）：除上述指标外，血红蛋白↓，红细胞容积比↓。"]}, {"type": "q", "stem": "[2019DTR真题]4.吃素妈妈给孩子也吃素，发现孩子缺铁，为了孩子给孩子补铁，不宜选的食物（ ）", "options": ["A.木耳炒鸡蛋", "B.炒肝尖儿", "C.酱牛肉", "D.猪肝"], "answer": "答案：A", "analysis": ["解析：《中国营养科学全书》第2版P137。《营养与食品卫生学》第9版P127。", "动物性食物含有丰富且易吸收的血红素铁，主要来源为动物肝脏（猪肝22.6mg/100g)、动物全血（鸭血30.5mg/ 100g)、动物瘦肉（牛肉3.4mg/100g)、海产品类（虾皮11.0mg/100g)、等。", "蛋黄中的铁含量虽然较高，但由于是非血红素铁，并与卵黄高磷蛋白结合，生物利用率仅为3%左右。"]}, {"type": "q", "stem": "[2021DTR真题]5.当机体缺铁时，最先出现（  ）", "options": ["A.红细胞游离原卟啉上升", "B.血红蛋白下降", "C.血清铁下降", "D.血清铁蛋白下降"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P63。", "铁缺乏三阶段（减、缺、贫）", "① 铁减少期(ID)：体内储存铁↓，血清铁蛋白↓，无临床症状；", "② 红细胞生成缺铁期(IDE)：血清铁蛋白↓，血清铁↓，铁结合力↑，游离原卟啉浓度↑；", "③ 缺铁性贫血期(IDA)：除上述指标外，血红蛋白↓，红细胞容积比↓。"]}], "qn": 5}, {"title": "21 锌", "items": [{"type": "q", "stem": "[2019RD真题]1.学龄前儿童缺锌的表现有（  ）①生长迟缓；②食欲不佳；③腹泻；④贫血；⑤暗适应能力下降", "options": ["A.①②", "B.①③", "C.①②③④", "D.①②③④⑤"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P65。", "锌缺乏可影响细胞核酸蛋白的合成、味蕾细胞更新、黏膜增生、角化不全、唾液中磷酸酶减少，从而导致食欲减退、异食癖、生长发育停滞等症状。"]}, {"type": "q", "stem": "[2019RD真题]2.促进烧伤创口愈合应选择补充（  ）", "options": ["A.铜", "B.铁", "C.锌", "D.钾"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P143。", "锌可参与DNA 和胶原组织的合成代谢，因此伤口愈合过程中必须有锌的存在。"]}, {"type": "q", "stem": "[2019RD真题]3.下列关于锌的生理功能，错误的是（  ）", "options": ["A.参与合成甲状腺激素", "B.促进味觉", "C.维持细胞膜稳定", "D.参与维生素A的代谢"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P65。", "A错，参与合成甲状腺激素是碘。", "其他选项对。"]}, {"type": "q", "stem": "[2019DTR真题]4.出现生长缓慢、皮肤伤口愈合不良、味觉障碍这些体征时，通常与下列哪种矿物质的缺乏有关（ ）", "options": ["A.铁", "B.锌", "C.碘", "D.铜"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P65。", "体内有多种含锌酶，参与组织呼吸、能量代谢以及抗氧化过程；锌参与蛋白质合成、细胞生长、分裂和分化过程。锌缺乏可影响细胞核酸和蛋白的合成、味蕾细胞更新，使黏膜增生、角化不全、唾液中磷酸酶减少，从而导致食欲减退、异食癖、生长发育停滞等症状，儿童长期缺锌可导致侏儒症。"]}, {"type": "q", "stem": "[2019DTR真题]5.下列哪一项症状与儿童的锌缺乏无关（ ）", "options": ["A.食欲差", "B.味觉迟钝", "C.齿龈肿胀", "D.性发育不良"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P65。", "锌与唾液蛋白结合成味觉素可增进食欲，缺锌可影响味觉和食欲，甚至发生异食癖。", "锌参与促黄体激素、促卵泡激素、促性腺激素等有关内分泌激素的代谢，对胎儿生长发育、促进性器官和性机能发育均具有重要调节作用。", "齿龈肿胀—维生素C缺乏。"]}], "qn": 5}, {"title": "22 硒", "items": [{"type": "q", "stem": "[2020RD真题]1.碘是甲状腺素合成的主要元素，由T4转化为T3与下列哪种矿物质有关（  ）", "options": ["A.铁", "B.铬", "C.硒", "D.铜"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P149。", "硒将甲状腺分泌的T4 转化成活性形式T3而提供给外周组织。"]}, {"type": "q", "stem": "[2020DTR真题]2.下列关于硒的描述，正确的是（ ）", "options": ["A.暂未制定RNI和UL值", "B.乳制品及新鲜蔬菜是硒良好来源", "C.参与维持胰岛素生理功能", "D.缺乏导致心脏疾病"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P66-P67。", "A错，硒RNI为60 μg/d，UL为400 μg/d。", "B错，海产品和动物内脏是硒的良好食物来源。", "C错，参与维持胰岛素生理功能的是铬。", "D对，机体缺硒可引起以心肌损害为特征的克山病，硒缺乏还可引起脂质过氧化反应增强，导致心肌纤维坏死、心肌小动脉和毛细血管损伤。"]}, {"type": "q", "stem": "[2021DTR真题]3.下列矿物质中，具有抗氧化作用的是（  ）", "options": ["A.碘", "B.硫", "C.硒", "D.磷"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P66。", "硒是谷胱甘肽过氧化物酶（GSH-Px）的组成成分，GSH-Px有抗氧化功能，可清除体内脂质过氧化物，阻断活性氧和其他自由基对机体的损伤作用。"]}, {"type": "q", "stem": "[2023RD真题]4.下列营养素中，可以通过红细胞中的谷胱甘肽过氧化物酶活性评估营养状况的是（  ）", "options": ["A.锌", "B.硒", "C.烟酸", "D.维生素B2"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P66、P67、P87、P88。", "锌—血浆碱性磷酸酶。", "硒—红细胞谷胱甘肽过氧化物酶活性。", "烟酸—红细胞NAD含量。", "维生素B2—红细胞谷胱甘肽还原酶活性。"]}, {"type": "q", "stem": "[2022DTR真题]5.下列关于硒生理功能的描述中，错误的是（  ）", "options": ["A.有毒重金属的解毒作用", "B.增强胰岛素作用", "C.保护心肌健康", "D.抗氧化作用"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P66。", "A对，硒与金属有较强的亲和力，能与体内重金属如汞、镉、铅等结合成金属－硒－蛋白质复合物而起到解毒作用，并促进有毒金属排出体外。", "B错，铬是体内葡萄糖耐量因子的重要组成成分，具有增强胰岛素作用。", "C对，硒缺乏引起脂质过氧化反应增强，致心肌纤维坏死、心肌小动脉和毛细血管损伤。", "D对，硒是谷胱甘肽过氧化物酶（ GSH-Px ）的组成成分，GSH-Px具有抗氧化功能。"]}], "qn": 5}, {"title": "23 铬", "items": [{"type": "q", "stem": "1.以下人体器官，铬浓度最高的是（ ）", "options": ["A. 肝脏", "B. 心脏", "C. 肾上腺", "D. 甲状腺"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P68。", "铬在人体内分布以骨、大脑、肌肉、皮肤和肾上腺浓度相对较高。肾上腺是内分泌器官，与铬参与糖代谢的功能密切相关。"]}, {"type": "q", "stem": "[2024RD真题]2.下列矿物质中，具有增强胰岛素作用的是（  ）", "options": ["A.硒", "B.铬", "C.碘", "D.钙"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P68。", "铬是体内葡萄糖耐量因子（GTF）的重要组成成分，在糖代谢中铬作为一个辅助因子，具有增强胰岛素作用。"]}, {"type": "q", "stem": "3.下列哪种物质会干扰铬的吸收（ ）", "options": ["A. 维生素C", "B. 草酸盐", "C. 乳糖", "D. 柠檬酸"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P68。", "铬的吸收率为10%~25%，草酸盐和植酸盐可通过与铬结合形成难溶化合物而干扰其吸收。维生素C、乳糖等可促进某些矿物质吸收，不干扰铬吸收。"]}, {"type": "q", "stem": "4.长期铬缺乏最可能出现的症状是（ ）", "options": ["A. 骨质疏松", "B. 葡萄糖耐量异常", "C. 皮肤角化过度", "D. 甲状腺肿大"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P68。", "铬缺乏会导致生长停滞、血脂增高、葡萄糖耐量异常，并伴有高血糖及尿糖。"]}, {"type": "q", "stem": "5.富含铬的食物来源中，错误的是（ ）", "options": ["A. 牡蛎", "B. 黑木耳", "C. 精制小麦粉", "D. 坚果类"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P68。", "铬广泛分布在食物中，动物性食物以肉类和海产品（牡蛎、海参、鱿鱼、鳗鱼等）含铬较丰富。植物性食物如谷物、豆类、坚果类、黑木耳、紫菜等含铬也较丰富。精制小麦粉因加工损失铬含量显著降低。"]}], "qn": 5}, {"title": "24 碘", "items": [{"type": "q", "stem": "[2017RD真题]1.通常用来反映某地区人群碘营养状况的指标是（  ）", "options": ["A.甲状腺结节", "B.尿碘", "C.甲状腺球蛋白", "D.游离四碘甲腺原氨酸"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P70。", "对于群体碘营养评价，可以采用50或100例以上的一次性随机尿碘中位数来表示。", "因采集儿童尿样可行性好，国际上常以儿童尿碘中位数来代表该地区人群碘营养状况。", "目前WHO推荐，当儿童尿碘中位数<100μg/L, 孕妇尿碘中位数<150μg/L, 则提示该人群碘营养不良。"]}, {"type": "q", "stem": "[2017RD真题]2.孕期甲状腺肿大可能是哪种营养素缺乏所致（  ）", "options": ["A.铁", "B.锌", "C.碘", "D.硒"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P69。", "碘缺乏的典型症状为甲状腺肿大。"]}, {"type": "q", "stem": "[2019DTR真题]3.下列食物中，长期大量摄入会干扰甲状腺对碘的吸收利用的是（ ）", "options": ["A.菠菜", "B.紫菜", "C.花菜", "D.西红柿"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P69。", "长期大量摄入含抗甲状腺素因子的食物（如十字花科植物中的萝卜、甘蓝、花菜中含有（β-硫代葡萄糖苷等），可干扰甲状腺对碘的吸收利用，可引起碘缺乏。"]}, {"type": "q", "stem": "[2021DTR真题]4.关于碘的说法正确的是（  ）", "options": ["A.尿碘是评价碘摄入量的良好指标", "B.各类食物来源的碘必须变成碘离子才能在小肠吸收", "C.过量摄入造成甲状腺坏死和萎缩", "D.过量碘由尿液排出，因此不会存在碘中毒危害"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P69-P70。", "无机碘在胃和小肠几乎100% 被迅速吸收；有机碘在消化道被消化、脱碘后，以无机碘形式被吸收。此外，与氨基酸结合的碘可直接被吸收。", "碘过量摄入可引起高碘性甲状腺肿、碘性甲状腺功能亢进、甲状腺功能减退、桥本氏甲状腺炎等。"]}, {"type": "q", "stem": "[2019DTR真题]5.下列矿物质中，参与甲状腺激素合成的是（ ）", "options": ["A.铁", "B.钙", "C.碘", "D.铜"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P69。", "碘的生理功能是通过甲状腺激素完成的。", "甲状腺利用碘和酪氨酸合成甲状腺激素，包括三碘甲腺原氨酸和四碘甲腺原氨酸。"]}], "qn": 5}, {"title": "25 铜", "items": [{"type": "q", "stem": "[2018RD]1.下列矿物质中，可促进运铁蛋白合成的是（  ）", "options": ["A.铜", "B.镁", "C.钴", "D.锰"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P70。", "铜蓝蛋白在肝脏合成，可催化二价铁氧化成三价铁，对生成运铁蛋白、促进铁的吸收和转运具有重要作用；铜蓝蛋白还能促进血红素和血红蛋白的合成，缺铜可引起缺铁性贫血。"]}, {"type": "q", "stem": "[2019RD]2.以下矿物质中，与胶原蛋白和弹性蛋白交联有关的是（  ）", "options": ["A.钙", "B.铁", "C.铜", "D.氟"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P70。", "含铜的赖氨酰氧化酶能促进骨髓、皮肤和血管中胶原蛋白和弹性蛋白的交联。"]}, {"type": "q", "stem": "3. 下列哪种酶需要铜作为辅助因子参与其活性（  ）", "options": ["A. 过氧化氢酶", "B. 超氧化物歧化酶（SOD）", "C. 谷胱甘肽过氧化物酶", "D. 碳酸酐酶"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P70。", "铜是超氧化物歧化酶（SOD）的必需辅助因子，该酶负责清除氧自由基，保护细胞免受氧化损伤。其他选项中，过氧化氢酶含铁，谷胱甘肽过氧化物酶含硒，碳酸酐酶含锌。"]}, {"type": "q", "stem": "[2023DTR真题]4.下列矿物质参与代谢对应错误的是（  ）", "options": ["A.铜，参与红细胞生成与代谢", "B.铁，超氧化物歧化酶", "C.碘，参与甲状腺激素合成", "D.硒，谷胱甘肽过氧化物酶"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P62、P66、P69、P70。", "A对，铜蓝蛋白可催化二价铁氧化成三价铁，对生成运铁蛋白、促进铁的吸收和转运具有重要作用；铜蓝蛋白还能促进血红素和血红蛋白的合成。", "B错，铁是血红蛋白、肌红蛋白、细胞色素、细胞色素氧化酶及触媒（铁的氧化物，起催化作用）的组成成分。锌、铜是超氧化物歧化酶组成成分。", "C对，碘在体内主要参与甲状腺激素的合成。", "D对，硒是谷胱甘肽过氧化物酶（GSH-Px）的组成成分，GSHPx具有抗氧化功能。"]}, {"type": "q", "stem": "[2024DTR真题]5.大多数家庭会选择自己包粽子，但市面新鲜粽叶往往供不应求，导致不法商家用硫酸铜浸泡叶子反青，下列正确的是（  ）", "options": ["A.铜是人体可能必需微量元素", "B.铜中毒主要的靶器官是肾", "C.硫酸铜是食品添加剂，作用是漂白剂", "D.硫酸铜是食品加工助剂，广泛应用于皮蛋生产过程"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P53、P70。《GB 2760-2024 食品添加剂使用标准》。", "A错，铜是人体必需微量元素。", "B错，过量铜中毒最常见的受损器官是肝脏。", "C错，硫酸铜不是漂白剂。", "D对，硫酸铜作为食品加工助剂，功能为澄清剂、螯合剂、发酵用营养物质，其适用范围为：葡萄酒的加工工艺、皮蛋的加工工艺、发酵工艺。"]}], "qn": 5}, {"title": "26 锰", "items": [{"type": "q", "stem": "1.锰在人体内的主要生理功能是（ ）", "options": ["A. 参与甲状腺激素合成", "B. 作为超氧化物歧化酶（SOD）的辅因子", "C. 维持红细胞渗透压", "D. 促进维生素B12吸收"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P71。", "锰是锰超氧化物歧化酶（Mn-SOD）的必需辅因子，参与清除自由基。甲状腺激素合成需碘，红细胞渗透压依赖钠钾平衡，维生素B12吸收与内因子相关。"]}, {"type": "q", "stem": "2.锰缺乏可能导致下列哪种症状（  ）", "options": ["A. 骨质疏松", "B. 伤口愈合延迟", "C. 葡萄糖耐量异常", "D. 夜盲症"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P71。", "锰缺乏可影响糖代谢酶活性，导致葡萄糖耐量异常。骨质疏松与钙或维生素D缺乏相关，伤口愈合延迟与锌缺乏相关，夜盲症由维生素A缺乏引起。"]}, {"type": "q", "stem": "3.下列哪种物质会抑制锰的吸收（  ）", "options": ["A. 植酸盐", "B. 维生素C", "C. 乳糖", "D. 柠檬酸"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P71。", "膳食纤维、钙、磷的浓度增高可促进锰的吸收，植酸盐、铁浓度增高时抑制锰的吸收。"]}, {"type": "q", "stem": "4.锰在人体内的主要排泄途径是（ ）", "options": ["A. 肾脏（尿液）", "B. 肠道（粪便）", "C. 汗液", "D. 呼吸道"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P71。", "锰90%以上由肠道排出，少量从尿中排出，也有微量从汗液、头发和指甲中排出。"]}, {"type": "q", "stem": "5.富含锰的食物来源是（ ）", "options": ["A. 精制大米", "B. 牛肉", "C. 坚果和全谷物", "D. 牛奶"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P71。", "糙米、米糠、麦芽、麦麸、核桃、河蚌，以及茶叶和咖啡中锰含量丰富。坚果、花生、干豆类食物也是锰的良好来源。精制谷类、脂肪、鱼、禽、肉、奶类中含量较低。"]}], "qn": 5}, {"title": "27 氟", "items": [{"type": "q", "stem": "[2019RD]1.氟摄入过量可以使人发生氟斑牙。下面不正确的是（  ）", "options": ["A.氟斑牙多发生在恒牙", "B.氟斑牙发生有性别差异", "C.外来人口更容易发生", "D.年龄越大，氟骨症患病率越高"], "answer": "答案：B", "analysis": ["解析：《环境卫生学》第8版P217。", "A对，氟斑牙主要发生在正在生长发育中的恒牙。", "B错，地方性氟中毒的发生一般无明显性别差异。", "C对，非病区迁入者发病时间一般较病区居民短，且病情严重，民间有“氟中毒欺侮外来人”的说法。", "D对，氟骨症发病主要在成年人，发生率随着年龄增长而升高，且病情严重。"]}, {"type": "q", "stem": "[2024RD]2.某山区居民，43岁，轻微驼背，牙齿有少量断裂和缺损，釉面有色素沉着，早上起床时感觉全身关节和骨骼疼痛，外出活动和劳动后减轻。无重大疾病史，家中无相似病例，该村民可能是（ ）", "options": ["A.软骨病", "B.水俣病", "C.氟中毒D 碘缺乏"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P71。", "患者表现为氟中毒典型症状：①氟斑牙（釉面色素沉着、牙齿缺损）；②氟骨症（骨骼疼痛、驼背，晨起活动后减轻）。其他选项：软骨病（维生素D缺乏）无牙齿病变；水俣病（汞中毒）以神经系统损害为主；碘缺乏主要导致甲状腺肿大或克汀病。"]}, {"type": "q", "stem": "[2020DTR]3.下列关于地方性氟中毒的描述，错误的是（  ）", "options": ["A.从非病区搬入的居民发病时间比当地居民要短", "B.随着年龄的增加，患氟骨病增多", "C.氟斑牙多见于恒牙", "D.发病有明显的性别差异"], "answer": "答案：D", "analysis": ["解析：《流行病学》第9版P334。", "地方性氟中毒通常男女无明显差别。"]}, {"type": "q", "stem": "4.人体内氟的主要存在部位是（ ）", "options": ["A. 肝脏", "B. 骨骼和牙齿", "C. 肌肉组织", "D. 血液"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P71。", "氟主要存在于骨骼和牙齿中，少量分布在毛发、指甲及其他组织。"]}, {"type": "q", "stem": "5. 氟的生理功能不包括（ ）", "options": ["A. 防治龋齿", "B. 维持骨骼硬度", "C. 参与甲状腺激素合成", "D. 促进牙釉质抗酸性"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P71。", "氟可部分取代骨骼中羟磷灰石晶体中的羟离子，成为骨盐的组成成分。适量的氟有利于钙和磷的利用，促进骨的形成和增强骨质坚硬性，加速骨骼生长。氟可与牙釉质中羟磷灰石作用，在牙齿表面形成一层坚硬且具有抗酸性腐蚀的氟磷灰石晶体保护层，抑制糖酵解，减少酸性物质生成，起到防治龋齿的作用。"]}], "qn": 5}, {"title": "28 钴", "items": [{"type": "q", "stem": "1.钴的主要生理功能是（ ）", "options": ["A. 参与甲状腺激素合成", "B. 作为维生素B12的组成成分", "C. 维持骨骼钙磷平衡", "D. 促进胶原蛋白合成"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P71。", "钴是维生素B12的核心成分，直接参与红细胞成熟过程。甲状腺激素合成需碘，钙磷平衡与维生素D相关，胶原蛋白合成依赖维生素C。"]}, {"type": "q", "stem": "2.下列人体组织内，钴含量最高的是（ ）", "options": ["A. 肌肉", "B. 肝脏", "C. 血液", "D. 皮肤"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P71。", "肝脏、肾脏、骨骼中钴含量较高。"]}, {"type": "q", "stem": "3.长期钴缺乏可能导致（ ）", "options": ["A. 缺铁性贫血", "B. 巨幼红细胞性贫血", "C. 坏血病", "D. 克山病"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P71。", "钴缺乏会阻碍维生素B12的合成，导致DNA合成障碍，引发巨幼红细胞性贫血。缺铁性贫血由铁缺乏引起，坏血病与维生素C缺乏相关，克山病与硒缺乏相关。"]}, {"type": "q", "stem": "4.钴过量可能对机体的主要危害是（ ）", "options": ["A. 抑制甲状腺对碘的吸收", "B. 损伤神经系统", "C. 诱发痛风", "D. 导致骨质疏松"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P71。", "过量钴会拮抗碘的吸收，干扰甲状腺功能。神经系统损伤常见于汞、铅中毒，痛风与嘌呤代谢异常相关，骨质疏松与钙或维生素D缺乏相关。"]}, {"type": "q", "stem": "5.富含活性型钴的食物来源是（ ）", "options": ["A. 精制大米", "B. 海带和紫菜", "C. 柑橘类水果", "D. 鸡蛋"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P71。", "活性型钴在海产品食物中如蟹肉、沙丁鱼、海带、紫菜、鱿鱼等含量最高；动物性食品如肝、肾等中钴含量较高；蔬菜中含钴量少，乳制品和各类精制食品中钴含量也较低。"]}], "qn": 5}, {"title": "29 镍", "items": [{"type": "q", "stem": "1. 镍在人体内的主要生理功能是（ ）", "options": ["A. 参与甲状腺激素合成", "B. 作为脲酶的辅助因子", "C. 维持红细胞渗透压", "D. 促进维生素D活化"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P71。", "镍是脲酶的必需辅助因子，参与尿素分解。甲状腺激素合成需碘，红细胞渗透压依赖钠钾平衡，维生素D活化与紫外线照射相关。"]}, {"type": "q", "stem": "2.镍的排泄主要途径是（ ）", "options": ["A. 尿液", "B. 汗液", "C. 胆汁（粪便）", "D. 呼吸道"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P71。", "体内大部分镍从粪便排出体外，少部分从尿以及汗液中排出。"]}, {"type": "q", "stem": "3.镍缺乏可能导致（ ）", "options": ["A. 生长迟缓和贫血", "B. 甲状腺肿大", "C. 皮肤角化过度", "D. 骨质疏松"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P71。", "镍缺乏可影响铁代谢和红细胞生成，导致生长迟缓和贫血。其他症状与碘、维生素A或钙缺乏相关。"]}, {"type": "q", "stem": "4.镍在人体内的主要吸收部位是（ ）", "options": ["A. 胃", "B. 小肠", "C. 结肠", "D. 口腔黏膜"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P71。", "镍在小肠内被吸收，一般吸收率低于10%"]}, {"type": "q", "stem": "5.富含镍的食物来源是（ ）", "options": ["A. 牛奶", "B. 精制小麦粉", "C. 巧克力及坚果", "D. 柑橘类水果"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P167。", "含镍丰富的食物有巧克力、果仁、干豆和谷类。"]}], "qn": 5}, {"title": "30 钼", "items": [{"type": "q", "stem": "1. 钼在人体内的主要生理功能是（ ）", "options": ["A. 参与甲状腺激素合成", "B. 作为黄嘌呤氧化酶的辅助因子", "C. 维持红细胞渗透压", "D. 促进维生素D活化"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P71。", "钼是黄嘌呤氧化/脱氢酶、亚硫酸盐氧化酶和醛氧化酶的必需辅助因子，参与嘌呤代谢和解毒过程。甲状腺激素合成需碘，红细胞渗透压依赖钠钾平衡，维生素D活化与紫外线照射相关。"]}, {"type": "q", "stem": "2.下列人体组织内，钼含量最高的是（ ）", "options": ["A. 肝脏", "B. 骨骼", "C. 肌肉", "D. 血液"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P71。", "肝脏、肾脏和皮肤含钼量较高。"]}, {"type": "q", "stem": "3. 钼缺乏的典型表现是（ ）", "options": ["A. 甲状腺肿大", "B. 亚硫酸氧化酶不足引起的昏迷", "C. 皮肤角化过度", "D. 骨质疏松"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P71。", "钼缺乏导致亚硫酸氧化酶活性下降，引发亚硫酸盐蓄积，表现为昏迷、心动过速、呼吸急促。"]}, {"type": "q", "stem": "4.钼缺乏可能关联的疾病是（ ）", "options": ["A. 食管癌", "B. 氟骨症", "C. 克山病", "D. 坏血病"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P71。", "根据人群流行病学调查结果，认为低钼可能与食管癌的发生有关。"]}, {"type": "q", "stem": "5.长期钼过量可能引起（ ）", "options": ["A. 溶血性贫血", "B. 氟斑牙", "C. 甲状腺功能减退", "D. 痛风样症状"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P71。", "钼过量会干扰嘌呤代谢，导致尿酸生成增加，引发痛风样症状。其他选项与铅、氟或碘异常相关。"]}], "qn": 5}, {"title": "31 维生素A（上）", "items": [{"type": "q", "stem": "[2024RD真题]1.下列维生素中，可以维持上皮细胞组织的完整性，增强上呼吸道的防御功能，对接触粉尘作业人群，膳食中应注意增加供给量的是（  ）", "options": ["A.维生素E", "B.维生素C", "C.维生素D", "D.维生素A"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P76。", "维生素A维护上皮组织细胞的健康。"]}, {"type": "q", "stem": "[2017RD真题]2.某成年人长期补充某种维生素后出现皮肤干燥、斑丘疹样皮疹、脱发、皮肤瘙痒、脱屑、骨关节疼痛，肌强直、厌食等症状，出现上述症状最可能的原因是（  ）", "options": ["A.维生素A中毒", "B.维生素D中毒", "C.维生素E中毒", "D.维生素K中毒"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P77。", "维生素A 使用剂量为其RNI 10倍以上时可发生慢性中毒，常见症状是头痛、食欲降低、脱发、肝大、长骨末端外周部分疼痛、肌肉疼痛和僵硬、皮肤干燥瘙痒、复视、出血、呕吐和昏迷等。"]}, {"type": "q", "stem": "[2021RD真题]3.维生素A缺乏的临床症状包括（  ）①夜盲症；②角膜软化；③皮肤干燥、毛囊角化；④脂溢性皮炎；⑤腹泻。", "options": ["A.①②③④", "B.①②③", "C.①③", "D.①②③④⑤"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P76。", "维生素A缺乏最早的症状是暗适应能力下降，进一步发展为夜盲症，严重者可致眼干燥症，甚至失明；儿童维生素A缺乏最重要的临床体征是比奥斑。", "维生素A缺乏还会引起机体不同组织上皮干燥、增生及角化，以至出现各种症状（如皮脂腺及汗腺角化，出现皮肤干燥，毛囊角化过度，毛囊丘疹与毛发脱落），食欲降低，易感染。特别是儿童、老人容易引起呼吸道炎症，严重时可引起死亡。另外，维生素A缺乏时，血红蛋白合成代谢障碍，免疫功能低下，儿童生长发育迟缓。"]}, {"type": "q", "stem": "[2018DTR真题]4.下列维生素中，过量摄入可在体内蓄积导致急慢性中毒的是（ ）", "options": ["A.核黄素", "B.维生素A", "C.硫胺素", "D.叶酸"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P77。", "维生素A是脂溶性维生素，脂溶性维生素的特点是可溶于脂类，故摄入较多时可在体内储存，并随着摄入量的增加逐步蓄积达到毒作用剂量水平而发生中毒。核黄素、硫胺素、叶酸均为水溶性维生素，摄入较多时可通过尿液、汗液排出体外，故不易发生中毒。"]}, {"type": "q", "stem": "[2020DTR真题]5.下列关于β-胡萝卜素的说法，错误的是（ ）", "options": ["A.β-胡萝卜素主要储存在皮下脂肪", "B.β-胡萝卜素是维生素A原", "C.β-胡萝卜素的利用率受到脂肪的影响", "D.动植物均可合成β-胡萝卜素"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P171。", "类胡萝卜素存在于某些动物、植物和微生物中，仅在植物和微生物中可自行合成，动物自身不能合成。"]}], "qn": 5}, {"title": "32 维生素A（下）", "items": [{"type": "q", "stem": "[2017RD真题]1.为预防儿童维生素A缺乏，下列描述中不正确的是（  ）", "options": ["A.常食用动物肝脏", "B.多吃胡萝卜或菠菜等深色蔬菜", "C.每天多晒太阳，可帮助维生素A在体内合成", "D.吃动物肝脏比吃胡萝卜更有利于预防维生素A缺乏"], "answer": "答案：C《营养与食品卫生学》第9版P78。", "analysis": ["晒太阳有助于维生素D 的合成。"]}, {"type": "q", "stem": "[2021RD真题]2.某研究采用相对剂量反应试验（RDR）法评价儿童维生素A营养状况。若某一儿童口服1mg视黄醇乙酸酯，在口服前和口服后5小时测定的血浆视黄醇浓度分别为1.05μmol/L和1.45μmol/L。请计算RDR并判断该儿童的维生素A营养状况（  ）", "options": ["A.28%，维生素A缺乏", "B.38%，维生素A充足", "C.28%，维生素A充足", "D.38%，维生素A缺乏"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P77。", "RDR(%)=(5h视黄醇浓度-基础视黄醇浓度）/5h视黄醇浓度×100%=(1.45-1.05）/1.45×100%=28%根据WHO建议标准，RDR(%)≥20%，可判断为维生素A缺乏。"]}, {"type": "q", "stem": "[2020RD真题]3.对某寄宿学校进行体格检查，发现25%的学生暗适应时间较正常人延长30秒，其他各项检查无异常，建议在该学校集体膳食中，应注意补充的是（  ）", "options": ["A.猪肝", "B.猪心", "C.蔬菜水果", "D.全谷类"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P76、P78。", "维生素A缺乏最早的症状是暗适应能力下降。动物肝脏是维生素A良好来源。"]}, {"type": "q", "stem": "[2018DTR真题]4.请根据所给的食物成分表，回答下列问题。", "options": ["A.234μgRAE、52μgRAE", "B.234μgRAE、103μgRAE", "C.117μgRAE、103μgRAE", "D.117μgRAE、52μgRAE"], "answer": "答案：A", "analysis": ["食物成分表（每100g可食部）若维生素A的单位换成“视黄醇活性当量（μgRAE）”鸡蛋和油菜的维生素A含量（每100g可食部）分别是（  ）", "解析：《营养与食品卫生学》第9版P78。", "膳食或食物中总视黄醇活性当量（μg RAE）=全反式视黄醇（μg）+1/2补充剂纯品全反式β-胡萝卜素（μg）+1/12膳食全反式β-胡萝卜素（μg）+1/24其他膳食维生素A原类胡萝卜素（μg）鸡蛋总视黄醇活性当量=234μgRAE。油菜总视黄醇活性当量= 620/12≈52μgRAE。"]}, {"type": "q", "stem": "[2022RD真题]5.若对某一成年男性做膳食调查，结果表明维生素A摄入量为2800μgRAE/d，下面对膳食的评价，最合理的是（  ）", "options": ["A.建议减少维生素A的摄入，已在UL边缘，有维生素A中毒的风险", "B.建议增加维生素A摄入，达3000μgRAE/d对健康最有益处", "C.维生素A摄入充足", "D.建议减少维生素A摄入，达RNI就可以满足需要量"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P16、P78。", "A错，UL是营养素每日摄入量的安全上限，未超过3000μgRAE/d，无中毒风险。", "B错，对一般群体来说，摄入量达到UL水平并不表示对健康最有益。", "C对，达到RNI水平（800μgRAE/d），维生素A摄入充足。", "D错，不用减少维生素A摄入，维持在RNI~UL之间水平就行。"]}], "qn": 5}, {"title": "33 维生素D", "items": [{"type": "q", "stem": "[2017RD真题]1.日常购买维生素D胶囊其中都是用“国际单位”表示含量。如果1粒胶囊中含有2000国际单位的维生素D3，换算成以“μg”为单位是（  ）", "options": ["A.50μg", "B.100μg", "C.600μg", "D.2000μg"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P80。", "维生素国际单位的换算关系：维生素D（1μg=40国际单位）维生素A（1国际单位=0.3μg全反式视黄醇= 0.3μg视黄醇活性当量）维生素E（1国际单位=0.91mg dl-α-生育酚=0.67mg d-α-生育酚）"]}, {"type": "q", "stem": "[2017RD真题]2.评价机体维生素D营养状况的良好指标是（  ）", "options": ["A.血25-(OH) D", "B.血1,25-(OH)2D", "C.碱性磷酸酶活性", "D.骨钙素"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P80。", "25-(OH)-D3是维生素D在血液中的主要存在形式，其半衰期是3周，可特异性地反映出人体几周到几个月内维生素D的储存情况；此外，在血液中25-(OH)-D3受机体调节影响较小，因而作为首选评价机体维生素D状况的指标。"]}, {"type": "q", "stem": "[2018DTR真题]3.下列维生素中，人体能通过膳食和皮肤两种途径获得的是（ ）", "options": ["A.维生素E", "B.叶酸", "C.维生素A", "D.维生素D"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P78。", "大部分的维生素不能由机体合成，需要从食物中获得。维生素D的合成原料是胆固醇的代谢产物7-脱氢胆固醇，它可在皮肤中经紫外线（阳光）照射合成维生素D的前体物质，经过在肝脏和肾脏的两次羟化以后形成具有生物活性的维生素D以供机体需要。"]}, {"type": "q", "stem": "[2019DTR真题]4.具有生物活性的维生素D-1,25(OH)2D3是在哪个器官合成的（ ）", "options": ["A.肝脏", "B.小肠", "C.肾脏", "D.皮肤"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P78。", "维生素D3 在肝脏羟化生成25-(OH) -D3，25-(OH) -D3由肝脏分泌入血，并由DBP携载运输至肾脏，进一步被羟化成1,25-(OH)2-D3。"]}, {"type": "q", "stem": "[2019RD真题]5.若桐桐囟门尚未闭合，有鸡胸，腹部膨出，双脚并立时双膝不能靠拢，最可能的病因是（  ）", "options": ["A.维生素A缺乏", "B.维生素D缺乏", "C.维生素E缺乏", "D.维生素K缺乏"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P79。", "维生素D缺乏时，由于骨骼不能正常钙化，易引起骨骼变软和弯曲变形，如幼儿刚学会走路时，身体重量使下肢骨弯曲，形成“X”或“O”形腿。胸骨外凸(“鸡胸” )，肋骨与肋软骨连接处形成“肋骨串珠”。囟门闭合延迟、骨盆变窄和脊柱弯曲等。由于腹部肌肉发育不良，易使腹部膨出。牙齿方面，出牙推迟，恒齿稀疏、凹陷、容易发生龋齿。"]}], "qn": 5}, {"title": "34 维生素E", "items": [{"type": "q", "stem": "[2017RD真题]1.下列天然油脂中总维生素E含量最高的是（  ）", "options": ["A.棕榈油", "B.花生油", "C.玉米油", "D.橄榄油"], "answer": "答案：C", "analysis": ["解析：《中国食物成分表》第6版。", "食用油脂中维生素E含量（100g）"]}, {"type": "q", "stem": "[2020RD真题]2.维生素E过量摄入，可能导致的问题是（  ）", "options": ["A.干扰钙磷吸收，容易发生骨质软化", "B.抑制铜吸收，造成溶血性贫血", "C.干扰维生素K的吸收及维生素K的凝血功能，导致出血性疾病的发生", "D.增加胆固醇氧化，造成动脉粥样硬化"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P81。", "在脂溶性维生素中，维生素E的毒性相对较小。但摄入大剂量维生素E（每天摄入800mg~3.2g） 有可能出现中毒症状，如肌无力、视觉模糊、复视、恶心、腹泻以及维生素K的吸收和利用障碍。"]}, {"type": "q", "stem": "[2018DTR真题]3.膳食脂肪能促进下列哪种维生素在肠道内的吸收（ ）", "options": ["A.维生素C", "B.叶酸", "C.维生素E", "D.烟酸"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P72。", "脂肪是脂溶性维生素的良好载体，食物中脂溶性维生素常常与脂肪并存。膳食缺乏脂肪或脂肪吸收障碍时，会引起体内脂溶性维生素不足或缺乏。"]}, {"type": "q", "stem": "[2018DTR真题]4.下列维生素中，具有抗氧化作用的是（ ）①维生素D；②维生素E；③维生素B1；④维生素C；⑤烟酸", "options": ["A.①②", "B.①⑤", "C.②③", "D.②④"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P80、P94。", "维生素E和维生素C是因其可提供电子给自由基而阻断自由基的链式反应，故具有抗氧化作用。"]}, {"type": "q", "stem": "[2021RD真题]5.下列关于脂溶性维生素的描述正确的是（  ）", "options": ["A.胃酸分泌减少，可能导致维生素K缺乏", "B.脂肪摄入过多，脂溶性维生素尿排泄也增多", "C.奶油富含维生素E", "D.视网膜内视紫红质是由11-顺式视黄醛与视蛋白结合而成"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P82。", "A错。胃酸分泌减少，可能导致维生素B12缺乏", "B错。脂溶性维生素不通过尿排泄。", "C错。奶油维生素E含量不高，1.99mg/100g。", "D对。人视网膜的杆状细胞内含有感光物质视紫红质，它是由11-顺式视黄醛和视蛋白缩合而成。"]}], "qn": 5}, {"title": "35 维生素K", "items": [{"type": "q", "stem": "[2018RD真题]1.下列关于维生素各种形式的描述，错误的是（  ）", "options": ["A.视黄酰棕榈酸酯是维生素A在体内的储存形式", "B.25-(OH)D是维生素D在血液中的存在形式", "C.α-生育酚是活性最高的维生素E", "D.维生素K1是由细菌合成的维生素K"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P82。", "维生素K1—天然绿色植物；维生素K2—细菌合成；维生素K3、K4—人工合成。"]}, {"type": "q", "stem": "[2022RD真题]2.下列关于维生素生理功能的描述中，正确的是（  ）", "options": ["A.维生素E能促进脂质过氧化反应", "B.维生素D是构成视觉细胞内感光物质的成分", "C.维生素K能调节骨组织钙化", "D.维生素A能调节凝血蛋白质合成"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P82。", "维生素K能够促进成骨细胞，抑制破骨细胞从而促进骨骼钙化。成骨细胞能够合成3种维生素K依赖Gla蛋白：骨Gla蛋白质（BGP），基质Gla蛋白质（MGP）和蛋白质S。"]}, {"type": "q", "stem": "[2023RD真题]3.列维生素K的描述中，正确的是（  ）", "options": ["A.维生素K可以长期储存在肝脏内，过量食用会导致中毒", "B.禽畜类肌肉是维生素K的良好来源", "C.乳糜微粒内不含维生素K", "D.维生素K缺乏，最具特征的表现是出血性倾向"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P82。", "A错，人类体内维生素K的储存很少，更新很快，肝脏储存机体10%的维生素K1和90%的维生素K2。天然形式的维生素K1和维生素K2不产生毒性，甚至大量服用也无毒。", "B错，维生素K1—天然绿色植物；维生素K2—肠道内由细菌合成；维生素K3、K4—人工合成。", "C错，维生素K的吸收需要胆汁、胰液参与，并与乳糜微粒相结合，由淋巴系统运输。", "D对，维生素K缺乏表现为凝血缺陷和出血。"]}, {"type": "q", "stem": "[2019DTR真题]4.下列哪类人群特别需要关注维生素K的补充（  ）", "options": ["A.新生儿", "B.不喝牛奶的青少年", "C.素食者", "D.孕妇"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P82。", "新生儿是对维生素K营养需求的一个特殊群休，因为：①胎盘转运脂质相对不足；②新生儿肝脏对凝血酶原的合成尚未成熟；③母乳维生素K的含量低，仅含1~2 μg/L（牛乳含5~10μg/L）；④新生儿肠道出生后头几天是无菌的。因此有许多婴儿产生新生儿出血病。"]}, {"type": "q", "stem": "[2019DTR真题]5.长期服用抗生素，较易造成下列哪种维生素缺乏（  ）", "options": ["A.维生素K", "B.维生素A", "C.维生素D", "D.维生素E"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P82。", "维生素K缺乏可见于最低限度膳食摄入量的成人，如他们经受外伤、外科手术，或长期胃肠外营养伴或不伴广谱抗生素治疗。", "抗生素抑制肠道细菌合成维生素K。"]}], "qn": 5}, {"title": "36 维生素B1", "items": [{"type": "q", "stem": "[2017RD真题]1.红细胞转酮醇酶活性系数可用来评价下列哪种营养素的营养状况（  ）", "options": ["A.维生素A", "B.维生素B1", "C.铜", "D.锌"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P85。", "血液中维生素B1绝大多数以TPP形式存在于红细胞中，并作为转酮醇酶的辅酶发挥作用。该酶活力的大小与血液中维生素B1的浓度密切相关。故可通过体外试验测定加入TPP前后红细胞中转酮醇酶活性的变化来反映机体的营养状态。"]}, {"type": "q", "stem": "[2018RD真题]2.三个月的婴儿，发绀、心脏肿大、心跳加快、食欲缺乏。请问是缺乏下列哪种营养素（  ）", "options": ["A.维生素A", "B.维生素B1", "C.维生素B2", "D.维生素C"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P84。", "婴儿脚气病多发生于2~5月龄的婴儿，多是由于乳母维生素B1缺乏所致。其发病突然，病情急，初期食欲缺乏、呕吐、兴奋和心跳快，呼吸急促和困难；晚期有发绀、水肿、心脏扩大、心力衰竭和强制性痉挛，常在症状出现1~2天后突然死亡。"]}, {"type": "q", "stem": "[2018DTR真题]3.小徐煮粥的时候，习惯往里面加碱，这样比较黏稠，口感好。这种方法会导致下列哪种营养素损失明显增加（ ）", "options": ["A.维生素B1", "B.烟酸", "C.维生素E", "D.维生素A"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P83。", "维生素B1（硫胺素）易溶于水且在碱性条件下容易受热分解的特性会使在烹饪中加碱导致维生素B1的大量损失。"]}, {"type": "q", "stem": "[2021DTR真题]4.男，60岁，酗酒，近3月出现疲乏无力，心悸，气促，全身水肿，症状逐渐加重，前往医院就诊，经强心，利尿，补充白蛋白，抗感染治疗1周后无效，考虑为某营养素缺乏。该患者可能缺乏的维生素是（  ）", "options": ["A.维生素B2", "B.维生素E", "C.维生素A", "D.维生素B1"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P84。", "长期酗酒的人群极易由于酒精中毒而引起维生素B1缺乏。", "维生素B1缺乏导致湿性脚气病：多以水肿和心脏症状为主。由于心血管系统功能障碍，出现水肿，右心室可扩大，出现心悸、气短、心动过速，如处理不及时，常致心力衰竭。"]}, {"type": "q", "stem": "[2021RD真题]5.一般情况下，维生素B1在体内的排泄途径是（  ）", "options": ["A.粪便", "B.汗液", "C.胆汁", "D.尿液"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P84。", "维生素B1在肝脏代谢，代谢产物主要由肾脏随尿排出体外，排出量与摄入量有关。少量由汗液排出。"]}], "qn": 5}, {"title": "37 维生素B2", "items": [{"type": "q", "stem": "[2017RD真题]1.在某小学进行体检时，发现有少数学生口角有轻度溃疡，怀疑可能是某营养素缺乏，为确诊并进行了实验室检查。该营养索及对应的检查项目是（  ）①维生素B1；②维生素B2；③红细胞转酮醇酶活性系数；④全血谷胱甘肽还原酶活性系数", "options": ["A.①③", "B.②④", "C.②③", "D.①④"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P86-P87。", "维生素B2缺乏早期表现为疲倦、乏力、口腔疼痛，眼睛出现痛痒、烧灼感，继而出现口腔和阴囊病变，称为“口腔生殖系统综合征” 。", "由于FAD是谷胱甘肽还原酶的辅酶，可采用红细胞或全血谷胱甘肽还原酶活性系数来评价维生素B2营养状况。"]}, {"type": "q", "stem": "[2018DTR真题]2.下列维生素及其活性形式对应错误的是（ ）", "options": ["A.维生素B1－TPP", "B.维生素B2－ATP", "C.维生素B6－PLP", "D.烟酸-NAD+"], "answer": "答案：B", "analysis": ["解析："]}, {"type": "q", "stem": "[2018DTR真题]3.下列维生素及其名称对应错误的是（ ）", "options": ["A.维生素B2－烟酸", "B.维生素B1－硫胺素", "C.维生素A－视黄醇", "D.维生素B6－吡哆醇"], "answer": "答案：A", "analysis": ["解析："]}, {"type": "q", "stem": "[2019DTR真题]4.尿负荷实验可用于测定下列哪些营养素的营养状况（ ）①维生素A；②维生素B1；③维生素B2；④维生素C；⑤维生素E", "options": ["A.①⑤", "B.②③④", "C.①②③", "D.①④⑤"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P85、P87、P95。", "尿负荷实验可用于水溶性维生素的营养水平评定。"]}, {"type": "q", "stem": "[2020DTR真题]5.下列维生素中与能量代谢无关的是（ ）①维生素A；②维生素D；③维生素B1；④维生素B2；⑤烟酸", "options": ["A.①②", "B.①③⑤", "C.②⑤", "D.③④⑤"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P72。", "维生素B1、维生素B2和烟酸与能量代谢密切相关，它们的需要量一般是随着对能量的需要量增加而增加。"]}], "qn": 5}, {"title": "38 烟酸", "items": [{"type": "q", "stem": "[2019RD真题]1.根据我国《食物成分表》，牛腩中的烟酸含量为2.2mg/100g，维生素B6含量为0.1mg/100g，色氨酸含量为120mg/100g，苏氨酸含量为800mg/100g，请问100g牛腩中的烟酸当量（mgNE）是（  ）", "options": ["A.2.2", "B.4.2", "C.10.2", "D.12.3"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P88。", "烟酸当量（mgNE）=烟酸（mg）+1/60色氨酸=2.2+120/60=4.2。"]}, {"type": "q", "stem": "[2020RD真题]2.烟酸缺乏导致的赖皮病其典型症状不包括（  ）", "options": ["A.腹泻（diarrhea）", "B.皮炎（dermatitis）", "C.痴呆（dementia）", "D.脱水（dehydration）"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P88。", "当烟酸缺乏时，体内辅酶I和辅酶Ⅱ合成受阻，导致某些生理氧化过程发生障碍，即出现烟酸缺乏症—癞皮病。其典型症状是皮炎（dermatitis）、腹泻（diarrhea） 和痴呆（dementia），即所谓“三D”症状。"]}, {"type": "q", "stem": "[2018DTR真题]3.色氨酸在体内可以转化为（ ）", "options": ["A.硫胺素", "B.泛酸", "C.叶酸", "D.烟酸"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P88。", "烟酸除了直接从食物中摄取外，还可在体内由色氨酸转化而来，平均约60mg色氨酸可转化为1mg烟酸。"]}, {"type": "q", "stem": "[2018RD真题]4.下列关于维生素及其功能对应关系正确的是（  ）①维生素B1—作为一碳单位载体；②维生素B2—参与烟酸代谢；③烟酸—葡萄糖耐量因子的组成成分；④泛酸—辅酶A成分；⑤维生素B6—促进体内烟酸合成", "options": ["A.②③④", "B.③④⑤", "C.①③④⑤", "D.②③④⑤"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P86、P88、P89、P91。", "①错。叶酸—作为一碳单位载体。", "②⑤对。色氨酸转化为烟酸需要维生素B1、维生素B2和维生素B6的参与。", "③对。葡萄糖耐量因子是由三价铬、烟酸、谷胱甘肽组成的一种复合体。", "④对。泛酸的主要生理功能是构成辅酶A和酰基载体蛋白。"]}, {"type": "q", "stem": "[2024RD真题]5.下列维生素中，不需要避光保存的是（  ）", "options": ["A.维生素A", "B.烟酸", "C.维生素B6", "D.维生素B2"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P87。", "烟酸在酸、碱、光、氧或加热条件下不易被破坏，高压、高温120℃，20分钟也不会被破坏，是维生素中最稳定的一种，一般烹调加工损失极小，但会随水流失。"]}], "qn": 5}, {"title": "39 泛酸", "items": [{"type": "q", "stem": "[2021DTR真题]1.下列维生素中，构成辅酶A的是（  ）", "options": ["A.叶酸", "B.泛酸", "C.生物素", "D.硫胺素"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P221。", "泛酸的主要生理功能是构成辅酶A和酰基载体蛋白，并通过它们在代谢中发挥作用。", "泛酸作为辅酶A的组成部分参与体内碳水化合物、脂肪和蛋白质的代谢；传导神经脉冲和解除某些药物毒性需要乙酰胆碱，乙酰辅酶A可提供乙酰胆碱的合成原料—乙酰基；血红素由甘氨酸、琥珀酰辅酶A及铁这三种原料合成，泛酸参与血红素的合成。", "酰基载体蛋白作为脂肪酸合成酶复合体的组成部分参与脂肪酸的合成。"]}, {"type": "q", "stem": "[2021RD真题]2.下列关于B族维生素的描述中，正确的是（  ）", "options": ["A.维生素B2参与氨基酸转氨作用", "B.烟酸作为CoA羧化酶的辅酶，催化CoA生成丙二酰辅酶A，为脂肪酸合成提供底物", "C.泛酸参与脂肪酸的合成", "D.维生素B1参与核酸的合成"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P84、P86、P89、P91。", "A错。维生素B6参与氨基酸转氨作用。", "B错。生物素作为CoA羧化酶的辅酶，催化CoA生成丙二酰辅酶A，为脂肪酸合成提供底物。", "C对。泛酸的主要生理功能是构成辅酶A和酰基载体蛋白，并通过它们在代谢中发挥作用。酰基载体蛋白作为脂肪酸合成酶复合体的组成部分参与脂肪酸的合成。", "D错。叶酸参与核酸的合成。", "泛酸在酸性和碱性条件下不稳定，易被破坏。"]}, {"type": "q", "stem": "3.《中国居民膳食营养素参考摄入量》（2023 版）成人泛酸的AI为（  ）", "options": ["A.10 mg", "B.8 mg", "C.6 mg", "D.5 mg"], "answer": "答案：D", "analysis": ["解析：《中国居民膳食营养素参考摄入量》(2023 版）成人AI 为5.0mg/d, 孕妇为6.0mg/d, 乳母为7.0mg/d。"]}, {"type": "q", "stem": "4.以下关于泛酸的说法，错误的是（  ）", "options": ["A.泛酸也被称为维生素B5", "B.辅酶A（CoA）是泛酸的一种代谢活性形式", "C.泛酸的水溶液在酸性情况下，对热不稳定", "D.泛酸的水溶液在酸性情况下，对热稳定", "A.泛酸的主要商品形式是泛酸钙", "B.泛酸的主要代谢活性形式是辅酶A和酰基载体蛋白", "C.泛酸缺乏导致代谢受损，导致很多动物生长迟缓和食物利用率下降", "D.泛酸在自然界仅存在于动物细胞中"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第8版P103。", "泛酸在酸性和碱性条件下不稳定，易被破坏。", "5.关于泛酸的说法，错误的是（  ）", "解析：《营养与食品卫生学》第8版P103。", "泛酸在自然界有广泛的食物来源，存在于所有动物和植物细胞中。"]}], "qn": 4}, {"title": "40 维生素B6", "items": [{"type": "q", "stem": "[2019RD真题]1.下列哪种维生素的缺乏，会影响肝脏ALT和AST的作用（  ）", "options": ["A.维生素B6", "B.胆碱", "C.核黄素", "D.生物素"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P89。", "ALT一谷丙转氨酶，AST一谷草转氨酶。", "进入人体的维生素B6以PLP辅酶形式参与许多酶系反应。包括参与氨基酸代谢，如转氨、脱氨、脱氢、转硫和色氨酸转化等作用。"]}, {"type": "q", "stem": "[2021RD真题]2.男，83岁，结核性胸膜炎1年，口服利福平、异烟肼。主诉近来倦怠、乏力，查体显示脂溢性皮炎。下列营养素缺乏中，该患者最有可能伴有的是（  ）", "options": ["A.维生素B1缺乏", "B.维生素B2缺乏", "C.维生素B6缺乏", "D.烟酸缺乏"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P89、《中国营养科学全书》第2版P1684。", "异烟肼能与PLP形成复合物而诱发维生素B6缺乏。", "异烟肼会使维生素B6排泄增加。"]}, {"type": "q", "stem": "[2017RD真题]3.下列哪种维生素的需要量不随能量需要量的增加而增加（  ）", "options": ["A.维生素B1", "B.维生素B2", "C.烟酸", "D.维生素B6"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P72。", "维生素B1、维生素 B2和烟酸的需要量与体内能量代谢密切相关。", "维生素B1以焦磷酸硫胺素（TPP）形式构成α-酮酸脱氢酶体系和转酮醇酶的辅酶，维生素B2在体内以黄素单核苷酸（FMN）和黄素腺嘌呤二核苷酸（FAD）的形式与特定蛋白结合，形成黄素蛋白，烟酸以烟酰胺的形式构成辅酶I和辅酶II，参与能量代谢。", "《中国居民膳食营养素参考摄入量（2023版）》中，维生素B1、维生素B2和烟酸的平均需要量的计算依据分别是：0.46mg/1000kcal、0.44mg/1000kcal和4.8mgNE/1000cal。"]}, {"type": "q", "stem": "[2019RD真题]4.当蛋白质摄入量增加时，以下营养素随之增加的是（  ）", "options": ["A.维生素B1", "B.维生素B2", "C.烟酸", "D.维生素B6"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P215。", "维生素B6的需要量随着蛋白质摄入量的增加而增多，平均为0.019mg/g 蛋白质。"]}, {"type": "q", "stem": "[2024RD真题]5.下列关于营养缺乏相关体征错误的是（ ）", "options": ["A.肌肉痛、反射减退—维生素B1缺乏", "B.味觉减退—维生素B6缺乏", "C.舌肿胀，红斑及舌乳头萎缩，地图舌—维生素B2缺乏", "D.皮肤干燥、粗糙，毛囊丘疹—维生素A缺乏"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P89。", "人体维生素B6缺乏可致眼、鼻与口腔周围皮肤脂溢性皮炎，并可扩展至面部、前额、耳后、阴囊及会阴等处。临床症状包括口炎、唇干裂、舌炎，个别有神经精神症状，易受刺激、抑郁以及神志错乱等。"]}], "qn": 5}, {"title": "41 生物素", "items": [{"type": "q", "stem": "[2017RD真题]1.下列关于B族维生素的描述中，正确的是（  ）", "options": ["A.维生素B2参与氨基酸转氨作用", "B.烟酸作为CoA羧化酶的辅酶，催化CoA生成丙二酰辅酶A，为脂肪酸合成提供底物", "C.泛酸参与脂肪酸的合成", "D.维生素B1参与核酸的合成"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P84、P86、P89、P91。", "A错。维生素B6参与氨基酸转氨作用。", "B错。生物素作为CoA羧化酶的辅酶，催化CoA生成丙二酰辅酶A，为脂肪酸合成提供底物。", "C对。泛酸的主要生理功能是构成辅酶A和酰基载体蛋白，并通过它们在代谢中发挥作用。酰基载体蛋白作为脂肪酸合成酶复合体的组成部分参与脂肪酸的合成。", "D错。叶酸参与核酸的合成。"]}, {"type": "q", "stem": "[2023RD真题]2.下列有关营养缺乏与其临床体征的描述中，错误的是（  ）", "options": ["A.末梢感觉迟钝、肌肉震颤与生物素缺乏有关", "B.匙状甲与铁缺乏有关", "C.角膜出现泡沫状白斑与维生素A缺乏有关", "D.水肿与蛋白质缺乏有关"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P93。", "A错，维生素B12 缺乏会阻抑甲基化反应而引起神经系统损害，可引起斑状、弥漫性的神经脱髓鞘，此种进行性的神经病变起始于末梢神经，逐渐向中心发展累及脊髓和大脑，形成亚急性复合变性，出现精神抑郁、记忆力下降、四肢震颤等神经症状。", "生物素缺乏早期表现有口腔周围皮炎、结膜炎、脱毛、舌乳头萎缩、黏膜变灰、皮肤干燥、麻木、精神沮丧、疲劳、肌肉痛，甚至出现共济失调等症状。生物素缺乏者会出现头发稀少、发色变浅的情况，个别严重者，可在3~6个月内眉毛、睫毛、头发都脱光，称为“生物素缺乏脸”。"]}, {"type": "q", "stem": "3. 生蛋清可能干扰生物素吸收的原因是（  ）", "options": ["A.含有胰蛋白酶抑制剂", "B.含有抗生物素蛋白", "C.富含生物素酶，分解生物素", "D.与胃酸结合降低吸收率"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第8版P106。", "抗生物素蛋白是生蛋清中的一种糖蛋白，它能与生物素结合，使其不能在肠道中吸收。"]}, {"type": "q", "stem": "4.生物素在人体代谢中的主要功能是（  ）", "options": ["A. 作为抗氧化剂保护细胞膜", "B. 参与血红素的合成", "C. 作为羧化酶的辅酶参与多种代谢", "D. 促进钙的吸收和利用"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第8版P106。", "生物素在体内是许多羧化酶的辅酶，在碳水化合物、脂类、蛋白质和核酸的代谢过程中发挥重要作用。"]}, {"type": "q", "stem": "5.长期服用以下哪种药物可能导致生物素缺乏（  ）", "options": ["A. 维生素C", "B. 苯妥因", "C. 阿司匹林", "D. 胰岛素"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第8版P106。", "长期服用苯妥因、苯巴比妥等抗惊厥药物，会导致生物素缺乏，因此服用抗惊厥类药物的病人，应加服生物素或多食富含生物素的食物。"]}], "qn": 5}, {"title": "42 叶酸", "items": [{"type": "q", "stem": "[2017RD真题]1.营养性巨幼红细胞贫血和体内哪些营养素的缺乏有关（  ）①维生素B12；②叶酸；③铁；④维生素B6；⑤锌", "options": ["A.①②", "B.①③", "C.③⑤", "D.④⑤"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P91、P93。", "巨幼红细胞性贫血是指因叶酸、维生素B12缺乏或其他原因引起的DNA合成障碍所致的一类贫血。", "外周血红细胞的平均体积和平均血红蛋白均高于正常，骨髓中出现巨幼红细胞为此类贫血的共同特点。"]}, {"type": "q", "stem": "[2017RD真题]2.高血压患者预防动脉粥样硬化时，不仅需定期化验监测血脂浓度，同时应监测下列哪一项与维生素B12、叶酸代谢相关的指标（  ）", "options": ["A.血清葡萄糖", "B.血清尿酸", "C.血清同型半胱氨酸", "D.血清铁"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P1543。", "维生素B12、维生素B6、叶酸是同型半胱氨酸向蛋氨酸、胱氨酸转化代谢过程中的辅酶，这些维生素缺乏时，可影响同型半胱氨酸代谢，导致高同型半胱氨酸血症。", "血浆高同型半胱氨酸水平与动脉粥样硬化性心血管疾病发病呈显著相关。"]}, {"type": "q", "stem": "[2018DTR真题]3.孕妇缺乏下列哪种维生素可增加胎儿神经管畸形的风险（ ）", "options": ["A.硫胺素", "B.泛酸", "C.叶酸", "D.烟酸"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P91。", "叶酸参与体内一碳单位的代谢，是甲基的供体。受精卵在分裂、分化过程中，须经过多次的甲基化和去甲基化过程，以调控基因的时空表达。当体内叶酸严重缺乏时，影响胚胎发育，增加神经管畸形的风险。"]}, {"type": "q", "stem": "[2021DTR真题]4.下列关于体内叶酸缺乏导致的代谢变化的描述中，正确的是（  ）", "options": ["A.嘌呤合成下降", "B.腺嘌呤合成增加", "C.氨基酸合成增加", "D.DNA及RNA合成增加"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P91。", "叶酸的重要生理功能是作为一碳单位的载体参与代谢。它主要携带“一碳基团”（甲酰基、亚甲基及甲基等）参与嘌呤和嘧啶核苷酸的合成，在细胞分裂和增殖中发挥作用。"]}, {"type": "q", "stem": "[2024RD真题]5.下列维生素当量描述错误的是（ ） ①视黄醇活性当量（μgRAE）=24×膳食全反式β胡萝卜素（μg）；②维生素D（μg）=20×维生素D（IU）；③α-生育酚当量（α-TE mg）=0.67×RRR-α-生育酚（mg）；④烟酸当量（mgNE）=烟酸（mg）+1/60亮氨酸（mg）；⑤叶酸当量（μg DFE）=膳食叶酸（μg）+1.7×叶酸补充剂（μg）。", "options": ["A.①③⑤", "B.①②④⑤", "C.①②③④", "D.②③④⑤"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P78、P80、P81、P88、P92。", "①错，视黄醇活性当量（μgRAE）=全反式视黄醇(μg)+1/2补充剂纯品全反式β-胡萝卜素(μg)+1/12膳食全反式β-胡萝卜素(μg)+1/24其他膳食维生素A原类胡萝卜素(μg) 。", "②错，维生素D（IU）=40×维生素D（μg）。", "③错，α-生育酚当量（α-TE mg）=RRR-α-生育酚（mg）。", "④错，烟酸当量（mgNE）=烟酸（mg）+1/60色氨酸（mg）。", "⑤对，叶酸当量（μg DFE）=膳食叶酸（μg）+1.7×叶酸补充剂（μg）。"]}], "qn": 5}, {"title": "43 维生素B12", "items": [{"type": "q", "stem": "[2017RD真题]1.高血压同时伴有同型半胱氨酸升高，为降低脑卒中发生的风险，下列适合补充的营养素有（  ） ①叶酸；②维生素B12；③维生素B6；④钙；⑤铁。", "options": ["A.①②③", "B.①②③④⑤", "C.②③④", "D.①②⑤"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P93。", "维生素B12从5-甲基四氢叶酸获得甲基后形成甲基B12，后者又将甲基转移给同型半胱氨酸，并在蛋氨酸合成酶的作用下合成蛋氨酸。维生素B12缺乏时，5-甲基四氢叶酸上的甲基不能转移，蛋氨酸的生成受阻，造成同型半胱氨酸堆积，形成高同型半胱氨酸血症。", "维生素B6是半胱氨酸脱羧酶、胱硫醚酶β-合成酶的辅助因子，这些酶参与同型半胱氨酸到半胱氨酸的转硫化途径。"]}, {"type": "q", "stem": "[2017RD真题]2.哪部分小肠切除一定长度时需要维生素B12替代治疗（  ）", "options": ["A.十二指肠", "B.空肠", "C.回肠", "D.回盲部"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P92。", "维生素B12在消化道内的吸收依赖于一种胃黏膜细胞分泌的糖蛋白内因子（IF）。当食物通过胃时，维生素B12从食物蛋白质复合物中释放出来，与IF结合，形成维生素B12-IF 复合物，其对胃蛋白酶较稳定，进入肠道后附着在回肠内壁黏膜细胞的受体上，在肠道酶的作用下，内因子释放出维生素B12，由肠黏膜细胞吸收。"]}, {"type": "q", "stem": "[2017RD真题]3.幽门螺杆菌感染引起萎缩性胃炎，从而导致胃酸和内因子分泌减少，最有可能影响哪些营养素吸收（  ）", "options": ["A.铁、维生素B12", "B.锌、维生素B2", "C.锰、维生素B6", "D.铜、维生素B1"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P62、P92。", "某些疾病如萎缩性胃炎、胃酸缺乏或过多服用抗酸药物时，抑制铁离子释放。", "维生素B12在消化道内的吸收依赖于一种胃黏膜细胞分泌的糖蛋白内因子（IF）。当食物通过胃时，维生素B12从食物蛋白质复合物中释放出来，与IF结合，形成维生素B12-IF复合物，其对胃蛋白酶较稳定，进入肠道后附着在回肠内壁黏膜细胞的受体上，在肠道酶的作用下，内因子释放出维生素B12, 由肠黏膜细胞吸收。"]}, {"type": "q", "stem": "[2019DTR真题]4.胃切除患者最容易缺乏哪种维生素（ ）", "options": ["A.维生素C", "B.维生素B6", "C.维生素B12", "D.叶酸"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P92。", "维生素B12在消化道内的吸收依赖于一种胃黏膜细胞分泌的糖蛋白内因子（IF）。当食物通过胃时，维生素B12从食物蛋白质复合物中释放出来，与IF结合，形成维生素B12-IF复合物，其对胃蛋白酶较稳定，进入肠道后附着在回肠内壁黏膜细胞的受体上，在肠道酶的作用下，内因子释放出维生素B12, 由肠黏膜细胞吸收。吸收过程中的任何阶段出现故障，维生素B12便无法被吸收。"]}, {"type": "q", "stem": "[2021RD真题]5.下题营养素与膳食成分分子中心结构金属元素配对正确的是（A）①维生素B12—钴；②叶绿素—镁；③硫辛酸—硫；④维生素K—钙；⑤叶酸—铁。", "options": ["A.①②③", "B.①②", "C.①③④", "D.①②③④⑤"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P61、P92。《中国营养科学全书》第2版P117。", "①对。维生素B12分子中含钴，又称钴胺素，是唯一含金属元素的维生素。", "②对。由于叶绿素是镁卟啉的螯合物，所以绿叶蔬菜中含丰富的镁。", "③对。硫辛酸又称α-硫辛酸，是一种天然的二硫化合物。"]}], "qn": 5}, {"title": "44 维生素C", "items": [{"type": "q", "stem": "[2017RD真题]1.下列哪种烹饪方法对食物中维生素C破坏最大（  ）", "options": ["A.急火快炒，迅速出锅", "B.用豌豆淀粉上浆后再下锅", "C.小火慢炖", "D.焯水半分钟后，加调料凉拌"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P130。", "烹调对蔬菜中维生素的影响与烹调过程中洗涤方式、切碎程度、用水量、pH、加热的温度及时间有关。如蔬菜煮5~10分钟，维生素C损失达70%~90%。", "使用合理加工烹调方法，即先洗后切，急火快炒，现做现吃是降低蔬菜中维生素损失的有效措施。"]}, {"type": "q", "stem": "[2020RD真题]2.大多数动物体内，维生素C可由哪种物质合成（  ）", "options": ["A.丙酮酸", "B.木糖", "C.葡萄糖", "D.果糖"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P94。", "很多动物可以在体内利用葡萄糖合成维生素C，因此不需要外源性维生素C。而人、猴和豚鼠体内不能合成维生素C，仍需由食物供给。"]}, {"type": "q", "stem": "[2018DTR真题]3.下列水果中，维生素C含量最高的是（ ）", "options": ["A.鲜枣", "B.苹果", "C.西瓜", "D.柠檬"], "answer": "答案：A", "analysis": ["解析：《中国食物成分表》第6版。", "每100g鲜枣、苹果、西瓜、柠檬中的维生素C含量分别为243mg、4mg、6mg和22mg。因此，鲜枣的维生素C含量最高。"]}, {"type": "q", "stem": "[2018DTR真题]4.下列关于维生素C生理功能的描述中，正确的是（ ）", "options": ["A.参与能量代谢的辅因子", "B.血红蛋白的主要成分", "C.与钙共同参与凝血作用", "D.参与合成胶原蛋白"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P95。", "维生素C的基本功能包括羟化作用、抗氧化作用、提高机体免疫力和解毒作用等。其中维生素C参与体内重要的羟化反应，该反应是体内多种重要物质代谢的关键过程。维生素C参与胶原蛋白合成，其作为脯氨酸羟化酶与赖氨酸羟化酶的辅助因子，催化多肽链中的脯氨酸残基与赖氨酸残基羟化为羟脯氨酸残基与羟赖氨酸残基，然后合成胶原蛋白。"]}, {"type": "q", "stem": "[2019DTR真题]5.下列关于维生素C的描述中错误的是（ ）", "options": ["A.一种水溶性维生素", "B.葡萄糖耐量因子的组成成分", "C.具有较强的抗氧化活性", "D.可通过尿负荷实验进行营养状况评价"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P88。", "葡萄糖耐量因子（GTF）是由三价铬、烟酸、谷胱甘肽组成的一种复合体，可能是胰岛素的辅助因子，有增加葡萄糖的利用及促进葡萄糖转化为脂肪的作用。"]}], "qn": 5}, {"title": "45 植物化学物", "items": [{"type": "q", "stem": "[2021RD真题]1.下面关于至于植物化学物的描述中，正确的是（ ）", "options": ["A.植物固醇是一类主要存在于各种植物油、坚果和种子中的甾体化合物", "B.绿原酸是一种有机硫化物，具有抗氧化作用", "C.大豆异黄酮是一种植物性雌激素，具有预防和改善老年性黄斑变性的作用", "D.叶黄素具有维生素A原活性，在体内可转化为维生素A"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P98、P99、P100、P105。", "A对。植物固醇是一类主要存在于各种植物油、坚果、种子中的植物性甾体化合物。", "B错。绿原酸是一种多酚类化合物（酚酸），具有抗氧化作用。", "C错。叶黄素具有预防和改善老年性黄斑变性的作用。", "D错。玉米黄素、辣椒红素、叶黄素和番茄红素不具有维生素A的活性。"]}, {"type": "q", "stem": "[2024RD真题]2.下列关于类胡萝卜素的描述中，正确的是（ ）", "options": ["A.类胡萝卜素都具有维生素A原活性", "B.动物自身都能合成类胡萝卜素", "C.类胡萝卜都具有保护视觉功能", "D.叶黄素、玉米黄素、番茄红素都属于类胡萝卜素"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P73、P99。", "A错，目前巳经发现的类胡萝卜素700种，仅有约十分之一是维生素A原。", "B错，类胡萝卜素仅在植物和微生物中可自行合成，动物自身不能合成。", "C错，叶黄素有保护视觉功能，但并非所有类胡萝卜素都有此功能。", "D对，主要的类胡萝卜素包括α-胡萝卜素、β-胡萝卜素、γ-胡萝卜素、叶黄素、玉米黄素、β-隐黄素、番茄红素等。"]}, {"type": "q", "stem": "[2017RD真题]3.下列有关大蒜素的描述中，错误的是（ ）", "options": ["A.大蒜主要的风味来自大蒜素", "B.大蒜素在生大蒜的含量比熟大蒜高", "C.新鲜大蒜中没有大蒜素，只含有蒜氨酸", "D.和微波烹调比较，蒸制大蒜会保留更多大蒜素"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P283。", "新鲜大蒜中并没有大蒜素，只含有蒜氨酸。蒜氨酸以不稳定无臭的形式存在于大蒜中。当大蒜组织被破坏（如切割或挤压），蒜氨酸便在蒜氨酸酶的作用下迅速生成大蒜素。大蒜素是多种烯丙基有机硫化物复合体，带有特殊大蒜气味。对热碱不稳定，对酸稳定。不同烹饪方法破坏大蒜素的程度不同：微波<水煮<蒸制<油炸（大蒜素损失由少至多）。"]}, {"type": "q", "stem": "[2018RD真题]4.下列植物化合物中，可用于预防老年性黄斑变性的是（ ）", "options": ["A.叶黄素", "B.大蒜素", "C.姜黄素", "D.番茄黄素"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P100。", "叶黄素在黄斑区域（视觉最敏锐的区域）内高浓度聚集，是视网膜黄斑的主要色素。增加叶黄素摄入量具有明显的预防和改善老年性眼部退行性病变的作用，如视网膜色素变性、黄斑病变和白内障等。"]}, {"type": "q", "stem": "[2020RD真题]5.下列蔬菜与植物化合物对应关系正确的是（ ）①萝卜―硫苷；②洋葱―有机硫化物；③西兰花―β谷甘醇；④紫甘蓝―花青素；⑤紫茄子―类胡萝卜素。", "options": ["A.①③⑤", "B.②④⑤", "C.①②③", "D.①②④"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P120。", "①对，萝卜、胡萝卜、大头菜等根茎类蔬菜的硫代葡萄糖苷（简称硫苷）含量相对较高。", "②对，葱蒜类如洋葱、大蒜、大葱、香葱、韭菜等含有丰富的含硫化合物。", "③错，十字花科蔬菜（西兰花）中的有机硫化物主要是介子油苷（ 硫苷）及其水解产物异硫氰酸盐。", "④对，紫甘蓝含有花青素。", "⑤错，紫茄子―花青素。"]}], "qn": 5}]}, {"name": "二、食物的营养价值", "count": 40, "ntopic": 8, "topics": [{"title": "46 食物营养价值的评价及常用指标", "items": [{"type": "q", "stem": "[2017RD真题]1.松子的能量含量为530kcal/100g，钙含量为14mg/100g。成年男性中体力活动能量需要量为2600kcal/d，钙RNI为800mg/d。对该成年男性而言，松子钙的营养质量指数是（  ）", "options": ["A.0.086", "B.0.081", "C.0.86", "D.0.81"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P114。", "INQ =营养素密度 / 能量密度=(14/800)/(530/2600)=0.086。"]}, {"type": "q", "stem": "[2023DTR真题]2.大米中蛋白质的INQ是0.8，如果长期摄入会引起（  ）", "options": ["A.信息不足不足于说明营养情况", "B.蛋白质摄入充足，会导致营养过剩", "C.蛋白质摄入不足，会导致优质蛋白质摄入不足      D.蛋白质摄入不足，会导致能量过剩"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P114。", "一般认为INQ>1和INQ=1食物营养价值高，INQ<1的食物营养价值低，长期摄入INQ<1的食物会发生该营养素不足或能量过剩。"]}, {"type": "q", "stem": "[2024DTR真题]3.一人份【薏苡仁燕麦糙米饭】的食谱为：薏苡仁20g，糙米80g，燕麦20g，该饭烹饪后的重量为250g，请根据所附食物成分表，回答下列问题。", "options": ["A.0.7", "B.1.2", "C.0.88", "D.2.24"], "answer": "答案：C", "analysis": ["食物成分表（每100g可食部）32岁，男性，中等强度身体活动水平（EER为2500kcal/d，钾AI为2000mg/d），该薏苡仁燕麦糙米饭钾的INQ值是（  ）", "解析：《营养与食品卫生学》第9版P114。", "250g【薏苡仁燕麦糙米饭】中， 蛋白质=20×12.8% + 80×7.7%+20×10.9% = 10.9g， 脂肪=20×3.3%+ 80×2.7%+20×10.2%= 4.86g，总碳水化合物=20×71.1%+80×75%+20×67.4% = 87.76g，可利用碳水化合物=总碳水化合物-膳食纤维=87.76-4.82=82.94g，钾含量= 20×238% + 80×230%+20×356% = 302.8mg。", "100g【薏苡仁燕麦糙米饭】中，钾含量=（302.8/ 250）×100=121.12mg。", "250g【薏苡仁燕麦糙米饭】能量= 10.9×4 + 4.86×9+82.94×4+4.82×2= 428.74kcal。", "100g【薏苡仁燕麦糙米饭】能量=（428.74/ 250）×100=171.496kcal。", "INQ=某营养素密度/能量密度=（某营养素含量／该营养素参考摄入量）/（所产生能量／能量参考摄入量）=（121.12/2000）/（171.496/2500）=0.88。"]}, {"type": "q", "stem": "[2017RD真题]4.运动可导致机体氧化应激反应增强，下列物质中，具有抗氧化作用的是（  ）①维生素C；②半胱氨酸；③番茄红素；④饱和脂肪酸；⑤碳酸钙。", "options": ["A.①③⑤", "B.①②③", "C.①④⑤", "D.②③④"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P115。", "食物中抗氧化的成分包括食物中存在的抗氧化营养素和植物化学物，前者如维生素A、维生素E、维生素C、硒等，后者如类胡萝卜素、番茄红素、多酚类化合物及花青素等其他植物化学物。半胱氨酸在体内可以合成谷胱甘肽，有抗氧化作用。"]}, {"type": "q", "stem": "[2018DTR真题]5.下列维生素中，具有抗氧化作用的是（  ）①维生素D；②维生素E；③维生素B1；④维生素C；⑤烟酸。", "options": ["A.①②", "B.①⑤", "C.②③", "D.②④"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P80、P94、P115。", "维生素E和C是因其可提供电子给自由基而阻断自由基的链式反应，故有抗氧化作用。"]}], "qn": 5}, {"title": "47 谷薯杂豆类营养价值", "items": [{"type": "q", "stem": "[2020RD真题]1.下列选项中，马铃薯描述错误的是（  ）", "options": ["A.不含维生素C", "B.干淀粉中磷含量比禾谷类作物淀粉中磷含量高几倍", "C.富含钾", "D.淀粉以支链淀粉为主，约占总淀粉含量80%"], "answer": "答案：A", "analysis": ["解析：《中国营养科学全书》第2版P441。", "A错，马铃薯维生素C 含量25mg/100g 。", "B对，马铃薯干淀粉中磷平均为0.15%，比禾谷类作物淀粉中磷含量高几倍。", "C对，马铃薯富含钾，约占灰分总量的2/3。", "D对，马铃薯支链淀粉约占总淀粉量的80%。"]}, {"type": "q", "stem": "[2020RD真题]2.以下关于大米的描述哪个错误（  ）", "options": ["A.大米按颜色可以分为黑米、紫米、红米、白米", "B.大米含淀粉70%，主要在胚乳", "C.大米比其他谷物含蛋白质高，含量10%~15%", "D.大米可分为粳米、籼米、糯米"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P436、P437。", "A对，根据颜色，稻米可分为白米、红米、紫米、黑米等。", "B对，稻米中70%左右是淀粉，主要存在于胚乳中。", "C错，稻谷中蛋白质含量一般比其他谷物低，其含量为4.50%~19.80%。", "D对，根据品种、外形、口感，大米分为梗米、籼米、糯米。"]}, {"type": "q", "stem": "[2021DTR真题]3.下列关于谷物的描述中，错误的是（  ）", "options": ["A.谷类食物中维生素绝大部分存在于胚乳中", "B.糙米是全谷物", "C.玉米中的烟酸是结合型，不易被人体吸收利用", "D.谷物提供的碳水化合物是最经济的能量来源"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P117。", "谷类的维生素主要存在于糊粉层和胚芽中。"]}, {"type": "q", "stem": "[2018DTR真题]4.全谷物中应包含的谷粒结构是（ ）①谷皮；②糊粉层；③胚乳；④谷胚", "options": ["A.①②", "B.①②③", "C.②③④", "D.①②③④"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P116。", "谷类的籽粒由谷皮、糊粉层、胚乳和谷胚四部分组成，全谷物是指谷物粮食在加工过程中仅脱去种子外面的谷壳，包括谷皮、糊粉层、胚乳和谷胚四部分的成分。"]}, {"type": "q", "stem": "[2018DTR真题]5.谷类食物含有丰富的碳水化合物，主要存在于（ ）", "options": ["A.谷胚", "B.胚乳", "C.糊粉层", "D.谷皮"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P116。", "谷类中的碳水化合物主要是淀粉，集中在胚乳的淀粉细胞中，含量在70%以上。"]}], "qn": 5}, {"title": "48 大豆坚果营养价值", "items": [{"type": "q", "stem": "[2018RD真题]1.属于大豆类制品的是（  ）①腐竹；②烤麸；③豆浆；④粉丝；⑤酱油", "options": ["A.①③⑤", "B.①③", "C.②④⑤", "D.②③④"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P119。", "大豆制品包括非发酵性豆制品和发酵豆制品两类，前者如豆浆、豆腐、豆腐干、干燥豆制品（如腐竹等）；后者如腐乳、豆豉、酱油、豆瓣酱及臭豆腐等。", "烤麸—江南地区常见的传统特色食品。用带皮的麦子磨成麦麸面粉，而后在水中搓揉筛洗而分离出来的面筋，经发酵蒸熟制成的，呈海绵状，口感松软有弹性。", "粉丝—蚕豆、绿豆。"]}, {"type": "q", "stem": "[2019RD真题]2.关于豆类食品错误的是（  ）", "options": ["A.红豆的淀粉含量百分之五十左右", "B.大豆根据颜色可以分为黄豆、黑豆和青豆", "C.腐竹是大豆打成浆后凝固脱水后的豆制品", "D.蚕豆淀粉不能做凉皮、凉粉等"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P446。", "蚕豆淀粉是制作粉丝、粉皮和凉粉的上等原料，品质不亚于绿豆制品，远较其他淀粉制品为优。"]}, {"type": "q", "stem": "[2020RD真题]3.下列食品中，不以大豆作为原料的是（  ）", "options": ["A.百叶", "B.烤麸", "C.千张", "D.素鸡"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P119。", "豆制品包括非发酵性豆制品和发酵豆制品两类，前者如豆浆、豆腐、豆腐干、百叶、千张、素鸡、腐竹等；后者如腐乳、豆豉及臭豆腐等。", "烤麸—江南地区常见的传统特色食品。用带皮的麦子磨成麦麸面粉，而后在水中搓揉筛洗而分离出来的面筋，经发酵蒸熟制成的，呈海绵状，口感松软有弹性。"]}, {"type": "q", "stem": "[2019DTR真题]4.下列关于豆制品的描述中，正确的是（ ）", "options": ["A.豆浆在煮沸时会产生泡沫，是因为其中含有植酸", "B.豆瓣酱、豆豉、酱油都是由大豆发酵而成的发酵豆制品", "C.腐竹是几乎不含有脂肪的豆制品", "D.生豆浆中的豆腥味是来自其中含有的大豆皂苷"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P119。", "A错，泡沫—大豆皂苷。", "C错，腐竹：脂肪21.7。", "D错，豆腥味是由豆类中的不饱和脂肪酸经脂肪氧化酶氧化降解，产生醇、酮、醛等小分子挥发性物质所致。"]}, {"type": "q", "stem": "[2018DTR真题]5.下列坚果中，不属于油脂类坚果的是（ ）", "options": ["A.核桃", "B.松子", "C.栗子", "D.南瓜子"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P128。", "每100g 干核桃、松子仁、栗子和南瓜子仁的脂肪含量分别为59g 、71g 、2g 和48g。因此，栗子不属于油脂类坚果，栗子中碳水化合物含量高达77%，是其主要营养成分。"]}], "qn": 5}, {"title": "49 蔬菜水果营养价值", "items": [{"type": "q", "stem": "[2020RD真题]1.下列关于蔬菜的说法正确的是（  ）", "options": ["A.浅色蔬菜比深色蔬菜的β-胡萝卜素含量多", "B.浅色蔬菜都含有β-胡萝卜素和番茄红素", "C.瓜类蔬菜比深色蔬菜β-胡萝卜素含量多", "D.番茄中含有番茄红素"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P120。", "蔬菜中的维生素含量与品种、鲜嫩程度和颜色有关，一般叶部含量较根茎部高，嫩叶比枯老叶高，深色菜叶比浅色菜叶高。", "番茄含有丰富的番茄红素和β-胡萝卜素。"]}, {"type": "q", "stem": "[2020RD真题]2.下列蔬菜与植物化合物对应关系正确的是（  ）①萝卜―硫苷；②洋葱―有机硫化物；③西兰花―β谷甘醇；④紫甘蓝―花青素；⑤紫茄子―类胡萝卜素", "options": ["A.①③⑤", "B.②④⑤", "C.①②③", "D.①②④"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P120。", "①对，萝卜、胡萝卜、大头菜等根茎类蔬菜的硫代葡萄糖苷（简称硫苷）含量相对较高。", "②对，葱蒜类如洋葱、大蒜、大葱、香葱、韭菜等含有丰富的含硫化合物。", "③错，十字花科蔬菜（西兰花）中的有机硫化物主要是介子油苷（ 硫苷）及其水解产物异硫氰酸盐。", "④对，紫甘蓝含有花青素。", "⑤错，紫茄子―花青素。"]}, {"type": "q", "stem": "[2020RD真题]3.关于水果及其制品的描述，错误的是（  ）", "options": ["A.水果所含矿物质主要为钾，钠含量很低", "B.多数未成熟水果含有淀粉，但随着水果的成熟，淀粉逐渐分解为可溶性的糖", "C.富含果糖的水果可制作成果酱", "D.部分人进食水果后可出现食物过敏或消化道不适，可能与其含有较多的蛋白酶类有关"], "answer": "答案：C", "analysis": ["解析：《中国营养科学全书》第2版P455-P457。", "A对，水果中主要的矿物质是钾，其中钠含量很低。", "B对，多数未成熟水果含有淀粉，但随着果实的成熟，淀粉逐渐分解为可溶性糖而消失。", "C错，果胶具有增稠、悬浮、形成凝胶等功能性质。富含果胶的水果食材可以制成果酱。", "D对，某些水果中含有较丰富的蛋白酶类，如菠萝、木瓜、无花果、弥猴桃等。它们也是引起部分人食用水果后发生食物过敏和消化道不适的原因之一。"]}, {"type": "q", "stem": "[2019DTR真题]4.我国地大物博，部分蔬菜在不同地区名称不一样，下列对应关系中，错误的是（ ）", "options": ["A.苦瓜—凉瓜—癞瓜", "B.南瓜—倭瓜—番瓜", "C.秋葵—羊角豆", "D.结球甘蓝—花椰菜"], "answer": "答案：D", "analysis": ["解析：", "A对，苦瓜性凉，清热解毒。苦瓜以味得名，苦字不好听，广东人便称作凉瓜。癞瓜则是从形状上来命名。", "B对，南瓜原产墨西哥到中美洲一带，明代传入中国。中国人初期误以为南瓜来自日本，故名之为“倭瓜”。", "C对，秋葵 —羊角豆（广东）。", "D错，结球甘蓝—卷心菜、圆白菜、包菜、莲花白。"]}, {"type": "q", "stem": "[2021DTR真题]5.下列关于水果的描述中，正确的是（  ）", "options": ["A.水果中含有的果胶是一种可溶性膳食纤维", "B.水果和果汁可以相互代替", "C.蔬菜和水果可以相互代替", "D.糖尿病患者一般不建议食用富含果糖的水果"], "answer": "答案：A", "analysis": ["解析：《中国营养科学全书》第2版P254。", "果胶是水果蔬菜细胞壁胞间层的一种酸性多糖，溶于水。"]}], "qn": 5}, {"title": "50 畜禽类营养价值", "items": [{"type": "q", "stem": "[2020RD真题]1.畜肉通常呈现红色，颜色深浅与下列哪个有关（  ）", "options": ["A.血红蛋白", "B.肌红蛋白", "C.肌球蛋白", "D.肌动蛋白"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P468。", "肌红蛋白是畜类肌肉自身所特有的一种色素蛋白质，呈红色，肉红色的深浅与其含量有关。"]}, {"type": "q", "stem": "[2018RD真题]2.关于畜禽肉营养价值叙述正确的是（  ）①畜禽肉是铁良好的来源；②畜禽肉含丰富的含氮浸出物，炖汤时味道更加鲜美；③畜禽肉含丰富的结缔组织，是完全蛋白质；④畜肉较禽肉含丰富的维生素C 和维生素B12", "options": ["A.①②③④", "B.②③", "C.①③", "D.①④"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P150。", "畜禽肉和动物血中铁含量丰富，且主要以血红素铁的形式存在，生物吸收利用率高，是膳食铁的良好来源。", "畜禽肉中含有能溶于水的含氮浸出物，使肉汤具有鲜味。", "畜禽的皮肤和筋腱多为结缔组织，主要含胶原蛋白和弹性蛋白，由于缺乏色氨酸、蛋氨酸等必需氨基酸，因此蛋白质的利用率低，其营养价值也低。"]}, {"type": "q", "stem": "[2018RD真题]3.下列猪肉的不同部位，脂肪含量最高的是（  ）", "options": ["A.里脊肉", "B.后肘肉", "C.前肘肉", "D.奶脯肉"], "answer": "答案：D", "analysis": ["解析：《中国食物成分表》第6版。", "里脊肉7.9，后肘肉28.0，前肘肉22.9，奶脯肉35.3。", "猪里脊：猪脊椎骨内侧的条状嫩肉。", "奶脯肉：猪肋骨下腹部的肉，呈泡泡状，肉质较差，老百姓觉得肥膘太多，现在一般被用来加工提炼、熬制猪油，已经很少直接食用。"]}, {"type": "q", "stem": "[2019DTR真题]4.下列关于畜禽肉营养价值的描述中，错误的是（ ）", "options": ["A.猪皮主要含胶原蛋白和弹性蛋白，缺乏色氨酸，蛋白质利用率较低", "B.畜禽内脏中，以脑组织的脂肪含量最高", "C.畜禽肉和动物血中铁含量丰富，且主要以血红素铁的形式存在，利用率较高", "D.畜禽肝脏中的维生素A含量丰富，但核黄素含量极微"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P122。", "畜禽肉可提供多种维生素，其中以B族维生素和维生素A为主，尤其内脏含量较高，其中肝脏的维生素A和核黄素的含量特别丰富。维生素A的含量以牛肝和羊肝最高，维生素B2则以猪肝含量最高。"]}, {"type": "q", "stem": "[2023RD真题]5.下列关于畜禽肉类食品的描述中，正确的是（  ）", "options": ["A.禽类油脂的消化率高于畜类油脂", "B.猪皮的主要成分是多糖", "C.家畜内脏食物中，心、肾蛋白质含量最高，其次是肝脏", "D.猪血和鸭血中都不含有蛋白质"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P122，《中国营养科学全书》第2版P469。", "A对，与畜肉相比禽肉类脂肪含量较少，而且熔点低（23~40℃）并含有20%的亚油酸，易于消化吸收。", "B错，畜禽皮肤和筋腱多为结缔组织，主要含胶原蛋白和弹性蛋白。", "C错，家畜不同的内脏中，肝脏含蛋白质较高，为18%~20%，心、肾含蛋白质14%~17%。", "D错，猪血和鸭血中都含有蛋白质。"]}], "qn": 5}, {"title": "51 水产品营养价值", "items": [{"type": "q", "stem": "[2024RD真题]1.下列关于水产品营养特点的描述中，正确的是（ ）", "options": ["A.鱼类肝脏是维生素A、维生素D、维生素C的重要来源", "B.鱼各部位胆固醇含量比较：鱼肝>鱼肉>鱼籽", "C.鱼汤的呈味物质主要是其中的含氮物质，如游离氨基酸、肽、胺类、嘌呤等", "D.经常吃生鱼片可能会导致维生素B2缺乏"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P123。", "A错，鱼类肝脏是维生素A和维生素D的重要来源，也是维生素B2的良好来源，维生素E、维生素B1和烟酸的含量也较高，但几乎不含维生素C。", "B错，鱼各部位胆固醇含量比较：鱼籽>鱼肝>鱼肉。", "C对，鱼类含有较多的其他含氮物质，如游离氨基酸、肽、胺类、嘌呤等化合物，是鱼汤的呈味物质。", "D错，一些生鱼中含有硫胺素酶，当生鱼存放或生吃时可破坏维生素B1，此酶在加热时可被破坏。"]}, {"type": "q", "stem": "[2019RD真题]2.关于水产品描述错误的是（  ）", "options": ["A.鱼汤冷却后凝固，是由于鱼汤含有胶原蛋白和黏蛋白", "B.鱼类的肝脏富含维生素A和维生素D", "C.鱼类不饱和脂肪酸丰富，熔点低，易消化", "D.鱼类碳水化合物含量低，以葡萄糖形式存在"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P123。", "D错，鱼类碳水化合物的含量低，仅为1.5%左右，主要以糖原形式存在。"]}, {"type": "q", "stem": "[2022RD真题]3.下列关于水产品的描述中，正确的是（  ）", "options": ["A.鱼类的碳水化合物含量很低，主要以糖原形式存在", "B.K值是鱼类细菌污染的指标", "C.鱼肉蛋白质的限制氨基酸是赖氨酸", "D.青皮红肉鱼中糖原含量低于白肉鱼"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P123、P262。", "A对，鱼类碳水化合物的含量低，仅为1.5%左右，主要以糖原形式存在。", "B错，K值主要适用于鉴定鱼类早期腐败。", "C错，鱼类中蛋白质富含亮氨酸和赖氨酸，属于优质蛋白质。", "D错，有些鱼不含碳水化合物，如草鱼、青鱼、鳜鱼、鲈鱼等白肉鱼。"]}, {"type": "q", "stem": "[2018DTR真题]4.下列水产品不适合作为生食的是（  ）", "options": ["A.三文鱼", "B.鲢鱼", "C.生蚝", "D.龙虾"], "answer": "答案：B", "analysis": ["解析：淡水鱼虾体内常有寄生虫，如青鱼、草鱼、鲢鱼、胖头鱼、鲤鱼、鲫鱼均可携带，因此，不适合生吃。"]}, {"type": "q", "stem": "[2019DTR真题]5.等能量的一份食物中，下列哪种食物所含胆固醇最多（  ）", "options": ["A.鸡腿", "B.猪大排", "C.河虾", "D.猪肝"], "answer": "答案：C", "analysis": ["解析：《中国食物成分表》第6版。", "鸡腿99/146，猪大排165/264，河虾240/87，猪肝180/97。"]}], "qn": 5}, {"title": "52 乳及乳制品营养价值", "items": [{"type": "context", "text": "牛奶已经成为大家餐桌上不可缺失的食品。增加奶类摄入不仅有利于儿童少年生长发育，也能促进成年人骨骼健康。"}, {"type": "q", "stem": "[2018DTR真题]1.如果要通过牛奶摄入约200mg的钙，建议牛奶饮用量是（ ）", "options": ["A.100ml", "B.200ml", "C.300ml", "D.400ml"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P124。", "牛奶中钙的含量约为100mg/100ml，因此要摄入200mg钙，需要牛奶200ml 。"]}, {"type": "q", "stem": "[2018DTR真题]2.下列哪种食物与一杯鲜奶(200ml )的营养成分最接近（ ）", "options": ["A.全脂奶粉50g，加水至200ml", "B.全脂奶粉25g，加水至200ml", "C.脱脂奶粉50g，加水至200ml", "D.豆奶200ml"], "answer": "答案：B", "analysis": ["解析：《中国居民膳食指南（2022）》P53。"]}, {"type": "q", "stem": "[2018DTR真题]3.市场上低脂牛奶的脂肪含量应为（ ）", "options": ["A.≤0.5g/100ml", "B.≤1.5g/100ml", "C.≤3g/100ml", "D.≤5g/100ml"], "answer": "答案：B", "analysis": ["解析：《GB28050-2025 预包装食品营养标签通则》。", "低脂肪的营养声称标准是：≤3g/100g固体; ≤ 1.5g/100ml液体。"]}, {"type": "q", "stem": "[2018DTR真题]4.下列乳制品中，可以在室温下保存的是（ ）", "options": ["A.巴氏消毒奶", "B.超高温灭菌乳", "C.无盐黄油", "D.奶酪"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P125。", "超高温灭菌乳是以牛（羊）乳为原料，添加或不添加复原乳，在连续流动的状态下，至少132℃，并保持很短时间的灭菌，再经过无菌灌装等工序制成的液体产品，达到了商业无菌的水平，因此可以放在室温保存。"]}, {"type": "q", "stem": "[2018DTR真题]5.下列乳制品中，经发酵制成的是（ ）①奶酪；②奶粉；③炼乳；④酸奶", "options": ["A.①②", "B.①③", "C.①④", "D.②④"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P125。", "发酵乳指的是以生牛（羊）乳或乳粉为原料，经杀菌、发酵后制成的pH降低的产品。其中以生牛（羊）乳或乳粉为原料，经杀菌、接种嗜热链球菌和保加利亚乳杆菌发酵制成的产品称之为酸奶。奶酪是在原料奶中加入适量的乳酸菌发酵剂或凝乳酶，使蛋白质发生凝固，并加盐、压榨排除乳清后的产品。"]}], "qn": 5}, {"title": "53 蛋及蛋制品营养价值", "items": [{"type": "q", "stem": "[2018RD真题]1.有关蛋类的营养价值，描述错误的是（  ）①鸡蛋清中的蛋白质是鸡蛋的主要蛋白质；②鸡蛋清中含卵磷脂和脑磷脂；③鸡蛋清中的蛋白质有乳化作用，烹饪食物容易；④蛋清是胆碱的主要来源。", "options": ["A.①②③④", "B.②③", "C.③④", "D.①③④"], "answer": "答案：A", "analysis": ["解析：《营养与食品卫生学》第9版P127。", "蛋白质在鸡蛋清中较低，蛋黄中较高。", "鸡蛋黄中含卵磷脂和脑磷脂。", "鸡蛋黄中的磷脂有乳化作用。", "蛋黄是胆碱的主要来源。"]}, {"type": "q", "stem": "[2019RD真题]2.关于蛋类说法正确的是（  ）", "options": ["A.煮久后的鸡蛋黄颜色变青褐色，是因为维生素A高温受破坏", "B.皮蛋蛋白表面青褐色是因为铅高", "C.蛋黄颜色是由营养素多少决定，与饲料无关", "D.蛋黄中富含胆碱，主要通过卵磷脂形式被吸收"], "answer": "答案：D", "analysis": ["解析：《中国营养科学全书》第2版P483。", "A错，蛋黄中含硫氨基酸受热分解后产生硫化氢，与蛋黄内铁反应产生黑色的硫化铁。", "B错，蛋中微量的葡萄糖与蛋白质碱水解产生的氨基酸发生美拉德反应而褐变。", "C错，蛋黄的颜色受禽类饲料成分的影响。", "D对，蛋黄中的磷脂主要是卵磷脂（磷脂酰胆碱）和脑磷脂。"]}, {"type": "q", "stem": "[2018DTR真题]3.煮鸡蛋时，如果煮的时间过长后会使蛋黄外面呈墨绿色，这是因为生成了下列哪种化合物所导致的（ ）", "options": ["A.硫酸铁", "B.磷酸铁", "C.氯化铁", "D.硫化铁"], "answer": "答案：D", "analysis": ["解析：鸡蛋中的含硫蛋白质（蛋氨酸），在长时间加热后，可分解出硫化物， 与蛋黄中的铁元素反应形成硫化铁。"]}, {"type": "q", "stem": "[2020DTR真题]4.下列关于蛋制品描述错误的是（ ）", "options": ["A.皮蛋中应用到蛋白质遇碱变性的原理", "B.蛋黄酱应用到蛋黄乳化的原理", "C.腌蛋钠含量上升", "D.皮蛋中松花出现与铁有关"], "answer": "答案：D", "analysis": ["解析：制造松花蛋时，在泥巴里加入了一些碱性的物质，如石灰、碳酸钾、碳酸钠等。它们会穿过蛋壳上的细孔，与氨基酸化合，生成氨基酸盐。这些氨基酸盐不溶于蛋白，于是就以一定几何形状结晶出来，就形成了漂亮的松花。"]}, {"type": "q", "stem": "[2020DTR真题]5.蛋黄中具有乳化剂作用的成分是（  ）", "options": ["A.胆固醇", "B.视黄醇", "C.卵磷脂", "D.抗生物素蛋白"], "answer": "答案：C", "analysis": ["解析：《营养与食品卫生学》第9版P34、P127。", "磷脂可以使体液中的脂肪悬浮在体液中，有利于其吸收、转运和代谢，即磷脂具有乳化剂作用。蛋黄是磷脂的良好食物来源，蛋黄中的磷脂主要是卵磷脂和脑磷脂，除此之外还有神经鞘磷脂。"]}], "qn": 5}]}, {"name": "三、特殊人群与特殊环境营养", "count": 125, "ntopic": 25, "topics": [{"title": "54 孕妇营养（一）", "items": [{"type": "q", "stem": "[2019RD真题]1.孕期生理变化，错误的是（  ）", "options": ["A.甲状腺素和胰岛素分泌减少", "B.孕晚期基础代谢升高", "C.血容量随妊娠进展增加", "D.消化液和消化酶分泌减少"], "answer": "答案：A解析：《中国营养科学全书 》第2版P1042、P1043。", "analysis": ["A错，孕期甲状腺呈均匀性增大，约比非孕时增大65%。血浆甲状腺素T3、T4水平升高，但游离甲状腺素升高不多。妊娠期胰岛功能旺盛，胰岛素分泌增加，循环血中胰岛素水平升高。"]}, {"type": "q", "stem": "[2017RD真题]4.孕期体重增长过多的危害有（  ）①巨大儿；②妊娠糖尿病；③低出生体重儿；④早产；⑤新生儿过敏", "options": ["A.①②④", "B.①②⑤", "C.①②③", "D.②④⑤"], "answer": "答案：A解析：《中国营养科学全书》第2版P1054。", "analysis": ["孕期体重增长过多—增加出生巨大儿及继发性头盆不称、妊娠期高血压综合征和妊娠糖尿病等并发症发生的风险，导致产妇围生期死亡危险性增加，也致续后发生肥胖、2型糖尿病及产后体重滞留的风险增加。", "孕期体重增长不足—胎儿宫内生长发育受限，致早产、出生低体重儿及围生期死亡危险性增加。即使成活，其成年后患心脏病、2型糖尿病、高血压等慢性疾病的风险也增加。"]}, {"type": "q", "stem": "[2022RD真题]3.下列关于孕早期妊娠反应的描述中，正确的是（  ）", "options": ["A.呕吐是因为孕酮分泌增加，导致胃肠道收缩加快", "B.妊娠剧吐需要补液，纠正水、电解质紊乱", "C.为避免酮血症发生，每天应至少摄入30g碳水化合物", "D.补充维生素B1有助于缓解恶心反应"], "answer": "答案：B", "analysis": ["解析：《中国营养科学全书》第2版P1043、P1056。", "A错，孕激素使平滑肌张力降低，蠕动减慢，胃肠道活动减弱，消化液分泌减少。", "B对，妊娠剧吐需补液纠正水、电解质紊乱。", "C错，每天应摄入含有130g碳水化合物的食物，以避免酮血症发生。", "D错，可给予维生素B6治疗，有助于缓解恶心反应。"]}, {"type": "q", "stem": "[2023RD真题]4.下列关于妊娠期母体生理变化的描述中，错误的是（  ）", "options": ["A.血浆容积增加，红细胞数目增加", "B.胎盘分泌人绒毛膜生长素升高，导致脂肪分解，游离脂肪酸升高", "C.肾小球滤过率增加，肾血浆流量增加", "D.孕酮增加引起胃肠道平滑肌张力增加，促使胃排空减慢，导致恶心、消化不良等"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P132-P133。", "孕酮分泌增加可引起胃肠平滑肌张力下降，贲门括约肌松弛，消化液分泌量减少，胃排空时间延长，肠蠕动减弱等，易出现恶心、呕吐、反酸、消化不良、便秘等妊娠反应。"]}, {"type": "q", "stem": "[2019DTR真题]5.李女士，孕20周，身高160cm，体重66kg，孕前体重56kg，父母认为“怀孕就是一个人吃，两个人补，孕期多吃应该且必要，怀孕期胖没有关系，孕后慢慢减”。根据李女士情况，孕20周的理想体重为（  ）", "options": ["A.62kg~66kg", "B.67kg~70kg", "C.56kg~58kg", "D.59kg~61kg"], "answer": "答案：D", "analysis": ["解析：《营养与食品卫生学》第9版P134。", "孕前BMI=56÷1.6÷1.6=21.9，孕前体重正常。", "孕20周属于孕中期，每周理想增重0.37kg，孕14周~孕20周共增重0.37×7=2.59kg。", "孕早期增重0~2kg。", "孕20周理想体重为56+0+2.59~56+2+2.59，即58.59~60.59，约等于59~61kg。"]}], "qn": 5}, {"title": "55 孕妇营养（二）", "items": [{"type": "q", "stem": "[2020RD真题]1.孕妇必须摄入足量的蛋白质以满足自身及胎儿生长发育的需要，和非孕女性比较，孕早期、孕中期和孕晚期蛋白质推荐摄入量的增加值分别是（  ）", "options": ["A.0g、15g、25g", "B.0g、15g、30g", "C.5g、15g、25g", "D.5g、15g、30g"], "answer": "答案：B", "analysis": ["解析：《营养与食品卫生学》第9版P134。", "孕妇蛋白质推荐摄入量（RNI） 为：妊娠早期不增加，妊娠中期和妊娠晚期分别增加15g/d 和30g/d。妊娠期膳食中优质蛋白质至少占蛋白质总量的1/3以上。"]}, {"type": "q", "stem": "[2021RD真题]2.以下营养素在孕期不需要增加的是（  ）", "options": ["A.维生素A", "B.钾", "C.叶酸", "D.钙"], "answer": "答案：B", "analysis": ["解析：《中国居民膳食营养素参考摄入量2013》。", "按DRIs2023，钾、钙都不增加。此题是2021真题，当时按DRIs2013。"]}, {"type": "q", "stem": "[2021DTR真题]3.孕早期就需要额外补充的营养素是（  ）①钙；②铁；③叶酸；④维生素B12；⑤维生素A。", "options": ["A.②③④⑤", "B.③④⑤", "C.③④", "D.①②③④⑤"], "answer": "答案：C", "analysis": ["解析：《中国居民膳食营养素参考摄入量（2013）》。", "按DRIs2023，钙也不增加。此题是2021真题，当时按DRIs2013。"]}, {"type": "q", "stem": "[2021DTR真题]4.孕早期就需要额外补充的营养素是（  ）①钙；②铁；③叶酸；④维生素B12；⑤维生素A。", "options": ["A.②③④⑤", "B.③④⑤", "C.③④", "D.①②③④⑤"], "answer": "答案：C", "analysi
