<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>食物营养估算引擎 · 评测仪表盘</title>
<style>
:root{
  --bg:#0f0f1a; --card:#1a1a2e; --card2:#16213e; --text:#e0e0e0; --t2:#8888aa;
  --green:#00e676; --orange:#ff9100; --red:#ff1744; --blue:#448aff; --purple:#e040fb;
  --cyan:#18ffff; --yellow:#ffea00; --accent:linear-gradient(135deg,#667eea,#764ba2);
  --shadow:0 8px 32px rgba(0,0,0,0.3); --radius:16px;
  --glow-green:0 0 20px rgba(0,230,118,0.3); --glow-purple:0 0 20px rgba(224,64,251,0.3);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;background-image:radial-gradient(ellipse at 20% 20%,rgba(102,126,234,0.15) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(224,64,251,0.1) 0%,transparent 50%)}
.container{max-width:1400px;margin:0 auto;padding:24px}

/* Animated header */
.hero{text-align:center;padding:48px 24px 32px;position:relative}
.hero h1{font-size:42px;font-weight:900;background:linear-gradient(135deg,#667eea 0%,#e040fb 50%,#18ffff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px;letter-spacing:-1px}
.hero .subtitle{font-size:15px;color:var(--t2);letter-spacing:2px}

/* Stats row */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:32px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow);text-align:center;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,0.05);transition:transform 0.3s,box-shadow 0.3s}
.stat-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,0.4)}
.stat-card .icon{font-size:28px;margin-bottom:8px}
.stat-card .value{font-size:44px;font-weight:900;margin:8px 0}
.stat-card .label{font-size:13px;color:var(--t2);text-transform:uppercase;letter-spacing:1px}
.stat-card.accent{background:linear-gradient(135deg,#667eea,#764ba2);border:none}
.stat-card.accent .label{color:rgba(255,255,255,0.7)}
.stat-card.accent .value{color:white}
.glow-green{box-shadow:var(--glow-green)}
.glow-purple{box-shadow:var(--glow-purple)}

/* Section */
.section{background:var(--card);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow);margin-bottom:24px;border:1px solid rgba(255,255,255,0.05)}
.section h2{font-size:20px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:10px;color:white}
.section h2 .badge{font-size:12px;padding:4px 10px;border-radius:20px;background:rgba(102,126,234,0.2);color:#667eea}

/* Case grid */
.case-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:16px}
.case-card{background:var(--card2);border-radius:var(--radius);padding:20px;cursor:pointer;border:1px solid rgba(255,255,255,0.06);transition:all 0.3s;position:relative;overflow:hidden}
.case-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:3px 3px 0 0;transition:opacity 0.3s}
.case-card:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,0.5);border-color:rgba(102,126,234,0.3)}
.case-card.open{border-color:rgba(102,126,234,0.5)}
.case-card .header-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.case-card .name{font-size:16px;font-weight:700;color:white}
.case-card .id{font-size:11px;color:var(--t2)}
.case-card .metrics{display:flex;gap:16px;margin:12px 0}
.case-card .metric{text-align:center}
.case-card .metric .num{font-size:24px;font-weight:800}
.case-card .metric .lbl{font-size:10px;color:var(--t2);text-transform:uppercase}
.case-card .progress-wrap{height:6px;background:rgba(255,255,255,0.08);border-radius:3px;margin-top:4px;overflow:hidden}
.case-card .progress-bar{height:100%;border-radius:3px;transition:width 0.6s ease}
.case-card .tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.case-card .tag{font-size:10px;padding:3px 8px;border-radius:10px;background:rgba(255,255,255,0.06);color:var(--t2)}
.case-card .tag.warn{background:rgba(255,145,0,0.15);color:var(--orange)}
.case-card .tag.good{background:rgba(0,230,118,0.15);color:var(--green)}

/* Expanded detail */
.detail{display:none;margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.08)}
.case-card.open .detail{display:block}
.field-row{display:flex;align-items:center;padding:6px 0;font-size:12px;border-bottom:1px solid rgba(255,255,255,0.03)}
.field-row .fname{flex:1;color:var(--t2)}
.field-row .fval{width:60px;text-align:right;font-weight:600}
.field-row .fstatus{width:24px;text-align:center}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.dot.green{background:var(--green)}
.dot.red{background:var(--red)}

/* Comparison table */
.compare-table{width:100%;border-collapse:collapse;font-size:13px}
.compare-table th{padding:12px 16px;text-align:left;font-weight:600;color:var(--t2);border-bottom:1px solid rgba(255,255,255,0.08);font-size:11px;text-transform:uppercase;letter-spacing:1px}
.compare-table td{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.04)}
.compare-table tr:hover td{background:rgba(255,255,255,0.02)}
.rank-badge{display:inline-block;width:28px;height:28px;line-height:28px;text-align:center;border-radius:8px;font-size:12px;font-weight:700}
.rank-1{background:linear-gradient(135deg,#ffd700,#ff9100);color:#000}
.rank-2{background:linear-gradient(135deg,#c0c0c0,#90a4ae);color:#000}
.rank-3{background:linear-gradient(135deg,#cd7f32,#a0522d);color:#fff}

.footer{text-align:center;padding:32px;color:var(--t2);font-size:12px}

@media(max-width:768px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .hero h1{font-size:28px}
  .case-grid{grid-template-columns:1fr}
}
</style>
</head>

  <div class="subtitle">PROMPT v1.1 · 评测仪表盘 · 2026-07-03 18:44:32</div>

// Rank table

D.forEach((c,i) => {
  const composite = Math.round(0.45*c.irr + 0.30*c.logic + 25);
  const rank = i+1;
  const rankClass = rank===1?'rank-1':rank===2?'rank-2':rank===3?'rank-3':'';
  const irrColor = c.irr>=90?'var(--green)':c.irr>=70?'var(--orange)':'var(--red)';
  const logicColor = c.logic>=80?'var(--green)':c.logic>=60?'var(--orange)':'var(--red)';
  rankHTML += `<tr>
    <td><span class="rank-badge ${rankClass}">${rank}</span></td>
    <td><strong>${c.name}</strong></td>
    <td><span style="color:${irrColor};font-weight:700">${c.irr}%</span></td>
    <td><span style="color:${logicColor};font-weight:700">${c.logic}%</span></td>
    <td><span style="color:var(--purple);font-weight:600">${composite}%</span></td>
    <td style="font-size:11px;color:var(--t2)">${c.path}</td>
    <td style="font-size:11px;color:var(--t2)">${c.conf}</td>

});
document.getElementById('rank-table').innerHTML = rankHTML;

  const barColor = c.irr>=90?'var(--green)':c.irr>=70?'var(--orange)':'var(--red)';

  // Logic checks

  c.lc.forEach(l => {
    logicHTML += `<div class="field-row">

  // Warning tags
